  - {type: 'tls:div-end', offset: 13649, content: '', id: KR3ep016_jc_004-d6.d2d66}
  - {type: 'tls:div-start', offset: 13649, content: '', id: KR3ep016_jc_004-d6.d2d67, level: 3, head_text: 堂嫂王氏吐紫黑血塊足跟焮腫癢痛}
  - {type: 'tls:head', offset: 13649, content: '', id: KR3ep016_jc_004-d6.d2.d67.h1s1}
  - {type: 'tls:div-end', offset: 13723, content: '', id: KR3ep016_jc_004-d6.d2d67}
  - {type: 'tls:div-start', offset: 13723, content: '', id: KR3ep016_jc_004-d6.d2d68, level: 3, head_text: 弟婦程氏孕五月痢下膿血}
  - {type: 'tls:head', offset: 13723, content: '', id: KR3ep016_jc_004-d6.d2.d68.h1s1}
  - {type: 'tls:div-end', offset: 13908, content: '', id: KR3ep016_jc_004-d6.d2d68}
  - {type: 'tls:div-start', offset: 13908, content: '', id: KR3ep016_jc_004-d6.d2d69, level: 3, head_text: 嫂汪氏頭疼遍身痛痢下赤白}
  - {type: 'tls:head', offset: 13908, content: '', id: KR3ep016_jc_004-d6.d2.d69.h1s1}
  - {type: 'tls:div-end', offset: 14046, content: '', id: KR3ep016_jc_004-d6.d2d69}
  - {type: 'tls:div-start', offset: 14046, content: '', id: KR3ep016_jc_004-d6.d2d70, level: 3, head_text: 仲闇氣虛中滿有發明}
  - {type: 'tls:head', offset: 14046, content: '', id: KR3ep016_jc_004-d6.d2.d70.h1s1}
  - {type: 'tls:div-end', offset: 14633, content: '', id: KR3ep016_jc_004-d6.d2d70}
  - {type: 'tls:div-start', offset: 14633, content: '', id: KR3ep016_jc_004-d6.d2d71, level: 3, head_text: 朱懷竹楊梅毒氣內攻上迫於肺將成肺癰下流陰囊囊潰見子}
  - {type: 'tls:head', offset: 14633, content: '', id: KR3ep016_jc_004-d6.d2.d71.h1s1}
  - {type: 'tls:div-end', offset: 15403, content: '', id: KR3ep016_jc_004-d6.d2d71}
  - {type: 'tls:div-start', offset: 15403, content: '', id: KR3ep016_jc_004-d6.d2d72, level: 3, head_text: 查良本兄令眷每飲食悉從背後而下}
  - {type: 'tls:head', offset: 15403, content: '', id: KR3ep016_jc_004-d6.d2.d72.h1s1}
  - {type: 'tls:div-end', offset: 15670, content: '', id: KR3ep016_jc_004-d6.d2d72}
  - {type: 'tls:div-start', offset: 15670, content: '', id: KR3ep016_jc_004-d6.d2d73, level: 3, head_text: 後谿大兄孺人戴氏患血痢有發明}
  - {type: 'tls:head', offset: 15670, content: '', id: KR3ep016_jc_004-d6.d2.d73.h1s1}
  - {type: 'tls:div-end', offset: 16435, content: '', id: KR3ep016_jc_004-d6.d2d73}
  - {type: 'tls:div-start', offset: 16435, content: '', id: KR3ep016_jc_004-d6.d2d74, level: 3, head_text: 邵敬圃乃眷胃脘痛}
  - {type: 'tls:head', offset: 16435, content: '', id: KR3ep016_jc_004-d6.d2.d74.h1s1}
  - {type: 'tls:div-end', offset: 16549, content: '', id: KR3ep016_jc_004-d6.d2d74}
  - {type: 'tls:div-start', offset: 16549, content: '', id: KR3ep016_jc_004-d6.d2d75, level: 3, head_text: 蘇望臺患瘧有發明}
  - {type: 'tls:head', offset: 16549, content: '', id: KR3ep016_jc_004-d6.d2.d75.h1s1}
  - {type: 'tls:div-end', offset: 17394, content: '', id: KR3ep016_jc_004-d6.d2d75}
  - {type: 'tls:div-start', offset: 17394, content: '', id: KR3ep016_jc_004-d6.d2d76, level: 3, head_text: 汪氏嫗寒痰壅滯}
  - {type: 'tls:head', offset: 17394, content: '', id: KR3ep016_jc_004-d6.d2.d76.h1s1}
  - {type: 'tls:div-end', offset: 17491, content: '', id: KR3ep016_jc_004-d6.d2d76}
  - {type: 'tls:div-start', offset: 17491, content: '', id: KR3ep016_jc_004-d6.d2d77, level: 3, head_text: 徐客兄子筋痿風}
  - {type: 'tls:head', offset: 17491, content: '', id: KR3ep016_jc_004-d6.d2.d77.h1s1}
  - {type: 'tls:div-end', offset: 17865, content: '', id: KR3ep016_jc_004-d6.d2d77}
  - {type: 'tls:div-start', offset: 17865, content: '', id: KR3ep016_jc_004-d6.d2d78, level: 3, head_text: 邵老封君手足麻而無力}
  - {type: 'tls:head', offset: 17865, content: '', id: KR3ep016_jc_004-d6.d2.d78.h1s1}
  - {type: 'tls:div-end', offset: 17977, content: '', id: KR3ep016_jc_004-d6.d2d78}
  - {type: 'tls:div-start', offset: 17977, content: '', id: KR3ep016_jc_004-d6.d2d79, level: 3, head_text: 程巢父乃郎痢後風有發明}
  - {type: 'tls:head', offset: 17977, content: '', id: KR3ep016_jc_004-d6.d2.d79.h1s1}
  - {type: 'tls:div-end', offset: 18319, content: '', id: KR3ep016_jc_004-d6.d2d79}
  - {type: 'tls:div-start', offset: 18319, content: '', id: KR3ep016_jc_004-d6.d2d80, level: 3, head_text: 葉潤齋心膈嘈雜好啖肉尤好雞腹大痛蟲症也}
  - {type: 'tls:head', offset: 18319, content: '', id: KR3ep016_jc_004-d6.d2.d80.h1s1}
  - {type: 'tls:div-end', offset: 18662, content: '', id: KR3ep016_jc_004-d6.d2d80}
  - {type: 'tls:div-start', offset: 18662, content: '', id: KR3ep016_jc_004-d6.d2d81, level: 3, head_text: 程相如令政孕七月患痢}
  - {type: 'tls:head', offset: 18662, content: '', id: KR3ep016_jc_004-d6.d2.d81.h1s1}
  - {type: 'tls:div-end', offset: 18783, content: '', id: KR3ep016_jc_004-d6.d2d81}
  - {type: 'tls:div-start', offset: 18783, content: '', id: KR3ep016_jc_004-d6.d2d82, level: 3, head_text: 程曉山中風先兆有發明}
  - {type: 'tls:head', offset: 18783, content: '', id: KR3ep016_jc_004-d6.d2.d82.h1s1}
  - {type: 'tls:div-end', offset: 19183, content: '', id: KR3ep016_jc_004-d6.d2d82}
  - {type: 'tls:div-start', offset: 19183, content: '', id: KR3ep016_jc_004-d6.d2d83, level: 3, head_text: 程曉山令郎麻後疳症}
  - {type: 'tls:head', offset: 19183, content: '', id: KR3ep016_jc_004-d6.d2.d83.h1s1}
  - {type: 'tls:div-end', offset: 19373, content: '', id: KR3ep016_jc_004-d6.d2d83}
  - {type: 'tls:div-start', offset: 19373, content: '', id: KR3ep016_jc_004-d6.d2d84, level: 3, head_text: 一婦疫後虛寒}
  - {type: 'tls:head', offset: 19373, content: '', id: KR3ep016_jc_004-d6.d2.d84.h1s1}
  - {type: 'tls:div-end', offset: 19631, content: '', id: KR3ep016_jc_004-d6.d2d84}
  - {type: 'tls:div-start', offset: 19631, content: '', id: KR3ep016_jc_004-d6.d2d85, level: 3, head_text: 從獻長郎七歲患痢疾後成疳有發明}
  - {type: 'tls:head', offset: 19631, content: '', id: KR3ep016_jc_004-d6.d2.d85.h1s1}
  - {type: 'tls:div-end', offset: 20118, content: '', id: KR3ep016_jc_004-d6.d2d85}
  - {type: 'tls:div-start', offset: 20118, content: '', id: KR3ep016_jc_004-d6.d2d86, level: 3, head_text: 侄孫子忠痢下紅膿如爛魚腸腹大痛日夜百次}
  - {type: 'tls:head', offset: 20118, content: '', id: KR3ep016_jc_004-d6.d2.d86.h1s1}
  - {type: 'tls:div-end', offset: 20769, content: '', id: KR3ep016_jc_004-d6.d2d86}
  - {type: 'tls:div-start', offset: 20769, content: '', id: KR3ep016_jc_004-d6.d2d87, level: 3, head_text: 元素內人雙胎難產治奇}
  - {type: 'tls:head', offset: 20769, content: '', id: KR3ep016_jc_004-d6.d2.d87.h1s1}
  - {type: 'tls:div-end', offset: 21033, content: '', id: KR3ep016_jc_004-d6.d2d87}
  - {type: 'tls:div-start', offset: 21033, content: '', id: KR3ep016_jc_004-d6.d2d88, level: 3, head_text: 邵馬兄患嘔吐所吐皆如爛豬肺}
  - {type: 'tls:head', offset: 21033, content: '', id: KR3ep016_jc_004-d6.d2.d88.h1s1}
  - {type: 'tls:div-end', offset: 21278, content: '', id: KR3ep016_jc_004-d6.d2d88}
  - {type: 'tls:div-start', offset: 21278, content: '', id: KR3ep016_jc_004-d6.d2d89, level: 3, head_text: 許卓峰上吐血下溲血咳嗽聲啞}
  - {type: 'tls:head', offset: 21278, content: '', id: KR3ep016_jc_004-d6.d2.d89.h1s1}
  - {type: 'tls:div-end', offset: 21656, content: '', id: KR3ep016_jc_004-d6.d2d89}
  - {type: 'tls:div-start', offset: 21656, content: '', id: KR3ep016_jc_004-d6.d2d90, level: 3, head_text: 族嫂汪氏患痢赤白嘔吐痰涎粒米不進二月}
  - {type: 'tls:head', offset: 21656, content: '', id: KR3ep016_jc_004-d6.d2.d90.h1s1}
  - {type: 'tls:div-end', offset: 21810, content: '', id: KR3ep016_jc_004-d6.d2d90}
  - {type: 'tls:div-start', offset: 21810, content: '', id: KR3ep016_jc_004-d6.d2d91, level: 3, head_text: 邵來儀丈令眷咳吐紅痰如桃花膿色}
  - {type: 'tls:head', offset: 21810, content: '', id: KR3ep016_jc_004-d6.d2.d91.h1s1}
  - {type: 'tls:div-end', offset: 21929, content: '', id: KR3ep016_jc_004-d6.d2d91}
  - {type: 'tls:div-start', offset: 21929, content: '', id: KR3ep016_jc_004-d6.d2d92, level: 3, head_text: 程玄祖兄春溫食復僵寢如屍有發明}
  - {type: 'tls:head', offset: 21929, content: '', id: KR3ep016_jc_004-d6.d2.d92.h1s1}
  - {type: 'tls:div-end', offset: 22230, content: '', id: KR3ep016_jc_004-d6.d2d92}
  - {type: 'tls:div-start', offset: 22230, content: '', id: KR3ep016_jc_004-d6.d2d93, level: 3, head_text: 汪郎兄蟲痛}
  - {type: 'tls:head', offset: 22230, content: '', id: KR3ep016_jc_004-d6.d2.d93.h1s1}
  - {type: 'tls:div-end', offset: 22302, content: '', id: KR3ep016_jc_004-d6.d2d93}
  - {type: 'tls:div-start', offset: 22302, content: '', id: KR3ep016_jc_004-d6.d2d94, level: 3, head_text: 查景川氣虛瘡疥}
  - {type: 'tls:head', offset: 22302, content: '', id: KR3ep016_jc_004-d6.d2.d94.h1s1}
  - {type: 'tls:div-end', offset: 22441, content: '', id: KR3ep016_jc_004-d6.d2d94}
  - {type: 'tls:div-start', offset: 22441, content: '', id: KR3ep016_jc_004-d6.d2d95, level: 3, head_text: 程玉吾內人妊七月內吹}
  - {type: 'tls:head', offset: 22441, content: '', id: KR3ep016_jc_004-d6.d2.d95.h1s1}
  - {type: 'tls:div-end', offset: 22603, content: '', id: KR3ep016_jc_004-d6.d2d95}
  - {type: 'tls:div-start', offset: 22603, content: '', id: KR3ep016_jc_004-d6.d2d96, level: 3, head_text: 一黃氏婦受身足月發癇}
  - {type: 'tls:head', offset: 22603, content: '', id: KR3ep016_jc_004-d6.d2.d96.h1s1}
  - {type: 'tls:div-end', offset: 22753, content: '', id: KR3ep016_jc_004-d6.d2d96}
  - {type: 'tls:div-start', offset: 22753, content: '', id: KR3ep016_jc_004-d6.d2d97, level: 3, head_text: 吳見南令郎心脾痛}
  - {type: 'tls:head', offset: 22753, content: '', id: KR3ep016_jc_004-d6.d2.d97.h1s1}
  - {type: 'tls:div-end', offset: 22870, content: '', id: KR3ep016_jc_004-d6.d2d97}
  - {type: 'tls:div-start', offset: 22870, content: '', id: KR3ep016_jc_004-d6.d2d98, level: 3, head_text: 又令郎八歲疳積蟲痛}
  - {type: 'tls:head', offset: 22870, content: '', id: KR3ep016_jc_004-d6.d2.d98.h1s1}
  - {type: 'tls:div-end', offset: 22951, content: '', id: KR3ep016_jc_004-d6.d2d98}
  - {type: 'tls:div-start', offset: 22951, content: '', id: KR3ep016_jc_004-d6.d2d99, level: 3, head_text: 侄女八歲腹高於胸咳嗽嘔吐甚則噴血}
  - {type: 'tls:head', offset: 22951, content: '', id: KR3ep016_jc_004-d6.d2.d99.h1s1}
  - {type: 'tls:div-end', offset: 23054, content: '', id: KR3ep016_jc_004-d6.d2d99}
  - {type: 'tls:div-start', offset: 23054, content: '', id: KR3ep016_jc_004-d6.d2d100, level: 3, head_text: 從兄䤾年五旬左脅痛手足抽搐不能步履}
  - {type: 'tls:head', offset: 23054, content: '', id: KR3ep016_jc_004-d6.d2.d100.h1s1}
  - {type: 'tls:div-end', offset: 23362, content: '', id: KR3ep016_jc_004-d6.d2d100}
  - {type: 'tls:div-start', offset: 23362, content: '', id: KR3ep016_jc_004-d6.d2d101, level: 3, head_text: 小童上達脾虛發腫}
  - {type: 'tls:head', offset: 23362, content: '', id: KR3ep016_jc_004-d6.d2.d101.h1s1}
  - {type: 'tls:div-end', offset: 23536, content: '', id: KR3ep016_jc_004-d6.d2d101}
  - {type: 'tls:div-start', offset: 23536, content: '', id: KR3ep016_jc_004-d6.d2d102, level: 3, head_text: 族侄良詮血痢腹痛有發明}
  - {type: 'tls:head', offset: 23536, content: '', id: KR3ep016_jc_004-d6.d2.d102.h1s1}
  - {type: 'tls:div-end', offset: 23935, content: '', id: KR3ep016_jc_004-d6.d2d102}
  - {type: 'tls:div-start', offset: 23935, content: '', id: KR3ep016_jc_004-d6.d2d103, level: 3, head_text: 一婦胸膈有痰大便泄瀉大發寒熱}
  - {type: 'tls:head', offset: 23935, content: '', id: KR3ep016_jc_004-d6.d2.d103.h1s1}
  - {type: 'tls:div-end', offset: 24133, content: '', id: KR3ep016_jc_004-d6.d2d103}
  - {type: 'tls:div-start', offset: 24133, content: '', id: KR3ep016_jc_004-d6.d2d104, level: 3, head_text: 從弟婦程氏右脅痛不能睡背心疼胸膈作梗痰中有血}
  - {type: 'tls:head', offset: 24133, content: '', id: KR3ep016_jc_004-d6.d2.d104.h1s1}
  - {type: 'tls:div-end', offset: 24266, content: '', id: KR3ep016_jc_004-d6.d2d104}
  - {type: 'tls:div-start', offset: 24266, content: '', id: KR3ep016_jc_004-d6.d2d105, level: 3, head_text: 黃懷虛原患吐血又咳嗽嘔吐左脅不能著席}
  - {type: 'tls:head', offset: 24266, content: '', id: KR3ep016_jc_004-d6.d2.d105.h1s1}
  - {type: 'tls:div-end', offset: 24356, content: '', id: KR3ep016_jc_004-d6.d2d105}
  - {type: 'tls:div-start', offset: 24356, content: '', id: KR3ep016_jc_004-d6.d2d106, level: 3, head_text: 一族姐年六十咳嗽口渴常吐蛔蟲}
  - {type: 'tls:head', offset: 24356, content: '', id: KR3ep016_jc_004-d6.d2.d106.h1s1}
  - {type: 'tls:div-end', offset: 24454, content: '', id: KR3ep016_jc_004-d6.d2d106}
  - {type: 'tls:div-start', offset: 24454, content: '', id: KR3ep016_jc_004-d6.d2d107, level: 3, head_text: 侄婦戴氏心痛徹背背痛徹心一發必七日}
  - {type: 'tls:head', offset: 24454, content: '', id: KR3ep016_jc_004-d6.d2.d107.h1s1}
  - {type: 'tls:div-end', offset: 24570, content: '', id: KR3ep016_jc_004-d6.d2d107}
  - {type: 'tls:div-start', offset: 24570, content: '', id: KR3ep016_jc_004-d6.d2d108, level: 3, head_text: 老僕來興痰火上壅胸脅背心脹痛}
  - {type: 'tls:head', offset: 24570, content: '', id: KR3ep016_jc_004-d6.d2.d108.h1s1}
  - {type: 'tls:div-end', offset: 24668, content: '', id: KR3ep016_jc_004-d6.d2d108}
  - {type: 'tls:div-start', offset: 24668, content: '', id: KR3ep016_jc_004-d6.d2d109, level: 3, head_text: 一婦生女不生子多思郁小便秘而不通轉脬症也治奇}
  - {type: 'tls:head', offset: 24668, content: '', id: KR3ep016_jc_004-d6.d2.d109.h1s1}
  - {type: 'tls:div-end', offset: 24932, content: '', id: KR3ep016_jc_004-d6.d2d109}
  - {type: 'tls:div-start', offset: 24932, content: '', id: KR3ep016_jc_004-d6.d2d110, level: 3, head_text: 昆池太學內人牙痛一晚暈厥三次}
  - {type: 'tls:head', offset: 24932, content: '', id: KR3ep016_jc_004-d6.d2.d110.h1s1}
  - {type: 'tls:div-end', offset: 25058, content: '', id: KR3ep016_jc_004-d6.d2d110}
  - {type: 'tls:div-start', offset: 25058, content: '', id: KR3ep016_jc_004-d6.d2d111, level: 3, head_text: 一僕婦難產子宮墜出戶外半月不收治奇}
  - {type: 'tls:head', offset: 25058, content: '', id: KR3ep016_jc_004-d6.d2.d111.h1s1}
  - {type: 'tls:div-end', offset: 25415, content: '', id: KR3ep016_jc_004-d6.d2d111}
  - {type: 'tls:div-start', offset: 25415, content: '', id: KR3ep016_jc_004-d6.d2d112, level: 3, head_text: 侄孫媳程氏體肥經閉者八年}
  - {type: 'tls:head', offset: 25415, content: '', id: KR3ep016_jc_004-d6.d2.d112.h1s1}
  - {type: 'tls:div-end', offset: 25704, content: '', id: KR3ep016_jc_004-d6.d2d112}
  - {type: 'tls:div-start', offset: 25704, content: '', id: KR3ep016_jc_004-d6.d2d113, level: 3, head_text: 熊成八官早起行路眼見邪火兩團滾來大被驚駭}
  - {type: 'tls:head', offset: 25704, content: '', id: KR3ep016_jc_004-d6.d2.d113.h1s1}
  - {type: 'tls:div-end', offset: 26041, content: '', id: KR3ep016_jc_004-d6.d2d113}
  - {type: 'tls:div-start', offset: 26041, content: '', id: KR3ep016_jc_004-d6.d2d114, level: 3, head_text: 從侄中叔太學以暑月赴南雍一日轉斑出}
  - {type: 'tls:head', offset: 26041, content: '', id: KR3ep016_jc_004-d6.d2.d114.h1s1}
  - {type: 'tls:div-end', offset: 26596, content: '', id: KR3ep016_jc_004-d6.d2d114}
  - {type: 'tls:div-start', offset: 26596, content: '', id: KR3ep016_jc_004-d6.d2d115, level: 3, head_text: 程達庵四媳戴氏產半月而腿疼}
  - {type: 'tls:head', offset: 26596, content: '', id: KR3ep016_jc_004-d6.d2.d115.h1s1}
  - {type: 'tls:div-end', offset: 27173, content: '', id: KR3ep016_jc_004-d6.d2d115}
  - {type: 'tls:div-end', offset: 27173, content: '', id: KR3ep016_jc_004-d6d2}
