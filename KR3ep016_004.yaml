body:
  text: 卷四新都治驗孫子元瘡後沐浴鼻出紅涕面足浮腫孫文學子元素多瘡疥近因沐浴鼻涕出紅面足浮腫汗多左脈大而有力右寸亦大據脈多思而氣不暢以葛根大腹皮厚朴赤茯苓青蒿澤瀉白朮鬱金升麻木通滑石黃芩水煎飲之浮腫漸消惟鼻紅尚在口且渴改用當歸白芍藥知母甘草石斛麥門冬五味子山梔子玄參調理而愈一婦食積痰飲瘀血流於下部左跨臍腹脹痛一婦因夫荒於酒色不事生計多憂多郁左跨疼痛且及於膝小水頻數大便頻並臍腹脹痛口乾脈之左手數右手弱近又發熱惡寒汗因痛出時刻不寧此食積痰飲瘀血流於下部足厥陽之經挾鬱火而痛恐成腸癰與神效栝蔞散一帖半夜後痛即減半汗也尋止次日診之數脈稍退小腹堅如石按之且痛再與前藥其夜環跳穴亦作痛直至於膝小腹稍軟小便仍痛大便也未通利仍與前藥每帖用大栝蔞二枚加牡丹皮莪朮五靈脂金銀花服下大便利而熱退痛止小水亦長諸症悉平恆宇令堂左肩筋搐腫痛太學恆宇侄令堂仲春右肩筋搐腫痛夜尤甚次日痛連胛下出臑入曲池且灑淅寒熱以二陳湯加南星酒芩白殭蠶羌活秦艽威靈仙服後至子丑時病乃減半而筋不搐矣紅腫略消次日減去南星加當歸川芎其夜肩痛又遞減但一夜不睡口乾舌硬用川芎當歸防風秦艽甘草威靈仙白殭蠶酒芩白芍藥服此熱全退痛全減飲食始進以人參川芎白芍藥當歸甘草秦艽殭蠶防風陳皮調理良安孫君錫頭痛胸背脹飲食作吐咳嗽族侄孫君錫頭痛胸背脹飲食下膈便吐咳嗽不住口痰濁如膿大便結燥脈之獨右寸洪大以二陳湯加竹茹滑石石膏酒連麥冬連進四劑夜與益元丸兼服而嗽吐俱止惟痰濁如膿色且腥氣觸人此將欲作肺癰改用牡丹皮麥門冬山梔子甘草貝母枳殼桑白皮紫菀知母當歸生地黃桔梗四帖全安孫爾嘉內人三妊而三小產侄孫爾嘉內人三孕而三小產六脈滑數乃氣虛血熱也由其熱故多滑下因其血頻下心甚恐怖終日偃臥略不敢起身稍起血即大下與生地白芍藥白朮地榆桑寄生續斷甘草升麻椿根白皮黃柏條芩服之而血三日不來惟白帶綿綿下過五日後因有不得已事起身稍勞血又大下予謂血滑已久如水行舊路若不澀之必不能止又思血海甚熱亦肝風所致防風子芩丸正與病對宜制與之又制白芍藥六兩側柏葉條芩各三兩防風椿根白皮各二兩蜜丸服之從此血止胎安足月而產一子此後連產三子並無胎漏之患後遇胎漏遞用此法莫不良已附告同志以便取用孫薇垣內人咳唾紅痰鴻臚薇垣侄內人喉中焮癢咳唾紅痰兩寸關洪大內熱生瘡山梔子小薊生地牡丹皮滑石青皮麥門冬甘草黃連栝蔞水煎飲之而血止嗽除後遇勞心即咳嗽喉中血腥總由上焦熱盛而然以枇杷葉山梔子生地白芍藥甘草牡丹皮地動蜂天花粉滑石紫菀常服三五劑兩月而安戴萬奇丈中痰後而右手不能動戴萬奇丈中痰後而右手不能伸動與之牛膽南星陳皮茯苓甘草天麻殭蠶黃連木通石菖蒲防己服後手稍能動惟左邊頭痛喉舌俱痛大便秘結三日一行又與川芎荊芥玄參桔梗柴胡酒芩蔓荊子甘草杏仁枳殼水煎飲之諸症悉減但下午體倦右邊頭微痛後又為怒氣所觸舌掉不言頭復大痛與連翹甘草山梔子薄荷石菖蒲遠志木通麥門冬五味子白芍藥黃柏調理而愈族文學內眷頭痛玉戶撮急肛門逼迫遍身皆疼亮卿文學內人頭痛遍身痛前後心兩乳皆脹玉戶撮急肛門逼迫大便三日未行口乾因大拂意事而起下午發熱似瘧噁心煩躁不寧而時當盛暑乃怒氣傷肝挾暑熱而然以石膏三錢青皮柴胡枳殼各一錢半夏曲黃芩各八分甘草桔梗各五分夜與當歸龍薈丸下之大小便皆利熱退而諸症悉減惟略噁心與清脾飲兩帖全安梓林兄內眷右手痛風小水頻迫梓林兄令眷右手痛風小水頻迫起身稍遲即出不禁足有浮氣年過六十右寸關脈濡弱左手和此脾虛停濕之症近且咳嗽用六君子湯加蒼朮石菖蒲遠志大附子晚蠶砂倍加薏苡仁緩治而平一婦經閉三月泄瀉嘈雜吐酸一婦經不行者三月大便瀉腹脹嘈雜吐酸水時下白帶常噁心自以為有孕予脈之候非有孕乃脾經有濕熱心經有瘀血症也與二陳湯加白朮澤瀉豬苓酒連木通吳茱萸滑石麥芽山楂瀉止腹寬經行腰腹作痛以川芎三錢當歸五錢香附丹參桃仁各一錢水煎服之經雖行口中吐出黑血水甚多且亦有如膿者改用四物湯加牡丹皮丹參桃仁紅花山梔滑石調理兩月而痊程氏婦下午喉痛痰多暈厥侄婦程氏下午喉痛近來痰多暈厥一日二三發頭痛面赤素未生育左脈弦大右寸關滑大有力以荊芥薄荷甘草桔梗玄參殭蠶柴胡枳殼竹茹貝母水煎飲之連進二帖其夜得睡惟背脹怔仲痰猶不清面多熱用黃芩枳殼甘草桑白皮地骨皮天花粉玄參前胡半夏曲橘紅山梔仁調養而平汪鋹兄時疫熱病汗出不止汪嗃兄時疫熱病被髮汗過度熱留胸中煩躁不止嘔惡不安汗竟不斂口且渴脈之獨兩關洪大此陽明之熱尚在當以白虎生脈湯為主石膏五錢知母三錢人參白芍藥甘草石斛各一錢麥門冬二錢五味子十五粒急煎飲之而熱退繼以益元丸服之而吐亦安何明吾時疫食復不省人事循衣摸床何明吾時疫食復大便不通嘔惡內熱昏憒不省人事或作夢語循衣摸床此熱在心包絡經以竹茹麥冬知母山梔各一錢陳皮半夏曲酸棗仁枳實各八分甘草三分服之至夜半人事稍清餘熱未散用石膏三錢知母二錢竹茹麥冬生酸棗仁各一錢天花粉陳皮各七分枳實麥芽半夏曲各六分水煎飲之下午大便行而熱退諸症悉愈孫元素春溫食復發斑族侄元素春溫頭痛發熱左脈弦大右洪大以小柴胡合白虎湯二帖而愈乃為食復發斑色紫神昏人事不省身重不能轉動即水火皆不自知合目鼾睡形如醉人面赤發熱舌苔外黃內黑皆有芒刺三日後予至脈之六部俱浮洪以三黃石膏湯加枳實鱉甲進之稍得微汗大便始有真糞次日才開目言語乃進粥一盞改以小柴胡湯加山梔枳實鱉甲白芍藥調理而愈孫安飢勞感疫食復發斑僕子孫安空晨出門途次食麵三碗飢勞感疫因內傷表裡皆熱及至績溪衙中昏悶譫語頭痛身疼腹痛醫不察為勞倦感疫遽以遇仙丹下之大便泄三四十行邪因陷下而為挾熱下利之候急歸視之舌沉香色額痛口乾燥渴煩悶昏昏憒憒脈左弦數右洪數但不克指知為誤下壞症以柴胡石膏各三錢白芍藥黃芩竹茹葛根各一錢天花粉甘草各五分山梔子枳實各七分蔥白五莖水煎服之後半夜吐蛔一條乃稍得睡次早大便猶瀉二次嘔吐酸水腹乃痛改用小柴胡加滑石竹茹夜熱甚與絲瓜汁一碗飲既神頓清爽少頃藥力過時煩熱如前再以絲瓜汁一大碗進之即大發戰予謂此戰非寒戰乃作汗之徵耳不移時汗果出而熱猶然憶活人書云再三汗下熱不退以人參白虎湯加蒼朮一錢如神跡此再加玄參升麻柴胡白芍藥黃連飲後身上之斑先發者紫後發者紅中夜後乃得睡而熱散斑尋退去腹中微疼腸鳴口渴右脈尚滑左脈已和再與竹葉石膏湯加白芍藥蒼朮服後睡安腹仍微痛用柴胡芍藥各一錢人參酒芩陳皮半夏各六分甘草三分烏梅一枚服此腹痛漸減精神駸駸長矣惟兩跨痛不能轉動此大病後汗多而筋失養之故宜當補益人參黃耆白芍藥桑寄生枸杞子薏苡仁桂心牛膝熟地黃水煎服後加木瓜黃柏當歸減去桂心調養而痊一人喉痛夜臥氣壅面足浮腫一人喉疼夜臥氣壅不能伏枕痰嗽不出遍身生瘡面足皆浮夜間發熱睡醒多出冷汗此由脾經有濕熱水氣不利而然薏苡仁款冬花陳皮貝母前胡蘿蔔子桔梗桑白皮茯苓甘草服此喘嗽大定仍得伏枕惟下體腫脹不消且膚皮緊硬小水黃動作則頭眩用大腹皮茯苓皮陳皮桑白皮五加皮生薑皮木瓜薑黃四劑而消何洗心虛寒腎泄善易數者何洗心每飲食稍冷饘粥或稀必作脹瀉理脾之劑歷試不瘳就予診之左三部皆濡弱右寸亦然關滑尺沉微此下元虛寒所致法當溫補以補骨脂杜仲菟絲子各二錢山茱萸肉人參山藥各一錢白茯苓澤瀉各八分肉果五分數劑而愈程湘孺人鼻衄後眩暈嘈雜嘔吐清水程湘孺人孫氏鼻衄後眩暈嘈雜嘔吐清水夜臥不安腹中飢而食不下膈由脾虛肝膽有鬱火也以人參黃連白朮扁豆甘草陳皮半夏竹茹茯苓石膏水煎調養而平孫君孝春溫誤作陰虛治侄君孝後谿兄次子也三月患頭項痛腰脊強遍身如被杖臍腹也痛口渴不寐飲食不進六脈浮數吳醫以為陰虛為滋陰降火三投而三劇反加嘔惡又與疏通熱尤不退下午煩亂延方和宇丈視之以為外感擬進人參敗毒散吳爭之謂陰虛體弱難再汗仍用四物湯加柴胡葛根薄荷黃芩知母而熱如焚神且昏冒矣予時遠出促歸診之六脈浮弦而數鼓指語之曰此春溫症也方診良是因復加內傷以故病劇滋陰之劑壅而作滯且引邪入於陰分宜乎熱加而躁悶也法當清解兼消可愈無傷以二陳湯加羌活柴胡防風麥芽山楂服下得微汗熱退其半惟下午作潮大便未行腰臍之痛不止用小柴胡湯加葛根白芍藥青皮黃連山楂飲下熱又少退大便已行腰臍之痛也隨減去但不知餓再以柴胡甘草青皮枳實麥芽知母黃芩白芍藥諸症悉平惟覺體倦乏力加人參白扁豆薏苡仁減去柴胡青皮調養而痊一僕婦頭疼喉痛咳嗽嘔惡胸膈作脹一僕婦頭疼喉嚨痛咳嗽嘔惡吐痰胸膈作脹經水適來身熱口乾此少陽經痰火症也用柴胡為君半夏白芍藥竹茹為臣葛根天花粉橘紅桑白皮黃芩知母為佐甘草桔梗為使一帖微汗而熱散痛除惟痰嗽不轉小水短澀柴胡知母麥冬竹茹各八分白芍藥一錢滑石三錢黃芩貝母桔梗各七分五味子十二粒甘草三分一帖而瘳族侄婦範氏乳癰族侄婦範氏大參晞老女也素有痰涎胸腹痞脹近因乳腫大發寒熱欲成癰毒以加味神效栝蔞散二帖寒熱雖退而腫不消用貝母白芷為臣栝蔞為君赤芍藥當歸連翹為佐青皮甘草柴胡為使痛雖減而腫仍不消脈之近數知已成膿仍與內托十宣散加金銀花蒲公英兩帖而膿潰因腳上生瘡而有浮氣前方去蒲公英金銀花加薏苡仁蒼耳子調理全安表侄女黃氏孕七月患血痢表侄女黃氏孕已七月患赤痢腹痛後重體素弱舉家甚憂以白芍藥三錢條芩一錢五分白朮地榆各八分甘草三分兩帖而愈後五日報云因稍勞痢又復來教以當歸三錢川芎一錢半真阿膠二錢艾葉三分一帖全瘳程氏婦小產後患赤痢一程氏婦吾孫門女也小產後二十日矣患赤痢一日十餘次怯寒惡食小腹脹痛診之右寸滑大知其虛中有熱憶其惡露未淨故小腹脹痛專科泥丹溪產後大補氣血之語概施之因而作痢乃翁曰病尚怯寒何云有熱予曰書云惡寒非寒明是熱症由熱極而似水也飲藥後當自知之以白芍藥當歸滑石為君桃仁酒芩酒連為臣木香桂皮檳榔為佐青皮為使服下果去臭黑瘀血甚多小腹頓寬惟口乾小水少噁心怕飲食體倦仍裡急後重人參川芎白芍藥各一錢當歸一錢五分酒連陳皮各六分木香二分外與清六丸服下熱除痢減十之八矣但大便不實噁心虛弱以四君子湯加酒炒白芍藥陳皮木香肉果酒連當歸養之而平孫竹野受暑作吐又傷酒面身黃疸孫竹野浙歸途次受暑又為酒面所傷因而作吐胸膈痞悶時師以消導之劑燥動脾火口渴嘈雜躁亂不寧目珠如金一身盡黃已成疸症診獨右寸脈洪大有力先以溫膽湯倍加香薷滑石葛根解暑止為君黃連麥門冬清熱止渴為臣使濕熱散而黃自瘳也連與三帖吐止食進黃也定矣再與五苓散加青蒿葛根滑石黃連枳實八劑而黃釋然程菊泉暑月喘嗽程菊泉暑月患喘嗽咳咳連聲濃痰滾滾行動則喘促不寧夜分口渴胸膈脹悶兩寸脈滑而數兩關弦此肺有宿痰膽有鬱火內經云火鬱發之又云風寒外來者可發用紫蘇子半夏曲杏仁各一錢石膏二錢款冬花桑白皮各八分桔梗枳殼各五分麻黃三分服下無進退改以杏仁陳皮人參貝母款冬花麥門冬各七分薏苡仁一錢五分桔梗知母各五分五味子十一粒桑白皮一錢陳皮六分服下痰減大半胸膈仍不舒口仍干腳仍熱前方減去款冬花五味子加枳殼葶藶子兩帖全安程應禎兄咳吐紅痰胸背脹痛眩暈程應禎兄胸膈背心時常脹疼頭眩暈腳軟弱手指痛咳吐紅痰診其脈左關弦大右寸關滑大予謂此食飽後感於怒老痰瘀血積在上焦宜其胸背脹痛而熱壅也治當清化上焦使新痰不生宿瘀磨去則萬全矣如落時套用地黃山茱萸等滋陰降火之劑是以滯益滯則熱無由去瘀無由消而痰益增不去也病者聞言諤然曰未見公時業已服過一月久矣疑其飲食損而熱尋加胸背脹痛遞長哉予曰今反轍幸早耳再遲則敗事亟以青皮枳殼陳皮快其氣而疏其壅滯蓋痰隨氣行也貝母桑白皮以消余痰而清其嗽牡丹皮滑石桃仁消其瘀血山梔仁開鬱清熱白芍藥伐肝補脾甘草調和諸性緩而理之當見其去泰去甚也別後半月復書報云胸背之脹減三之二血已十日止矣痰如舊改以山梔仁牡丹皮丹參赤芍藥桃仁各八分滑石三錢五靈脂當歸尾各一錢半夏曲青皮各六分諸症悉去獨足心熱再以黃柏知母苡仁牛膝甘草白芍藥茯苓陳皮貝母石斛牡丹皮調之如初虛山內人胸脅脹痛五更嘈雜虛山內人胸脅脹痛五更嘈雜每一嘈雜則痛發更甚左寸關脈洪滑右關亦然此肝膽有鬱火胃中有膠痰乃有餘之疾內經云木鬱則達之蓋木火之性貴乎疏通當以龍薈丸條而達之顧痛則不通通之則不痛也服龍薈丸一錢五分大便行一次痛隨殄跡惟聲不開以陳皮柴胡貝母茯苓甘草白芍藥酒芩香附杏仁桔梗調之而安一婦暑月小便不利玉戶腫大便血一婦當暑月小便不利而痛玉戶腫且又便血發熱左脈弦數右寸短弱此肺氣不足肝火太熾蓋肝為血海肝又主小便玉戶為肝經所絡之地治當疏決肝經壅塞俾氣暢則新血得以歸經熱解則小水可不痛而腫亦可消矣以滑石三錢桃仁當歸白芍藥各一錢柴胡黃連人參各八分川芎六分甘草桂皮白芷各三分四劑而病如失弟婦戴氏臍腹痛白帶如注裡急後重下痢赤白族弟婦戴氏腹中痛多在臍腹白帶如注四肢痠疼大便裡急後重已成赤白痢矣脈之兩寸關俱滑數尺也數以白芍藥當歸黃連黃芩木香檳榔桂皮甘草滑石桃仁桔梗一劑而紅止惟小水短澀下午發熱大便一日夜仍四行改用白芍藥當歸白朮陳皮滑石甘草茯苓厚朴酒連酒芩桔梗柴胡木香飲下諸症悉愈惟頭痛腰疼再以桂心當歸白芍藥白朮茯苓甘草酒芩酒連破故紙木通黃柏煎服全安族弟應章胃脘當心而痛族弟應章胃脘當心而痛手不可近疑有瘀血使然玄胡五靈脂牡丹皮滑石川芎當歸甘草桃仁桔梗香附水煎臨服加韭菜汁一小酒杯其夜痛止得睡飲食也進惟大便下墜逼迫不安此瘀血已動欲下行也前劑減去韭菜汁一帖全安弟淑南三陽合病暑症予弟淑南額痛遍身痛口乾舌苔黃厚左脈浮大六部俱數時當仲秋初旬以小柴胡合白虎湯加羌活熱仍不退下午用六神通解散以蔥湯調服三錢熱稍退至半夜後又復熱額痛頂巔尤甚舌根黃且焦黑小水赤痛煩躁不睡遍身又痛此三陽合病暑症也次日以小柴胡大加石膏為君藁本白芷竹葉粳米生薑大棗少頃大汗出至足熱始盡退猶煩躁不睡仍以小柴胡湯加桂枝山梔子竹茹竹葉飲下煩躁寧而得睡餘熱悉平精神爽而向安矣一富婦轉脬一富家婦當仲秋大小便秘者三日市師以巴豆丸二帖大便瀉而小便愈秘脹悶臍突二寸余前陰脹裂不能坐臥啼泣呻吟欲求自盡此轉脬病也桕樹東行根皮一寸滑石二錢玄胡索桃仁當歸瞿麥各一錢水煎臨服入韭菜汁半杯服後食頃而小便稍行玉戶痛甚小便非極用力努之則不能出改用升麻桔梗枳殼玄胡索煎成調玄明粉二錢乃提清降濁之意服後大小便俱行始不脹急次日報云每大小便來時腹中先痛有淡血水小便短再以丹參丹皮當歸白芍藥甘草青皮香附玄胡茯苓山梔子山楂兩帖各症良安文約孺人八十三胃脘疼痛孫文約孺人年八十有三胃脘疼痛手不可近腹中飢而飲食不能下兩寸關脈滑大兩尺沉弱此血虛氣滯症也先予積氣丸一服而痛減半再用生白芍藥山梔子五靈脂各一錢酒炒白芍藥二錢粉草山楂香附各八分一帖全安應章弟三陰瘧應章族弟三陰瘧發於子午卯酉日四越月矣每發於夜熱多寒少左脈微弦右關滑大以二陳湯加柴胡黃柏川芎當歸黃連兩帖而熱稍輕飲食不進四肢懶倦脾氣大虛白朮何首烏各三錢鱉甲二錢青皮七分烏梅一個一帖而截程好吾春溫太學程好吾倜儻博洽士也季春患兩太陽痛胸脅稍疼口渴大便水瀉左脈浮弦而數中按有力右關滑大予曰春溫症也柴胡前胡葛根粉草青皮黃芩知母桔梗半夏曲石膏半夜後得微汗因起大便感風續又發熱依然口渴更覺煩躁石膏三錢知母柴胡各二錢葛根黃芩各一錢粉草桔梗各五分竹葉二十片兩進而汗出熱解諸症悉平四肢尚倦口微干語言乏力以生麥湯加薏苡仁石斛甘草白芍藥黃芩調養如初程氏婦屁從子戶出令媳長卿之婦腹中微疼經行不流利喉痛四肢麻木作戰不知飢餓右脈洪大如豌豆以川芎香附麥芽山楂烏梅粉草桔梗酒芩防風荊芥白朮茯苓四劑而安次月經水大行十日不止以黃耆阿膠蒲黃各一錢白芍藥二錢粉草三分一帖而止此後但覺濁氣下墜屁從子戶中出以補中益氣湯加酒炒黃連調養而平族子應章之弟十月發三陰瘧族子應章之弟十月發三陰瘧至次年仲春未止每發於辰戌丑未日午後寒多熱少夜有盜汗左脈軟弱右關盡弦數有力用白芍藥當歸各一錢白朮二錢柴胡川芎粉草砂仁桂枝酒芩各三分生薑三片水煎服再以何首烏白朮鱉甲各三錢柴胡一錢青皮酒芩甘草各五分烏梅一個生薑三片水煎臨發日五更服之兩帖而止後半月下身大生瘡癤以東坡四神丹調理而痊吳中嶽孺人疫後壞症油沄吳中嶽孺人先感風邪後傷飲食發熱頭疼腹中作脹醫與巴豆丸瀉之而熱不減後醫又以大黃重瀉之而熱也如初再後醫謂瀉而熱不退者為虛大用參耆白朮補之補經四日神氣昏沉不知人事乃敦予診左脈弦數右關尺沉數有力舌尖沉香色舌根焦黑芒刺語言含舌不清扣前服藥始知妄下妄補不思飢謹之餘疫氣為厲誤成壞症危而且殆姑以知母柴胡各三錢石膏六錢枳實天花粉各五分粉草黃芩麥冬各一錢山梔子生地黃各七分人參六分竹葉三十片生薑三片水煎飲之中夜後人事稍清微有汗舌稍柔和語言已不含舌駸駸然有生氣矣次日前方減去地黃加白芍藥舌心焦黑退盡諸症十減其七但大便五日未行遍身尚痛咳嗽與七制化痰丸兩帖再以石膏二錢麥冬貝母各一錢前胡枳實黃芩梔子各六分甘草三分桑白皮八分煎服而安鮑子五保時疫耳聾泄瀉鮑子五保時疫耳聾體有熱口乾大便五日不行人事不清竹葉黃芩柴胡半夏曲甘草枳殼天花粉知母煎服而熱渴更甚大便行而瀉手攣縮不能伸且發呃或又咳嗽改以柴胡石膏竹茹人參甘草麥冬半夏曲橘紅黃芩黃連一帖而呃止瀉除諸症悉罷而安睡矣僕子孫守中麻後咳嗽無痰唇厚聲啞僕子孫守以中麻後咳嗽無痰上唇厚腫體熱大便燥聲啞以麥門冬知母栝蔞仁甘草白芍藥桑白皮地骨皮石斛枳殼五味子服後嗽減其七乃減去栝蔞枳殼以其大便已溏加生地黃當歸薏苡仁調理而安僕子得貴春溫頭痛僕子得貴春溫頭痛體熱面赤舌心焦燥以石膏柴胡葛根甘草黃芩知母天花粉白芍藥服之而舌不焦黑矣進粥太早半夜後又復發熱中脘硬痛與大柴胡湯一帖汗出津津大便行二次腹痛不止乃以小承氣湯調下玄明粉一錢大便又行二次熱不退而痛全減旋作鼻衄改以石膏牡丹皮生地黃山梔子甘草升麻黃芩赤芍藥一帖而熱散衄止元素侄令政春溫後經水適止元素侄令政春溫後經水適止餘熱不退口中甚渴胸脅痛而耳重脈左弦數右滑大而數小柴胡加石膏知母桔梗枳殼葛根栝蔞半夏曲服下而熱渴如舊改用柴胡二錢人參甘草天花粉黃芩各七分白芍藥紅花當歸牡丹皮知母各八分調理而瘳朱氏子天送時疾頭疼身若燔炭朱氏子天送時疾頭疼身若燔炭口渴氣促申酉刻熱潮更甚舌心焦黑遍體紫斑語言含舌不清時多發呃耳聾先治者誤進藿香正氣散而加嘔逆水瀉又醫以柴苓湯嘔益甚熱轉增劇迎予為診六脈俱洪數此少陽陽明合病之疫以石膏五錢知母柴胡各三錢黃芩一錢五分半夏曲麥門冬竹茹橘紅葛根各一錢粉草枳實各五分服下熱退其七舌不燥矣再以柴胡半夏曲白芍藥竹茹各一錢石膏三錢麥門冬知母各一錢五分黃連甘草人參各五分水煎飲之而斑退諸症悉平朱桃源內人胃脘痛常苦夢遺經水一月二至朱桃源內人胃脘痛年五十有二經水尚行不止一月且二至每至十餘日不淨白帶淫淫下常苦夢遺近又眩暈先與積氣丸一帖以止胃脘痛再以逍遙散加石蓮子蓮花心五倍子煉蜜為丸每早晚白湯送下二錢夢遺竟絕桂亭大兄痰積瘀血作痛桂亭兄壯年原有濕熱痰積年遇艾偶墜轎跌傷背脅專科以草藥敷貼於外內以藥酒攻之而愈越十五年左脅痛手不可近左脈弦數堅勁搏指小腹也痛知為舊瘀及痰積作祟以青皮赤芍藥黃連當歸尾各一錢桃仁一錢五分大黃二錢滑石三錢水煎臨服調玄明粉一錢服下吐出痰涎碗余大便僅行一次而左胯及腿膝皆痛夜睡不安由小腹痛甚之故此瘀物欲行而未能也再與大黃當歸尾紅花牡丹皮赤芍藥各一錢桃仁二錢滑石三錢青皮八分調玄明粉一錢再下之大便行三次皆沉香色稠黏瘀物腹痛雖除胯痛仍在用乳香沒藥歸尾紅花各一錢桃仁滑石各三錢大黃二錢穿山甲丹參各一錢五分服後大便行四次所下皆紫黑如筋膜者不可勝計諸病悉減因食雞湯牛肉臍腹又痛裡急後重此余積未盡欲再下之舉家驚怖謂六旬以外之年以下數次恐脾弱不能再下予曰醫貴認病何以年齒數下拘哉今藥力到而積已動矣破竹之勢可迎刃而解若失時姑息恐他日滋蔓欲下難動也行後而補庶無反顧之憂大兄然之以紅花桃仁當歸尾赤芍藥山梔仁玄胡索牡丹皮穿山甲滑石煎調玄明粉下二次紫黑瘀物如前之半腿胯小腹痛則俱釋次日用人參茯苓白芍藥粉草陳皮山楂桂心當歸半夏調養半月精神步履飲啖一如舊矣熊二官疫後食復江右熊二官疫後食復額痛口渴譫語神昏面青舌黑鼻中停灰不省人事小水短小勢已危急以小柴胡湯減去半夏加石膏知母當歸山梔子豆豉枳實急與服之一飲便得微汗熱退大半次日以柴胡滑石甘草知母石膏人參桔梗黃芩天花粉與之舌黑始退人事乃清飲食才進霍然生矣堂弟東里內子咳嗽吐紅堂弟東里內子咳嗽吐紅發熱頭眩腳膝乏力先已服滋陰降火十數劑不愈飲食漸少精神漸羸懇予治之兩寸脈累累如貫珠兩尺俱軟弱此上盛下虛之候上盛者痰與瘀血也下虛者腎陰弱也且生平好飲不無助熱法當先清上焦化去瘀血宿痰然後以養陰藥收功則病根可刈癆瘵可免也用貝母枳殼桑白皮清肺化痰滑石桃仁牡丹皮小薊消除瘀血山梔子甘草白芍藥養血以祛餘熱三帖後紅漸稀少前後心始不脹痛惟痰嗽不止大便結燥減去滑石桃仁加栝蔞黃芩紫菀調養而平程竹坡內人年六十瘟疫昏憒由溪程竹坡孺人年過六十為疫所染頭痛口渴舌苔前黃燥後紫黑身熱沉重人事昏憒語言錯亂小水短澀嘔逆煩躁合目不開諺語不輒口耳聾胸脅痛時五月初旬也迎予為診左浮而弦數右洪長而數診畢仲君清夷問曰何症予曰此熱病類也清夷曰因體熱便名熱病乎予曰否仲景謂春溫過時為熱病矧茲又為熱厲也邪在陽明少陽二經又問曰可生乎予曰脈症對可生也此症遠邇染延甚夥不足怪清夷曰適方和宇也云少陽陽明二經之病二公所見既同乞商確一方為幸予與和宇診多符合即以柴胡石膏為君知母麥冬天花粉竹茹為臣黃連為佐甘草枳殼桔梗為使連進兩帖醜刻微汗熱退神清不虞即進葷粥下午又復大熱譫語昏沉舉家驚怖予曰此食復也即以小柴胡湯加山梔子枳實淡豆豉鱉甲四劑復得汗熱從散去神頓清爽仍口渴煩躁以生脈湯加黃連香薷竹茹竹葉而安程內眷新寡七日染疫適值夢泄神昏譫語程家內眷藏溪汪氏女也乃夫歿於疫癘新寡七日疫即及之大熱頭疼口渴胸脅並痛醫與小柴胡湯夜忽夢夫交泄而覺冷汗淫淫四肢如解略不能動神昏譫語面如土色舌若焦煤強硬迓予診之六脈沉弦而數大小便俱秘此亦陰陽易類也疫後有是危已極矣予以生脈湯加柴胡黃芩桂枝甘草水煎成將乃夫昔穿舊褲襠燒灰調下兩劑而神醒體溫汗斂舌始柔和焦也漸退次日仍以前方加酸棗仁竹茹四肢始能運動乃飲粥湯僅一子甫十歲一女甫十四繼被疫困均以六神通解散汗之而安妯娌及婢輩六人皆六神通解散瘳之舉家德予以為再造太學從明滯下純血有發明族侄太學從明夏初由客邸患滯下調半痊而歸因食隔宿豬首而復裡急後重晝夜三四十度日漸沉困口渴胸膈焦辣手必熱腹微痛小水少每解時先乾噦嘔惡汗出飛飛下皆稠黏紫黑血無糞彼素知醫且慎重不輕服人藥敦予診之脈左沉弦右滑數面色外黑內黃飲食不入肛門辣痛予以渠原稟薄弱今遠歸途次不能無勞不敢疏下姑以胃風湯加黃連與二帖不效腹稍加脹渠叮予曰古云無積不成痢顧積勢膠固切勿用補無以體素弱為疑予曰諾改用黃芩芍藥湯三劑無進退乃私語渠侄元亮曰令伯之症實實虛虛熱熱寒寒實不易治且穀食噤口不入乾噦可慮須得明哲參治元亮從容言之欲得方古墩為翼諸相契及內眷遞相贊言太學不從曰吾豈不重命而吝費哉顧新都之醫無如叔最明吾之交無如叔最厚舍叔安所倚元亮曰叔祖善矣能用人之長得一雋商榷可無後慮太學拂然曰知莫過於知心吾知其心久矣專任勿疑也予知渠信任堅若金石益加研究圖欲先開胃口使新穀食淨宿穢壓出或補或攻視緩急以為方略乃背囑元亮曰令伯非人參不可幸且勿露俾予得以盡技元亮曰諾乃仿朱丹溪法用人參黃連各二錢煎濃細細呷之但得一呷下咽胃口便開噦惡便止蓋胃口虛熱衝上為噦也其日用之噦惡即止大半連與兩日覺胸腹脹即以保和丸應之覺小水不利又以清六丸應之裡急後重以參朮加芩連木香檳榔滑石桃仁應之人參皆背加太學不知也渠每診必叮予曰日來疾稍平叔之力也幸忽遽補恐廢前功予曰如教詎知人參已服過十日計二兩許矣此後脈僅四至軟而無力憶丹溪云虛回而痢自止又云氣虛甚者非附子不能行參耆乃以胃風湯加黃耆附子薑炭四劑而血全無後重也止惟大便瀉而不實所下俱黃糞渠知積滯己盡始欲理脾用參苓白朮散服十日便仍不實乃問予曰補脾而瀉不止奈何予曰據脈乃下元虛寒殆腎泄非脾泄也溫補下元則固矣蓋腎者胃之關初不敢用下劑者慮有今日也教以菟絲子破故紙杜仲山茱萸人參大附子白茯苓澤瀉四帖全瘳里中稱太學能知人而予不負所任也查少川喘後腫脹有發明查少川公年四十三夙有哮喘疾每發則遍身如燎氣賁賁上騰息息短促候中痰聲響若湯沸經七晝夜汗而漸平居常嗜飲通宵不輟醉後縱欲不避風寒族中有教以石膏麻黃杏仁枳殼細茶各一兩作大劑飲之名曰五虎湯喘至即以此御之隨飲而止屢發屢進應若桴鼓公喜甚持為保命丹寓大通一月邑中麻黃石膏為之缺市詎知情欲無窮胃中衝和有限三年之間飲五虎者殆不可以數計而胃中之沖和者亦不知損之何若也因而腹大若復箕兩腿光腫如柱內外臁疥瘡中清水涓涓流之不竭晝夜腥氣逼人不能伏枕而臥者五越月自儀徵楊州醫起問京口鎮江之醫如何如何張者最良遍延治之彌月卒無一驗又舍京口抵姑蘇歷嘉杭凡有名者悉迎療之而勢益劇舁回至岩鎮鎮醫擅名者吳與方也先詣吳吳駭辭不治就方方診視久之曰公疾非常必得非常人乃可已公曰先生世家大方昔在兩淮且人人引領願得先生一診為快何我棄而使需非常人也今世非常人舍先生其誰方曰嘻公貴邑孫生生者名動三吳今歸不出亟迎治之或可無恙公扣孫生生居何里狀何若方書予姓氏里居與之歸即懇程公山氏紹介迓予時長至後一日也至則見公坐高椅之上氣高而喘身熱而煩復以綿被足納火箱前後左右環火五盆首戴絨帽帽外籠以貂套套外仍束一帕鼻用絨套籠之門設重幔猶凜凜怯寒診其脈浮大無力睇其色白中隱青徐問公曰惡寒身熱從何時起公曰十日予曰據色據脈予已得其概矣公曆數府名家認為何症擬何湯劑請詳述之公曰眾論落落不一先生學博見真願惟命予曰公疾乃氣虛中滿法當溫補下元人徒知利小水不知小水不利者由下焦之氣不充不能滲從膀胱故道而行若利之急則汛濫而橫流肌膚下於陰囊甚則脹裂崩塌而出若使下焦壯盛則小水自通譬之甑炊釜底水火交旺甑中之氣自然蒸騰若霧若露內經曰上焦開發宣五穀味熏身充膚澤毛若霧露之灌溉是謂氣故曰上焦如霧也清陽升則濁陰降降下則為小水故曰下焦如瀆也瀆者水也言下焦為決水之官水道出焉者是也人之汗即此霧露之氣小水即降下之氣蓋氣者水之母由氣化而為水故又曰氣化則能出矣融眾理而觀之總由下焦元氣壯盛斯能升降變化清陽升濁陰降即地天交之泰陽不升陰不降即天地不交之否痞者塞也此脹滿之所由生也公之疾起於五虎湯致臟寒生滿病也公曰善吾乃今始知致病之源第近來身熱手熱膈內焦辣而外惡寒竟不解孰為熱孰為寒也予曰仲景云傷寒必惡寒由寒邪在表而然合先散之胸膈焦辣者乃陰盛格陽虛陽之火被寒氣驅逼上行非真熱也經雲水流濕火就燥但得下元一溫熱自下行公曰然惟先生命劑予以紫蘇馬蹄莘炙甘草防風白豆仁蒼朮陳皮人參羌活生薑一帖而得微汗悉徹去環列之火僅存足底一盆首上所覆之帕也去獨鼻寒如初乃用防風黃耆二兩煎湯置器中令熏其鼻飲頃而止一日凡三熏次日鼻套也除嘔惡不止用人參溫膽湯加丁香進之一帖而止又謂鯉魚能利水一日盡二斤半夜脹極乃告急於予予曰病勢如是固乃縱恣若此等閉之劑曷能消釋沉思久之以平胃散一兩入橄欖肉一兩水煎飲之兩劑而定獨腹脹小水不利不能伏枕為苦乃以附子理中湯加砂仁補骨脂赤小豆桂心連進四帖小水略長繼以尊重丸日三服之每服五丸五日後小水通利可貼席而睡守此調理腹脹漸消兩月大平三月而公出市市中人信予實從公始夏益吾肢節腫痛手足彎痛腫尤甚夏益吾肢節腫痛手足彎痛腫尤甚不能動止凡腫處皆紅熱先起於左手右足五日後又傳於左足右手此行痹症也且喘咳氣湧不能睡左脈浮數中按弦右滑數乃濕熱風痰壅遏經絡而然以茅山蒼朮薑黃苡仁威靈仙秦艽知母桑白皮黃柏酒芩麻黃水煎服下而右手腫消痛減夜服七制化痰丸而嗽止乃得睡再劑兩足彎消其半左手經渠列缺穴邊腫痛殊甚用苡仁蒼朮秦艽甘草天花粉五加皮石斛前胡枳殼威靈仙當歸旋服旋愈初陽侄內人肺癰初陽侄令政先時咳嗽諸治無功且嗽急則吐用碧玉散二錢白湯調下立止後半年復咳嗽胸背隱隱疼痛身常內熱咳出桃花膿不可勝計腥穢之氣甚惡右脅並乳脹痛脈洪數大便燥肌瘦骨立此肺癰症也用貝母茜根白芍藥各一錢知母麥門冬山梔子紫菀各八分桑白皮當歸牡丹皮杏仁各七分薏苡仁一錢五分甘草葶藶子各五分水煎服之服止甚安但要常服若一缺藥其疾便發據此肺竅中痰積瘀血尚多未能即去宜緩圖之書云俟膿去盡當自愈也予謂丹溪雖有此言也不可固執設不以藥消化之必俟其膿自盡恐歲月深而有他變且中年之人何能當此莫若清熱潤肺消痰化瘀久而服之或早愈也方黃吳諸公謂久咳傷肺每每投補屢被紊之每補必增熱加痛加咳而膿轉多余曉之曰諸公之意誠良其如病加何是姑息之謂也古人不務姑息惟以去病為安夫姑息可以養病非所以去病也獨汪無懷然余言守余法二年良愈肌長如初仲木內人氣喘作脹族侄仲木內人賢淑婦也不育多郁腹脹左脅不能側臥也不能仰臥仰側臥即氣湧每午夜背心作脹氣喘吐痰發熱必起坐令人揩摩久之始定面有浮氣右寸關脈滑大有力此氣鬱食積痰飲症也蓋憂思傷脾思則脾氣結氣結不行則五穀之津液皆凝聚為痰故喘急作脹先與定喘湯二帖而無進退繼用核桃肉五錢杏仁三錢人參桑白皮各七分水煎服之氣喘乃定惟腹中脹急改用橘紅半夏曲木香白豆仁鬱金蘿蔔子姜連香附茯苓四劑大便痰積隨下腹脹盡消而愈侄孫女十歲大便脫肛鼻中出血族侄孫女年甫十歲大便脫肛鼻中時常出血夜多咬牙肚熱面黃將成疳症以山楂青蒿枳實升麻酒連滑石各一兩甘草蘆薈乾蟾各五錢俱研末神麯糊為丸一料痊愈唐岩祈患痢赤白腹脹氣喘四肢冷陰囊腫唐岩祈首秋患痢赤白延至次年春分不愈腹中作脹不知餓每行動則氣喘四陽之末皆冷陰囊腫大便日夜十數行而肌肉甚瘦小水短少飲食減半面黃兩跗腫大及踝與平胃散加酒連豬苓澤瀉升麻防風酒炒白芍藥薏苡仁外與香連丸合益元丸相兼服四日而痢止乃知餓而加食精神爽快再四劑兩跗陰囊之腫皆消惟咳嗽用薏苡仁酒炒白芍藥粉草澤瀉杏仁桑白皮陳皮姜連茯苓薑黃葛根蘿蔔子二帖而嗽除但體乏力與六君子湯加補骨脂薏苡仁滑石紅曲酒炒白芍藥桔梗麥芽調養半月而全瘳侄婿陳東山患休息痢下皆紫血侄婿陳東山仲夏患休息痢所下皆紫血腹痛迨清明猶不愈醫藥備嘗體倦肌瘦或三五日一發或七八日一發發必三日乃止予為診之左澀而右滑據脈有瘀血痰積近來小水不利姑用四君子湯加滑石紅曲陳皮山楂澤瀉升麻服後微覺有熱改用四君子湯加滑石桃仁紅曲酒連神氣稍旺脾氣始回乃用番鴉膽三錢下之果去紫黑血塊及如敗魚腸者半桶從此痛除痢止次日以六君子湯去半夏加酒炒白芍藥山楂紅曲滑石桃仁升麻調之報云胸膈作脹恐積滯未盡而服參朮欲再下之予為再診兩寸短弱兩尺洪大前日滑澀兩脈俱無此陽虛下陷之候宜當大升大補以六君子湯大加黃耆為君酒炒芍藥為臣升麻桔梗為使服此胸膈寬快精神也好惟肛門熱前方加酒連減半夏脫然平安陳氏婦腸鳴腹痛合目汗出下午潮熱陳氏婦腸鳴腹痛大便溏瀉合目即汗出下午潮熱醫謂潮熱盜汗乃虛怯之症加之泄瀉脾氣壞矣視為不治浼予診之右脈濡數左脈洪數予曰此鬱火痰積症也蓋憂傷肺思傷脾飲食因而不化積而生痰故腹痛溏瀉但理中焦消去痰積可瘳也以四君子湯加半夏曲滑石紅曲麥芽苡仁酒炒白芍藥酒炒黃連牡蠣桔梗八帖而病去如釋九德侄耳鳴九德侄耳鳴氣築築然閉而不通鼻塞不利口不知味痰多而膈熱不清脈左浮而弦大右滑大俱數內經云頭痛耳鳴九竅不利腸胃之所生也此由胃中痰火上壅熱極生風乃以蔓荊子升麻木通赤茯苓桑白皮麥門冬生地黃前胡甘菊花赤芍藥甘草石膏生薑三片棗子一枚水煎飲之四帖左弦雖減半而症尚如前再用甘菊花橘紅半夏曲茯苓甘草知母白芍藥酒芩麻黃石膏桑白皮桔梗加薑棗又四帖而諸症悉平後以六君子加酒連柴胡川芎白芍麥門冬升麻兩帖飲食亦甘味矣陳覺宇上盛下虛合目亂語痰火吼喘陳覺宇丈常山縣人也年四十有三體肥患痰火十年多矣每月必一發或勞心過度則二發吐痰身熱吼喘飲食不進不能倒頭而睡合目則亂語面赤頭痛遍身痰氣走動牽扯作痛必俟吐出痰後則耳始不鳴目始不淚素服風痰藥南星半夏之類不效後服參耆也僅止四五個月診其脈兩寸洪滑兩尺沉微殆上盛下虛之候法當清上補下以橘紅貝母茯苓甘草桔梗杏仁前胡鉤藤天麻酒芩枳殼水煎服之夜進七制化痰丸再以八味丸加人參麥門冬五味子空心服之半年而瘳程紹溪中年患鶴膝風有發明程紹溪中年患鶴膝風症兩腿及腳肚內外臁肉盡削兩膝腫大乃酒後縱欲所致經治蘇松嘉湖杭嚴六府視為痼疾且四肢膿疥連片淫爛醃臟臭惡難近自分必死家人以渠病久醫藥破家今則衣食不抵無門求生矣渠有親為予鄰家偶言及渠病之異家道之窘予聞惻然鄰素知予不以窘異為憚懇為一看予攜仲子泰來同往令渠沐手診之左寸關浮數右寸短弱兩尺沉微此氣虛血熱之候法當大補氣血壯其筋骨猶可冀生病者聞言命家人子媳羅拜於地請藥予曰病熱已痼非百日不見功蓋補血無速效日浸月潤漸而濡之關節通利骨正筋柔腿肉自生初以龜板苡仁各三錢蒼耳子五加皮頭二蠶砂節節香各一錢當歸人參黃耆蒼朮杜仲黃柏各八分紅花五分水煎服之十劑而瘡疥漸稀精神稍長再以薏苡仁五加皮龜板各二錢節節香蒼耳子地黃丹參蒼朮黃柏何首烏各一錢人參當歸各八分紅花木通各五分三十帖足可倚杖而行腿肉漸生瘡疥盡愈膝腫消去其六後以虎潛丸加鹿角膠何首烏金毛狗脊節節香牛膝用龜板膠為丸服三越月腿肉復完出之苕上苕人嘖嘖稱奇悉錄其方以布堂嫂程氏喉間有物如臠咯之不出咽之不下予堂嫂程氏喉間有物如臠咯之不出咽之不下梗梗不安腹中痛且瀉年五十有八矣乃梅核氣症也腹痛乃新疾以二陳湯加旋覆花白朮香附紫蘇桂皮厚朴澤瀉四劑腹痛仍在瀉亦不止乃用胃苓湯加麥芽砂仁香附二帖痛止瀉瘳仍用二陳湯加厚朴桂皮紫蘇旋覆花細辛人參煎服四帖而喉中病去如失一婦產後咳嗽發熱咳出之痰色黑而臭一婦先傷風發熱咳嗽二日乃分娩熱尚未退又食雞汁肉等太早咳嗽發熱愈盛已八日矣胸膈脹痛頭痛口渴大便秘咳出之痰色黑而臭小水短少脅下扯痛氣逆而喘不得臥左脅不能著席汗出不止症甚危急予以栝蔞五錢紫蘇子一錢枳殼酒芩各六分前胡桔梗各五分粉草三分生薑三片水煎飲之胸膈之痛減半氣喘稍定次日再進前藥大便用蜜棗導之熱盡退痛盡減諸症尋愈表嫂孀居二十年右癱不能舉動神情恍惚亂言多悲泣表嫂孀居二十年矣右癱不能舉動不出門者三年今則神情恍惚口乳語常悲泣詰其故答曰自亦不知為何故也診之兩寸脈短澀以石菖蒲遠志當歸茯苓人參黃耆白朮大附子晚蠶砂陳皮粉草服四劑精神較好於前但悲泣如舊夜更泣予思仲景大棗小麥湯正與此對即與服之兩帖而瘳方用大棗十二枚小麥一合大甘草炙過三寸水煎飲之此憂傷肺臟臟寒故多泣也桂亭大兄墜轎後腰脅脹痛桂亭大兄原因墜轎跌傷腰脅痛不能轉側咳嗽吊痛用三製大黃二錢桃仁一錢五分杏仁紅花天花粉各一錢穿山甲八分甘草五分水煎服之兩帖而大便行繼以五加皮紅花川芎當歸生地黃白芍藥丹參甘草桃仁穿山甲柴胡煎四劑飲之而痛大定後因過食葷腥喘嗽腰痛右肩背墜痛素有濕熱痰積以威靈仙紫蘇子枳實酒芩半夏曲栝蔞仁甘草陳皮薑黃防風羌活服後腸鳴坐則重墜此痰積已動欲行不可得也與穿山甲當歸尾紅花杏仁枳殼大黃蘿蔔子川芎莪朮青皮服後大便所下稠積穢瘀甚多痛隨減去以保和丸調理而安堂嫂王氏吐紫黑血塊足跟焮腫癢痛堂嫂王氏兩寸脈洪大右關滑大五六月間必吐紫黑血塊足跟焮腫癢痛時流黃水與牡丹皮山梔子玄參甘草白芍藥當歸陳皮滑石桃仁四劑而愈弟婦程氏孕五月痢下膿血族弟婦程氏孕已五月痢下膿血裡急後重腰重墜難當以白芍當歸木香砂仁條芩酒連艾葉陳皮煎服夜仍痛痢三次次日大便所下如爛魚腸者甚多夜半忽兩足腳底前半節紅腫疼痛難安此厥陰肝經虛胎氣下墜也當補氣血以川芎當歸人參白朮紫蘇茯苓甘草檳榔服下夜半痛止即得睡矣左腳略痛再以人參紫蘇川芎當歸白芍甘草陳皮茯苓大腹皮柴胡服後左腳痛也全減後以補中益氣湯加白芍黃苓茯苓調補而胎也無恙嫂汪氏頭疼遍身痛痢下赤白族嫂汪氏發寒發熱頭疼遍身痛眼珠疼小腹痛裡急後重赤白膿血日夜三十餘度口渴此瘧痢並作也以柴胡葛根甘草青蒿枳殼酒芩酒連當歸白芍桂枝防風羌活川芎水煎服之外與神授香連丸其夜痢減十之九但遍身尚疼略惡寒不發熱頭略暈而已改以川芎川歸白芍木香桂皮陳皮酒連酒芩調理三日全安仲闇氣虛中滿有發明仲闇侄孫赴府考試過食牛面且勞苦因而發瘧城中醫瘧半月形神俱瘦瘧愈而腹大如箕矣健所黃夫人仲暗岳母也凡名家遞為延至率認瘧後腹脹其中必有瘧母為祟也諸消痞藥嘗之不效又以五皮飲利之不應將議攻下而予適至觀其色黃口渴小水短澀腹脹不可言足膝之下腫大不能行兩腿腫連陰囊氣壅不能臥飲食絕少脈才四至大而不斂予曰此真氣虛中滿症也法當溫補下元而兼理脾病猶可愈若攻下是殺之也渠父與予厚今宦河南予安得不為渠任其重哉顧歙友所用之劑乃皂莢檳榔三稜莪朮薑黃葶藶子木通枳實陳皮厚朴山梔大黃牽牛黃連等皆破敵有餘之品見之且駭然但黃夫人薦來之醫又不能拒正躊躇間幸渠乃伯溪亭公知予心卒謝歙醫而一任予治予即以人參白朮各三錢炙甘草五分大附子炮乾薑桂心各一錢破故紙二錢桑白皮砂仁茯苓澤瀉各八分水煎飲之其夜小水稍利喘急稍緩連飲五日腹稍寬皮作皺因食豬肚子大早依舊作脹前方人參白朮加至五錢再加陳皮八分又二十劑而腹消其大半乃能伏枕而臥始能移步行動改以參苓白朮散加破故紙肉桂調養而安溪亭公問曰腹脹如此口渴如此小水短澀如此諸人悉認為熱為有餘乃今以溫補收功何也予曰公不觀古人以氣虛中滿名鼓脹耶由氣虛所以成中滿設氣不虛何中滿之有哉且鼓者外皮堅緊而內空無物若復瀉之真元脫矣安能復生故惟有補而已口渴小水少者皆元氣虛弱不能運轉清氣不上升故口渴濁氣不下降故無小便乃天地不交之否茲特補其下元俾水火充實陽氣上騰濁氣下降中氣運動而諸疾皆瘳也朱懷竹楊梅毒氣內攻上迫於肺將成肺癰下流陰囊囊潰見子朱懷竹壯年客外不謹而生楊梅瘡恐人知之又欲回家乃求速愈每日用藥外熏熏而不效用藥水頻洗洗而不瘳乃以末藥點之一日凡服煎藥三帖如斯兩月不惟瘡不能瘳毒且趕入內在下則肛脫二寸余周匝瘡滿如蕈弗克收入因而不能行坐在上則毒入於肺喘咳氣湧胸膈脹悶不能仰臥內熱而外惡寒寢食俱廢合目即譫語陰囊疙瘩紅腫脹痛兩足瘡延腫大精神恍惚軟床舁歸乃兄少竹逆予為診六脈俱洪大而數語少竹曰病至重幸壯年猶可治也今予尚未可敷藥俟彼胸中瘀血毒物出後乃可服否則彼以予藥動血而反致疑顧城中諸友鮮有識此病者一誤則大事去矣慎之慎之少竹素信予固請予藥而不與其服懷竹見予不發藥乃延張程兩公為治晌午服藥晡刻大發喘咳吐出紫黑血塊如膿之類碗余滿房腥穢不可近懷竹心慌少竹慰之曰毋恐孫君先已預言你胸中脹悶者由熏藥逼毒入內上迫於肺痰與瘀血壅遏肺竅將欲成膿故喘咳不能伏枕顧脈洪大而數從可知也必俟吐後乘而消之極易為力今果如孫君言孫君藥俱在急煎飲之藥用牡丹皮桑白皮白蘚皮木通前胡枳殼桔梗甘草杏仁苡仁葶藶子服後大便裡急後重者二十餘次所下黑紫膿血甚多喘咳稍定痰紅稍淡二三劑乃能伏枕而睡改用白芍當歸白蘚皮甘草貝母黃連金銀花皂角子苡仁麥冬木通連飲二帖足上跟踝瘡腫漸消其夜陰囊出臭膿血二碗許次早診之兩尺脈不洪大矣仍用前劑加丹參又兩帖陰囊結靨甚厚橫裂一縫三日後隨縫連皮落下約重五六兩厚可半寸色如豬肝洞見兩陰子系一光薄白胞令人駭然此也亙千古稀見者舉家謂陰囊乃致命之所且未有子今爛去即使復好也不能育子矣環哭甚悲予諭之曰此毒去也而真元不傷吾能使其生肉如故也不妨於生育毋過慮焉舉家將信將疑予即用紅粉霜加生肌末藥敷上一日三次並不作痛膿水立干外以人參當歸酒炒白芍白芷甘草白蘚皮皂角子苡仁何首烏調理一月囊肌全生諸症悉愈乃令日用土茯苓豬肉各半斤同煮極爛將肉入醬鹽如常法食之湯當茶飲脫然全瘳次年生女查良本兄令眷每飲食悉從背後而下查良本兄令眷怒後偶食魚頭骨梗於喉中即以饅頭粽肉等壓之骨雖下便覺胸膈不快又服消骨藥兩日迨今乃七日矣胸膈脹痛殊甚飲食悉從背後而下惡寒發熱六脈弦數予思骨梗之後用硬物壓之傷其胃脘必有瘀血停留膈間將食管逼在背後故飲食覺從背後下也今但消去瘀血使食管復原胸膈之痛可瘳矣藥以五靈脂為君山楂玄胡索桃仁枳殼為臣赤芍藥牡丹皮香附山梔仁為佐柴胡石菖蒲為使水煎臨服入韭汁一酒杯飲之其夜胸膈寬快大便瀉一次痛減大半飲食仍從右邊而下右邊胸喉稍痛吞物甚艱若吐出痰皆血腥氣改以山梔赤芍藥歸尾桃仁劉寄奴五靈脂牡丹皮穿山甲煎入韭菜汁服之兩帖全瘳後谿大兄孺人戴氏患血痢有發明後谿大兄孺人戴氏勤篤嚴謹人也秋患痢所下皆血及屋漏水內有血子如赤小豆者不可計數晝夜五六十行裡急後重噦惡不住聲者五日予以劉守真芍藥湯與三劑而病無進退適後谿兄在浙侄女輩素信醫博黃氏為女科專門延而治之投以芩連枳殼檳榔山梔地榆黃柏滑石之類服已五日始雖噦惡一日尚有碗粥今則粒米不進腹痛轉加必用重物壓之乃稍定神思昏弱臥不能起下午發熱女科仍以前劑加青皮枳實侄孫爾嘉持藥見予曰家姑酷信黃醫為專門今已任事五日較前精神大瘁叔翁為祖父至交寧無一語啟愚乎子曰吾非不言欲詆黃恐為妒婦之口今子來予可診之六脈滑大無力診畢慌語爾嘉曰事急可速令人促乃祖歸否則令姑女流不諳醫藥吾安能施其巧比有西席汪帶川聞之決爾嘉曰此事極要調停留黃醫以安女流心黃髮之劑擱而不進以東宿之劑作黃劑進之內外無猜則妥矣予然其言以人參白朮酒炒白芍各三錢炙甘草一錢半炮薑肉桂各一錢白茯苓陳皮各八分砂仁五分大棗二枚水煎飲之噦惡減半其夜痢減十之五惟腹痛不甚減次早診之脈稍斂黃醫以為渠功大言自矜藥仍以芩連之類予仍以前劑再加黃耆其日下午始納粥一茶盞腹痛漸減又次晨黃醫診視見夜來痢減其七益得揚揚得志語左右曰寒家業醫五代似此大病也不多見自以為非彼也無能治也爾嘉詰曰瘧痢也尋常耳何以為大黃曰丹溪云下痢身涼者生身熱者死下痢純血者死脈洪大者死如屋漏水者半死半生今皆犯之故云去也爾嘉曰然然則今日當用何劑黃曰劑已投病仍當確守前方何敢輕改爾嘉笑而點首復向予求劑予以理中湯倍加酒炒白芍藥以肉桂佐之腹痛身熱悉愈痢十去九矣後谿兄也浙回爾嘉述病原以黃方予方呈看後谿唏噓嘆息乃辭謝黃而詰予曰人言下赤痢者熱噦惡者熱又身熱脈大吾弟何獨認為寒而用此大熱之劑成功曷故哉予曰此虛虛實實之處極能誤人尊嫂之熱非真有餘之熱乃內有虛寒逼真血火上行故噦惡潮熱耳脈大而無力仍作虛看且向服寒涼不效當自知警也後谿兄曰微弟幾敗乃事矣邵敬圃乃眷胃脘痛邵敬圃令眷常胃脘痛由氣鬱而起近以產後下痢紅白而胃脘之痛不止汗多六脈滑大無力法當收斂以小建中湯為主白芍藥酒炒四錢炙甘草一錢半桂皮五靈脂醋炒各一錢香附糖球子各八分水煎飲之痛減汗未全斂次日前方加御米殼醋炒過一錢兩帖全止蘇望臺患瘧有發明蘇文學望臺患瘧一日一發先寒後熱熱多寒少胸膈痞悶口渴小便混濁腥臊不可近醫五越月不效面黃肌瘦飲食減少喘息呻吟精神疲憊起須人扶乃敦予治脈得沉弦而數公問曰是瘧否予曰是公曰吾聞之真病不治治之無功蓋真者死候也瘧殆常病不過寒熱虛實表裡諸名家曾認為表症者麻黃羌活柴胡等汗之矣有認為里症者大柴胡湯輩下之矣有認為痰飲者常山礬石吐之矣有認為虛寒者附子理中湯人參服過三斤矣有認為實熱用白虎湯枳實青皮檳榔草果消之矣盡法備嘗絕無一應瘧豈亦有真而卒至於死耶言訖淚潸潸下予曰觀公色脈瘧將發矣不暇辯第飲予藥不死也以柴胡滑石各五錢為君鱉甲三錢為臣黃連知母各一錢為佐枳實甘草各五分黑豆四十九粒為使水煎送下昆布鱉甲丸申刻瘧至戌初便止公喜曰曏者瘧發未申夜半尚不能止即止猶倦怠懶言適飲先生藥不兩時而止止便能言先生之功也予曰偶耳今日服藥已晏明日五更幸早服之服訖竟日不發又次日前方加人參白朮小水腥臊之氣已無精神徒長公又喜曰兩日無苦先生之功也予曰偶然耳公曰嘻吾瘧幾半載休歙之名公莫不歷試卒無影響先生一舉奏奇有而不居益見所養不審湯名何劑乞指示之以詔將來予曰公何以名為哉老子曰無名天地之始矧醫亦道也即道亦是強名醫貴識病苟識病一二三品便能成劑立功經云約方如約囊又曰方以類聚方憑病立苟不識病即盡本草一千六百五十六品並而服之未見其益也瘧固常疾治亦不易仲景有言曰治瘧當分六經予謂即六經之中又各有寒熱虛實陰陽在焉是六六而三十六也即三十六之中又有挾痰挾食挾氣者稟弱者曷能枚舉人與天地陰陽一致天地變化無窮人身災患不一豈拘拘一百一十三方三百九十七法所能概哉王節齋曰古人因病以立方非立方以待病也斯言深得軒岐立方大意然予今日所用之劑和劑也仲景謂汗吐下後而邪熱不減者是為壞症以小柴胡湯加鱉甲治之予特仿仲景小柴胡例加益元散撤邪熱從小便中出鱉甲雖治壞症又能截瘧公曰噫嘻前此諸公看病不過曰寒曰熱曰虛實而已未嘗有此妙論誠空谷跫音也吾聞先生從祝令君潘去華輩六邑會中討究理致又曾覽先生序大易彀序翼飛乃知先生融三教而萃於醫先生之醫得之於性命竅中故能全人性命也有如此汪氏嫗寒痰壅滯一汪氏嫗寒痰壅滯於背胸脅腹皆脹小水頻數先與女金丹以治胸脅之痛以二陳湯加益智仁香附子白芥子青皮柴胡蒼朮桂枝一帖而小水減半次日以白豆仁易益智仁以枳殼易青皮再加川芎桔梗開提清氣諸脹痛悉減徐客兄子筋痿風太塘徐公諱客者其子弱冠肌肉瘦削尻膝腫大手肘肩髃皆腫腫處皆痛而發熱時醫有作風治者有作濕痰治者有作鶴膝鼓槌風治者愈治愈重伏床褥奄奄一息耳舉家倉惶而決之蓍楪者釋策曰易象可不死天醫上卦第遠在東方相去百里而遙迎而治之無恙也因訪予而迎之治予診其脈六部皆弦觀其色青而白飲食少時當長至予曰此筋痿症也書云諸痿皆不可作風治病勢幾危者以前藥皆風劑耳風能傷血血枯則筋愈失養況弦脈乃肝木所主攙前而至是肝有餘而脾土受敵脾為所傷宜飲食少肌肉削而勢將危也內經曰諸痿獨取於陽明為治陽明者腸與胃也法當滋補腸胃俾飲食日加五臟六腑有所稟受營衛流行氣煦血濡調養至春淑氣司令君火主事之時宗筋潤而機關可利也病者年雖少而能聞言相信懇予為治予立方五加皮苡仁甘草蒼耳子枸杞子回陽人參杜仲黃柏黃耆防風服二十劑而精神壯腰膂健飲食加惟間或夢遺則為減去杜仲而加遠志當歸三十帖而全安此余初發之治也邵老封君手足麻而無力邵都諫老封君思翁年過古稀右手足麻而無力不為運用足不良於行以六君子湯加川芎當歸苡仁大附子鹿角膠黃耆桂枝兩劑便能步履四劑手足強健每隆冬必服十數劑則精神加飲食美睡臥也安翁喜語曰吾得君方服之可不杖君劑當我几杖乎嘻程巢父乃郎痢後風有發明太溏程巢父文學乃郎諱萬里者年十五夏月患痢族醫為治彌月痢止而筋骨腫痛痛處發熱晝輕夜重肌肉消飲食少煩躁醫者以白虎歷節風治之病劇而形削骨立矣又有作鶴膝鼓槌風治者法愈更而病愈甚其家有程松谷者博洽嘉聞君子也為巢父族大父以余在西吳治多奇中命巢父迎余予至診之脈皆細澀曰此痢後風也蓋由治痢不善以致寒濕穢瘀凝滯經絡日久氣血為痛所傷此症虛虛實實極難認而措藥不易欲補虛則腫愈劇欲疏通則痛愈甚惟局方大防風湯可愈此疾也防風熟地黃耆人參白芍當歸杜仲各一錢白朮一錢五分羌活牛膝甘草回陽各五分川芎七分加姜三片水煎服服三十帖而愈按局方云痢後腳緩痛不良於行者名曰痢風或兩腳腫痛足脛枯臘者名曰鶴膝風並一切麻痹痿軟風濕挾虛之候服之其效如神余故用之亦謂治氣血兩虛挾風氣而成痿蹶者爾非謂可並治初起有餘之疾也葉潤齋心膈嘈雜好啖肉尤好雞腹大痛蟲症也葉潤齋年近四十心膈嘈雜好啖肉尤好雞一日不能缺缺則身浮力倦神魂無措必急得肉乃已見則大嚼及入腹腹又大痛痛極則吐酸水稠涎然後定稍定又思肉啖也其痛苦之態喊叫之厲難狀見者酸鼻而潤齋則甘心焉市人咸以為祟或有諭之者曰古云與其好肉而受痛孰若絕肉以無楚也久病脾虛肉入難化故使作痛此婦人女子且知之汝丈夫獨不慎何哉潤齋曰吾豈不知絕肉之為愈也蓋痛雖苦尚能熬若嘈雜則遍身淫淫蘇蘇左右無可奈何手足無所把捉頃刻不能自存有近於死不能熬急須肉少蘇吾豈縱口求痛哉不得已也乃翁延予為診六脈大小不等觀其色唇紅臉黃予曰據色脈乃蟲症非祟也予能拯之先與雄黃丸一服不瘳改以膩粉五分使君子末一錢用雞子打餅五更空心飼之辰刻下長蟯十條內有二大者長尺有咫自首貫尾皆紅下午又下小蟲百餘自此再不喜肉而嘈雜良愈程相如令政孕七月患痢程相如丈令政鄭氏孕逾七月因食冷患痢所下皆白膿腹痛後重小水不利兩關脈滑數以艾葉砂仁白芍藥白朮厚朴澤瀉滑石甘草與之痢如舊小水仍不通利夜更痢頻改用當歸白芍藥各二錢益母草酒連酒芩各一錢滑石三錢枳殼七分木香甘草各三分艾葉二分兩帖而安程曉山中風先兆有發明太塘程曉山程松谷從弟也客湖州年四十懸弧之日湖中親友舉賀徵妓行酒宴樂月餘一日忽言曰近覺兩手小指及無名指掉硬不舒也不為用口角一邊常牽扯引動幸為診之六脈皆滑大而數浮而不斂其體肥其面色蒼紫予曰據脈滑大為痰數為熱浮為風蓋濕生痰痰生熱熱生風也君善飲故多濕近又荒於色故真陰竭而脈浮此手指不舒口角牽扯中風之症已兆也所喜面色蒼紫其神藏雖病猶可治切宜戒酒色以自保愛為立一方以二陳湯加滑石為君芩連為臣健脾消痰撤濕熱從小便出加膽星天麻以定其風用竹瀝薑汁三拌三曬仍以竹瀝打糊為丸取竹瀝引諸藥入經絡化痰外又以天麻丸滋補其筋骨標本兩治服二料幾半年不惟病痊且至十年無恙迨行年五十湖之賀者如舊召妓宴樂者亦如舊甘酒嗜音荒淫而忘其舊之致病也手指口角牽引掉硬尤甚月餘中風左體癱瘓矣癱瘓俗所謂半身不遂也歸而逆予診之脈皆洪大不斂汗多不收呼吸氣促予曰此下虛上竭之候蓋腎虛不能納氣歸原故汗出如油喘而不休雖和緩無能為矣閱二十日而卒程曉山令郎麻後疳症程曉山中風歸而逆予診時其子僅七歲中麻西吳呼為瘄子姑蘇呼為沙子一月餘矣發熱如故咳嗽聲啞肌削骨立頭髮盡禿眾醫束手舉家也墮淚而已余以診曉山見之曰舉家驚惶謂此兒不保耶此疳症疳因麻後虛熱而發以大蘆薈丸治之可獲萬全君家初不問予者謂予非幼科專門也不知此特大方家餘事耳為製藥服之藥未盡而病瘳松谷君語其鄉人曰東宿公見病而決死生治病而隨俗為變一秦越人也孫真人後身非耶予聞之而三謝不敏一婦疫後虛寒去予舍二里許地名曰前坑口一婦人清明前十日發熱頭痛醫者以九味羌活湯十神湯進之不效而又加口渴舌黑如煤更一醫以如神白虎湯竹葉石膏湯進之亦不效而加泄瀉不止人事昏沉四肢厥冷呼吸氣微米粒不進者十四日其家為具含殮而待斃適予掃祖墓而近其家其子聞之即告急於予懇為一診其脈細如蛛絲予曰此疫症也合理中生脈二湯飲之連進二服夜半神氣稍蘇飲粥湯半盞次早六脈漸見予喜語其子曰可保無事書云脈絕微續者生仍以前藥與之至晚瀉止口不渴舌心焦煤退精神清爽駸駸向安矣再用人參白朮各五錢炮薑炙甘草各二錢半麥門冬三錢五味子十五粒水煎不拘時服不數日而痊愈從獻長郎七歲患痢疾後成疳有發明族太學從獻長郎七歲時患痢紅白稠黏而紅更多飲食少形氣弱於時太學應南都試其兄從明雅知予因逆予視視畢予曰此不可尋常治也法當補從明曰語云無積不成痢故法先推今不下而遽用補積何從去予曰足下論者常也治病貴先察症古人有先攻後補有先補後攻者因症投劑不膠於常也今形瘦體弱面色青稟受大不足者飲良又少予故用補欲使寧有餘即不如意猶可措手若拘常法下之倘有變將奈之何從明是予而索藥即以四君子湯加歸芍黃連山楂與服三帖而病無進退婦道間有議予非幼科專門令更請夏氏夏至即語予先不下而用補以至遷延如是夏曰幸不下若下今不可為叩其故曰丹溪云大孔如毛筒者不治今肛門有竹筒狀豈可下然也不必補香連丸六一散可愈耳三服而痢愈頻其病愈甚又加噁心而神氣憊又更醫請汪恆春汪至亦以香連丸黃芩芍藥湯與之痢下日夜不可以數計飲食不入口婦道信耳謂二氏有時名故遞迎之獨從明持議覆逆予予往觀其形神大非昔比知中氣虛極非理中湯不可用人參白朮各二錢五分酒炒白芍藥白茯苓各一錢炙甘草炮姜各八分肉桂三分四帖痢即減半前方減其半料又六帖而飲食進痢也止稠黏雖無而血水日夜仍三五行肌肉也未生予思其故必疳疾從虛而動用如聖丸以治疳病則全瘳矣侄孫子忠痢下紅膿如爛魚腸腹大痛日夜百次族侄孫子忠患痢於湖之東雙林腹大痛日夜行百餘次下皆紅膿狀若腐爛魚腸絕無糞疼而喊叫聲震中外由孟秋飢飽後娼家縱欲而得也一病即伏枕已十餘日矣予時寓雉城相去百里外渠叔少崖邀予往視診其脈皆緩大無力始用芎歸各五錢加人參白芍藥桂心木香黃連服四日不效改用膠艾湯也不效大孔狀如竹筒物食而下不變色猶原物予思之此脾經為寒濕所傷脾不裹血故也非附子理中湯加肉桂肉果不可進五六帖痢始減半飲食稍進但所下穢惡仍若前狀亦無糞渠父仲珪家居聞報即遍訪徽之名家僉囑以切勿用補藥兼程而抵苕城儆虞留款因詢近用何劑儆虞曰聞用附子理中湯人參每帖三錢仲珪駭而墮筋亟使見予潸然淚下言曰侄五旬僅此一子症危如此倘不測後將何望予曰郎君險過矣復何憂亦以侄只此一子故殫心力相扶也仲珪曰離家而徽之名公俱囑以勿輕用補侄故兼程而來竟以補收功非叔幾乎誤事吾兒自今以往之年皆叔之賜侄父子何以報效予曰治疾如救焚醫家份內事矧屬在宗鄰且無德我之望又何望報第雉城之約不可失若浼李鍾泉邀吳蓽齋代視數日俾予得踐雉城之約庶兩盡矣而吳子疑而辭曰病者危在旦夕何孫公欲自脫手而愚我被惡聲也予聞而曬之曰見何鄙哉丹溪有言虛回而痢自止病者再五日可脫然矣予也暫留即以東垣和中勝濕湯與之服七日即衣冠出市報謝四鄰吳見之而悔李鍾泉靳之曰孫公欲成爾名爾欲自沒沒也悔之何補吳由是改容相敬令其弟遊予門彼也納交予而稱莫逆子忠始病也其友李鍾泉重交誼日夕省候督其僕事湯藥毋許離蛙步所下穢物腥臭不可聞皆用漆布拭之晝夜用數十斤悉其湔浣了無難色兩月如一日也此友也今時所稀觀者因並記之以著其高元素內人雙胎難產治奇余侄元素內人季夏難產夜過半急叩予門起而問之為產者急矣曰然作何狀曰產已及戶不能下用力則胸膈間有物上衝痛不可忍予思少頃曰此必雙胎胞已分而一上一下也及戶者在下欲產在上者以用力而上衝惟上衝胸膈故病也勢亦險矣乃諸書如產寶良方胎產須知與各大方傢俱未論及將何以處因詳思其治法偶悟必安上而下始用力產也即取益元散一兩與之令以紫蘇湯送下囑必如法飲藥入腹而胸膈痛止不逾時產兩女母亦無恙予仲子泰來問曰益元散非產科急劑何能取效如是予曰紫蘇安胎下氣滑石滑以利竅亦摧生之良品蓋醫者意也予亦以意裁處之耳此法方書無載故記之以備專女科者採而用焉邵馬兄患嘔吐所吐皆如爛豬肺有邵兄而諱馬者年五十患嘔吐吐物如爛豬肺狀胸背脹市上諸醫皆以翻胃治之不效而反加潮熱煩躁飲食不入口歙醫謂肺壞辭去不治延予治之診其脈兩寸滑數左關尺澀予曰此瘀血痰飲症也非肺壞果若肺壞聲音當啞今聲亮而獨胸背作脹瘀血痰飲明矣此症殆由酒後怒發所致蓋肝藏血脾統血酒傷脾怒傷肝以故不能藏不能統血隨氣上積於胸膈必吐出而脹斯寬也法當消瘀血調氣化痰氣調瘀消則新血始得歸經大本端而病根可除矣乃為立方滑石三錢甘草五分茜根二錢小薊一錢五分桃仁貝母歸尾香附各一錢山梔仁枳殼桑白皮各八分服十帖而全安許卓峰上吐血下溲血咳嗽聲啞許卓峰者多酒多怒人也上吐血下溲血咳嗽聲啞族醫以為瘵辭去不治迎予診之其脈左關弦大右寸下半指累累如薏苡子狀予曰此有餘症也作瘵治者非客有辨之者謂此症人皆認為瘵而先生獨謂非瘵然何以失血而聲啞也予曰其為人也好酒酒屬濕熱而助火生痰火性炎上迫肺不降積而生痰壅瘀肺竅肺屬金主聲書云金空則嗚金壅塞而不通故啞此痰壅之啞非肺痿之啞也其性又多怒內經云怒則傷肝甚則嘔血並下泄蓋血隨氣行氣妄動血隨之亦妄動而不歸原故上吐而下溲法宜清熱開鬱化痰導血歸原不半月而病可瘳也若認為瘵症而以地黃天麥門冬牛膝山茱萸之類將甚其塞而益其熱聲音何由而開血隨氣行氣不清血又何得歸原哉諸君試觀之予用滑石青蒿解酒熱為君貝母鬱金山梔仁香附開鬱為臣杏仁桔梗同貝母化痰為佐丹皮丹參小薊甘草導血歸原為使服十帖血果歸原又以貝母一兩童便浸一日為末柿霜等分時時抄舌上化下五日而聲音開亮矣計期不出半月族嫂汪氏患痢赤白嘔吐痰涎粒米不進二月族嫂鈞孺人年六旬孀居已十餘年患痢赤白俱下腹微痛晝夜二十餘次嘔吐痰涎粒米不入口者兩月日惟用薄白酒打雞蛋花飲之肌肉盡削諸藥不效予歸診之六脈滑數知濕熱痰火所致以二陳湯加益元散薑汁炒黃連黃芩服幾四十帖而嘔止痢瘳其病也幾危矣予為治者恃其神存惟神存雖形氣不足不食猶可不死此也醫者當察也邵來儀丈令眷咳吐紅痰如桃花膿色邵來儀丈令眷咳吐紅痰或如桃花膿色前後心稍脹痛兩寸脈洪滑此瘀血痰火鬱滯肺之氣道而欲成肺癰也治當調氣化痰兼消瘀血清理肺金以山梔子牡丹皮貝母桑白皮赤芍藥麥冬各一錢白滑石三錢茅草根五錢小薊二錢甘草五分枳殼八分四帖而瘳程玄祖兄春溫食復僵寢如屍有發明程玄祖兄春溫食復人事昏沉內熱口渴舌如焦煤脅痛耳聾身熱如火僵硬不能轉動屍寢者十日口中喃喃蓋夢語也城中時疫正盛親友咸不弔慶予為脈之左弦數右洪大而數以柴胡石膏各五錢黃芩知母葛根各二錢山梔子枳實各三錢甘草五分連飲三劑額上微汗腹中雷鳴其夜大便瀉三次皆清水熱仍不退次早脈之右寸稍軟前方加人參七分又二帖而汗出熱退身仍僵口仍渴耳仍聾瀉也不止汗也不收四肢如冰勺粒不進者已十三日人皆以為死矣予獨不忍棄以人參麥門冬白芍藥石斛各一錢五味子十一粒當歸八分桂枝三分黃柏甘草各五分後再診之左脈已弱咳嗽人事漸爽粥飲稍進乃能開目發聲瀉已止頗可轉身才有生氣後以四物湯加苡仁甘草陳皮白朮石斛百合貝母調理一月全瘳汪郎兄蟲痛汪郎兄腹痛嘔吐不止城中諸友畢力醫治不痊予為脈之早晚大小緩急不一知其為蟲也以乾薑檳榔蒼朮各一錢五靈脂三錢烏梅三個川椒三分水煎飲之痛吐立止查景川氣虛瘡疥查景川兄遍身痱痤紅而焮癢諸君以白蒺藜荊芥升麻葛根玄參甘草石斛酒芩甘草與之不愈又謂為風熱以玄參蟬蛻赤芍藥羌活防風甘草生地當歸升麻蒼耳子連翹服之飲食頓減遍身發瘡痛癢不可言予脈之兩手俱緩弱以六君子湯減去半夏加白扁豆砂仁苡仁山藥藿香黃耆一飲而飲食進四帖而痛癢除十帖瘡疥如蛻程玉吾內人妊七月內吹程玉吾內人妊已七月乳忽紅腫而痛灑淅惡寒發熱而成內吹以大栝蔞四錢為君當歸尾二錢為臣甘草節蒲公英貝母連翹各一錢二分為佐青皮柴胡各八分橘葉五片為使水煎飲之兩劑而瘳此方治驗不可勝數緣婦女鬱怒肝經為多故栝蔞甘草為緩肝之劑貝母開鬱連翹蒲公英解毒柴胡青皮調氣橘葉引經當歸活血血活氣調毒解熱散而腫痛消釋也若將成膿可加白芷一黃氏婦受身足月發癇一黃氏婦青年初孕已及彌月忽午夜口中呶呶目作上視角弓反張裸裎不避羞恥口眼偏邪昏憒不知人事問之不能言對舉家悚駭予曰此風痰為怒所動而成子癇當從云箕子葛根湯加大腹皮一兩劑可愈也方以葛根貝母丹皮防風川芎當歸茯苓桂心澤瀉甘草各二錢獨活石膏人參各四錢水煎飲之而蘇按貝母令人易產未臨月者用升麻代之吳見南令郎心脾痛吳見南令郎心脾痛因勞倦而致每痛必得可口之物壓之立止兩腿生瘡右脈滑左脈弱以白芍藥三錢甘草一錢五分白蒺藜碧胡麻各一錢當歸黃柏各八分石菖蒲白茯苓各六分四劑而痛止仍用小建中湯減去桂枝加黃柏蒼耳子白蒺藜何首烏煉蜜為丸服之瘡也尋愈又令郎八歲疳積蟲痛又令郎八歲原有疳積蟲痛因幼科攻克太過脾氣不足面色青以啟脾丸為主藥用人參白朮茯苓甘草白芍藥山楂澤瀉薏苡仁白扁豆使君子蘆薈雞肫皮以神麯糊為丸一料而瘳侄女八歲腹高於胸咳嗽嘔吐甚則噴血族侄女年甫八歲腹高於胸發熱面紅咳嗽嘔吐甚則連血噴出右關脈滑大有力此風熱羈絆於脾肺之間而然以滑石二錢枇杷葉一錢麥芽天麻半夏曲各八分枳實枳殼防風青皮各五分水煎服之熱退嗽定吐也良瘳從兄䤾年五旬左脅痛手足抽搐不能步履從兄䤾年近五十左脅痛手足抽搐不能步履兩手脈俱軟弱用當歸白芍藥木瓜石斛蒼耳子枸杞子各一錢薏苡仁二錢人參牛膝各七分陳皮白芥子各六分紅花三分水煎飲之其夜大便下黑血二升乃得睡痛搐俱緩改用人參當歸白芍藥各一錢二分薏苡仁四錢牛膝木瓜石斛各八分紅花酒芩各五分其夜大便仍有黑物從此精神和好寢食俱安後五日因為怒忤且加食傷右手左足大搐左足大腿疼痛縮而難伸伸則痛甚左脅極痛小水短用山楂青皮防己人參半夏曲陳皮苡仁川芎蒼耳子杜仲石斛以栝蔞為君服下左脅痛止右手也不搐矣惟左大腿內股筋痛一搐則膝抵於口此也事之異者因改以人參當歸薏苡仁甘草黃柏白芍藥鉤藤牛膝木通山梔子諸痛搐悉愈口也不渴後只以此法調理五日隨能縱步出戶小童上達脾虛發腫一小童上達年十六忽面大腫足也微腫喘息不安此脾虛濕氣壅盛所致酒芩桑白皮防風葶藶子陳皮羌活升麻甘草澤瀉白朮此上下分消法也服後腫勢稍退但正氣甚虛以六君子湯加麥芽澤瀉調理而安一日因多飲食且感風寒痰湧吐逆見鬼面掉手足角弓反張唇口色黑勢極危急此癇症也以膽星半夏天麻殭蠶橘紅炙甘草枳實麥芽白朮紫蘇子杏仁前胡白茯苓姜三片水煎飲之一劑而愈此後再不復發族侄良詮血痢腹痛有發明族侄良詮患血痢腹痛裡急後重時師治以香連丸黃芩芍藥湯不愈反增痛面赤唇紅有似塗朱喊叫之聲四舍悚駭比有太學寧宇者仁心為質人也憐其家貧莫秪拉予為診六脈洪大伏於床間兩眼淚而不能言太學會其意語予曰症誠急彼以後事無措而難於言予曰諾吾能起之以生熟白芍藥六錢生熟甘草二錢乾薑肉桂各一錢木香五分棗二枚水煎飲之飲竟嗒焉而臥太學心疑歸囑家奴曰倘有急叩門可即報我及明見無動靜仍令人覘病者何若復曰夜來痢減十之五痛減十之七早間已啜粥半盞矣太學喜而叩予曰渠面赤唇紅脈大所下皆血症皆屬熱叔乃復投熱劑吾甚恐一夜不能寐乃今疾已減半生有望焉不卜今日用何劑予曰比昨劑差小耳方仍昨也太學曰吾惑矣何視熱為寒耶予曰君知脈大為熱不知大而無力乃虛寒也面赤唇紅由中寒而火不能下陰盛格陽之症設是真熱腹痛其人體仰而舒寒則引而伏所下血色帶晦均是假熱寒症明矣前劑果再進而全瘳太學復書報予曰昨聞虛實真假之論非飲上池水者不能道也幸注之以詔後世一婦胸膈有痰大便泄瀉大發寒熱一婦年三十二大發寒熱胸膈有痰大便泄瀉以二陳湯加白朮桂枝白芍藥柴胡酒芩一帖而止後因怒早晨又復發熱吐血一盞口渴汗多脈甚數陳皮知母柴胡杏仁丹皮酒芩白朮人參烏梅青皮檳榔水煎服之用此調理數脈漸退惟左脈尚弦寒熱已止喉中痰聲已定後又因將息失宜兩脅痛痰多嗽不易出脈較前不甚數以栝蔞仁一錢半貝母白芥子各一錢蘿蔔子桃仁滑石牡丹皮香附山梔子各七分青皮赤芍藥甘草各四分煎服血絕不來嗽熱寢息而安從弟婦程氏右脅痛不能睡背心疼胸膈作梗痰中有血從弟婦程氏右脅痛不能睡背心疼下午潮熱胸膈作梗痰中有血大便秘用大黃以韭菜汁蘿蔔汁苧根汁各和勻將大黃拌濕炒乾再拌再炒如此三次以黑為度三錢栝蔞仁二錢貝母當歸山梔子牡丹皮各一錢青皮前胡穿山甲各六分甘草三分水煎飲之凡三帖而瘳再也不發黃懷虛原患吐血又咳嗽嘔吐左脅不能著席黃懷虛咳嗽嘔吐不知飢餓氣逆不調不得仰臥左脅也不能著席原曾吐紅近又傷食先以丹溪保和丸進之繼以穀芽橘紅白朮枳實半夏曲甘草蘿蔔子茯苓杏仁桑白皮將養而安一族姐年六十咳嗽口渴常吐蛔蟲一族姐年近六十咳嗽口渴常吐蛔蟲用前胡知母天花粉白芍藥當歸甘草陳皮桔梗烏梅桑白皮煎服諸症悉止後半年膝彎紅腫作痛大便秘黃柏當歸生地紅花威靈仙羌活蒼耳子五加皮防風苡仁四劑全瘳侄婦戴氏心痛徹背背痛徹心一發必七日族侄婦戴氏兩寸脈滑大兩尺沉微心痛徹背背痛徹心甚則必探吐其食乃已近來每一痛必七日僅進白水粒食不能進進則吐而痛更加七日後痛漸已如此者十七年所矣始則一年兩發又一年六七發今則一月一發以積氣丸治之不終劑而斷根老僕來興痰火上壅胸脅背心脹痛老僕來興咳嗽胸脅背心脹痛如刀刃所痌發熱口渴諸治不瘳脈浮而數此風寒鼓激痰火上湧而然前胡麻黃紫蘇子散風邪為臣以栝蔞仁治痰火為君橘紅半夏旋覆花杏仁為佐枳殼桔梗甘草為使兩劑而平一婦生女不生子多思郁小便秘而不通轉脬症也治奇一婦生女不生子多思多郁小便秘而不通脹悶不安者二日歙醫汪氏以備急丸進之謂大便行小水自利也詎意大便行後而小水點滴不通脹悶益急時刻不能存將欲自盡家人急予為治予詢之曰近來經水行否答曰行過十日矣小腹腫大如一大西瓜之硬自大便泄後疲睏不足以息勢若燃眉予曰此轉脬病也不急治則危矣以補中益氣湯臨服入韭菜汁一小酒杯服訖選有力婦人進房令患者橫臥床間力婦以患者兩腳膝彎架於肩上將患者下身虛空提起搖擺數四俾尿脬倒上徐徐放下患者去衣不及小便箭射而出熱如湯黑如墨頃刻盈盆小腹立消而愈後遇數人不拘男婦皆以此法治之而安昆池太學內人牙痛一晚暈厥三次昆池太學內人患牙痛一晚暈厥三次次日兩腮紅腫痛不可支且灑淅惡寒寢食廢以清胃湯加石膏為君白芷為臣連翹為佐北細辛為使飲下痛頓釋然如風滅燈之速外以明礬為末大五倍子一枚將礬裝入以滿為率炭火上炙焦以礬紅枯為末不時搽牙痛處牙痛立止此方多效一僕婦難產子宮墜出戶外半月不收治奇一僕婦因難產而子宮墜出戶外半月不收艱於坐臥家貧不能求藥憂恐成痼鄰嫗為訪之專門黃醫博氏教之四此易事也只須補中益氣湯一百帖每帖要人參三錢計二斤可收功也乃夫聞言即大伸舌謝之曰彼家朝傭暮食無隔宿之儲甑生蛛網者半越月矣安有人參二斤可服也惟命是俟耳嫗復向予言之且告以醫博氏之治予笑語嫗曰審如彼言貧家則盡俟命矣又奚醫為此必產時受寒血凝滯不能斂而收入症雖名陰脫未必盡由氣虛下脫也觀其善餐而大小便如常可知矣予有一法價廉而功捷三五日可瘳也用未經水石灰幹一塊重二三斤者又以韭菜二三斤煎湯置盆中將灰干投入灰開湯沸看沸聲盡乃濾去灰帶熱坐於盆上先熏後洗即以熱韭菜於患處揉挪蓋石灰能散寒消血韭菜亦行氣消血一日洗一次如法洗之初極爽快洗三日果消軟收入此予臆度之方初不期捷效如是里中聞之咸謂此方合命名曰賽百帖人參湯云侄孫媳程氏體肥經閉者八年族侄孫媳程氏雙桂翁女也年甫三旬產曾五胎今則經閉不行者八年肌肉則豐肥於昔飲食又倍加於昔精采則豔美於昔腹柔不堅略無所謂病者獨經閉不行不生育耳專科率用四物湯玄胡索牡丹皮諸通調劑計服千餘帖矣又如三稜莪朮乾漆桃仁蘇木之類莫不概嘗罔有一應訪余為診六脈緩大有力予曰此脾濕生痰脂滿子宮徒行血活血破血無益也法宜調氣消痰燥濕熔脂俾使清瘦庶新飲食不復生痰不助肥脂復為經水經不期行而自行矣若被專科者流局局然養血活血破血而望其經行不也難乎蓋前劑皆滋濕生痰之味非有濕痰者所宜而肥人尤不宜用也乃為訂一方以平胃散加滑石桃仁黃連薑黃丹參南星半夏作丸劑服之半年而經行次年生一子後連生一子一女熊成八官早起行路眼見邪火兩團滾來大被驚駭熊成八官江右南昌人也早起行路忽見邪火兩團滾滾而來大驚駭次日腹中膨懣漸成脹滿面白皮薄兩手瘦削兩足皆有浮氣按之窅然不起行動氣促形神俱弱醫謂神弱氣促面白肌瘦胸腹青筋縷縷如貫索小水清長形症如此脾虛所致以參苓白朮散投之十日堵然如鼓中有一塊巍巍突出堅若鐵石臍已平滿勺粒不入醫者復診與渠決曰若疾法在不治盍早圖歸毋作異鄉鬼也病者聞言淚簌簌下熊東溪憐而懇予為診脈沉弦有力診竟語渠曰審脈驗症非氣虛中滿候也前補太驟適有助長顧今黴雨途遙即歸恐未能時刻可到即到未必遇良手治稍異則大事去矣予有一藥尚可冀生東溪力為之請以琥珀調中丸日二進之一進甚甘再進稱快十日腹漸寬塊漸熔半月塊盡消去青筋俱斂改以平胃散加蘿蔔子薑黃苡仁砂仁木香調養一月飲食大加帖然安寢兩足之浮亦並消釋從侄中叔太學以暑月赴南雍一日轉斑出從侄中叔太學以暑月赴南雍一日轉班出索茶飲飲輒逆流左鼻出茶入腹者十之三當迓白下名家調理者盡其人幾一月不惟飲茶水為然食粥與飯亦多從鼻出太學生平喜精潔日與交遊皆縉紳逢掖遂以疾自慚因告假圖治聞京口多名醫買舟訪之如何如張如團無不謁治然愈服藥愈病漸加噁心頭暈肌肉削四肢無力心益惴惴亟歸就予治予診畢因叩所見諸名公認何症投何劑中叔曰諸君皆謂此疾板籍無載治法無稽徒揣度為胃火謂諸逆上衝皆屬於火故投劑非黃連解毒即三黃石膏梔子黃柏知母天花粉葛根之屬侄也以初到白下苦酒因酒動火理或為然聽其治而不惶它計也予曰治病貴辨明經絡與經絡之出納虛實明臟象察經度究竟夫病機病能此扁鵲所以隨俗為變也何常拘拘守方書哉內經有云咽喉者水穀之道路也喉嚨者氣之所以上下者也頏顙者分氣之所泄也人之鼻淵涕出不收者頏顙不開也子之症也頏顙不開之類爾頏顙不開故氣上而不下會厭弱而不能掩其氣喉夫鼻與氣喉相通惟不掩故飲食逆從鼻竅而出不見常人偶氣逆而飲食自噴嚏出乎即其例也且右脈緩弱無力氣虛明矣內經云形寒飲冷則傷肺又曰脾胃喜溫而惡寒又云視聽明而清涼香臭辨而溫暖子多服寒涼此所以噁心頭暈肌消也予但為溫補蓋肺屬金而主氣金氣旺則收斂下降氣下降則飲食從氣下矣以六君子湯加辛夷桑白皮苡仁沉香一進而勢緩三進而止大半七劑而全安以此症舊無載故筆之以俟後人採焉程達庵四媳戴氏產半月而腿疼程達庵四媳戴氏產半月而腿疼迎專科診視曰虛投以八珍湯服十日痛益甚予赴邑候之召道經其廬達庵趨問產後半月而腿疼何症予曰兩腿皆疼獨一疼也達庵曰右腿疼予問疼處熱否曰熱予謂切不可認虛認風此產後敗血凝滯血海流於經絡不急治則血無從出久必化膿成毒或為腸癰今腿痛是其徵也達庵默然而別復迎專科又曰風也但丹溪有云產後須當大補氣血雖有他症以末治之投以十全大補湯痛轉劇大發寒熱小腹近胯果紅腫出膿外科又為生肌收口太早致腰俞復發一毒腫痛寒熱如初十日後大潰膿而不收口精神萎頓肌肉陡削飲食不進噁心怯寒奄奄一息爾外科曰不可為也專科曰余但治胎前產後今為腫毒所壞皆辭去而不下藥達庵始悔不聽予言以致誤事因急予予往視六脈濡大無力瘡口流清水而無膿予曰勢棘矣不暇治疾速為保脾蓋五臟六腑皆藉脾土以為養然非大劑人參附子不可始以人參白朮各五錢甘草乾薑大附子各一錢黃耆三錢白芷桂心各五分以其能排膿止痛也外科猶然阻曰白朮作膿恐不可服予曰膿不死人飲食不入口則死人也急進之四帖而神氣回飲食進諸症悉減瘡口成膿予語之曰生矣改用參苓白朮散調理一月而安達庵叩予曰公何預知必為腫毒當急治也予曰內經所謂臟象又云現症腿疼而熱症已現矣生於產後非敗血所致而何於時急為疏通不留經絡何毒之有專科不察而補是益其毒而助之潰也外科不審虛實強弱概以毒治之奈何不使患者幾危哉達庵曰專科之不足恃也如此夫雖然不如是無以見公之高矣
