body:
  text: 卷三新都治驗瓊兄內傷飲食外感風邪瓊兄內傷飲食外感風邪灑淅惡寒發熱煩躁不寧已經表汗瀉吐之後小水短赤口渴腹中疼夜不能睡耳聾氣塞神魂不安懊憹不已予脈之兩寸滑大左關弦右關滑兩尺皆弦皆七至據此乃少陽陽明兩經合病仲景云渴而小便不利者當利其小便先與柴苓湯加竹茹進之耳稍聰稍得睡熱仍不退聞食氣即嘔以濟生竹茹湯加人參麥冬黃連與辰砂六一散三錢服後神稍清手足心仍熱用竹葉石膏湯而熱亦不退且懊憹殊甚合目即譫語按仲景謂傷寒汗吐下後懊憹不得眠者熱在心胸之間宜輕湧之以梔子豆豉湯主之服後晚間仍不得眠兩耳氣塞難當改以小柴胡湯合白虎湯進之即得睡睡中汗出二次耳頓通利因進食早又發熱口渴舌上黃苔此陽明餘熱復萌乃用石膏七錢甘草一錢知母三錢黃連一錢五分百合竹茹各一錢竹葉三十片急進而熱全退始得獲安程龍邱翁每行動即作熱發渴嘔惡腰與環跳穴常痛程龍邱翁每行動即作熱發渴嘔惡腰與環跳常痛脈左沉細右寸滑關尺濡弱此上焦有痰火下焦有濕熱治當流濕舒筋然後施補先用苡仁三錢蒼朮威靈仙黃柏烏藥葉紫荊皮各一錢紅花桂皮防己各五分水煎服外以鹿茸虎骨晚蠶砂仙茅黃柏龜板蒼朮牛膝杜仲蜜丸服之而安汪松崗原傷於酒夜分發熱咳嗽咯血汪松崗翁原傷於酒夜分有熱咳嗽咯血不思飲食左脅氣不調左寸脈芤關澀尺弱右寸短關滑此胃中痰火正旺氣血俱虛宜先清胃保肺然後大補麥冬知母寒水石甘草紫菀人參牡丹皮白芍藥當歸貝母桑白皮煎服一帖紅仍未止加側柏葉茅根四帖而紅止過後四月又為怒氣所傷血又動左不能睡桃仁滑石紅花當歸人參貝母山梔甘草香附青皮牡丹皮煎服而安予囑渠令子曰寄語令堂諸凡得意事可與尊翁知之如不得意者切不可使之聞也蓋肝為藏血之所況血去多肝火剛燥心主不足內經云主不明則十二官危不可不謹防之且左不得眠肝脹可知予甚為尊翁慮後三年果為怒復乃命使迎予予固辭謝曰何曾叮囑今病之來非不佞所堪任也不逾旬而歿族妹經不行者八十日每飲食入腹即疼痛吐出乃止族妹經不行者八十日每飲食入腹即疼痛必盡吐出乃止居常亦吐酸水上焦熱下焦寒大便半月始一行食飲不進者四十日六脈皆數左滑右軟弱妹能事者以其夫多病且不諳世故由是悒悒病從思慮而得恐成膈症今大便燥結吐酸乃膈之徵急宜拂慮庶藥有功先與丁靈丸一粒而吐止繼用溫膽湯加大腹皮姜連痛吐全安改以二陳湯加香附條芩山梔仁丹參砂仁調理兩月經行大便始潤而膈症斯不作矣孫華野喉頰車腫孫華野脈沉弦而數喉痛頰車腫兩太陽作脹疼遍身皆脹痛憎寒發熱乃痰火上壅而變風熱將欲作毒也宜急治之薄荷甘草升麻白芷石膏枳殼天花粉桔梗大力子連翹玄參一帖而愈顯兄每辛苦及酒多則咯血數口顯兄每辛苦及酒多則咯血數口脈兩寸皆短弱關尺洪數此胃中有痰火而下焦有陰火由壯年酒色所傷故耳以丹參滑石各三錢白芍藥二錢麥冬貝母桃仁紫菀牡丹皮各一錢當歸七分甘草五分煎服而安吳遂兄濕熱發黃歙邑吳遂兄木商也在吳興年七十因冒雨勞力汗出又以冷水澡浴因而發熱口渴心與背互相脹痛小水長而赤舌上黃苔夜不得臥眼目如金皮膚盡黃吳興之醫見之遠走不敢措劑謂其年高不宜此病讚勸回家乃敦訪予治診得左脈浮數右濡弱兩手皆有六至予曰此濕熱發黃症也病雖重年雖高有是症當有是藥毋用倉惶乃以柴胡三錢酒芩葛根青蒿香薷天花粉各一錢人參七分粉草五分連進二帖晚得微汗即能睡次早熱退其半舌苔稍淡潤不焦燥矣胸膈餘熱作煩身黃如舊以竹茹青蒿葛根各一錢人參麥門冬天花粉知母各八分白芍藥六分二帖熱退食進精神陡長後於補中益氣湯加青蒿麥門冬天花粉十帖而眼目肌膚之黃盡釋然矣吳興諸公悉服其精當各錄方而傳族侄明之痰火上逆大吐痰沫因而嘔血一湧數碗有發明族侄文學明之以作文過勞痰火上逆大吐痰沫因而嘔血一湧數碗昏暈汗出奄奄而臥略不敢動稍動即嘔吐而血隨出色鮮紅飲食湯水皆不敢入入即吐而眩暈血即隨之里有婺君程聞野氏為之診駭而走曰血如湧泉體熱脈大眩暈而藥食難入似無佳兆乃速予治予診視畢語其乃兄勉之曰可生也何舉家張惶若此勉之以程言告予予曰看症要圓活勿拘泥據經云心主血肝藏血又曰怒則氣上又曰脈虛身熱得之傷暑今左脈弦大右脈虛大明之不獨作文勞心動火且亦被怒傷肝抑又為暑所逼以致木火上升眩暈作吐經曰諸風掉眩皆屬肝木諸嘔吐逆皆屬於火又諸動屬火內為木火上衝外為暑氣所迫故吐而汗多血隨吐出也醫貴識病有是病則有是藥予特以白丸子三錢解其暑氣清其痰飲抑其沖逆則吐可止吐止氣平則血自能歸經服後果嗒然而睡醒則吐止食進眩暈尋已繼用滑石香薷各三錢甘草五分黃連白扁豆各一錢五分竹茹一錢四帖全安族嫂程氏肺癰族嫂程氏年近五十患咳嗽吐臭膿血一日夜一碗余發熱晝輕夜重肌肉大瘦六脈浮而洪滑且數人皆謂嘔血身熱脈大法在不治予曰此非吐血比也此係釀酒傷肺又為怒氣所觸瘀血濁痰滯於肺之氣竅無從而出久之化而為膿成肺癰也治宜開肺竅活血化痰使膿盡當自愈也諸人治之二年不效予教以白芨薏苡仁各三錢牡丹皮桔梗茜根歸尾山梔子貝母白芍藥各一錢甘草葶藶子各五分三十帖痊愈後壽七十三以它病而終此疾再不復發侄媳葉氏身面四肢浮腫族侄媳葉氏年三十身面四肢浮腫漸而入腹腹大不可言眼泡腫而無縫飲食大減小水不利此氣滯水脹也以大腹皮茯苓皮薑黃蒼朮厚朴澤瀉木香烏藥陳皮服四劑而眼目能開飲食稍進即為食傷而復腫予改用七傷丸調理全安族侄孫伍仲善飲好內小便血淋疼痛族侄孫伍仲立年善飲好內小便血淋疼痛予以滑石甘草梢海金沙琥珀山梔子青蒿茅草根煎膏為丸梧桐子大每空心及食前燈心湯送下三錢不終劑而愈後五年因子遲服補下元藥過多血淋又發小便中痛極立而不能解必蹲下如婦女小解樣始能解出皆大血塊每行一二碗余如是者半月諸通利清熱之劑靡不遍嘗不應脈俱洪數予以五靈脂蒲黃甘草梢各二錢小薊龍芽草各三錢水煎空心服二帖而痛減半血仍舊改用瞿麥山梔子甘草各二錢茅根杜牛膝連葉車前草各三錢生地黃柴胡黃柏木通各一錢四帖痛全減血全止惟小便了而不了六脈亦和緩不似前矣後以人參葛根青蒿白朮茯苓甘草白芍藥升麻黃柏知母調理萬全令眷吐紅髮熱令眷辰州太守石峰公女也吐紅髮熱經水二十日一行或一月行二次白帶且多胸膈飽脹脈洪數以丹參生地山梔子白芍藥小薊鹿角膠水煎臨服前加入童便一酒杯二十劑而瘳亮卿令愛右目紅腫亮卿令媛右目紅腫如腹中飽眼乃能開飢則眼不能開此疳積虛寒症也以夏枯草二錢甘草穀精草各一錢香附一錢五分煎服四帖而安太學少竹眼紅腫脹侄孫少竹大學生也眼紅腫脹佘雲谷以苦寒治時疾之劑與之眼愈腫且增兩太陽痛前藥中再加石膏不惟眼腫不消頭痛不止且令遍身脹悶寢食俱廢予為脈之弦大而無力乃用蔓荊子桑白皮柴胡香附夏枯草甘草芽茶一帖而痛定兩帖腫消四帖全瘳一僕婦產後惡露不盡腹中作痛一僕婦產後惡露不盡腹中作痛且冒風咳嗽嘔吐頭暈腳麻不知痛癢亦不能轉側與糖球子紫蘇旋覆花烏藥五靈脂茯苓川芎當歸澤蘭葉玄胡索加砂糖煎服而痛止再進惡露行咳嗽嘔吐皆愈程好吾令孫右耳後生毒腫痛上舍程好吾公令孫右耳後生一毒腫痛遍身生大泡瘡憎寒發熱與金銀花當歸尾甘草赤芍連翹殭蠶大力子玄參兩劑而消華岳令堂右手臂肢節脹痛華岳令堂年五十餘向來小水短少今則右背鹽匙骨邊一點痛夜尤痛已經半月醫治不效輾轉加劇即於右邊手臂肢節皆脹痛筋皆暴起肌肉上生紅點子脈兩手皆滑數右尺軟弱乃濕熱傷筋而成痛痹以東垣舒筋湯為主羌活升麻桃仁麻黃紅花當歸防風甘草獨活豬苓黃柏防己知母黃連兩帖痛減腫消再亦不發程兩峰令眷血痢由溪程兩峰丈內人患血痢裡急後重嘔吐不納穀兩寸脈洪大以竹茹溫膽湯加姜連滑石橘紅酒芩水煎服二帖大便結實膿血皆止惟後重與枳殼當歸芍藥生地桃仁條芩甘草滑石酒連四帖全安程七護兄臍腹右邊疼痛小水不利嘔吐不進食由溪程七護兄臍腹右邊疼痛小水短少大便四日未行嘔吐不能進食舌上白苔面青手冷勢甚危急脈之左沉伏右滑大有力予曰此痰格中焦氣閉下焦故大小便秘而不利氣逆嘔吐也不急治即無救矣與桕樹東行根皮二錢滑石三錢桃仁青皮枳實檳榔各一錢水煎服之夜半吐出膠痰碗余大便未行痛亦不減次日改用玄胡索五錢水煎臨服調下玄明粉三錢辰刻服下午刻痛減大半未刻大便始行右脈平而左脈起矣覺體倦無力以生脈散加甘草山梔仁黃柏芍藥苡仁陳皮調理如故程社貴兄醉後御色次早胃脘痛極由溪程社貴兄先醉酒後御色次早四肢冷胃脘痛極脈僅四至先醫以鬱火為治投以寒涼痛更增極三日前所食西瓜仍吐出不化乃翁以為陰症傷寒欲用附子理中湯不決逆予治之予觀其面色青慘叫痛而聲不揚坐臥煩亂予曰此霍亂兼蛔厥症也先當止痛安蛔後理霍亂可免死也遲則誤事矣急用五靈脂醋炒三錢蒼朮一錢五分烏梅三枚川椒炮薑桂心各五分水煎飲下痛減大半下午以大腹皮藿香半夏陳皮山楂五靈脂茯苓兩帖全安汪松崗令眷左脅痛咳嗽內熱汪松崗令眷左脅疼咳嗽內熱每咳則脅下吊痛寢食大減與青皮香附甘草芍藥訶子山梔子貝母茯苓柴胡桃仁滑石人參水煎飲之熱除痛減贊皇令堂產後左脅痛甚文學贊皇令堂產後左脅痛甚咳嗽痰不易出內熱氣壅不能伏枕予以栝蔞仁六錢桑白皮紫蘇子杏仁半夏桔梗枳殼各一錢水煎服之而氣壅定嗽漸減除外與保和丸及七制化痰丸而安許少峰中風先兆許少峰胃中有痰肝膽經有鬱火心血不足面色黑而枯燥肢節疼痛健忘精神恍惚內熱將有中風之兆左寸細數關弦數右關重按滑兩尺弱治以清肝膽之鬱火而養心神消胃中之痰涎而生氣血使神帥氣氣帥血氣血周流經絡無壅則諸疾不期愈而自愈矣何中風之有哉用石菖蒲黃連白茯苓半夏酸棗仁天麻橘紅各一兩牛膽南星二兩白殭蠶青黛木香各五錢柴胡七錢五分竹瀝生薑汁打神麯糊為丸綠豆大每食後及夜茶湯任下二錢一日二三次服完神氣大健肢節皆舒面色開而手足輕健種種皆瘳少峰曰吾生平服藥少效不期此方之神若是不惟自服有功即諸親友有痰火者服之莫不響應朱宅女眷熱入血室朱宅女眷經水行一月不止每黃昏先寒後熱夜遍身疼痛胸前脹悶不通必欲大喊叫嘶用手於喉中斡而吐出痰涎乃寬今且渴甚此痰飲瘧疾今飲食不進夜如見鬼者乃熱入血室也用小柴胡湯加生地黃丹皮陳皮桃仁兩帖後以白朮三錢何首烏二錢陳皮麥芽各一錢烏梅一枚生薑三片水煎服之而寒熱止諸症皆安孫熙宇肢節腫痛痰多嘔惡病多夢鬼孫熙宇肢節腫痛痰多嘔惡胸中氣不暢達語言亦不清利夜夢皆亡人野鬼追陪精神慘惡驚恐不安且汗多不止飲食減三之二遠近名家醫治逾月不應敦予為治診其脈左手甚弱汗多故也右手滑大痰飲濕熱而然法當補斂前醫皆作風治而用疏散泄其元神將成柔痁予以人參麥門冬五味子白芍藥當歸苡仁陳皮石斛木瓜甘草白朮桂枝服此汗大斂而神思稍清吐亦止矣惟飲食不思夜夢與亡人同遊為惡耳改用人參黃耆枸杞子苡仁白朮各一錢五分當歸遠志茯苓木瓜陳皮各一錢甘草五分水二盅入雄豬心血一枚煎作八分飲之四帖乃能睡始夢生人不復夢亡人矣愛泉傷風咳嗽聲啞右邊不能貼席愛泉上年十月因傷風咳嗽即時聲啞繼聞父傷過憂右邊不能貼席而睡醫以滋陰降火之劑治之半年肌肉大削大便溏瀉飲食減少咳嗽聲啞有加喉且疼痛迎余為治診得六脈俱弦數此憂傷肺思傷脾症也危急甚矣以白朮茯苓陳皮粉草苡仁桔梗柴胡桑白皮酒炒白芍藥澤瀉麥芽山楂煎服一日再以荊芥桔梗玄參甘草茯苓白芍酒連扁豆山藥山楂木通服此而右邊可睡矣改用參苓白朮散加白芍藥烏梅訶子酒連山楂調理而愈侄婦戴氏有妊五月忽血大下午後發熱侄婦戴氏有孕已五月矣忽血大下午後發戰六脈俱數左寸滑大右關搏指左關軟弱予以白芍藥二錢生地陳膠人參蒲黃各一錢柴胡香附地榆荊芥穗各七分甘草五分煎服午後發寒熱每夜凡三次頭痛惡心腹中塊硬所下血塊甚多心下怯力此虛無疑也以補中益氣湯加阿膠炮薑白芍藥烏梅煎服下午右眼白珠發一白泡光腫下垂而面亦腫此虛火遊行無制之症其夜大發寒熱指爪皆黑唇白汗大出腹中作痛牽引兩乳皆痛仍以補中益氣湯加阿膠白芍藥桂枝五味子麥冬服後熱退汗止渴除神氣稍定乃有生意次日咳嗽而胎墮即以獨參湯繼服其夜腸鳴瀉二次以人參白朮各三錢炙甘草一錢五分炮姜一錢桂心茯苓各五分陳皮七分蓮子大棗煎服後因咳嗽以四君子加炮薑五味子紫菀調理而愈靈岳乃眷胃脘疼痛頭暈舌麻靈岳乃眷胃脘疼痛手心熱頭暈舌麻兩太陽痛背心亦脹內熱而外惡寒必厚被蓋覆得微汗乃解二陳湯加桔梗杏仁桑白皮枳殼青皮白芥子蘿蔔子酒芩煎服兩帖舌竟不麻晚因食雞過多膈上氣滯二陳湯加蘿蔔子枳實山楂川芎香附酒連調理痊愈吳人峰先生內人兩脅脹急痛抵胃脘歙溪南吳人峰先生內人兩脅脹急抵於胃脘作痛痛一陣則汗出一番兩顴紅唇口亦紅飲食湯水飲之立吐不受者三日夜矣予為診之兩寸脈洪大兩尺沉微予以井水半碗白滾湯半碗和之名曰陰陽湯用此調玄明粉一錢五分服之不惟不吐痛減半矣少頃大便行二次因食豆腐及粥太早而痛復萌唇臉皆紅此必有蟲故如是也與白芍藥桂枝粉草烏梅花椒五靈脂杏仁水煎痛乃定其大半再與蒼朮厚朴山楂枳實茯苓玄胡索香附一帖全止但心背皮膚外疼不能著席而睡以川芎當歸白朮厚朴大腹皮粉草茯苓香附陳皮半夏調養痊愈陳鐵兄內人產後腹痛發熱下痢膿血陳鐵兄內人產後腹痛發熱下痢膿血裡急後重川芎二錢當歸三錢茯苓乾薑肉桂山楂陳皮酒炒白芍藥白朮各一錢粉草五分一帖而腹痛止痢輕後重亦除惟發寒熱多汗改用人參白芍藥桂枝粉草川芎當歸白朮茯苓香附陳皮山楂再劑而諸症如釋程石洲乃眷因產難子死憂悶小腹有塊作痛復因多食圓眼腹益大脹堅如石大如斗氣促不安有發明程石洲乃眷因產難子死憂悶小腹有塊作痛下午發熱不思飲食次早診之脈右大於左者三倍且數與芎歸湯加糖球子澤蘭葉肉桂次日下午腰腹脹痛詰之晌午食圓眼一斤矣從此小腹漸脹大便三日未行早晨鼻衄夜間極熱口渴脈大無緒勢甚危急用川芎當歸紅花桃仁青皮檳榔莪朮山楂水煎調玄明粉二錢服後大便稍行結糞二枚安而就寢醒後進粥稍多又復脹痛腹大如斗堅如石氣促不安勢危至此亦已極矣乃與五靈脂糖球子各四錢凌霄花二錢赤芍藥一錢服後大便通腹軟氣定始可進粥漸有生氣但脈仍鼓指此腹中積滯尚多不可不因其時而驅去也用糖球子大黃各三錢桃仁二錢桂心紅花各五分炙甘草七分水煎臨服調玄明粉一錢五分其夜下黑糞四次熱始退上腹雖消臍下仍大仍以桃仁承氣加山楂滑石紅花煎飲之五更大便行臍腹脹又漸減後與積塊丸調理全消是役也女流只知女科專門為仗故前發熱腹痛止之時彼專門不察虛實即以常套十全大補湯投之詎知圓眼肉初入腹之時不覺少頃漸漸脹開故腹亦因之而脹也且其味甘尤能作滯復加地黃參術寧不塞其塞哉由是而成大滿大堅之症內經謂中滿者瀉之於內良以此夫彼亦泥乎丹溪產後須當大補氣血之誤也程嫗年八旬頭暈腳軟大便溏泄小水淋瀝程宅一老嫗年八十餘常頭暈腳軟撐載上身不起行須人扶否則眩暈跌僕大便溏泄小水淋瀝此下元虛憊所至以人參黃耆白朮薏苡仁各二錢山茱萸杜仲茯苓各一錢陳皮山藥粉草各八分八帖而愈程道吾先生令眷夜魘而驚時常暈厥文學程道吾先生令眷夜為夢魘所驚時常暈厥精神恍惚一日三五發咳嗽面色青不思穀食日惟啖牛肉脯數塊而已時師屢治無功吳渤海視為寒痰作厥投以附子肉桂而厥尤加逆予為治診左脈弦右脈滑兩寸稍短道吾先令眷二皆卒於瘵知其為傳屍瘵症也不易治之乃權以壯神補養之劑消息調理俟飲食進胃氣轉始可用正治之法姑用人參茯苓柏子仁石菖蒲遠志丹參當歸石斛以補養神氣以陳皮貝母甘草紫菀化痰治嗽服半月而無進退乃為制太上渾元丹藥用紫河車一具辰砂鱉甲犀角各一兩鹿角膠紫石英石斛各八錢沉香乳香安息香茯苓紫菀牛膝人參各五錢麝香五分煉蜜為丸赤豆大每早晚鹽湯或酒送下三十六丸又制霹靂出獵丹藥用牛黃狗寶阿魏安息各一錢虎頭骨五錢啄木鳥一隻獺爪一枚敗鼓心破皮三錢麝香五分天靈蓋一個煉蜜為丸雄黃三錢為衣每五更空心蔥白湯送下五分三五日服一次與太上渾元丹相兼服才服半月精神頓異不似前時恍惚矣但小腹左邊一點疼前煎藥中加白芍一錢服之一月精神大好暈厥再不發矣次年生一女其宅瘵疾從此再亦不傳一僕婦瘟疫以勞食復作一僕婦年三十患瘟疫一月餘矣非勞復即食復今則發熱咳嗽胸脅痛耳聾口渴大便七八日不行不知人事乃與柴胡石膏各三錢栝蔞桔梗枳殼各一錢五分黃芩前胡各一錢天花粉八分甘草五分黃連八分急煎服之人事稍清因大便不行次日以大柴胡湯下之又次日大便雖行熱仍不退改以柴胡二錢白芍藥黃芩麥門冬各一錢天花粉茯苓甘草各六分四帖而愈程方塘年六十四風癱不能步者三載腿肉盡消參軍程方塘翁年六十四向以殈胤服溫補下元藥太多冬月下身著單褲立溪邊督工受寒致筋骨疼痛肩井缺盆腳膝跟踝手肘掌後及骨節動處皆紅腫而痛臥床褥三年吳中溪視為虛而用虎潛丸吳渤海視為寒而用大附子肉桂鹿茸徐東皋認為濕周皜認為血虛張甲認為風李乙認為歷節百治不瘳腿間大肉盡消惟各骨節處腫大而疼予適在程道吾宅乃逆予診之其脈弦澀有力知其為濕熱痰火被寒氣凝滯固澀經絡也第為藥劑不對故病日加所取者目中精神尚在胃氣仍未全損但小水解下以瓦盆盛之少頃則澄結為砂色紅而濁兩膝下及腳指皆生大瘡瘡靨如靴釘狀此皆平昔服溫補春方所致病雖久年雖高猶為有餘之疾不可因高年疾痼棄不治也乃特為先驅逐經絡中凝滯然後健脾消痰俾新痰不生氣血日長最後以補劑收功斯得矣翁生平好補畏攻故進門者皆務迎合予獨反之以新取威靈仙一斤裝新竹筒中入燒酒二斤塞筒口刮去筒外青皮重湯煮三炷官香為度取出威靈仙曬乾為末用竹瀝打糊為丸梧桐子大每早晚酒送下一錢一日服二次五日後大便瀉出稠黏痰積半桶腫痛消去大半改以人參石斛蒼朮黃柏苡仁蒼耳子牛膝烏藥葉龜板紅花犀角屑木通煎服二十帖又用前末藥服三日又下痰積如前之半仍以前煎藥服半月又將末藥服三日腹中痰漸少乃為制丸藥以虎骨晚蠶砂蒼朮黃柏丹參杜牛膝莖葉苡仁紅花五加皮蒼耳子龜板打酒麵糊為丸梧桐子大每空心白湯送下七八十丸外以丹溪保和丸食後服半年痊愈腿肉復完步履如故汪省吾瘧三日一發發於夜汪省吾暮秋患瘧三日一次發於夜迨次年仲春猶不能止遍身疼頭疼背脊疼百治不應即炙亦僅止得一日次日仍發面色青肌肉瘦以症參之邪在足太陽經用麻黃一錢五分人參桂枝白芍藥粉草知母各一錢陳皮貝母各七分薑棗煎服諸疼減半而瘧未止以何首烏白朮各五錢青蒿一錢烏梅一個陳皮二錢生薑三大片水煎臨發日五更服尋常以六君子湯加黃耆柴胡五味子烏梅草果調理而愈汪東之丈七月初旬虛陽口瘡有發明江東之丈七月初旬自浙歸連日與客手談過勞口中生瘡醫以香薷飲清胃湯瀉黃湯三黃丸黃連解毒湯白虎湯涼膈散凡治上焦熱症之劑竭寒涼而進之者十一日矣口瘡日甚一日不但飲食不進即藥亦難下咽因瘡延及於喉也逆予為診其脈六部俱豁大無力診罷有外科陳氏者自稱喉舌專門炫其口疳敷藥之妙予曰汝試為口中一洗看是何狀才開口見涎沫迷漫不能得見肉色陳以荊芥湯洗而引之攪出稠涎一二碗余傾於地上偶見二雞爭啄之二雞立斃其毒何如此亦疾之奇者予囑陳曰汝用藥只可吹入喉中切不可敷其舌必候喉中全好然後敷舌待舌好再敷口唇甚毋得概敷恐毒無出路反攻入喉極為誤事陳曰諾予對乃翁曰令郎之疾乃虛陽口瘡也翁曰當用何劑予曰附子理中湯煎熱待冷飲之可救如他藥不能立功翁曰瘡乃熱症況上身已熱又天時酷暑大熱之劑其敢進乎予曰此陰盛格陽之症初未嘗如此因服寒涼過劑激之使然爾翁不看其兩足膝下皆冷乎翁用手探足下果冷乃欣然聽用用人參白朮各三錢大附子炮薑炙甘草各一錢水煎冷與之服後即鼾睡達旦次早便能食粥半盞足膝下漸暖藥仍如前早飯後予與二三友散步山溪午刻歸來乃見舉家大慟於地見予至哭語予曰不可為矣本是熱病誤服熱藥今舌腫大塞滿口中不能言語死在頃刻奈何奈何予駭然應曰安得有是不祥語也今晨診脈與昨不二適往返不過二時許何倏爾有此大變乎待予再診決之及診六脈漸斂較昨大有神氣面色亦和獨舌脹大予心知為陳寒涼敷藥所致也乃詰陳曰我別後可用敷藥否陳點首曰已二次矣予撫翁及諸人曰無慟立看予為翁消之急取官桂研末五錢用生薑自然汁調塗舌上才塗上但見眼淚雙流鼻中涕出口內涎垂舌頓消去語近侍曰我無事矣諸環侍者男婦不下二十皆面面相覷以為神奇予曰可即取粥與食使壓之庶虛火不再升適舌脹滿者乃敷藥寒涼閉其毒氣毒無從出故作脹耳桂皮乃辛熱之物又以薑汁調塗取辛散之義也諸人皆服其論令眷妊中咳嗽東之丈令眷妊已六月為傷風咳嗽腹中吊疼痰壅喉音不清頭且眩暈脈左滑數右寸弱關滑左尺有力右尺弱予以人參白朮陳皮貝母茯苓桔梗桑白皮紫蘇粉草黃芩前胡四帖而病痊愈吳東渠瘧後虛憊吳東渠年五十又七因上年患瘧胸痞作脹肌肉大削因連服攻克太重脾胃敗壞膝及跟踝皆浮腫遍身發熱口渴小水短赤舌上黃苔舌心焦煤乾燥誤服寒涼大便連瀉五六次目不能開手足無力倦於言語予診之六部俱浮大按之豁然空虛飲食不進此中氣大虛元神俱脫可畏之甚即以人參白朮茯苓粉草木香葛根酒炒白芍藥水煎服之連進二帖始能開目漸出聲言語後以六君子湯去半夏加葛根白扁豆山藥藿香苡仁白芍藥石斛調理而愈吳西源令眷以艱子多郁多思肌肉盡削皮膚燥揭遍身生瘡體如火燎吳西源令眷因未有子多郁多思肌肉漸瘦皮膚燥揭遍身生瘡體如火燎胸膈脹痛而應於背咳嗽不住口醫治十越月僉以為瘵疾不可治知予在程方塘宅中乃迓予治診得右寸關俱滑大有力左弦數予以栝蔞仁四錢蘿蔔子貝母枳殼調氣化痰開鬱為君桑白皮葶藶子黃芩瀉肺火為臣甘草前胡為使三十帖痊愈仍以千金化痰丸調理向來年年至冬月則咳嗽痰喘不能睡自此後遇冬月痰再不復發族嫂程氏環跳穴邊腫痛寒熱併發不能動止族嫂程氏環跳穴邊腫痛憎寒發熱不能動止寢食俱廢頭重噁心上身熱下身冷天明乃退口乾舌上白苔甚厚以柴胡防風桂枝解其寒熱以蒼朮黃柏五加皮桃仁赤芍藥治其痛木通利其濕熱且引火下行甘草調和諸藥使各得職一帖而痛止大半再進寒熱除三帖痛全減去改以小柴胡湯加牡丹枳殼桔梗二帖而舌苔脫然恆宇瘡後遭跌環跳脫出不能復收上舍恆宇先生原因生楊梅瘡後偶遭一跌環跳脫出不能復入窠臼疼痛殊甚兩足因長短不齊予思不能復入窠臼者以瘀血流入窠臼佔滿故竅致骨不得復入也今但消去瘀血必以行氣活血之劑為主以下行響導之劑佐之庶可復原用陳年窖中磚瓦洗淨煅過四兩生地杜牛膝骨碎補丹參赤芍各一兩五錢自然銅三兩蒲黃車前子蘇木各一兩鹿角二兩玄明粉五錢各為末以茅草根一斤紅花四兩煎膏拌曬前藥再以煉蜜為丸梧桐子大每空心及食前酒送下八九十丸未服此藥之先病足長二寸余服此丸藥後只差半寸設再製久服必能萬全惜渠素畏藥中道而止故功虧一簣也豈勝嘆哉侄孫女周歲發慢驚族侄孫女二周歲時發慢驚眼開手拳目不動移腳指微動先自囟門後遍身如火喉中痰聲口中痰沫腹脹放屁大便亦行先以牛黃丸蘇合香丸進之不效及各治驚治痰等藥與之皆不受即從痰沫流出用通關散吹入鼻中亦不作嚏自申時至戌時猶不能醒面色素青而白氣稟甚弱因婢者抱而偶失跌受驚發熱此驚氣乘虛而入在法已無生路但不忍坐視姑以人參三錢生薑自然汁拌炒煎湯頻頻用匙挑入口中初二三四匙皆不受又與五六匙偶能入一二匙下喉便覺痰聲稍緩因此頻頻與之十匙中有二三匙入腹矣喉中氣轉目便能動始有生意再以六君子湯加天麻石菖蒲殭蠶澤瀉薄荷煎服至雞鳴時乃略啼一二聲方識吮乳次日咳嗽語聲不出小水短少以辰砂益元散一錢用燈心湯調下熱退聲出惟嗽不盡止改以四君子湯加陳皮五味子麥門冬桑白皮桔梗杏仁薄荷一帖痊愈程少湖以飲生酒面浮胸脹程少湖因飲生酒食硬幹豆腐以致次日面上浮腫胸中作脹今經半年腹中腸鳴四肢浮腫兩腿及陰囊皆腫口乾大小便俱不利年四十六矣夜臥氣喘膝下冷先以人參蒼朮陳皮蘿蔔子半夏曲葛根厚朴枳實破故紙大附子茯苓煎服二帖氣喘稍定腹中仍鳴加白豆仁白芥子桑白皮小水頗利浮腫漸消吳鬥一原有腸風又感風邪發熱多痰腹痛下痢吳鬥一丈歙溪南人也八月初旬自新都往湖州途次偶感風邪發熱多痰且又腹痛下痢裡急後重原有腸風下血之疾又以舊年乃翁痢疾發熱卒於湖州心甚恐怖予脈之兩關滑大有力尺寸俱不足乃以白芍藥一半生一半酒炒五錢止痛為君當歸活血酒連酒芩柴胡桔梗清熱升提陽氣為臣枳殼槐花兼治腸風為佐益元散木香以實大腸山楂以消瘀血調肝安脾為裨佐一帖熱減半痢稍輕次日仍用前藥外與丹溪保和丸調理五日而出戶侄孫二水體甚肥胖患溫瘧侄孫二水年三十體甚肥胖夏月常浸在溪中臥於松陰之下至八月大發寒熱於巳午間至天明乃退不能起床飲食亦不進嘔吐黃苦膽汁胸膈脹悶舌上乾燥生芒刺沉香色強硬不能言語必含冷水漱之始能說一句若再語三語必三噙水而後可惟西瓜新藕是啖先發寒熱之日吐血一口今則大便下血症甚危惡且咳嗽此溫瘧症也由醫失解散遽用黃耆以閉邪氣致成大禍今法當清解止吐俾飲食進然後庶可保其生也柴胡知母各三錢石膏七錢葛根二錢橘紅竹茹各一錢五分酒芩枳實各二錢甘草貝母各五分水煎服之三帖而吐止改用二陳湯加柴胡枳實黃芩黃連天花粉鱉甲白朮何首烏調理而愈乃囑其不可食葷食葷早恐復發也堪輿張錫泉先生左脅皮裡膜外疼痛堪輿張錫泉先生患左脅皮裡膜外疼痛有惡寒發熱之狀以白芥子一錢五分川芎柴胡桔梗各一錢桂枝甘草各五分水煎飲之當愈其半次日以八珍湯加青皮為君木香為佐柴胡為使一帖痊愈族侄云岳偏墜臍腹腰俞脹痛族侄云岳患偏墜臍腹腰俞俱脹而痛左關脈弦大鼓指用小茴香甘草蒼朮益智仁防風各五分荔枝核橘核糖球子柴胡各一錢山梔青皮各七分服後其痛如舊脈且轉數恐作囊癰急為解毒栝蔞五錢當歸甘草節金銀花各一錢連翹柴胡青皮各七分水煎服之痛定腫消因食雞魚太早次日臍腹又作脹痛發熱不能睡昨日囊消後弦脈盡退今復弦矣改以山楂栝蔞各二錢金銀花柴胡連翹各八分甘草節黃連當歸各五分青皮七分兩帖而愈一婦妙齡感風寒致成鼻淵一婦時方妙齡表虛易感風寒致成鼻淵流清涕不止便覺頭運兩太陽常作疼且多噴嚏脈之兩寸洪大用秦艽酒芩桑白皮馬兜鈴各八分白芍一錢滑石石膏各二錢枳殼蔓荊子各五分甘草三分四帖涕止病愈程兩峰瘀血發黃吐出穢惡如爛豬肺狀大便色如墨有發明程兩峰丈偶與乃侄稍有介蒂其晚飲於侄家歸覺腹中脹滿嘔噦不寧次日眼珠面色皆黃惡寒發熱時當仲秋正瘧痢為癘之候醫作瘧治五心加熱下午潮熱煩躁似嘔不嘔且鼻衄腹痛大便黑如墨吐出黑血如爛豬肺者然約碗余有謂所吐之物如此大便之黑又如彼似有中蠱之象心疑乃侄毒之也正欲與乃侄爭辯予仲子泰來適在渠宅徐語渠諸郎君日尊翁症尚可起顧不為救症而務與人哄何舍重而圖輕耶渠家素不急予仍迓所親信者率相視之見目珠如金面若熏橘腹大如斗其中有塊大如碟堅如石兩足下皆浮腫四肢且冷小水赤飲食不思莫不面面相覷辭而不藥舉家聞言通宵號泣惟欲攘臂爭哄仲子泰來又語之曰家君固不敏其知識量不出諸公下昨自華陽歸迓而診之當必有說舉家忻然敦予求診其脈左澀右滑予曰據滑脈主痰飲澀主有瘀血也今所吐所下皆瘀之徵斷非蠱也使得早從事曷有此猜忌此號泣哉兩峰曰吾生平頗謹疾瘀自何致予曰內經云怒則傷肝甚則嘔血不嘔則積積而瘀於經隧滿而溢也兩峰曰若謂從怒而致則此語恰當吾病源矣敢請劑予用當歸尾三錢赤芍藥牡丹皮川芎各一錢五分玄胡索五靈脂桃仁各一錢滑石茜根各二錢水煎飲之所下黑物甚多腹中仍痛塊猶未軟前方再加青皮山楂酒蒸大黃服之大便行三次黑瘀及痰不計其數從此腹漸寬塊漸溶面色稍轉而黃日退飲食津津有加四肢微溫有生氣矣惟兩足浮腫不消改用六君子湯加炮薑茜根滑石青蒿調理而黑糞全無一月精神復舊里中謂予此役匪得認病投劑為足稱且俾二宅釋猜疑排忿爭其雅誼尤足重也予表嫂小產後腹痛暈厥予有表嫂小產後腹痛暈厥冷汗淋淋遍身麻木心怔怔動左脈絕不應指虛極故也以當歸三錢川芎一錢五分人參荊芥穗燈火燒存性各一錢益母草澤蘭吐各八分甘草五分水煎飲之腹痛減惟怔怔不寧以四君子湯倍加黃耆為君當歸香附益母草為臣川芎為佐炮姜為使兩劑而安陳士美傷寒熱症漏底有發明陳士美孤子也年弱冠由夢遺後患頭疼發熱時值仲夏醫治不瘳凡市中有名者率延致轉治轉熱反加水瀉口渴日夜不得眠者旬日眾視為危時有俞氏者用參耆白朮為其斂汗止瀉而汗瀉愈劇呻吟不間晝夜勺粒不入口咳嗽胸痞躁悶不寧又四日矣渠親邵瓊林交予因凂邵逆予為治診其脈左弦長右洪大俱七至舌苔焦黃體若火燎神昏氣促予曰此仲景傷寒熱症也邪在陽明少陽二經其危不啻風中燭胡時師不認症察脈徒以夢遺受病率投補劑無怪乎轉治轉劇也幸予至設遲一日大事去矣用石膏五錢柴胡知母各三錢炙甘草白芍藥枳殼桔梗黃芩天花粉各一錢粳米一撮急煎飲之夜半熱稍退神稍靜脈之仍數甚繼以前劑進天明乃得睡覺而熱退神清瀉止膈寬惟口尚渴再用柴胡一錢五分白芍藥麥門冬知母各一錢石膏三錢甘草五味子各五分人參七分服之舌潤渴止餘熱盡退粥飲始入漸向安矣次日忽兩足指前一截痛如犬齧不能耐以野蓼一握入明礬四兩煎湯熏洗痛勢稍緩又以薏苡仁三錢木瓜二錢黃柏牛膝各一錢漢防己三分一帖而愈後又幹咳嗽盡夜不住口喉且疼胸脹而體略熱此為誤服參朮太早之過用馬兜鈴百部御米殼各用蜜水制過一錢五味子甘草各五分百合二錢四帖而愈程松逸兄酒疸程松逸兄患酒疸遍身皆黃尿如柏汁眼若金裝汁出沾衣如染胸膈痞滿口不知味四肢痠軟脈濡而數以四苓散加厚朴陳皮糖球子麥芽葛根倍加青蒿水煎臨服加萱草根自然汁一小酒杯四帖其黃煥然脫去仲諫患跨馬癰有發明太學岐原門下千人名仲諫者患跨馬癰大發寒熱紅腫疼痛嘔惡不納飲食外科醫月餘腫痛日加飲食日減肌肉日削精神大憊不能起止岐原邀予脈之六部數而無力形氣殊不勝息時有專科唐氏為渠調劑將進予詰何劑唐曰真人活命飲也曾服四劑今始加大黃予復詰曰前此何劑唐曰敗毒散黃連解毒湯予曉之曰此皆治初起有餘之疾據今症乃氣血大不足者法當大補托而出之庶保終吉唐曰凡痛為實癢為虛今痛正盛脈正數飲食且不進大補必加飽悶飲食何由進熱毒何由出也予正色語之曰素問云數脈所主其邪為熱其症為虛今痛極者皆由寒涼敗毒之劑傷脾胃凝氣血故飲食減而痛增也又以敗毒之劑進是鴆之爾安望膿出而全其生乎唐曰補劑迨膿潰後或因膿清而後用之今膿未出安可謂虛而補之吾為專門不敢任其責予顧岐原曰生死在此一劑不可不慎彼謂膿未出無補理彼排膿內托散十全大補湯非外科急劑乎大抵凡病寧使有餘後欲剝之乃為易易今狼狽若此再株守成法剝削後何以措手岐原曰井蛙之見豈知有天惟叔命劑予用黃耆三錢人參二錢川芎當歸各一錢白芷官桂甘草防風各五分急煎飲之一帖痛止而精神回飲食進再劑而膿潰十帖肉生能動止矣唐乃拊膺嘖嘖語同列曰今而後知補劑能出膿而加食也吾儕外科當永識此以為法則一婦咳嗽痰中有紅一婦咳嗽痰中有紅大便一日五六度飲食極難下膈才下膈腹中即不安立時欲瀉必盡瀉出乃止肌肉消瘦下午發熱熱將發時四肢先麻兩足膝皆戰搖兩寸關脈滑數兩尺沉細此虛中有實疾痰飲之候也脈雖數午後雖發熱不敢輕用寒涼特為溫補下元庶關門有守瀉可止也山茱萸菟絲子人參破故紙杜仲山藥茯苓澤瀉桂心砂仁服下甚安四劑後下體不戰搖矣但飲食腹中微疼即欲蹲廁前方減去山萸加白朮肉果木香八帖愈族侄春溫鼻衄寒戰族侄煌春溫後忽鼻衄寒戰小水不利舌上焦黃目珠極紅六脈伏而不見舉室惶惶予曰此作汗之兆由熱極使然也因先時汗未透徹陽明餘熱在經迫血上行越出鼻竅故有此症以石膏滑石生地黃升麻赤芍藥牡丹皮麥門冬天花粉甘草煎而服之汗出如雨直至兩踝舌潤而苔盡退衄亦止目珠色淡脈乃漸出改用人參麥門冬五味子白芍藥甘草知母黃芩柴胡竹葉石膏服下大便原五日未通今亦始行精神大轉飲食亦漸進矣汪氏婦腹脹如斗富昨汪氏婦對河程門女也年僅三八經不行者半載腹大如斗堅如石時或作痛里醫盡技以治月餘弗瘳乃舉歙友為翼又治月餘腹轉脹急小水涓滴不通乃仿予治孫仲暗法而用溫補下元之劑則脹急欲裂自經求盡文學南瀛憐之薦予診其脈兩關洪滑鼓指按之不下乃有餘之候也症雖重機可生詢其致病之源由乃姑治家嚴而過儉其母極事姑息常令女童袖熟雞牛舌之類私授之因絅食冷物積而漸成鼓脹前任事者並不察病源不審脈候誤作氣虛中滿治之因脹而欲裂宜其然也乃用積塊丸三下之而脹消積去後以丹溪保和丸調養一月而愈積塊丸列赤水玄珠第五卷蟲蠱後仲登陽症似陰有發明族侄孫仲登因與堂兄構訟城中方歸時值二月末旬醉後房事二起而小溲隨即臍下作痛水瀉腸鳴一日十數度發熱頭痛里醫進理中湯一帖反而嘔逆煩躁口渴敦予診之左脈弦大右洪大俱七至飲食不能下咽晝夜不得睡面赤唇燥舌上黃苔深厚診畢語予曰我房失後陰症傷寒也小腹痛且漏底幸叔祖救之予笑而應曰以子所言決為陰症以予指下辨之當是春溫陽症也且外症亦陽烏得為有房事而遽以理中進之乎族中相知者交為予言渠病的屬陰症故嘔吐水瀉不可因其面赤便認為陽顧戴陽症與此近似幸加察之吾輩正擬於理中湯內再加大附子肉桂庶可保全予極言不可仲景有云桂枝下咽陽盛則斃況附子理中者乎陰陽寒熱之間辨之不真生死反掌耳茲當舍症而從脈也以溫膽湯加薑汁炒黃連柴胡乾葛與二帖囑令當夜飲盡俾明日不它傳也予別後渠一服而嘔逆止餘症悉在詰朝予診竟扣渠曰夜來二藥必未服完不然何兩手之脈洪大搏指如是僉曰因有竹茹黃連恐非房失後所宜故僅服一予曰不服黃連致熱轉劇今日非石膏不能已乃與白虎湯加竹茹兩劑臨別囑渠曰今症非昨日可比用石膏者豈得已哉設當用不用使經中之熱傳入於腑非大黃不能瘳切勿失時誤事詎知別後又有惑之者仍只服一帖瀉即隨止余小腹之痛具在次日予診畢語渠曰昨臨行時囑之再三何乃又不服完今脈洪長堅硬邪已入腑奈何奈何對曰眾謂石膏大寒恐小腹加痛實只服一帖而已予曰懼服石膏今且服大黃矣皆失時誤事之過周金人銘云熒熒不滅炎炎奈何其斯之謂歟思非桃仁承氣湯不可乃覿面煎服連飲二劑下極黑燥糞五六枚痛熱俱減再為診之六脈皆緩弱迨是病方盡去改以四君子湯加白芍藥黃連香附調養數日而愈汪希明性躁痰火咳嗽吐紅汪希明竹山丈長君也年弱冠性多躁素有痰火舊曾吐紅張醫用收澀之劑太早以致痰與瘀血留滯經絡釀成病根恬不知覺且為灸肺俞膏肓撼動前疾止澀無功滋陰作壅咳不能睡又誤作風邪而投發散風劑不思火盛得風其勢愈熾血從口鼻噴出勢如泉湧延予為治六部洪數身熱而煩又時當三伏內外之火夾攻縱體質剛勁寧能堪此銷鑠哉予思非釜底抽薪之法難奪其上湧之勢乃以三製大黃三錢石膏五錢黃連茜根滑石各二錢牡丹皮一錢急煎飲之大便微行二次血來少緩即用石膏滑石冬青子各三錢旱蓮草茜根各二錢黃連山梔貝母各一錢甘草五分茅草根五錢煎服血乃全止三日後大便結燥火又上逆咳咳連聲左關脈弦勁右關洪滑與當歸龍薈丸下之而咳始緩改以栝蔞仁茜根各一錢五分貝母旱蓮草麥門冬知母各一錢白芍藥二錢黃連黃芩各七分青皮甘草各三分仍加茅根後每遇大便燥結即進龍薈丸跡此調理三月大定半載全瘳書云病有六不炙火盛者不炙此由誤炙幾於不保故特識之以為好炙者龜鑑祝弘吾潮熱咳嗽汗流不止德興文學祝弘吾公祝令君叔祖也在休衙偶有陰陽之患子午潮熱咳嗽痰多汗流不止胸膈不暢大便燥結動作喘乏口渴以貝母知母栝蔞仁桑白皮各一錢枳殼黃連麥門冬各八分桔梗柴胡前胡各五分甘草三分五味子十一粒服下五更微汗熱退十之七惟痰嗽喘乏改用栝蔞仁二錢余如前外以七制化痰丸夜服熱盡退渠甚喜以為自是以往可勿藥矣予曰未也據脈弦數不減恐防作瘧公未為然予適東行半月書報瘧作咳嗽轉加所出皆黃黏老痰予曰書云無痰不作瘧仍用前方倍加柴胡貝母為君加烏梅一個四劑霍然良已公曰翁之視疾應若桴鼓古云智者不治已病治未病吾於翁言徵之乃以是備言祝令公祝令公喜曰孫君匪獨得岐黃正脈其雅誼足稱叔祖尚未前聞予當賦詩以贈於是欣然手書若干律以授予其詩附後第六卷汪宥翁老年勞倦感冒胸膈大熱而痞素封汪宥翁年八十有一因勞倦感冒胸膈大熱而痞口渴舌上苔白如敷粉咳嗽不能睡此少陽症也柴胡一錢桔梗枳殼竹茹知母各八分酒連酒芩天花粉各七分甘草四分姜三片服下乃得睡口仍渴痰仍嗽前方加半夏曲夜與二母丸治其熱嗽而愈汪鏈兄內人經水紫黑血塊不止汪鏈兄內人經水久不止內有紫黑血塊今則胃脘胸腹皆痛玉戶且腫手足皆冷絕不知餓臍腹之下有一塊堅如鐵脈左數右沉澀此血瘕癥也用糖球子五錢玄胡索五靈脂香附麥芽青皮各一錢水煎服夜即痛減其半手足漸溫後加丹參川芎蒲黃益母草當歸四帖而痛全止玉戶亦消再四帖而經調程相如令政妊發寒熱程相如丈令政孕四月頭疼遍身皆痛腰痛更甚惡寒發熱咳嗽口渴六脈浮數以小柴胡湯加防風羌活葛根薑棗煎服夜忽大發寒戰繼而發熱五更又發戰告急於予予曰此作汗之兆俄而汗出口渴頭痛身熱皆減惟胸膈脹悶此胎氣上逼而為子懸以大紫蘇飲與之紫蘇人參白朮茯苓甘草當歸陳皮大腹皮川芎白芍藥服後身冷而汗出不止胸腹脹痛急以奪命丹進服下嗒然而睡覺則痛止脹消始能進食身溫汗止駸駸向安奪命丹用白朮茯苓牡丹皮桃仁白芍藥桂枝醋水煎服止痛如神余文臺壯年咳嗽吐紅余文臺壯年咳嗽吐紅腹中常痛夜多口渴夢遺背心作脹兩手脈短弱兩關弦大左尺弱右尺滑大心血不足中焦有痰積膈間有瘀血陰分有淫火乃先為清肅上焦用山梔仁牡丹皮丹參茯苓甘草貝母橘紅益元散服十帖背脹漸消惟咳不止改用黃芩杏仁半夏曲益元散黃連栝蔞仁甘草十帖而嗽止惟腹疼不除再以遇仙丹同丹溪保和丸進之大便下稠積痰甚多後以人參白茯苓白芍藥紫菀知母麥門冬甘草當歸五味子調理而愈邵伯成女經行而浴感冒大發寒熱嘔吐煩躁邵伯成丈大令嬡經水適行洗浴後感冒風邪誤服人參補劑大發寒熱嘔吐煩躁隨即口噤心煩不安循衣摸床時當仲夏之晦予謂上焦有痰因誤補故阻滯其氣道而然與加味溫膽湯半夏四錢橘紅二錢白茯苓枳實竹茹麥門冬各一錢益元散三錢生薑三片水煎飲之一帖而安後稍勞復頭疼痰火上衝背脹腰痛以柴胡薄荷甘草枳殼桔梗酒芩桑皮半夏麥門冬山梔仁茯苓生薑調養痊愈金氏婦血崩後四肢浮腫金氏婦蘇雙泉之親媽也舊秋患崩中愈後方百日時值上巳因洗浴受風邪外寒而束內熱前後心脹四肢腫痛面有浮氣惡寒發熱呵欠不時大小便欲行不行口內常甜六脈浮大而數以柴胡紫蘇麻黃桔梗枳殼大腹皮厚朴酒芩薑黃服下夜得微汗胸腹稍安四肢仍脹再加蘿蔔子進之覺煩躁且醋心改用二陳湯加香附大腹皮桑白皮姜連枳殼山梔子各八分益元散二錢薏苡仁三錢吳茱萸三分服下四肢消半面氣全消覺腰痛噯氣胸膈嘈辣用六君子湯加薏苡仁姜連厚朴知母澤瀉鬱金砂仁枳實調養半月四肢悉平嘈雜尋愈張雲門令郎囊癰文學張雲門三令郎丁年偶發寒熱右脅有一塊降起疼痛手不可近下午至夜尤甚額顱手心皆熱脈右關洪滑兩尺尤有力日夜不得睡乃仿推氣散例薑黃桔梗川芎各一錢五分枳實二錢白芍藥一錢粉草五分薑棗煎服外以當歸龍薈丸其夜大便行一次頗得睡三更後先發寒戰徐熱至五更微汗而脅痛寒熱悉減再診之左脈略弦舌有黃白厚苔兩脅重按微疼大便燥結不行以小柴胡湯減半夏倍加栝蔞鱉甲牡蠣脅疼全瘳睪丸略硬痛彼自以為無後恙矣予語渠姐夫徐仲子偉曰病先起脅下顧脅下為肝之經後及睪丸硬疼其睪丸亦肝之地此餘熱未盡徹故也而彼已厭藥以小愈為全安不出浹旬必有奇疾徐仲之曰奇者若何余曰此君性急好勝若勉強作文遇勞而發憎寒壯熱非瘧即囊癰也予倘東行子宜識之別後半月果因作文夜發寒熱囊漸腫大其熱如火及予至診之六部皆數兩尺且近於洪知其膿已成必潰而後已彼心甚恐予曰無傷易與耳急以營衛返魂湯加金銀花為君兩帖而膿潰再加人參又兩帖而肌生十日痊愈方用何首烏赤芍藥當歸小茴香甘草節木通金銀花貝母枳殼白芷水與酒共煎服之此方加獨活治流注尤神朱宅內眷懷妊受驚而成子懸有發明朱眷內眷孕已八月因送殯受驚胸膈脹悶嘔逆不入食城中時師認為外感為之發散嘔惡愈劇舉家恐胎有動延予診視兩寸脈皆洪滑兩尺弱此亢上不下之候胸膈脹者蓋由子懸而然此一劑可瘳也夫曰胎婦難任峻劑覷其嘔惡之狀脹悶之勢時刻不秪一劑曷愈予曰請試之與溫膽湯加薑汁炒黃連大腹皮水煎成送下薑汁益元丸果一帖而嘔止膈寬即能進食午後酣寢怡然若未始有病者其夫訝曰溫膽湯何神若此幸詳其義予曰胎孕之症重在足少陽足少陽者膽也病起於驚氣逆痰隨胎氣上逼故脈亢上不下在難經為溢候由木火之性上而不下經曰上部有脈下部無脈其人當吐不吐者死予故用一劑可愈也方名溫膽者此溫字非溫暖之溫乃溫存之溫黃連竹茹清其肝膽之火同白茯苓而安心神益元丸壓其痰火下行火下行而胎因之亦安矣筠皋公曰先生認症真故投劑確非神乎藥神乎用也胡鄰泉女吐血潮熱胡鄰泉令媛及笄後患吐血每吐碗余下午倦怠夜分潮熱嘔吐不食大便秘結時師視為陰虛火動投以滋陰之劑反加飽悶背心脹痛予診其脈兩寸洪大兩尺弱知其有瘀血凝滯以致新血不得歸經故滿而溢也法當消瘀為主用白芍藥枳殼前胡益元散桃仁紅花牡丹皮山梔子貝母水煎臨服入蘿蔔汁一小酒杯服後嘔吐如舊大便仍秘乃以龍薈丸通之更以石膏三錢橘紅半夏曲姜連茜根竹茹黃連枳殼各一錢白茯苓八分甘草三分服後大便行三次吐止食進後用二陳湯加滑石丹參丹皮茜根白芍藥香附二十劑後經行熱退背脹悉愈從此經調血不上逆汪思石令堂怒後暈厥汪思石令堂年可五旬大怒後小解驀然暈厥口噤牙關不省人事以蘇合香丸灌之而蘇左手右足疼痛不能舉動用二陳湯加酒芩五加皮秦艽石菖蒲防風薏苡仁紫荊皮四帖而愈侄孫君實遍身筋骨痛如虎齧族侄孫君實壯年患遍身筋骨疼痛肢節腫痛其痛極狀如虎齧大小便起止非三五人不能扶諸痛處熱如火燎食飲不入呻吟床褥已經二候有以疏風之劑投者不應又以乳香沒藥活血止痛之劑投者亦不應延予診治六脈浮緊而數予曰此周痹也勢甚惡俗名白虎歷節風乃濕熱所致丹溪云腫屬濕痛屬火火性速故痛暴猛若此以生地黃紅花酒芩酒連酒柏秦艽防風羌活獨活海桐皮威靈仙甘草四劑而痛減大半再加赤芍藥當歸蒼耳子薏苡仁減去獨活秦艽又八劑痊愈葉子黑內人疫後虛憊葉子黑內人患疫醫為其汗為其下罄技不能起屍寢者已浹旬家事窶乏亦不能復迎醫鄰人睹其狀以生死在須臾間群然發善願科斂助其殯斂之需予聞為之診六部俱微弱不充指右關稍滑精神昏憊僅一息奄奄四肢冷厥口渴予診畢語諸鄰曰據症甚危據脈邪已盡退惟虛憊而神氣弱非大補不能也諸君苟能以助殯者助其市人參庶幾可起死而還之生也諸君既憐其死寧不以冀其生乎予非毫有希覬顧渠力不足瞻願與諸君共圓滿好生善果耳諸鄰固有善心激於余言益忻然相語曰惟先生命即以六君子湯加歸芍補氣血而化痰涎以麥門冬五味子復脈通心而生津液以桂枝溫其四體午刻進藥晡刻四肢漸暖精神渙發尚無力開聲改以生脈湯加遠志歸芍苡仁山藥調理而愈諸鄰人大快孫如亭令政右眼眥突生白泡二寸余嘔吐眩暈有發明孫如亭令政年過四十眼偶赤腫兩太陽疼痛大便不行者三日平時汛期一月僅二日令行四日猶且未止里有開化余雲谷者自謂眼科捷手醫治逾候腫赤不消而右眼內眥突生一白泡垂與鼻齊大二寸余余見而駭走以為奇疾莫能措劑又見其嘔吐眩暈伏於枕上略不敢動稍動則眩愈極吐愈急疑其變而不治予為診之兩寸關脈俱滑大有力兩尺沉微予曰此中焦有痰肝膽有火必為怒氣所觸而然內經云諸風掉眩皆屬肝木諸逆衝上皆屬於火蓋無痰不作暈也眼眥白泡乃火性急速怒氣加之氣乘於絡上而不下故直脹出眼外也古壯士一怒而目眥裂與白泡脹出眥外理同肝為血海故血亦來不止治當抑其肝木清鎮痰火則諸症自瘳先用薑汁益元丸壓其痰火以止其吐再以二陳湯加酒連酒芩天麻滑石吳茱萸竹茹枳實煎飲一帖吐止暈定頭稍能動改用二陳湯加芩連穀精草香附夏枯草吳茱萸薏苡仁兩劑赤腫消白泡斂四劑痊愈血海亦淨從是後不發吳勉齋腹痛欲死有發明吳勉齋年近五十有腹痛疾或作或止性極急多躁多怒今痛在當臍不間晝夜市裡醫者為下之已五日大便雖瀉痛則尤甚飲食不進手足清冷形神俱倦脈僅四至重按則伏而有力此由攻克太過寒涼傷脾脾虛則中氣不運積反凝滯以故大便雖瀉而積不行痛終不減也治當建立中氣為主中氣一回痛當立止先與王海藏五神丸一錢滾水送下以止其痛此丸補接元氣安和五臟升降陰陽極有神應故名五神丸方出醫壘元戎第十卷中再用小建中湯調肝養脾蓋臍下乃肝經部位唯此湯乃對症劑也白芍酒炒三錢炙甘草一錢五分桂心一錢加香附一錢生薑三片水煎服午牌進藥未牌已報痛止因其夜進粥太頻且食鴨汁憾動余積腹又作痛且加脹悶面有浮氣裡急後重與四平丸而漸定外以二陳湯加香附砂仁蒼朮厚朴山楂腹中始覺寬快三日無恙又縱恣口腹大啖肥甘糕粽肉雞之類不飽不止腹中大痛時刻難存欲吐則食已下膈欲瀉則食尚未入腸自喊叫云可取木香檳榔丸大承氣湯急與我下之雖死無憾予諭之曰據痛雖甚腹則不堅顧今日適屆冬節禮曰先旺於至日閉關安靜以養微陽曷敢以大寒峻劑而汨天和乎設不和已只須桕樹東行根上白皮一錢長流水煎飲之一服可愈也夜已二鼓覓而煎服天明瀉三五行痛減大半仍以小建中湯和之痛又旋減唯臍下尚不脫然常常以熱手重熨之大便欲行及至廁則又不解知其血少而氣不調用熟地三錢白芍一錢杏仁二錢烏藥一錢木香五分水煎飲既下黑糞甚多十年腹痛沉疴從此不再復萌此後勉齋常語人曰吾得孫公五神丸桕根皮小建中湯三法不啻脫胎換骨數年來豈惟飲食增加即步履輕便捷若少壯皆孫君賜也親友有求其三法者畀而服之捷若桴鼓彼家謂予殆三生夙緣云黃頤齋內子產未彌月醉犯房事血來如崩黃頤齋內子產未彌月醉犯房事血來如崩勢不可遏發熱頭暈大小便俱熱六脈洪大以竹茹蒲黃白芍藥各一錢香附茯苓側柏葉青蒿各七分甘草炮薑艾葉各三分血止大半腰猶脹痛下午胸膈飽悶改以川芎五分當歸茯苓破故紙蒲黃香附各八分薑炭甘草各一分陳皮七分人參一錢服此血全止腰痛亦愈程心章兄頰腮紅腫程心章兄頰腮紅腫嘔惡發熱不能進食下午煩躁口苦夜不能睡六脈洪大此俗名鸕鷀瘟是也乃少陽陽明二經之症法當清解以柴胡貫眾各二錢乾葛竹茹半夏曲各一錢黃連枳殼各七分甘草四分一帖而瘳其半再服腫消食進而安睡矣程六十喘後發腫程六十者原有喘嗽今腫發於面四肢俱浮大便溏小水少時多怔忡此痰飲症也以旋覆花湯加桑白皮薏苡仁主之旋覆花桑白皮各一錢半夏人參橘紅茯苓各七分厚朴五分桂心甘草各三分薏苡仁一錢五分生薑三片水煎服一劑而怔忡除四劑喘腫俱消程七護丈發熱背痛伏梁積塊下痢紅白程七護丈發熱背痛起於傷酒醫治三月反加里急後重瀉下紅白黏稠中脘有塊自鳩尾骨直硬至臍如橫梁狀小水少且澀一日僅進粥二盞臥不能起才立起即後重下墜腹中隱隱痛與積塊丸消之連與二日所下血屑甚多外與滑石三錢當歸二錢桃仁川芎白芍藥枳實山楂各一錢酒芩酒連各八分木香六分升麻五分連進四帖塊軟腹寬再以丹溪保和丸兼服一月而消其六飲食大加紅白俱無塊痛硬勢雖云稍可然其根尚未易刈素多縱性飲啖無忌每每為飲食所復病久而中氣虛弱難任峻劑乃與六君子湯加香附山楂滑石紅曲木香酒連調理而痊乃囑之曰足下兩構危疾皆縱恣所致不佞殫力盡技為足下拯之非易易也固三生之緣有在幸無為再誤邵子謂爽口物作疾快心事為殃足下其鑑諸程孺人黃氏春溫過時熱病程孺人黃氏予之內親也發熱頭痛遍身如煅口渴譫語飲食不進先已迎程文峰氏療之認為痛風症授以蠟丸及辛溫之劑進之余適至為之診六部弦而洪數視其舌皆沉香焦燥芒刺深厚神漸昏沉乃語之曰此春溫過時熱病也法宜清解彼視為痛風而用辛溫是謂如火益熱適足以戕生非衛生也方和宇氏亦以予言為是乃用石膏五錢知母麥冬各三錢竹茹甘草黃連各一錢生薑三片一帖而神清再帖汗津津出始能言熱解食進又兩帖一身輕快自能坐立再用薏苡仁麥冬白扁豆甘草黃連白芍藥香薷白茯苓調養而愈程有望孺人月汛當止不止程有望孺人年逾五十月汛當止不止來且甚多遍身皆疼手足牽扯而痛牙疼經年不愈此氣虛血熱症也白芍藥二錢當歸八分人參七分蒲黃五靈脂炒黑側柏葉各一錢五分甘草薑炭各三分四帖諸症悉減惟牙痛尚存改用石膏一錢五分人參石斛當歸各八分地黃白芍藥各一錢黃連升麻各七分白芷甘草各三分再四帖牙疼亦愈上舍近洲胸膈脹痛有發明上舍近洲予族中至厚侄孫也性拓落豪放不羈夏仲在苕與諸友泛舟遊於碧浪之間興至即百觥不辭亦以是終為酒困也嘔惡體熱胸脅脹悶腹中疼痛大便秘結飲食大減苕之名醫如楊調元者橋梓悉方治之已三月或愈或否延至深秋肌瘦神瘁日進米僅二合胸脅脹腹中痛漠然略無所減懣然而不可支兩足皆有浮氣歸謀於予左脈沉弦而數右關結實大如碧豆因詰其在苕所服之劑答曰彼謂侄孫稟薄肌脆宜當理脾向服多理脾之劑予曰否子所苦者胸脅脹悶腹中疼痛大便燥結其累大矣理脾曷可以去此哉適足以益病耳經曰塞者通之又曰通則不痛其治此病之謂歟乃取當歸龍薈丸三下之大便行五六度又與酒連酒芩青蒿薑黃檳榔青皮半夏葛根飲之豁然焦膈通達呼吸開利惟頭略暈足上浮未去前方再加滑石茯苓薏苡仁山楂與調中丸兼服半月痊愈近洲喜曰人皆謂我症似中滿今不滿者叔公力也敢不德歟予警之曰吾聞君子之於身也兢兢焉不敢輕父母之遺體無伐天和則疾疢不作無反天常則災害不逢蘧伯玉嘗言行年五十而知四十九年之非況新愈後尤當痛懲庶保遐年區區無足恃也別未五年予在宜興聞訃果以傷酒而卒噫惜哉黃源金先生內人吐血泄瀉發喘有大發明甲午仲秋下旬黃源金先生以中饋病急謁予於市貌甚慘步立慄然語其症怔怔言澀於吻不勝其憂執族醫尺一白予云病自仲夏吐血二碗余初以芩連梔柏生地芍藥大寒之劑投之一帖而止未幾則咳嗽徹晝夜後師謂咳自吐血後當以滋陰降火之治逾兩月盡其法而罔效反加喘促泄瀉辰巳二時發熱煩躁師告技窮謂喘咳乃火刑肺金泄瀉乃脾胃已憊保脾則火愈熾而喘咳增加滋陰則泄瀉綿綿而元氣下脫經書所記嗽而下泄上喘者死此症之謂也似無可奈何矣語竟淚潸潸下予觀其忡忡之狀心不覺惕然動也市去渠宅五里許即步去一視觀其面青喘從抬肩擷項息息連身而倒脅背俱疼日夜不得伏枕脈之左澀右寸關滑大診畢顧金兄猶淚盈眥予撫其背曰毋淚尚可生也適徐仲子同視詰予曰症若此夫子曰可生何也予曰是非汝所知也第觀予治俟奏功當語汝遂以紫菀茜根牡丹皮桃仁益元散桑白皮茯苓桔梗栝蔞仁桂枝白前水煎臨服加韭菜汁半酒杯服後背脅痛止瀉減半乃得睡但咳而聲啞不除次以杏仁桔梗紫菀甘草白前五味子栝蔞乾薑款冬花半夏曲通草水煎服服後聲漸開瀉全止惟嗽尚多再以半夏曲桔梗茯苓陳皮甘草杏仁桑白皮白前苡仁白芍牡丹皮水煎後以丹溪治咳吐方用瀉白散加青皮人參白茯苓五味子調理痊愈次年誕一子是役也徐仲子之功居多蓋金為徐仲子友也徐仲子治疾多奇中乃篤信予而推轂之初投劑人多置議仲子獨贊之曰其必有見也人人辟易彼許可生安得不望生哉故金任之不二功成餘明甫查仲修問予曰病起於吐紅發熱煩躁喘咳皆是火邪前後之師滋陰降火藥法亦未爽然而病轉增劇其故何也予答曰醫不難於用藥而難於認病餘明甫查仲修曰市人議先生治疾多不循方每每師心金之役人皆視為火症而用寒涼先生獨用溫藥雖成功小人竊為先生恐予曰病原於火其勢之劇以治之太峻致然夫血之初來勢如湧泉安能一吐遂盡必有餘血伏於經絡思不及此而以大寒之劑一帖而止夫大寒之劑豈能止血適以凝其血耳血凝經絡滯於氣道氣滯血凝日甚一日氣滯又復生痰痰與瘀血兩滯經絡則肺氣不利故咳嗽聲啞不加察而為消瘀化痰導血歸經又以滋陰苦寒之劑施之則痰瘀愈凝而氣道愈不利也久則胃寒脾弱反增泄瀉晝夜喘促不能臥矣書云上熱未除中寒復生而為陰盛格陽之症故咳而嘔吐予故始以桂枝乾薑之類溫其胃以桃仁韭汁丹皮茜根之類活其血而消其瘀故喘止而瀉除東垣曰脾胃喜溫而惡寒信不欺也古謂藥不貴執方而貴合宜方即兵家之陣圖匠氏之規矩也圖可授人而不能授人鬥匠可授人規矩而不能授人巧此岳武穆對宗留守云運用之妙存乎一心也予遊方之外亦不失方之內惟不失方竊謂知方知方合法豈區區能哉觀古人治虛怯之疾即不治之症亦能延之三五載乃今治虛怯者不半載而竟殞逝猶駕言曰殆今之天元運氣使然故人多不壽愚謂天元運氣則人人皆如是乎何予母八十有六予父逾八望九予伯母今九十有五予表伯汪春元東臺之父年九十餘強健不啻少壯不思速夭之由皆為滋陰降火之誤而反歸咎於天天何尤哉緣滋陰降火之法起于丹溪繼而王節齋何大英之流倡而和之以成其風此當今之大弊而人未之警也我師祖汪石山先生揭而指之惜乎未有繼其言者一齊眾楚故滋陰之禍流而迨今敝以繼敝無已時也二三子其識之徐仲子其聞之乎仲修又問先生何以認是症為中寒而非陰虛之火而又認其喘為瘀血也予曰脈與症皆可考脈經云澀為氣滯氣滯且血凝盛吐之後大寒之藥一帖而止其未盡之餘血為寒涼所凝滯於氣道為喘書云從前來者為本從後來者為標茲用活血消瘀之劑治其本以溫熱暖胃之劑治其標故瀉止而喘定也若夫陰虛火動之脈乃細數之候今脈滑大非陰虛之脈陰虛喘嗽之症潮熱於夜兩頰皆紅今熱在辰已陽分而面色帶青由是以知其非陰虛之火乃誤用寒涼激其火而上行也經曰水流濕火就燥中氣既寒火愈不能下矣正如雨驟雷烈則電光之火愈熾日出而電光自息也且陰虛火動火起九泉皆自足下湧泉穴起以漸上升今膝下冷而上身熱兩尺脈又弱蓋由咳而氣升經曰形寒飲冷則傷肺肺氣為寒藥壅遏不得下降故咳而吐酸丹溪纂要云陰氣在下陽氣在上喘咳嘔吐瀉白散加人參茯苓五味子青皮故不從河間而用諸嘔吐酸皆屬於火之治況今歲次甲午為濕土司運八月建酉水土衰敗之時內經曰毋違時毋代化且脾惡濕濕多則瀉濕則生痰前後之師不考運氣月令一概而用滋陰降火之劑助濕生痰安望其痰之愈也丹溪纂要云實脾土燥脾濕是治痰之本也遵而用之如鼓應桴予故曰醫不難於用藥而難於認病有以也孫合溪翁八旬而發寒熱咳嗽汗出不止呃呃連聲族侄合溪年當八旬春初偶為寒襲發熱咳嗽醫與芎蘇散即汗出不止呃呃連聲勺粒不入昏憒經旬汗日加呃日甚延予診之六部浮大無力重按三五不調六七至一止右關近滑診畢語嗣君敬所曰尊翁由勞倦表虛感邪脈故浮大無力法當從東垣補中益氣湯一二劑可瘳也醫乃妄為表散致汗漏神疲昏憒發呃高年值此寧不殆乎即可僥倖圖安亦不過千日養耳敬所勃然俯而對曰上已後為家君壽期不虞構疾羸憊若此苟保百日俾菽水之心庶幾少盡叔祖之賜多矣若千日又出於望外也予即以六君子湯加竹茹柿蒂以止呃再加酸棗仁石斛以斂汗一進熱退呃定再進汗止食入三進霈霈然精神長矣乃減去竹茹柿蒂加當歸半月全安先是祝令君謂渠有耆德請為介賓以疾辭不及赴迨季春令君聞渠壽即援例賜一級寵以冠帶扁額用彰恩典光於鄉閭後果三年而卒孝廉方叔度令嫂江氏脹滿孝廉方叔度令嫂江氏年甫三旬患脹滿諸名家或補或消或分利或溫或寒悉為整理一番束手而去舉家惶惶無所適從叔度曰聞孫仲暗昔患此眾亦束手比得孫生生者治而起之眾皆斂衽欽服仲暗伯仲適在館中盍咨訪之即發書介予隨紹嚮往診得左脈弦大右滑大予曰此李東垣木香化滯湯症也病從憂思而起合如法按治可保終吉叔度喜曰曩從事諸公悉云不治先生謂可保終吉此故倉公有言拙者疑殆良工取焉是也幸先生早為措劑予即照本方發四帖服訖腹果寬其半繼以人參消痞湯琥珀調中丸調理二月全瘳叔度信予從此始每推轂予於諸相知多有奇中卒為通家之好吳天威丈便癰有發明臨溪吳天威丈年七十有三客邸遠歸偶墜馬跌傷左脅作痛隨治而愈後半年忽左胯腫痛憎寒作熱動止極艱里中諸公有認濕痰者有認風氣者有認濕熱者總罔效聞歙外科洪氏能且識雜病迓以為治居數日視為疝氣率投荔枝核大小茴香川楝子橘核之類痛躁不可當乃欲引繩自絕諸子百般慰解洪乃辭去竟不知為何疾也其婿汪開之予之表弟也邀予診之六脈浮而洪數左寸尤甚驗其痛處紅腫光浮如瓠撫之烙手予曰此便癰也洪系外科專門胡獨忽此蓋渠素慎重見患者年高烏敢認為便癰治哉此殆千慮一失毋足怪諸郎君聞予言皆駭然詰予曰家嚴不御色者十載顧安得此願先生再思予曰此非近色而得審胯屬足厥陰肝經肝為血海乃昔時墜馬惡血消之未盡瘀蓄經絡無門可出化而為膿由年高氣虛又被香燥克伐太過不能潰而即出故散漫浮腫觀其色青中隱黑濃已成腐必須外用鑱針引而出之內用千金托裡庶可排膿生肉但予生平心慈不能用針予弟警吾外科良手可延而決之至即以鑱針深入寸余出青黑膿五六碗許臭穢難近即語諸郎君曰使早決三日可免一月之苦今即日大補之非百日不能痊此俗名石米瘡也諸郎君及患者見膿色如是始信予言不爽急以請劑予乃用內托十宣散參耆每帖三錢後加至五錢一日兩進兩越月膿盡肉滿而愈一市稱奇文貴者明疫漏底發熱譫語有發明文貴者善為族文學岐原出入子母者也寓長興邸中病發熱晝夜不止口渴齒燥鼻乾舌苔黃厚不得眠服藥不效予適至雉城岐原邀診之脈俱洪數嘔惡胸膈痞懣小水短而赤大便下皆清水予以石膏七錢知母五錢甘草一錢軟柴胡五錢葛根三錢黃芩二錢枳殼竹茹桔梗各一錢連進三帖嘔惡止胸膈寬熱仍未退無汗瀉未止也時有問予者謂胡不用柴苓湯而退熱止瀉也服石膏故益瀉耳予戲之曰予乃三腳貓耶能認此為何症用柴苓湯也仍以柴胡石膏各七錢為君葛根知母各五錢為臣黃芩甘草各一錢為佐生薑五片速進二帖汗則津津然出熱退瀉止口不渴而眠矣予因他往留藥三帖而囑之曰胃氣初回勢必思食宜謹慎不可多進若多則餘熱復作必成食復治將費手也慎之慎之後五日果以食不慎而復病予又至熱較前為重且加懊憹夜譫語如見鬼狀口大渴齒燥舌焦黑有芒刺勢甚危急以前方加枳實梔了各三錢淡豆豉二錢煎飲之二帖懊憹止餘症猶然夜更甚前方減去豆豉加黃連麥冬生地白芍一日二帖舌以井水生薑擦去黑苔用蜜調玄明粉塗之而胎去矣服三日始得微汗諸症盡減再四叮嚀慎飲食調理半月而全岐原問曰人始皆認此症為漏底傷寒謂叔不用柴苓湯退熱止瀉而用石膏為非乃竟以石膏收功何也予曰此問甚善蓋醫貴認症此症乃少陽陽明合病也柴胡白虎湯葛根為二經對症之藥服之可解肌熱止口渴若柴苓湯為太陽少陽合病之劑內有五苓散乃太陽經之裡藥症非太陽曷敢用之且其內有人參白朮肉桂皆助熱發燥之味誤投則必發斑其齒燥舌乾而焦黑又何敢用茯苓澤瀉豬苓利之使益亡其津液耶古人謂以傷寒為大病不察症而誤投則生死立見傷寒論有言不得汗不得下不得利小便是謂三禁故曰少陽陽明不從標本從乎中治小柴胡白虎湯中治劑也人徒見其大便作瀉為漏底不察瀉皆清水無糟粕者為熱極所致症乃春溫時疫也但為發散使清氣上升而微有汗瀉當自止此瀉豈五苓散所能止哉止則誤事岐原曰夜重如見鬼者何以故予曰熱入血室故也岐原曰男子亦有血室乎予曰血室男婦同之衝任二脈為血之海二脈附於陽明今病乃陽明之熱遺入血海也故加生地白芍而效余治傷寒用柴葛解肌湯及柴胡白虎湯而熱不解者加此二味則熱無不退汗無不出矣且下午與夜又陰分主事欲解血海之熱必投此二味以收其功此亦予一得之愚也岐原曰善願記之以詔後來鍾澤程夢奎孺人哭子過傷因發寒熱有發明鍾澤有程夢奎孺人者年將五十僅一子念一歲而歿於痘旦夕哭之哀且彌月攬鏡自鑑曰何子死而形色不瘁如此因持鐵如意捶其胸絕粒斷漿肌容日瘁時為初秋寒熱交作嘔噦懊憹遍身疼夫為遍延診視卻藥不飲諸醫百莢開譬拒而不聽媳與孫跽而懇姻族就而諭其不納者若罔聞也惟合睫以待死已而作色語其夫曰病若此汝曷不延名醫一決生死乎夫曰所延皆名士病者曰昔常聞程方塘參軍患瘋三年而起者誰曰孫君又問吳西源孺人病燥揭痰喘三年與程道吾內眷勞瘵暈厥誰為起之夫答如前病者曰何不請孫君決我生死夫聞言物色徵予五日而後至則薄暮矣病者猶疑為誕也私至三家訪予狀皆曰魁然長髯者也詰朝覿面診之畢則問曰何日死予應曰病勢危去死不遠病者喟然嘆曰死不足惜第九華山香願未了為恨耳予曰孺人大願不思何須以此小願為孜孜也孺人曰無大願予曰人之修短有數今年之痘死者不可勝計令嗣之死亦數也然有二孫可承宗祧孺人能忍哀撫孫使其成立娶婦以蕃後胤令嗣雖死猶不死也而孺人亦有令名若不此之思憂傷以殞夫君必娶娶必少年繼室生子則必厚其子而薄孺人之孫晚娘晚爺之謠獨不聞之耶孺人萬金之家使令孫不得其所令嗣九泉之下恐不能無憾孺人憂死何益也願孰大於此者予故謂未之思耳孺人試思之誰輕誰重當自辨也語畢憮然曰先生言至此吾如寐者得醒矣顧病勢去死不遠何能得如吾願予曰所謂近者病也非脈也脈左弦細右關滑故發熱體痛嘔噦乃秋來瘧症非死脈也若如前執拗不服藥不進飲食書謂絕谷者亡殆非虛語孺人誠聽予言以二孫為念以大體為重予以活血養血之劑而治其傷損以小柴胡加竹茹滑石以和陰陽而止其嘔噦不一月而可無恙矣奚憂哉果從予言而進飲食服藥五日寒熱嘔噦皆止後以丹參劉寄奴各三錢為臣五加皮五錢為君香附一錢為佐入四物煎服果一月而全可矣程孺人病起而聞者皆曰七發起太子之病觀於孫君益信歙潛口汪召南丈令郎蠱脹有發明歙潛口汪召南令郎年十四患蠱脹大如覆箕經醫三十餘人見症皆駭而走獨市之幼科汪養直者調理數數見效第此子溺於豢養縱口腹不守戒忌病多反復一日語召南曰郎君之症非求之孫生生者不能成功召南曰聞此公多遊吳浙縉紳間何可以月日致也養直曰歸矣吾有妹適羅田為方與石丘嫂也舊歲患症如蠱治經彌歲無功生生子立全之吾推轂孫君者豈有他腸為郎君也召南即凂羅田延予予至日已晡矣觀病者腹脹大極青筋縷縷如蚯蚓大上自胸脯至上脘而止惟喜其不下現也臍平四肢面目皆浮大兩足胻骨上各裂開大出清水一日間數為更衣易被陰囊光腫如泡淫淫滲濕發寒熱脈以手腫不能取必推開其腫下指重按浮而六至予曰症可謂重之極矣僅可恃者目瞳子有神耳余皆險惡將何以治養直知予至亟過相陪宣言曰病重不必言引領先生久矣幸為投劑生死無憾予曰且先為理表若表徹稍得微汗使肺氣少利則小水可通召南喜而亟請藥乃用紫蘇葉蘇子陳皮麻黃各一錢桑白皮八分防風杏仁各七分炙甘草桂枝各二分生薑三片水煎服之五更乃有微汗次早面上氣稍消胸脯青筋皆退餘症雖仍舊機栝則可生矣仍投前藥次日腹與四肢皆有皺紋惟小水未利乃改用破故紙蒼朮赤茯苓澤瀉桑白皮赤小豆桂心木香二帖而小水利駸駸已有生意乃以飲食過度大便作瀉又以四君子湯加苡仁破故紙澤瀉山楂砂仁調理而全安此症予閱歷者不下數十然青筋未有如此之粗足時出水有之未有出水處如鮎魚口之大而取效亦未有如此之速蓋此子體未破而真全故症雖重而收功速也數十人間有五六不能成功者由其縱欲恣情不守禁忌非藥之罪也召南昆仲見人談醫則以不佞為稱首予笑曰君得無到處逢人說項斯者耶乃汪養直亦醫道中白眉乃不收功於後病者不忌口過耳於養直何尤養直不矜己之功亦不忮人之功所謂忠厚長者非耶岩鎮鄭景南丈痰飲積塊跳動不止有發明岩鎮鄭景南丈病臥年餘百治不效昔體豐腴今瘦骨立飲食少進新都名士皆辭不治其家聞昔年方士榮孺人蠱症時師亦皆辭去予為起之因徵余治時則六月望也診其脈左弦大右關滑大兩尺俱無噁心腹瘦削狀如仰瓦腸鳴如雷晝夜不住小水不利肌膚及眼珠色若黃金腹中有塊如碟動跳不止足膝以下皆冷飲食不入予詳思其病機昔肥而今瘦者痰也形雖瘦而目炯炯有神先以五飲湯姑試之以觀其勢再為加減因用族復花八分破故紙一錢肉桂三分白朮茯苓澤瀉陳皮半夏各八分生薑三片水煎服之二帖噁心腸鳴皆止次早飲食稍進舉家欣欣色喜令岳程鐘山公於予為石交聞病有起意心殊異之不知為予因而過訪見予撫掌大叫稱快曰吾固知是公也指其甥而語之此即所嘗與爾曹言者聞久為西吳縉紳遞留不意今歸城吾婿之幸也相與談對兩日而別別之時景南飲食稍加小水利肌膚面目黃氣退漸有生機不虞逾半月為拂意事所激而怒復吐痰不思飲食家人驚惶無措亟請予診兩寸滑大左關弦勁搏指右關亦滑大有力兩尺沉微予語之曰病甚重脈非前比且不敢以萬全許第盡吾心爾病以藥力而回君之福也時為七月之朔予因留視七日日進一劑劑以人參陳皮半夏茯苓香附白豆仁黃連旋覆花麥芽甘草與服服三日噁心止大便有稠痰下其中間有瘀血此皆大怒所致故經云怒則傷肝甚則嘔血並下泄上吐亦或有紅點子在痰中吐出是其徵也後改用六君子湯加麥芽黃連枇杷葉白扁豆調理病勢駸駸向安腹中如碟之塊亦漸消去大僅如指耳肌肉亦生能下榻舉足以步市上之人稱奇後聞臘月又被鬱怒頸發瘰癧外科以爛藥點潰服蜈蚣敗毒藥卒莫能收口而終傷哉
