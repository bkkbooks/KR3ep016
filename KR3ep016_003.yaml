  - {type: 'tls:div-end', offset: 18689, content: '', id: KR3ep016_jc_003-d5.d2d81}
  - {type: 'tls:div-start', offset: 18689, content: '', id: KR3ep016_jc_003-d5.d2d82, level: 3, head_text: 黃源金先生內人吐血泄瀉發喘有大發明}
