  - {type: 'tls:head', offset: 461, content: '', id: KR3ep016_jc_003-d5.d2.d4.h1s1}
  - {type: 'tls:div-end', offset: 745, content: '', id: KR3ep016_jc_003-d5.d2d4}
  - {type: 'tls:div-start', offset: 745, content: '', id: KR3ep016_jc_003-d5.d2d5, level: 3, head_text: 族妹經不行者八十日每飲食入腹即疼痛吐出乃止}
  - {type: 'tls:head', offset: 745, content: '', id: KR3ep016_jc_003-d5.d2.d5.h1s1}
  - {type: 'tls:div-end', offset: 931, content: '', id: KR3ep016_jc_003-d5.d2d5}
  - {type: 'tls:div-start', offset: 931, content: '', id: KR3ep016_jc_003-d5.d2d6, level: 3, head_text: 孫華野喉頰車腫}
  - {type: 'tls:head', offset: 931, content: '', id: KR3ep016_jc_003-d5.d2.d6.h1s1}
  - {type: 'tls:div-end', offset: 1012, content: '', id: KR3ep016_jc_003-d5.d2d6}
  - {type: 'tls:div-start', offset: 1012, content: '', id: KR3ep016_jc_003-d5.d2d7, level: 3, head_text: 顯兄每辛苦及酒多則咯血數口}
  - {type: 'tls:head', offset: 1012, content: '', id: KR3ep016_jc_003-d5.d2.d7.h1s1}
  - {type: 'tls:div-end', offset: 1108, content: '', id: KR3ep016_jc_003-d5.d2d7}
  - {type: 'tls:div-start', offset: 1108, content: '', id: KR3ep016_jc_003-d5.d2d8, level: 3, head_text: 吳遂兄濕熱發黃}
  - {type: 'tls:head', offset: 1108, content: '', id: KR3ep016_jc_003-d5.d2.d8.h1s1}
  - {type: 'tls:div-end', offset: 1391, content: '', id: KR3ep016_jc_003-d5.d2d8}
  - {type: 'tls:div-start', offset: 1391, content: '', id: KR3ep016_jc_003-d5.d2d9, level: 3, head_text: 族侄明之痰火上逆大吐痰沫因而嘔血一湧數碗有發明}
  - {type: 'tls:head', offset: 1391, content: '', id: KR3ep016_jc_003-d5.d2.d9.h1s1}
  - {type: 'tls:div-end', offset: 1763, content: '', id: KR3ep016_jc_003-d5.d2d9}
  - {type: 'tls:div-start', offset: 1763, content: '', id: KR3ep016_jc_003-d5.d2d10, level: 3, head_text: 族嫂程氏肺癰}
  - {type: 'tls:head', offset: 1763, content: '', id: KR3ep016_jc_003-d5.d2.d10.h1s1}
  - {type: 'tls:div-end', offset: 1949, content: '', id: KR3ep016_jc_003-d5.d2d10}
  - {type: 'tls:div-start', offset: 1949, content: '', id: KR3ep016_jc_003-d5.d2d11, level: 3, head_text: 侄媳葉氏身面四肢浮腫}
  - {type: 'tls:head', offset: 1949, content: '', id: KR3ep016_jc_003-d5.d2.d11.h1s1}
  - {type: 'tls:div-end', offset: 2052, content: '', id: KR3ep016_jc_003-d5.d2d11}
  - {type: 'tls:div-start', offset: 2052, content: '', id: KR3ep016_jc_003-d5.d2d12, level: 3, head_text: 族侄孫伍仲善飲好內小便血淋疼痛}
  - {type: 'tls:head', offset: 2052, content: '', id: KR3ep016_jc_003-d5.d2.d12.h1s1}
  - {type: 'tls:div-end', offset: 2325, content: '', id: KR3ep016_jc_003-d5.d2d12}
  - {type: 'tls:div-start', offset: 2325, content: '', id: KR3ep016_jc_003-d5.d2d13, level: 3, head_text: 令眷吐紅髮熱}
  - {type: 'tls:head', offset: 2325, content: '', id: KR3ep016_jc_003-d5.d2.d13.h1s1}
  - {type: 'tls:div-end', offset: 2403, content: '', id: KR3ep016_jc_003-d5.d2d13}
  - {type: 'tls:div-start', offset: 2403, content: '', id: KR3ep016_jc_003-d5.d2d14, level: 3, head_text: 亮卿令愛右目紅腫}
  - {type: 'tls:head', offset: 2403, content: '', id: KR3ep016_jc_003-d5.d2.d14.h1s1}
  - {type: 'tls:div-end', offset: 2466, content: '', id: KR3ep016_jc_003-d5.d2d14}
  - {type: 'tls:div-start', offset: 2466, content: '', id: KR3ep016_jc_003-d5.d2d15, level: 3, head_text: 太學少竹眼紅腫脹}
  - {type: 'tls:head', offset: 2466, content: '', id: KR3ep016_jc_003-d5.d2.d15.h1s1}
  - {type: 'tls:div-end', offset: 2576, content: '', id: KR3ep016_jc_003-d5.d2d15}
  - {type: 'tls:div-start', offset: 2576, content: '', id: KR3ep016_jc_003-d5.d2d16, level: 3, head_text: 一僕婦產後惡露不盡腹中作痛}
  - {type: 'tls:head', offset: 2576, content: '', id: KR3ep016_jc_003-d5.d2.d16.h1s1}
  - {type: 'tls:div-end', offset: 2667, content: '', id: KR3ep016_jc_003-d5.d2d16}
  - {type: 'tls:div-start', offset: 2667, content: '', id: KR3ep016_jc_003-d5.d2d17, level: 3, head_text: 程好吾令孫右耳後生毒腫痛}
  - {type: 'tls:head', offset: 2667, content: '', id: KR3ep016_jc_003-d5.d2.d17.h1s1}
  - {type: 'tls:div-end', offset: 2729, content: '', id: KR3ep016_jc_003-d5.d2d17}
  - {type: 'tls:div-start', offset: 2729, content: '', id: KR3ep016_jc_003-d5.d2d18, level: 3, head_text: 華岳令堂右手臂肢節脹痛}
  - {type: 'tls:head', offset: 2729, content: '', id: KR3ep016_jc_003-d5.d2.d18.h1s1}
  - {type: 'tls:div-end', offset: 2867, content: '', id: KR3ep016_jc_003-d5.d2d18}
  - {type: 'tls:div-start', offset: 2867, content: '', id: KR3ep016_jc_003-d5.d2d19, level: 3, head_text: 程兩峰令眷血痢}
  - {type: 'tls:head', offset: 2867, content: '', id: KR3ep016_jc_003-d5.d2.d19.h1s1}
  - {type: 'tls:div-end', offset: 2953, content: '', id: KR3ep016_jc_003-d5.d2d19}
  - {type: 'tls:div-start', offset: 2953, content: '', id: KR3ep016_jc_003-d5.d2d20, level: 3, head_text: 程七護兄臍腹右邊疼痛小水不利嘔吐不進食}
  - {type: 'tls:head', offset: 2953, content: '', id: KR3ep016_jc_003-d5.d2.d20.h1s1}
  - {type: 'tls:div-end', offset: 3168, content: '', id: KR3ep016_jc_003-d5.d2d20}
  - {type: 'tls:div-start', offset: 3168, content: '', id: KR3ep016_jc_003-d5.d2d21, level: 3, head_text: 程社貴兄醉後御色次早胃脘痛極}
  - {type: 'tls:head', offset: 3168, content: '', id: KR3ep016_jc_003-d5.d2.d21.h1s1}
  - {type: 'tls:div-end', offset: 3360, content: '', id: KR3ep016_jc_003-d5.d2d21}
  - {type: 'tls:div-start', offset: 3360, content: '', id: KR3ep016_jc_003-d5.d2d22, level: 3, head_text: 汪松崗令眷左脅痛咳嗽內熱}
  - {type: 'tls:head', offset: 3360, content: '', id: KR3ep016_jc_003-d5.d2.d22.h1s1}
  - {type: 'tls:div-end', offset: 3429, content: '', id: KR3ep016_jc_003-d5.d2d22}
  - {type: 'tls:div-start', offset: 3429, content: '', id: KR3ep016_jc_003-d5.d2d23, level: 3, head_text: 贊皇令堂產後左脅痛甚}
  - {type: 'tls:head', offset: 3429, content: '', id: KR3ep016_jc_003-d5.d2.d23.h1s1}
  - {type: 'tls:div-end', offset: 3514, content: '', id: KR3ep016_jc_003-d5.d2d23}
  - {type: 'tls:div-start', offset: 3514, content: '', id: KR3ep016_jc_003-d5.d2d24, level: 3, head_text: 許少峰中風先兆}
  - {type: 'tls:head', offset: 3514, content: '', id: KR3ep016_jc_003-d5.d2.d24.h1s1}
  - {type: 'tls:div-end', offset: 3763, content: '', id: KR3ep016_jc_003-d5.d2d24}
  - {type: 'tls:div-start', offset: 3763, content: '', id: KR3ep016_jc_003-d5.d2d25, level: 3, head_text: 朱宅女眷熱入血室}
  - {type: 'tls:head', offset: 3763, content: '', id: KR3ep016_jc_003-d5.d2.d25.h1s1}
  - {type: 'tls:div-end', offset: 3899, content: '', id: KR3ep016_jc_003-d5.d2d25}
  - {type: 'tls:div-start', offset: 3899, content: '', id: KR3ep016_jc_003-d5.d2d26, level: 3, head_text: 孫熙宇肢節腫痛痰多嘔惡病多夢鬼}
  - {type: 'tls:head', offset: 3899, content: '', id: KR3ep016_jc_003-d5.d2.d26.h1s1}
  - {type: 'tls:div-end', offset: 4146, content: '', id: KR3ep016_jc_003-d5.d2d26}
  - {type: 'tls:div-start', offset: 4146, content: '', id: KR3ep016_jc_003-d5.d2d27, level: 3, head_text: 愛泉傷風咳嗽聲啞右邊不能貼席}
  - {type: 'tls:head', offset: 4146, content: '', id: KR3ep016_jc_003-d5.d2.d27.h1s1}
  - {type: 'tls:div-end', offset: 4335, content: '', id: KR3ep016_jc_003-d5.d2d27}
  - {type: 'tls:div-start', offset: 4335, content: '', id: KR3ep016_jc_003-d5.d2d28, level: 3, head_text: 侄婦戴氏有妊五月忽血大下午後發熱}
  - {type: 'tls:head', offset: 4335, content: '', id: KR3ep016_jc_003-d5.d2.d28.h1s1}
  - {type: 'tls:div-end', offset: 4637, content: '', id: KR3ep016_jc_003-d5.d2d28}
  - {type: 'tls:div-start', offset: 4637, content: '', id: KR3ep016_jc_003-d5.d2d29, level: 3, head_text: 靈岳乃眷胃脘疼痛頭暈舌麻}
  - {type: 'tls:head', offset: 4637, content: '', id: KR3ep016_jc_003-d5.d2.d29.h1s1}
  - {type: 'tls:div-end', offset: 4750, content: '', id: KR3ep016_jc_003-d5.d2d29}
  - {type: 'tls:div-start', offset: 4750, content: '', id: KR3ep016_jc_003-d5.d2d30, level: 3, head_text: 吳人峰先生內人兩脅脹急痛抵胃脘}
  - {type: 'tls:head', offset: 4750, content: '', id: KR3ep016_jc_003-d5.d2.d30.h1s1}
  - {type: 'tls:div-end', offset: 4982, content: '', id: KR3ep016_jc_003-d5.d2d30}
  - {type: 'tls:div-start', offset: 4982, content: '', id: KR3ep016_jc_003-d5.d2d31, level: 3, head_text: 陳鐵兄內人產後腹痛發熱下痢膿血}
  - {type: 'tls:head', offset: 4982, content: '', id: KR3ep016_jc_003-d5.d2.d31.h1s1}
  - {type: 'tls:div-end', offset: 5098, content: '', id: KR3ep016_jc_003-d5.d2d31}
  - {type: 'tls:div-start', offset: 5098, content: '', id: KR3ep016_jc_003-d5.d2d32, level: 3, head_text: 程石洲乃眷因產難子死憂悶小腹有塊作痛復因多食圓眼腹益大脹堅如石大如斗氣促不安有發明}
  - {type: 'tls:head', offset: 5098, content: '', id: KR3ep016_jc_003-d5.d2.d32.h1s1}
  - {type: 'tls:div-end', offset: 5586, content: '', id: KR3ep016_jc_003-d5.d2d32}
  - {type: 'tls:div-start', offset: 5586, content: '', id: KR3ep016_jc_003-d5.d2d33, level: 3, head_text: 程嫗年八旬頭暈腳軟大便溏泄小水淋瀝}
  - {type: 'tls:head', offset: 5586, content: '', id: KR3ep016_jc_003-d5.d2.d33.h1s1}
  - {type: 'tls:div-end', offset: 5684, content: '', id: KR3ep016_jc_003-d5.d2d33}
  - {type: 'tls:div-start', offset: 5684, content: '', id: KR3ep016_jc_003-d5.d2d34, level: 3, head_text: 程道吾先生令眷夜魘而驚時常暈厥}
  - {type: 'tls:head', offset: 5684, content: '', id: KR3ep016_jc_003-d5.d2.d34.h1s1}
  - {type: 'tls:div-end', offset: 6105, content: '', id: KR3ep016_jc_003-d5.d2d34}
  - {type: 'tls:div-start', offset: 6105, content: '', id: KR3ep016_jc_003-d5.d2d35, level: 3, head_text: 一僕婦瘟疫以勞食復作}
  - {type: 'tls:head', offset: 6105, content: '', id: KR3ep016_jc_003-d5.d2.d35.h1s1}
  - {type: 'tls:div-end', offset: 6262, content: '', id: KR3ep016_jc_003-d5.d2d35}
  - {type: 'tls:div-start', offset: 6262, content: '', id: KR3ep016_jc_003-d5.d2d36, level: 3, head_text: 程方塘年六十四風癱不能步者三載腿肉盡消}
  - {type: 'tls:head', offset: 6262, content: '', id: KR3ep016_jc_003-d5.d2.d36.h1s1}
  - {type: 'tls:div-end', offset: 6838, content: '', id: KR3ep016_jc_003-d5.d2d36}
  - {type: 'tls:div-start', offset: 6838, content: '', id: KR3ep016_jc_003-d5.d2d37, level: 3, head_text: 汪省吾瘧三日一發發於夜}
  - {type: 'tls:head', offset: 6838, content: '', id: KR3ep016_jc_003-d5.d2.d37.h1s1}
  - {type: 'tls:div-end', offset: 7009, content: '', id: KR3ep016_jc_003-d5.d2d37}
  - {type: 'tls:div-start', offset: 7009, content: '', id: KR3ep016_jc_003-d5.d2d38, level: 3, head_text: 汪東之丈七月初旬虛陽口瘡有發明}
  - {type: 'tls:head', offset: 7009, content: '', id: KR3ep016_jc_003-d5.d2.d38.h1s1}
  - {type: 'tls:div-end', offset: 7745, content: '', id: KR3ep016_jc_003-d5.d2d38}
  - {type: 'tls:div-start', offset: 7745, content: '', id: KR3ep016_jc_003-d5.d2d39, level: 3, head_text: 令眷妊中咳嗽}
  - {type: 'tls:head', offset: 7745, content: '', id: KR3ep016_jc_003-d5.d2.d39.h1s1}
  - {type: 'tls:div-end', offset: 7826, content: '', id: KR3ep016_jc_003-d5.d2d39}
  - {type: 'tls:div-start', offset: 7826, content: '', id: KR3ep016_jc_003-d5.d2d40, level: 3, head_text: 吳東渠瘧後虛憊}
  - {type: 'tls:head', offset: 7826, content: '', id: KR3ep016_jc_003-d5.d2.d40.h1s1}
  - {type: 'tls:div-end', offset: 8012, content: '', id: KR3ep016_jc_003-d5.d2d40}
  - {type: 'tls:div-start', offset: 8012, content: '', id: KR3ep016_jc_003-d5.d2d41, level: 3, head_text: 吳西源令眷以艱子多郁多思肌肉盡削皮膚燥揭遍身生瘡體如火燎}
  - {type: 'tls:head', offset: 8012, content: '', id: KR3ep016_jc_003-d5.d2.d41.h1s1}
  - {type: 'tls:div-end', offset: 8201, content: '', id: KR3ep016_jc_003-d5.d2d41}
  - {type: 'tls:div-start', offset: 8201, content: '', id: KR3ep016_jc_003-d5.d2d42, level: 3, head_text: 族嫂程氏環跳穴邊腫痛寒熱併發不能動止}
  - {type: 'tls:head', offset: 8201, content: '', id: KR3ep016_jc_003-d5.d2.d42.h1s1}
  - {type: 'tls:div-end', offset: 8349, content: '', id: KR3ep016_jc_003-d5.d2d42}
  - {type: 'tls:div-start', offset: 8349, content: '', id: KR3ep016_jc_003-d5.d2d43, level: 3, head_text: 恆宇瘡後遭跌環跳脫出不能復收}
  - {type: 'tls:head', offset: 8349, content: '', id: KR3ep016_jc_003-d5.d2.d43.h1s1}
  - {type: 'tls:div-end', offset: 8602, content: '', id: KR3ep016_jc_003-d5.d2d43}
  - {type: 'tls:div-start', offset: 8602, content: '', id: KR3ep016_jc_003-d5.d2d44, level: 3, head_text: 侄孫女周歲發慢驚}
  - {type: 'tls:head', offset: 8602, content: '', id: KR3ep016_jc_003-d5.d2.d44.h1s1}
  - {type: 'tls:div-end', offset: 8927, content: '', id: KR3ep016_jc_003-d5.d2d44}
  - {type: 'tls:div-start', offset: 8927, content: '', id: KR3ep016_jc_003-d5.d2d45, level: 3, head_text: 程少湖以飲生酒面浮胸脹}
  - {type: 'tls:head', offset: 8927, content: '', id: KR3ep016_jc_003-d5.d2.d45.h1s1}
  - {type: 'tls:div-end', offset: 9059, content: '', id: KR3ep016_jc_003-d5.d2d45}
  - {type: 'tls:div-start', offset: 9059, content: '', id: KR3ep016_jc_003-d5.d2d46, level: 3, head_text: 吳鬥一原有腸風又感風邪發熱多痰腹痛下痢}
  - {type: 'tls:head', offset: 9059, content: '', id: KR3ep016_jc_003-d5.d2.d46.h1s1}
  - {type: 'tls:div-end', offset: 9524, content: '', id: KR3ep016_jc_003-d5.d2d46}
  - {type: 'tls:div-start', offset: 9524, content: '', id: KR3ep016_jc_003-d5.d2d47, level: 3, head_text: 堪輿張錫泉先生左脅皮裡膜外疼痛}
  - {type: 'tls:head', offset: 9524, content: '', id: KR3ep016_jc_003-d5.d2.d47.h1s1}
  - {type: 'tls:div-end', offset: 9617, content: '', id: KR3ep016_jc_003-d5.d2d47}
  - {type: 'tls:div-start', offset: 9617, content: '', id: KR3ep016_jc_003-d5.d2d48, level: 3, head_text: 族侄云岳偏墜臍腹腰俞脹痛}
  - {type: 'tls:head', offset: 9617, content: '', id: KR3ep016_jc_003-d5.d2.d48.h1s1}
  - {type: 'tls:div-end', offset: 9806, content: '', id: KR3ep016_jc_003-d5.d2d48}
  - {type: 'tls:div-start', offset: 9806, content: '', id: KR3ep016_jc_003-d5.d2d49, level: 3, head_text: 一婦妙齡感風寒致成鼻淵}
  - {type: 'tls:head', offset: 9806, content: '', id: KR3ep016_jc_003-d5.d2.d49.h1s1}
  - {type: 'tls:div-end', offset: 9901, content: '', id: KR3ep016_jc_003-d5.d2d49}
  - {type: 'tls:div-start', offset: 9901, content: '', id: KR3ep016_jc_003-d5.d2d50, level: 3, head_text: 程兩峰瘀血發黃吐出穢惡如爛豬肺狀大便色如墨有發明}
  - {type: 'tls:head', offset: 9901, content: '', id: KR3ep016_jc_003-d5.d2.d50.h1s1}
  - {type: 'tls:div-end', offset: 10502, content: '', id: KR3ep016_jc_003-d5.d2d50}
  - {type: 'tls:div-start', offset: 10502, content: '', id: KR3ep016_jc_003-d5.d2d51, level: 3, head_text: 予表嫂小產後腹痛暈厥}
  - {type: 'tls:head', offset: 10502, content: '', id: KR3ep016_jc_003-d5.d2.d51.h1s1}
  - {type: 'tls:div-end', offset: 10626, content: '', id: KR3ep016_jc_003-d5.d2d51}
  - {type: 'tls:div-start', offset: 10626, content: '', id: KR3ep016_jc_003-d5.d2d52, level: 3, head_text: 陳士美傷寒熱症漏底有發明}
  - {type: 'tls:head', offset: 10626, content: '', id: KR3ep016_jc_003-d5.d2.d52.h1s1}
  - {type: 'tls:div-end', offset: 11090, content: '', id: KR3ep016_jc_003-d5.d2d52}
  - {type: 'tls:div-start', offset: 11090, content: '', id: KR3ep016_jc_003-d5.d2d53, level: 3, head_text: 程松逸兄酒疸}
  - {type: 'tls:head', offset: 11090, content: '', id: KR3ep016_jc_003-d5.d2.d53.h1s1}
  - {type: 'tls:div-end', offset: 11180, content: '', id: KR3ep016_jc_003-d5.d2d53}
  - {type: 'tls:div-start', offset: 11180, content: '', id: KR3ep016_jc_003-d5.d2d54, level: 3, head_text: 仲諫患跨馬癰有發明}
  - {type: 'tls:head', offset: 11180, content: '', id: KR3ep016_jc_003-d5.d2.d54.h1s1}
  - {type: 'tls:div-end', offset: 11668, content: '', id: KR3ep016_jc_003-d5.d2d54}
  - {type: 'tls:div-start', offset: 11668, content: '', id: KR3ep016_jc_003-d5.d2d55, level: 3, head_text: 一婦咳嗽痰中有紅}
  - {type: 'tls:head', offset: 11668, content: '', id: KR3ep016_jc_003-d5.d2.d55.h1s1}
  - {type: 'tls:div-end', offset: 11850, content: '', id: KR3ep016_jc_003-d5.d2d55}
  - {type: 'tls:div-start', offset: 11850, content: '', id: KR3ep016_jc_003-d5.d2d56, level: 3, head_text: 族侄春溫鼻衄寒戰}
  - {type: 'tls:head', offset: 11850, content: '', id: KR3ep016_jc_003-d5.d2.d56.h1s1}
  - {type: 'tls:div-end', offset: 12030, content: '', id: KR3ep016_jc_003-d5.d2d56}
  - {type: 'tls:div-start', offset: 12030, content: '', id: KR3ep016_jc_003-d5.d2d57, level: 3, head_text: 汪氏婦腹脹如斗}
  - {type: 'tls:head', offset: 12030, content: '', id: KR3ep016_jc_003-d5.d2.d57.h1s1}
  - {type: 'tls:div-end', offset: 12273, content: '', id: KR3ep016_jc_003-d5.d2d57}
  - {type: 'tls:div-start', offset: 12273, content: '', id: KR3ep016_jc_003-d5.d2d58, level: 3, head_text: 仲登陽症似陰有發明}
  - {type: 'tls:head', offset: 12273, content: '', id: KR3ep016_jc_003-d5.d2.d58.h1s1}
  - {type: 'tls:div-end', offset: 12910, content: '', id: KR3ep016_jc_003-d5.d2d58}
  - {type: 'tls:div-start', offset: 12910, content: '', id: KR3ep016_jc_003-d5.d2d59, level: 3, head_text: 汪希明性躁痰火咳嗽吐紅}
  - {type: 'tls:head', offset: 12910, content: '', id: KR3ep016_jc_003-d5.d2.d59.h1s1}
  - {type: 'tls:div-end', offset: 13299, content: '', id: KR3ep016_jc_003-d5.d2d59}
  - {type: 'tls:div-start', offset: 13299, content: '', id: KR3ep016_jc_003-d5.d2d60, level: 3, head_text: 祝弘吾潮熱咳嗽汗流不止}
  - {type: 'tls:head', offset: 13299, content: '', id: KR3ep016_jc_003-d5.d2.d60.h1s1}
  - {type: 'tls:div-end', offset: 13609, content: '', id: KR3ep016_jc_003-d5.d2d60}
  - {type: 'tls:div-start', offset: 13609, content: '', id: KR3ep016_jc_003-d5.d2d61, level: 3, head_text: 汪宥翁老年勞倦感冒胸膈大熱而痞}
