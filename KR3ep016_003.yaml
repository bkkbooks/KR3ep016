  - {type: 'tls:div-end', offset: 14643, content: '', id: KR3ep016_jc_003-d5.d2d66}
  - {type: 'tls:div-start', offset: 14643, content: '', id: KR3ep016_jc_003-d5.d2d67, level: 3, head_text: 張雲門令郎囊癰}
  - {type: 'tls:head', offset: 14643, content: '', id: KR3ep016_jc_003-d5.d2.d67.h1s1}
  - {type: 'tls:div-end', offset: 15071, content: '', id: KR3ep016_jc_003-d5.d2d67}
  - {type: 'tls:div-start', offset: 15071, content: '', id: KR3ep016_jc_003-d5.d2d68, level: 3, head_text: 朱宅內眷懷妊受驚而成子懸有發明}
