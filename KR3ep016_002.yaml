body:
  text: 卷二三吳治驗王文川令郎內傷發黃有發明王文川令郎原傷飲食又傷於冷菱等物遍身發黃眼如金色夜發熱天明則退腹痛手不可近號叫通宵市醫因其黃而曰胡苩真矣衆議以草頭藥進豫至急止之曰向以草藥幾誤其母復欲誤其子乎蓋脾胃喜溫惡寒且此症乃食積釀成而黃為濕熱所致法當健脾用溫暖之劑下之濕熱去而黃自退草頭藥性多寒用之是損脾土而益其疾也可用哉即以保和丸一錢入備急丸五分作一次服之少頃瀉一次又少頃連下三次積物所下甚多腹痛盡止再與調中丸服一月不但一身之黃盡退而步履輕捷如飛其父喜曰神不誤我問其故曰始議進草頭藥者十九而孫君獨叱其非余不能決而決於神神允孫君服果有效而吳我峰小樓等曰亦孫君之藥神爾設無孫君神雖靈何所顯哉衆拊掌而噱施涇陽先生內人痰火施涇陽先生內人年五十八左脅有痰飲每升至咽間即脹悶不知人事遍身皆脹不能臥小水赤診其脈兩寸關洪滑六部皆數豫謂此痰火症也痰生熱熱生風故每發人事不知爾乃與牛黃清心涼膈丸同黑虎丹服之夜遂得睡人事亦安靜再以二陳湯加滑石竹茹鬱金薄荷黃芩前胡加燈心生薑煎服全安矣屠侍軒尊眷産昏憒不知人事屠侍軒尊眷産一日而觸於怒大便泄瀉昏憒不省人事大熱氣促汗多衆醫謂産後脈不宜大今脈大左手散亂又汗出喘促法在不治豫曰固然書云醫而不起者有矣未有不藥而起者也且不藥而視其死與藥而或可圖生者孰優豫試之亟與人參五錢白朮三錢炙甘草一錢五分炮姜二錢肉果六分五味子七分煎服其夜遂稍睡豫竅喜補而得睡其陰陽和矣次早脈果稍收斂喘促亦緩大便前半夜瀉三次五更啜粥半盂小便通利大有生意也再以人參阿膠固元氣定喘為君白朮炮姜補脾為臣澤蘭葉退産後之熱五味子斂神止汗肉果止瀉為佐甘草和中為使五帖而安屠學恆乃眷産後作瀉屠學恆先生乃眷以産後缺補養而精神疲困脾胃亦弱腹中間作痛作瀉脈兩手皆濡軟無力以六君子湯加藿香砂仁香附蒼朮澤瀉調理而安周鑑泉令政傷寒譫語周鑑泉令政病傷寒發熱譫語口渴咳嗽胸膈痛泄瀉嘔吐遍身發斑診之六脈洪滑豫曰此少陽陽明合病之症勢亦重矣急以升麻葛根湯加滑石五味子進之服後汗大出下午即退涼而譫語止晚進柴苓湯加五味子滑石其夜瀉止神思始清次日左脈已和右脈亦稍收斂豫喜曰可無恙也改用白芍藥為君陳皮柴胡酒芩五味子牡蠣滑石茯苓澤瀉白朮服四帖而痊可臧顧渚老先生兩耳焮癢大國博臧顧渚先生病兩耳焮癢唇燥舌乾咳嗽吐濃痰脈左稍浮弦右洪滑此胃中痰火流入肺經鬱積久而生熱生風也先以總管丸導其痰又與黑虎丹祛其風熱繼以天花粉薄荷鬱金葛根白藥子甘草黃連連翹蟬蛻煎服而安王南岡咳嗽氣湧王南岡咳嗽氣湧不能伏枕吐痰不已下午微熱胸膈膨脹不知飽餓口乾舌上白苔厚小水短少大便裡急後重間有紫黑血脈右關洪滑左手澀據脈症胃中有瘀血痰積而肺氣亦虛也法當先補而後瀉以人參白朮白芍藥柴胡黃連陳皮半夏五味子桔梗與三帖後察其肺脈已旺乃與總管丸下之去黑血屑極多諸症悉減再與紅六神丸調理而痊張桃津乃政小産後臍下痛張桃津乃政原有小便癃閉之症又小産後三日臍下作疼夜分發熱口渴大便溏日三四度先與補中益氣湯加玄胡索澤蘭葉牡丹皮服之連進三帖大便實矣惟小便頻數滴滴不斷一日夜二十餘次夜分尤多精神甚憊脈雖五至不甚充指此血虛有熱而氣亦滯也濕熱在氣分故口中渴血虛故臍下痛法當峻補其陰而淡滲其陽以熟地黃三錢黃柏一錢補陰為君萆薢去濕熱為臣瞿麥穗澤瀉淡滲為佐烏藥調氣甘草為使服下臍痛全止小便其夜亦不起連進三帖病脫然矣陳光祿五更胸膈飽脹陳光祿松巒翁長厚君子也而存心博愛常五更胸膈脹疼三吳名家遍延而治寒熱溫涼藥味備嘗竟無一效禮豫診之右寸軟弱左平兩尺亦弱豫曰此肺腎二經之不足也補而斂之可無恙矣以補骨脂山茱萸人參各三兩鹿角膠鹿角霜各五兩杜仲巴戟白茯苓車前子各一兩五錢乾山藥二兩鹿角膠酒化為丸空心淡鹽湯送下又以御米殼去筋膜蜜水炒三兩訶子麵煨去核一兩陳皮一兩半煉蜜為丸五更枕上白湯送下一錢服一月病不再發翁由是交豫極歡也及見豫玄珠稿大稱快語曰醫家凡得一方輒自祕以為高君獨欲公諸人是有意於壽蒼生者亟付剞劂豫當助梓因手録豫百餘方制丸散以施而亦無人德我之望溧水令君夫人五更倒飽泄瀉溧水令君吳湧瀾公尊夫人每五更倒飽必瀉一次腹常作脹間亦痛脈兩手寸關洪滑兩尺沉伏豫曰此腸胃中有食積痰飲也乃與總管丸三錢生薑湯送下大便雖行不甚順利又以神授香連丸和之外用滑石甘草木香枳殼山楂陳白白芍藥酒連調理而安李悅齊夫人腹痛譫語如狂鼻衄有發明李悅齊先生夫人胸脅大腹作痛譫語如狂寅卯辰三時稍輕午後及夜痛甚晝夜不睡飲食不進者十八日究其故原有痰火與頭疼牙疼之疾又困經行三日後頭疼發寒熱醫以瘧治因大惡熱三四人交扇之而兩手浸冷水中口噙水而不咽鼻有微衄又常自悲自哭目以多哭而腫痛時即壁上亦欲飛去劇則咬人小水直下不固喉梗梗吞藥不下脈則左弦數右關洪滑豫曰此熱入血室症也誤服治瘧剛燥之劑而動痰火以致標本交作諸人尤謂熱入血室當夜間譫語如狂如見鬼何至胸脅痛劇咬人也豫曰仲景云經水適來適止得疾皆作熱入血室治之治同少陽而以小柴胡湯為主加涼血活血之藥此古人成法可守也痛極咬人者乃胃虛蟲行求食而不得故喉中梗梗然也即以小柴胡湯加桃仁丹皮而譫語減次日以安蛔湯與服而疼隨止飲食進遂駸駸有生意吳仲峰脾泄吳仲峰先生邀豫診時為仲秋初二日也六部皆沉微而左尤甚隱隱又如蛛絲之細症則原以腸風去血過服寒涼致傷脾胃自春至秋脾泄不愈日夜十二三行面色黃白帶青兩頤浮腫四肢亦浮小水不能獨利利必與大便並行腸鳴四肢冷口不渴飲食大減口唇齦肉皆白其為人也多憂思夫四肢者脾之所主清冷為陽氣不充兩頤乃腎經部位浮腫益見腎氣之不足也脈沉微與面色黃腫皆屬於濕書云諸濕腫滿皆屬脾土合脈症觀之由脾虛不運積濕而然虛寒明矣病至此勢亦甚危第形症相符色脈相應又能受補庶幾可生也法當大溫補升提以東垣益胃升陽滲濕湯加減調理人參三錢白朮五錢黃耆二錢茯苓益智仁蒼朮澤瀉各一錢大附子五分炮薑炙甘草升麻防風各五分連服八帖諸症悉減乃囑之曰病雖暫愈宜戒生冷憂思庶服藥有效切勿輕犯犯之非藥石可回也翁曰諾敢不唯命張後溪令孫瘡疥發腫張後溪先生令孫遍身疥瘡浮腫腫自足背起漸腫上大腿今且至腹大便泄瀉發熱不得安寢此風濕之症當令與時違之候治從開鬼門潔淨府二法使清陽升則瀉可止小水利則浮腫可消上下分去其濕之意也蒼朮一錢薏苡仁桑白皮各三錢青蒿防風升麻柴胡各五錢大腹皮五加皮赤茯苓澤瀉各六分八帖全安張五橋夫人喘嗽府佐張五橋先生夫人患喘嗽夜分氣壅不能仰臥體素弱脈右滑大左細弱每咳嗽必連連數十聲痰不易出甚至作吐以東垣人參平肺散加減治之四日而愈人參桑白皮地骨皮青皮茯苓五味子知母滑石麥芽天麻粳米甘草水煎服夜與白丸子方東野脊骨痛牽引胸腹皆痛方東野患脊骨痛牽引胸腹皆疼舌上黃苔甚厚脈沉滑而數先以川芎羌活炙甘草蒼朮薑黃防風藁本枳殼桔梗柴胡服之服後背脊痛減腹仍痛與木香檳榔薑黃香附青皮酒連大栝蔞柴胡川芎服之腹痛稍減腰疼甚知其痰積下行欲去而不能也即以木香檳榔丸下之連行三四次舌上黃苔始退腹痛全止脈亦軟弱改以人參當歸白芍甘草茯苓陳皮白芥子香附柴胡青皮白朮調理而安張淨宇發熱腹痛泄瀉嘔吐張淨宇文學發熱腹疼泄瀉口渴嘔吐不止時師有認寒者有認熱者有認傷食者豫至診之曰此時疫瀉也以二陳湯倍白朮加青蒿葛根酒芩白芍藥豬苓澤瀉滑石一劑而安張近川胃脘痛張一尹近川翁始以內傷外感過服發散消導之劑致胃脘當心而痛六脈皆弦而弱此法當補而斂之也白芍藥酒炒五錢炙甘草三錢桂枝一錢半香附一錢大棗三枚飴糖一合煎服一帖而瘳閔文川公肛生一毒膿潰不收口閔文川先生肛上生一腫毒月餘膿潰矣但稍動則出鮮血不止大便結燥胸膈飽脹飲食不思脈兩寸短弱關弦尺洪滑此氣虛血熱陷於下部法宜補而升提也者不然痔漏將作可慮也黃耆二錢歸身地榆槐花枳殼各一錢升麻秦艽各七分荊芥穗五分甘草三分服後胸膈寬惟口苦甚前方加酒連連翹各五分而愈李古愚胸膈飽悶大便溏泄李古愚先生每食後即大便腹皮稍脹急胸膈飽悶醫與參朮則痞悶愈甚小水清而長豫脈之左寸澀右寸滑按之如黃豆大且鼓指關尺之脈皆弦小左尺脈迢迢有神氣據脈乃積痰鬱滯於肺莫能出以致大便之氣不固也法當效丹溪治乃叔用吐吐去上焦痰積而大便自實矣先用苦梗蘿蔔子各三錢白豆仁橘紅山梔仁各一錢川芎五分生薑三片蔥三根水煎服之取吐服後半小時許噁心吐出清痰噁心之勢雖有乃痰積膠固猶不易出又以蘿蔔子一合擂漿水加蜂蜜與半碗飲之始吐出膠痰二碗余平日每小水則大便並行吐後小水始能獨利連行三四次而胸腹寬舒初亦以吐為懼至是豁然稱快大便五日不行始以豫言為不謬也再以二陳湯加白朮旋覆花麥芽調理而全可矣姚惠齊夜多泄瀉姚惠齊先生夜多泄瀉瀉必三五次甚且十數次小腹時作疼按亦疼口不渴小便長醫半年不愈豫診之左寸滑餘五部皆濡弱此陽氣大虛虛中有寒也治當溫補下元兼之升舉人參一錢半黃耆白朮各二錢白芍藥酒炒三錢大附子五分肉桂一錢杜仲補骨脂各一錢半升麻防風各七分薑棗煎服其夜大便減半次早雖瀉俱是白積如生豆汁狀小腹痛止再診之右脈稍起連服四帖而瘳翁喜言曰抱病半年藥無虛日今收功於四劑何速哉認病真而投劑確也敢不銘心姚老夫人右手疼大京兆姚畫老夫人年幾七十右手疼不能上頭醫者皆以痛風治不效益加口渴煩躁請豫診之右手脈浮滑左平豫謂此濕痰生熱熱生風也治宜代痰清熱兼流動經絡可瘳也二陳湯倍加威靈仙酒芩白殭蠶秦艽四劑而病去如脫一僕時疫頭痛發熱一僕發熱頭疼口渴腹疼小便赤大便瀉日夜不睡者六日豫診之曰據脈汗後浮數熱尚不減乃疫症也以滑石三錢青蒿葛根白芷片芩各一錢半炙甘草升麻各五分一帖即得睡熱減大半頭痛全除惟小水赤頭暈腳膝無力此病後血虛之故以四物湯加青蒿酒芩薏苡仁服之而安一僕時疫頭痛如破一僕病與前類而身如火爍頭痛如破大便不瀉小水赤口渴鼻乾不得眠胸膈膨脹腹飢不能食六脈弦而數用竹葉石膏湯加知母枳殼白芷葛根大加青蒿一帖而熱痛減半胸膈亦寬惟口渴小水短澀睡臥不安又與化瘟丹三錢井水化下渴止稍得睡頭暈腳軟喘急與四物湯加青蒿酒芩薏苡仁木瓜服之全安一僕時疫嘔吐煩躁口渴一僕之病亦前相似以服丘一齊藥而大吐大瀉熱益增頭痛莫能當煩躁口渴鼻乾嘔吐小水短澀寢食廢者十四日勢甚危急詢前所服藥乃藿香正氣散加砂仁厚朴山楂大耗元氣之味且五月火令當權之疫當以甘寒之劑治之何可以辛熱香竄者益其火而枯其津也其勢危矣此皆不知因時變達惟習常膠故以誤人者用急投人參白虎湯加竹茹葛根青蒿升麻一帖而熱除再帖而頭痛止諸症盡去後連治數人多如此類何也此無行之疫故一方見之治多先以甘寒清解之劑投之熱退即以四物湯以補陰血稍加清熱之劑而青蒿之功居多此固一時自得之愚用録之以告同志者使知治法當隨時俗為變而常套不可不脫也馬鳳陽咳嗽內熱馬鳳陽文學五月患咳嗽內熱額上多汗惡風脈左弦數右滑數豫曰據弦數為陰虛滑為有痰不亟調治恐成虛怯以白芍藥川歸茯苓五味子白朮甘草陳皮貝母天花粉酒芩麥冬知母桑白皮十帖諸症皆瘳七月復瘧間日一發寒熱相半寒熱亦俱極渴甚上身汗多以石膏五錢人參黃耆白芍藥麥冬知母二錢柴胡三錢桂枝甘草陳皮貝母各一錢竹葉三十片一帖而愈倪二南內人小水不禁倪二南先生內人小水不禁一日二十餘起脈右寸洪而有力左寸虛右尺沉微此心腎不交之症也以當歸遠志丹參牡丹皮桑螵蛸人參山茱萸益智仁黃柏知母為丸服之五日為安後凡遇辛苦則發以此服之立效嚴柱史令媳腹中有塊疼痛柱史嚴印老長媳少司空沈鏡老女也患腹痛有小塊纍纍然腹覺冷甚兩寸關皆滑數兩尺皆沉微此脾氣弱而飲食不消又當秋令濕淫之候不利亦瀉宜預防與白朮蒼朮茯苓甘草白豆仁木香半夏陳皮澤瀉煎服其夜果瀉一度次早又瀉一度小腹仍疼不少減且裡急後重蓋其稟賦素虛當補中兼消兼利白芍藥三錢桂心一錢甘草人參茯苓澤瀉陳皮白朮各八分升麻葛根各六分服後脈皆軟弱不滑纍塊亦消改以人參黃耆白朮白芍藥各二錢炙甘草陳皮澤瀉葛根柴胡茯苓各一錢調理而痊陳鹿塘腸風臟毒大便燥結新市陳鹿塘先生原有腸風臟毒之症大便燥結數日不能一行痛苦殊甚此胃寒腸熱之症其脈兩寸皆數兩關皆弦而無力兩尺洪滑而左尤甚診畢渠告豫曰病數年百醫不效望生難矣聞公治多奇中冀一奇而生之實再造之恩也豫憐其苦而俯想久之因思李東垣有云大腸喜清而惡熱脾胃喜溫而惡寒以胃屬土而大腸屬金也今治腸胃相兼之疾必寒非悽悽熱非灼灼始可乃詳酌一方專以腸風臟毒之藥為君主外以養血之劑裹之使不傷胃氣蓋藥先入胃而後傳入大腸入胃時裹藥未化及入大腸則裹藥化而君藥始見庶幾兩不相妨亦假道滅虢之策也因以大黃酒浸九蒸九曬者二兩槐花三兩木耳二兩郁李仁皂角子象牙屑條芩各一兩血餘灰升麻荊芥穗各五錢為末煉蜜為丸赤豆大外以四物湯加蒲黃各一兩為衣米湯送下空必及下午各服二錢服此果然血止而大便不燥飲食日加鹿塘大喜曰古稱用藥如用兵奇正相生鮮有不克敵者其公之謂乎張道南內人腹痛張道南先生內人以飲食忤於氣因腹痛不飲食五日矣逆豫診之兩寸關弦尺滑豫曰此上焦氣虛下有鬱滯也以薑黃青皮為君山楂檳榔當歸杏仁烏藥枳殼為臣柴胡木香為佐吳茱萸為使服後氣稍順然後用蔥二斤前湯浴洗腰腹即將熟蔥擦摩腰腹使氣通透洗畢即安臥少頃其夜大便通先下皆黑硬結塊後皆水此積滯行而正氣虛也以建中湯加山楂茯苓澤瀉柴胡香附姜連調攝之而痊張道南尊堂膈上痰飲痞而噁心張道南先生尊堂老婦人以勞倦致早晨膈上有痰痞而噁心每食熱物目中即出淚脈右寸關皆滑左寸短弱此心血不足而肺胃有痰也以六君子湯加麥芽白豆仁旋覆花治之而愈馬迪庵內人奇痰症馬迪庵先生內人原以飲食過傷又為風寒外襲以內傷外感治之後復至五更發熱唇燥胸中衝跳不已手足皆冷脈兩寸俱滑數豫謂此奇痰症也以小陷胸湯加白芍藥蘿蔔子前胡酒芩二帖次早大便行下蛔蟲八條胸中即不沖跳但覺力怯再診之兩寸減半尺脈稍起以二陳湯加白朮白芍藥酒芩調理後四帖加當歸而痊愈董老夫人眩暈大宗伯董潯老夫人常眩暈手指及肢節作脹脈右寸軟弱關滑左脈弦長直上魚際兩尺皆弱此亢而不下之脈難經所謂木行乘金之候也總由未生育而肝經之血未破爾內經云諸風掉眩皆屬肝木兼有痰火治當養金平木培土化痰以白朮半夏天麻湯正與此對服兩帖而眩暈平再與六君子湯加天麻白殭蠶以治其暈加白芍藥以瀉肝麥門冬人參以補肺金麥芽枳實神麯蒼朮以健脾使宿痰去而新痰不生少用黃柏二分為使引熱下行令不再發張裕齊惡寒發厄張裕齊惡寒痰多作厄胸膈不寬兩寸俱短弱關洪大尺澀此上焦氣虛中焦有痰下元不實也法當清中補下不然後將有中風之患二陳湯加白蔻仁香附藿香以開胃氣白芥子蘿蔔子杏仁以降痰而潤大便兩帖諸症悉去乃録八味腎氣丸方與之令自調理嚴老夫人胸膈痞悶大柱史嚴印臺夫人年近六十已孀居十年餘以孀居而食長素其壻張懷赤善豫語曰外母近鼻塞大便瀉胸膈不暢醫者下之益甚豫曰王海藏有云雜病酒積下之早必成痞滿所當慎也用拉豫診之兩寸沉弱關弦大兩尺亦弱豫曰此陽氣其弱脾氣大虛不當下而誤下之故鼻作塞而胸痞悶也用蒼朮川芎桂枝白芷防風桔梗以疏風而升陽氣白蔻仁蘿蔔子寬胸利膈麥芽以助脾氣服後鼻不塞而胸猶痞復用東垣木香化滯湯加吳茱萸乾薑而安乃囑之曰病雖漸愈第陽氣虛脾氣弱不宜久食素恐中氣不充防作中滿謹識之謹識之王谷泉頭眩泄瀉汗出不止王谷泉大便作瀉上身熱耳中壅塞頭眩暈胸膈不寬口渴痰多咳嗽六脈俱濡弱汗大出此正氣大虛或由克伐太過所致當以補養為先人參白朮白芍藥酒炒各四錢柴胡石菖蒲陳皮各一錢炙甘草五分澤瀉茯苓各一錢兩服而神清膈寬脾健惟汗不斂眩暈未除再與人參白朮黃耆酒炒白芍藥各二錢炙甘草五分大附子五分桂枝三分澤瀉一錢而愈方東野兩脅痛方東野兩脅痛上壅至胸發熱飲食不進脈左手沉而弦數乃積氣也右手滑痰飲也關脈濡弱脾氣不充也據症或觸於怒故痛之暴耳治當先去積熱消痰氣然後用補栝蔞仁六錢枳殼姜連半夏各一錢半白芥子一錢牡蠣二錢炙甘草五分柴胡一錢五分二帖諸症盡去飲食進矣然恐其復發也與當歸龍薈丸使行之以刈其根服下果行兩次一婦懷孕內熱咳嗽一婦人懷妊七月內熱咳嗽胸膈飽悶以條芩二錢栝蔞仁白芍藥紫菀貝母桑白皮各一錢甘草三分枳殼紫蘇梗知母陳皮各七分兩帖而愈一婦心痛唇紅蟲痛症一婦人心痛唇紅痛則大發熱頭疼少頃出汗脈大小不一豫曰此蟲痛之症痛吐白沫可徵也檳榔川椒各二錢杏仁一錢五分石菖蒲一錢烏梅七個炮薑草豆仁陳皮各五分山梔仁一錢一進而痛減半再進而痛全除倪二南內人小産小腹痛暈厥倪二南內人小産後小腹痛夜分作熱作暈豫曰此氣血虛而惡露未盡也川芎一錢半當歸三錢澤蘭益母草香附丹參各一錢人參七分荊芥穗五分山楂桂皮各一錢一帖而小腹痛止再帖而熱暈悉除倪少南右頰車浮腫疼痛倪少南右頰車浮腫而疼直衝太陽大發寒熱兩手寸關俱洪大有力此陽明經風熱交扇所致以軟石膏三錢白芷升麻各一錢葛根二錢生熟甘草各一錢薄荷山梔子牡丹皮連翹各七分天花粉貫衆各一錢半兩帖腫痛全消倪少南內人經行如崩頭暈倪少南內人行經如崩勢不可遏頭暈眼花脈右寸極軟弱左近快此氣虛血熱之候由氣虛而血不固也仲景云血脫益氣特用人參黃耆各三錢白朮二錢粉草五分荊芥穗蒲黃側柏葉薑炭各一錢三帖全瘳高仰山內人痔血裡急後重高仰山內人痔血裡急後重飲良入腹大便即行晝夜行五六度五更咳嗽喉中痰響肌肉脫口作渴由服痔科涼血之藥過多致脾虛不能統血也脈六部皆軟弱無力以四君子湯加荊芥穗秦艽陳皮炮姜四帖而飲食進血全止嗽定而睡寧後減炮姜倍加何首烏又四帖而數年不發矣姚娘子小腹疼姚娘子小腹疼飲食及藥入腹皆疼疼來遍身無力此由血崩而致宜急治之人參黃耆各二錢白朮一錢茯苓陳皮各八分白芍藥貫衆各一錢薑炭荊芥穗蓮蓬殼燒炭各三分煎服而安張五橋先生令政痰喘咳嗽張五橋先生令政鄭都諫春寰公令姊也痰喘不能伏枕且咳嗽甚則吐痰涎碗余乃止以旋覆花湯為主治之旋覆花紫蘇子各一錢半夏一錢五分厚朴桂皮粉草各三分茯苓陳皮桑白皮葶藶子各八分姜三片水煎服臨臥以養正丹二十粒白湯送下兩帖痰嗽喘各減十之七乃去葶藶子加白芥子蘿蔔子二帖而痊徐文學三泉令郎右脅脹痛徐文學三泉令郎每下午發熱直至天明夜熱更甚右脅脹痛咳嗽吊疼坐臥俱疼醫以瘧治罔效延及二十餘日熱不有退後醫謂為虛熱投以參朮為主痛益增逆豫診之左弦大右滑大搏指豫曰內經云左右者陰陽之道路據脈肝膽之火為痰所凝必勉強作文過思不決木火之性不得通達鬱而為疼夜甚者肝邪實也初治只當能調肝氣一劑可瘳誤以為瘧燥動其火補以參朮閉塞其氣書云體若燔炭汗出而散今汗不出舌上之胎已沉香色熱之極矣設不急治立見凶危乃以仲景小陷胸湯為主大栝蔞一兩黃連三錢半夏曲二錢前胡青皮各一錢水煎飲之夜服當歸龍薈丸微下之諸公猶爭之曰病久而食不進精神狼狽若此寧可下乎豫曰經云肝常有餘且脈亦為有餘故有餘者瀉之前時誤認為虛投補左矣豈容再誤哉服後夜半痛止熱退兩帖全安王祖泉乃眷遍身痛王祖泉乃眷朝飯後稍寒惡風發熱遍身疼痛汗大出不止口中熱腹中不知餓小水短六脈皆澀以白芍藥五錢白朮二錢桂皮黃芩各一錢甘草八分二帖而汗止寒熱除減去白朮加當歸而遍身痛止費少垣乃眷孕痰喘胎逆費少垣乃眷妊已九月痰多喘嗽胎氣上逆眼撐不起兩太陽微疼豫曰此子懸症兼痰火也以大紫蘇飲為主才服一帖逆即不逆胸膈頓寬惟喘嗽不止與七制化痰丸而安費一吾令政孕子淋費一吾先生令政妊已四月夜不能睡小便淋痛痰嗽內熱脈右關滑左寸微弱兩手皆數與橘紅貝母片芩黃連茯苓澤瀉枳殼蘇梗前胡水煎服之其夜即能安寢次日再以四君子湯加當歸香附貝母陳皮條芩紫蘇梗前胡調理足月而産一子六娘子遍身痛汗大出昏昏如醉令弟媳六娘子遍身痛發熱汗大出昏昏如醉臥不能起兩寸脈短弱兩手皆數而無力此勞倦之餘故汗大走也黃耆三錢白芍四錢粉草一錢五分桂皮八分當歸一錢石斛二錢一帖熱除痛汗皆止惟倦而不能起仍以前方加人參陳皮兩帖而痊八娘子頭痛咳嗽痰多有血又八娘子頭痛咳嗽痰多有血夜分發熱喉中常作血腥每經水行必腹中先痛二日用香附牡丹皮滑石甘草桃仁川芎當歸柴胡白芍山梔子茅根八帖而瘳姚辨山內人胸脅痛姚辨山老先生內人自上年十月左足不能履地至十二月産後忽好三日復不能動時常胸脅作痛素多痰火而治者卒以四物湯天麥門冬為主間服獨參湯服將彌年而病如故豫診之兩寸脈俱洪滑而數夜分發熱此係濕痰凝滯補塞太重故遷延不脫乃以二陳湯加蒼朮黃柏威靈仙五加皮生地黃白芥子白芍藥當歸兩帖胸脅痛止熱除再加薏苡仁八帖而足能舉步矣李坦渠令子室咳嗽心痛腰疼李坦渠老先生令子室十月發寒熱起一日一發咳嗽心痛腰亦痛至次年正月十七日始間日一發肌肉大瘦喉疼汗出如雨白帶如注飲食減少百試而汗不止延豫為診其脈右手軟弱左手散亂此汗多而脈不斂病勢至此危之甚矣書云火熱似瘧此病之謂歟以黃耆二錢白芍一錢五分粉草阿膠各一錢鱉甲三錢桂枝五分烏梅一個水煎服其夜汗止次早診之左脈已斂神氣亦回前方加何首烏石斛牡蠣其日寒熱亦不發飲食稍加駸駸然有幽谷回春之象周衡宇咯血痰火作痞太學周衡宇先生吳江瀾溪人大冢宰白川公之令孫也近來咯血色紫胃中痰火素盛壅於胸膈作痞作疼痰與瘀血挾而為熱脈左寸洪大右寸關皆滑兩手盡數此有餘之候總管丸四錢再以滑石桃仁各三錢山楂二錢枳殼梔子貝母紅花丹皮各一錢茅根五錢水煎服之次日大便行三次痰積極多內帶瘀血改以山梔子紫菀丹皮各一錢滑石三錢桃仁一錢五分小薊三錢茅根五錢水煎加童便一酒杯三帖全安張分守腰膝痠痛大參張公分守杭嘉湖道因喪夫人衙中亡者八口心中惶惶因凌繹翁交厚而禮豫為診左寸脈短關弦右關滑兩尺亦弦據脈心血不足中焦有痰流於下部凝於經絡以故腰膝痠疼居常背心作脹頭多眩暈夜睡多汗先時諸醫悉投風劑非所宜也豫以陳皮白芍藥木瓜牛膝五加皮苡仁黃柏酒芩甘草生地當歸威靈仙調理十劑諸症悉愈鄭春寰頭痛內熱大都諫鄭春寰老先生為春元時頭痛內熱入夜尤甚汗出如流通宵不止小水短赤舌上黃苔右脅脹疼先與桂枝白虎湯一帖解其內熱斂去浮汗再與白芥子一錢栝蔞仁四錢枳實薑黃黃連各八分水煎服外與當歸龍薈丸一錢五分下之而脅痛安徐老夫人胸膈痞悶大參徐天目老夫人胸膈痞悶不思飲食咳嗽多痰或時噁心上焦頭目俱不清利向來長素兩寸關滑大如豆兩尺沉微痰火症也二陳湯加酒芩薄荷前胡枳殼蒼朮香附鬱金川芎調理而安張麗川咳嗽多痰糞門發瘻張麗川咳嗽多痰面青潮熱肌瘦性躁而多自用以數考不利悒悒成疾又新婚之後飲食不節脈之右關滑大餘部皆無神氣且糞門已發瘻瘡潰流膿血豫曰此陽病極而下也法在不治果不逾月而亡陳仰山內人小産二月而血大下陳仰山先生內人小産後二月而血大下白沫如注五更泄瀉面虛浮下午身熱口渴面色青黃脈右手豁大近芤左濡弱據此大虛之候血海尚有瘀血不盡以致新血不得歸源稍動氣即下如崩蓋脾乃統血之經虛則不能約束且面浮食少脾虛劇矣急宜溫補勢或可為人參白朮各二錢薑炭粉草各五分茯苓六分香附八分丹參炒過一錢水煎服四帖而瀉止再以人參白朮各二錢茯芩丹參黃耆蒲黃各一錢薑炭澤蘭葉粉草各五分調理痊愈張溪亭乃眷喉中梗梗有肉如炙臠張溪亭乃眷喉中梗梗有肉如炙臠吞之不下吐之不出鼻塞頭暈耳常啾啾不安汗出如雨心驚膽怯不敢出門稍見風即遍身疼小腹時疼小水淋澀而疼脈兩寸皆短兩關滑大右關尤搏指此梅核氣症也以半夏四錢厚朴一錢紫蘇葉一錢五分茯苓一錢三分姜三片水煎食後服每用此湯調理多效張溪亭令媳夢亡過祖母打其背溪亭子室妊已七月夢見亡過祖母揮拳背打一下驚醒即覺胎動不安血已下大小便皆急腰與小腹脹疼者五日此亦事之奇也迓豫為治兩寸脈俱短弱此上焦元氣大虛當驟補之人參阿膠黃耆白朮各二錢當歸白芍條芩杜仲各一錢砂仁香附各五分苧根嫩皮三錢蔥白六錢一劑而血止兩劑諸症悉除而神漸安四帖後減去苧根蔥白調理旬日足月而産一女陳茂之勞倦色欲傷寒陳茂之勞倦之後勉強色欲精竭而血繼至續感風寒發熱頭痛胸膈飽悶始從太陽而傳之少陽胸脅痛而耳聾嘔逆口苦咳嗽六脈俱弦數此少陽症也以小柴胡湯加枳殼桔梗竹茹而嘔逆止熱退因進粥早夏熱口渴小水不利大便一日夜六七次所行皆清水日晡熱甚舌上黃苔昏沉振顫此食夏之候書云渴而小便不利者當先利其小便以豬苓湯為主豬苓澤瀉各二錢滑石三錢赤茯苓一錢柴胡八分升麻木通各五分連進兩帖小便利而大便實但熱不退以六神通解散一帖其夜熱仍不退次早診之左脈不弦數矣兩寸脈虛以故服藥無汗口渴漱水而不欲咽咽熱此邪傳陽明經不急涼血必作鼻衄病勢至此可謂極惡矣投黃芩芍藥湯合生脈散以止嗽渴用葛根湯以解肌熱白芍藥三錢葛根升麻黃芩各一錢人參一錢五分麥冬滑石各三錢甘草五味子各五分烏梅一枚急煎二帖飲之日中大便下燥糞十數枚始得微汗就得睡矣晚進粥一盂夜臥向安陳五山胃脘痛陳五山胃脘疼醫作勞倦治不效又醫作寒氣治而用剛燥痛轉極又醫以巴豆丸下之大瀉皆水亦無積滯之物痛雖稍減然面有虛浮胸痞足腫又張醫以人參白朮各二錢大補脾胃則痰嗽氣逆上膈熱甚喉嚨乾燥右脅不能貼席大便一日二三行因向被巴豆丸瀉起逮今七日猶瀉不止飲食大減延余為治診兩寸濡弱兩關滑兩尺洪大豫曰據症原起於鬱火亂投湯劑大推大搬以致加重若平平治之自當尋愈二陳湯加姜連枳實薑黃桔梗蘿蔔子前胡一帖而熱嗽除右脅亦可貼席再劑而飲食進大便實其晚又為怒氣所加痰嗽脅痛如舊且多煩躁改用橘紅貝母栝蔞茯苓山梔子前胡青皮甘草陳皮蘿蔔子水煎飲之而平吳小峰酒積作痛吳小峰年五十未有子素有酒積作疼晌午即瀉所下多稠黏之物腹痛之疾年已久矣治當清潔中焦分濕熱兼養脾法用白滑石三兩粉草肉果各五錢白芍藥酒炒一兩五錢木香三錢紅曲四錢神麯糊為丸每早晚白湯送下二錢服未竟而積除始舉一子沈大參痰飲痞滿沈大參玉陽老先生中焦有食積痰飲而作痞滯以故大便了而不了間或作脹豫脈之兩寸短弱關滑兩尺沉滑有力豫曰脾胃經有濕痰蘊而為熱但清其中宮使清陽升濁陰降而氣血自旺此不補之補也以二陳湯加枳實酒連酒芩滑石薑黃木香乾葛山楂兩劑而愈王敬泉胸膈飽悶頭暈作吐王敬泉頭暈且痛起則倒僕胸膈脹悶如繩束縛嘔吐而食飲皆不得入六脈俱澀此痰飲挾木火之勢而作暈也先以濟生竹茹湯而吐不止且煩躁發眊發熱再與蘆根湯連進二碗氣眊稍定再以吳茱萸一兩為末以雞子心調塗兩足心引火下行外用二陳湯加薑汁炒黃芩黃連旋覆花枇杷葉丁香白豆仁檳榔柴胡水煎服之服後熱退大便亦行頭暈嘔吐皆止惟胃脘有一塊作痛仍與前藥兩劑而塊亦消張二官傷寒張二官發熱頭痛口渴大便祕結三日未行脈洪大此陽明少陽二經之症用大柴胡湯行三五次所下者皆黑糞夜出臭汗次日清爽惟額上仍熱用白虎湯加葛根天花粉因食粥太早復發熱咳嗽口渴殊甚且噁心用小柴胡加枳實山梔子麥芽次日渴不可當改以白虎湯加麥門冬天花粉外與辰砂益元散以井水調下五錢熱始退渴始定不虞夜睡失蓋復受寒邪天明又大發熱不知人事急用小柴胡湯加升麻葛根前胡薄荷進之而汗出熱退神思大瘁四肢皆冷語言懶倦且咳嗽以生脈散加石斛百合大棗白芍藥服後咳嗽尋止精神日加飲食進而向安矣大司馬令媳産後暈厥發狂有發明大司馬潘印川第三令子室尚書蔣公孫女也年二十五體素弱語言端謹因難産傷力繼以生女拂意後又女死悲戚即時暈厥醒而神思咪昧手足瘛瘲目作上視豫更後始至因瘛瘲不能診脈細詢之自女落地惡露絶無比有女醫在旁乃昔所親信者時與人參大嚼及獨參湯並粥亂進參與粥皆壅塞膈上不下以故神昏瘛瘲不已也豫教以手於喉中探而吐之喜其隨手吐出痰飲粥藥盈盆瘛瘲方定乃與川芎山楂澤蘭葉陳皮半夏茯苓香附進之稍得睡豫亦出中堂就寢不虞女醫又私與補藥二帖子丑時陡然狂亂如降神之狀口中亂語云我是觀音大士降壇所言皆儒雅官話問答如流聲甚壯厲殊無産後不足之態生平不諳漢聲至是出語如生成者人皆異之目為神附禳禱百般豫獨諍之語諸左右曰此惡露不盡乃蓄血如見鬼之症非真有神佛相附也徐以正言叱之即緘默繼以清魂散加滑石童便與之至天明小水乃行狂亂皆定逮豫出房少頃詎知女醫意欲要功又不知與何藥服之少刻狂亂如前再與川芎一錢五分當歸四錢澤蘭葉益母草各一錢臨服加童便連飲二帖不效豫逆思之胸中必有餘痰作滯前劑中無佐使之品故藥力不行也即用前劑大加山楂與之惡露稍行神思即靜嗣後稍睡少時手足微動或自以手掌其面或自以手捶其胸昏亂不息診其脈近虛早間面紅而光申酉時面色白此血行火退故脈虛而當補矣與人參川芎澤蘭葉各一錢當歸山楂各二錢茯苓陳皮各八分卷荷葉一片煎熟調琥珀末子五分服下半時許噯氣二聲豫喜曰此清陽升而濁陰降矣自茲安靜夜中惡露行大便亦利乃索粥飲問其昨日漢聲何來答曰不知也諸君始信蓄血如見鬼之言為不誣昔秦越人有言曰病有六不治信巫不信醫一不治也古稱用藥如用兵以郭子儀之英明而以魚朝恩監之便不成功豫固非郭令公之儔彼女醫之誤則又有過於魚朝恩矣噫寧不慎哉孝廉臧茗泉瘧後作痢孝廉臧茗泉老先生脈左弦數右寸弱關大重則滑右尺微原以瘧後復傷飲食大便瀉而變痢一日夜雖只五六行皆積滯無糞腹疼後重難安午未後發熱至天明始退此夏傷於暑而秋為瘧痢也其熱仍瘧之餘邪當先解散然後以補劑投之則大便自愈矣與神授香連丸一服服訖腹中腸鳴須臾大便行且較前更多方有糞下改以白芍藥四錢澤瀉黃連各一錢滑石二錢粉草桂皮木香各四分山楂七分兩日後乃與補中益氣湯加木香黃連白芍藥調理半月潮熱大便皆愈包繼可先生令眷孕而發瘧包繼可先生令眷孕三月而瘧疾發先寒後熱胸膈大脹疼口渴湯水入即吐譫語無汗胎氣上衝而成子懸脈皆弦大以川芎柴胡黃芩知母甘草橘紅紫蘇枳殼砂仁水煎服之吐止痛除一張氏婦心神不足肺經有痰一張氏婦年才二十一其夫延余診之左寸關短弱尺滑右寸亦滑關濡弱尺沉微診畢問豫曰脈何如豫曰心神脾志皆大不足肺經有痰夫曰不然乃有身也豫曰左寸短弱如此安得有孕夫曰已七十日矣豫俯思久之問渠曰曾經孕育否夫曰已經二次今乃三也豫問二産皆足月否男耶女也夫曰實不敢諱始産僅九個月手足面目完全而水火不分臠肉一片生下亦無啼聲抱起已身冷矣細檢之乃知其無水火也次亦九個月産下又無啼聲看時口中無舌二胎之異不知何故聞先生能細心察人之病特祈審之豫方悟前二胎之不完者由心脾二經不足所致也今左寸右關之脈可見矣乃為籌思一方專以補心血為主令其多服以百帖為率酸棗仁遠志茯神各一錢白朮二錢白芍藥當歸枸杞子各一錢五分甘草五分生地黃八分艾絮二分龍眼肉五枚水煎服足月而産一子次年又有身不以前事為意至九個月産下形體俱具外有脂膜一片包其面耳目口鼻不見但不能去此脂膜産下即歿因思上年之子為藥之力也因豫久不至苕其家以豫方黏於壁間一覺有身即照方服之後生二子一女里中以此方為補天手云吳比部公子眼病有發明癸巳仲夏吳比部鳳麓父母以次君弦臺先生眼目紅痛恐學道按臨速於取效乃聽眼科罄寒涼而治兩越月無驗又眼科視之曰目疾不宜多用寒涼恐冰其血以人參五錢枸杞子一兩悉溫補之劑凡用人參枸杞子五六斤矣目腫如桃絶不能開又專科語之曰紅腫而痛明是熱症誤服溫補反助其熱寧不益腫顧其勢即百寒涼亦不易瘳捷徑無如用下此釜底抽薪法也弦臺惟其速效一聽下之用大黃芒硝枳殼作大劑下五六次而飲食日減噁心畏風則不能出房門矣又專門謂前劑缺當大瀉之後正合補也又聽補之一補而目腫如舊又有眼師云目疾熱症多寒症少只當滋補腎水水升則火自降火降而目疾斯愈矣用是以滋陰降火之劑為恃才數服而精滑不禁一夜夢遺一二次神氣大脫投補則目腫痛用降則精元滑脫屢試屢如是諸醫無策悉謝而退乃修書命使自淮陰之海陽懇祝令君介紹徵豫為治豫始以遠為懼祝再四為渠言豫亦素為渠重義不得以遠為辭乃解行李嚮往至即診之左寸脈甚短右寸大而無力左關弦弱右滑兩尺亦滑豫見其坐在幔中略不敢見風問其日食幾何答曰三次計二碗許葷腥絶不能用豫曰夜臥安否答曰邇來甚苦於睡才合目即夢魘可畏或被虎蛇交咬或有鬼來勾攝或落橋墜井或與人爭門而負猛然驚悟冷汗淋淋四肢癱軟不能動憚少頃乃定今幸公不遠千里而臨足徵素雅豫曰足下始無大恙只緣大推大搬以致狼狽若是彼專科者不足恃也經謂五臟精華皆上注於目今專科局局然守其死法安知五臟盈虛陰陽消長隨時出入哉以愚管見但平平治之易與耳據足下之脈心神脾志互相不足肝膽之火鬱而不散致生目痹今為補養心脾壯其神志則飲食日加寢臥安穩而精元有守神水盈溢何目痹之不愈哉弦臺曰善惟先生命劑乃以歸脾湯減去黃耆木香加丹參而補心脾以大安丸專助脾胃而磨穀食俾新痰不生則氣血可繼日而旺矣後五日而飲食加十日而夢魘少尋能出戶不畏風日半月而肌肉生目可觀奕津津然而有萬全之兆不虞專門張氏子復至以白眼藥日頻點之一日凡七八次後此復不能開臉肉風粟生滿適豫有南都之往卒為所誤後幸有李少塘打去風粟眼始能開李雖手法精熟然於軒岐閫奧尚亦未窺藩籬豫後自南都至見左目雖愈右目終成內障豫故曰彼專科者不足恃也豈虛語哉丘太守令侄筋痿有發明丘太守鎮山翁令侄淮陰人也丁年患兩手筋攣指掉不能屈伸臂肉瘦削體瘠面白寢食大減市中諸友調治不驗乃任京口諸名家療之半年肉更消色更瘁聞豫在吳比部衙中敦豫為治診其脈六部俱弦重按稍快診竟扣其受病之源太守公曰自上年冬底偶發寒熱筋骨疼痛逮於仲春寒熱雖退而筋骨之疼不減服藥無虛日甚之日三四進肉漸消去指掉不隨似有加於往昔醫之來者一曰風二曰風三四五六皆曰風即十數輩又莫不皆曰風者竭技盡方卒無一應奄奄床第絶不知為何病豫對公曰此筋痿症也乃少年不謹欲而受風濕邪氣乘虛而入醫者不察天時不分六經概而汗之仲景治風濕之法但使微汗津津則風濕盡去若汗大出則風去而濕存由是血氣俱虛經云陽氣者精則養神柔則養筋虛則筋無所養漸成痿弱乃不足之疾故陳無擇朱丹溪劉宗厚皆謂諸痿切不可作風治誤則成痼疾公聞言愕然曰服風藥幾二百劑矣顧今已痼奈之何豫對曰令侄青年猶可圖也公曰用何法豫曰法當大補氣血經云氣主煦之血主濡之氣血旺則筋柔而軟由是乃可以束骨而利機關也抑何掉之有哉病者聞言大喜曰聆先生詳病之源治法之略雖未服藥已覺沉疴去體矣即請劑豫以五加皮薏苡仁紅花人參鹿角膠龜板虎骨當歸丹參地黃骨碎補蒼耳子之類服兩月肌肉漸生飲食大進兩手指掉亦平復一書辦下消一書辦年過五十糟酒縱欲無憚忽患下消之症一日夜小便二十餘度清白而長味且甜少頃凝結如脂色有油光治半年不驗腰膝以下皆軟弱載身不起飲食減半神色大瘁脈之六部大而無力書云脈至而從按之不鼓諸陽皆然法當溫補下焦以熟地黃六兩為君鹿角霜山茱萸各四兩桑螵蛸鹿角膠人參白茯苓枸杞子遠志菟絲子懷山藥各三兩為臣益智仁一兩為佐大附子桂心各七錢為使煉蜜為丸梧桐子大每早晚淡鹽湯送下七八十丸不終劑而愈或曰凡云消者皆熱症也始公具方人多議之今果以溫補成功此何故哉豫曰病由下元不足無氣升騰於上故渴而多飲以飲多小便亦多也今大補下元使陽氣充盛熏蒸於上口自不幹譬之釜蓋釜雖有水若底下無火則水氣不得上升釜蓋干而不潤必釜底有火則釜中水氣升騰熏蒸於上蓋才濕潤不幹也豫已詳著醫旨緒餘中茲不多贅韓僉憲令媳怒後夜臥不安僉憲韓約齊老先生令子室每動怒則夜臥不安如見鬼魅小水淋瀝今又大便祕結腹中疼痛腰胯脹墜如生産狀坐臥不安因痛而脈多不應指此肝經鬱火所致法當通利以杏仁桃仁各三錢桕樹根皮山梔仁青皮各一錢檳榔五分枳殼八分水煎服之少頃大便通痛脹隨減韓老婦人夜來臍腹痛甚僉憲韓約齊老先生夫人向來夜分臍腹疼極甚必用炒鹽尉之兩時久乃止次日必頭痛兩太陽如箍遍身亦疼此上盛下虛症也先用柴胡川芎粉草酒連薄荷天麻橘紅茯苓半夏蔓荊子水煎服數帖頭痛全止惟咳嗽胸前略痛兩寸脈浮滑兩尺弱再用鹿角霜鹿角膠補骨脂遠志枸杞子金鈴子香附子煉蜜為丸梧桐子大每空心及下午食前淡鹽湯送下七十丸而瘳丁震瀾令郎瘧母孝廉丁震瀾丈令郎才二歲瘧母上壅咳嗽每午後發熱至子丑時乃退終日啼哭不止鵝口白屑神氣大弱痘後遍身瘡疥未愈多方治之不效有炙之者有痌之者有以膏藥貼之者種種施之全然不應豫曰乳下嬰孩臟腑薄脆不可亂攻亂補參耆足以增其嗽炙痌適以驚其神安能取效豫教以白朮鱉甲各一錢五分青蒿麥芽陳皮各八分烏梅一枚貝母知母各六分甘草三分八帖痊愈孫令君令媳産後譫語發熱泄瀉有發明武進令君孫康宇公子室臧位宇丈女也年十六初産女艱苦二日偶感風邪繼食麵餅時師不察竟以參朮投之即大熱譫語口渴汗出如洗氣喘泄瀉瀉皆黃水無糞一日夜不計遍數小水短少飲食不進症甚危惡時當六月初旬女科見熱不除乃投黃芩芍藥黃連寒涼之劑諸症更甚又以參朮大劑肉果乾薑等止瀉一日計用人參二兩四錢瀉益頻熱益劇喘汗轉加譫語不徹口醫各縛手辭謝曰書云汗出如油喘而不休死症也又汗出而熱不退瀉而熱不止且譫語神昏産後而脈洪大法皆犯逆無生路矣惟附子理中湯庶僥幸於萬一適豫為顧太守肖溪公延至即過為一診六脈亂而無緒七八至獨右關堅硬躊躇久之因思暑月汗出乃常事但風邪麵食瘀血皆未消熔補劑太驟書云蓄血如見鬼治當消瘀血麵食解其暑氣猶可圖生勿遽棄也有臧玉宇者位宇堂兄也醫有雅緻深以豫言為然而速豫措劑豫曰劑憑症發難拘常套不常之症須用不常之藥乃用益元散六錢解暑氣清熱為君仲景云渴而小便不利者當先利其小便況水瀉尤當用之為君也以糖球子三錢為臣紅曲澤蘭葉各一錢五分消瘀血安魂為佐香附一錢五分為裨佐橘紅半夏曲茯苓乃統理脾氣為使京三稜五分消前參術決其壅滯為先鋒水煎飲之飲下即稍睡譫語竟止連進二劑其晚大便減半次日仍用前劑飲之其夜熱大減大便只二次有黃糞矣惡露略行黑血數枚又次日診之脈始有緒神亦收斂進粥一盞大有生意前方減去京三稜紅曲加白扁豆其夜大便一次所下皆黑糞從此熱盡退大便亦實改用四君子湯加益元散青蒿香附白扁豆酒炒白芍藥炮姜調理而平吳東星先生楊梅風毒有發明吳東星上舍辰州太守公長君也冒暑赴南都試落第歸而怏怏因成瘧自八月中旬延至十月瘧雖止而腰痛白濁日夜咳嗽肌肉大消藥劑亂投認為風者以羌活防風續斷等發散認為虛者以六味地黃丸為補認為火者以芩連梔子黃柏知母天花粉生地黃瀉其火認為半虛半實者投以獨活寄生湯認為寒者以大附子肉桂鹿角膠參術溫補之痛劇欲死叫撼四鄰豫脈之左弦細右滑大俱六至口渴眼赤豫知其昔患楊梅瘡餘毒尚伏經絡適因瘧後氣血不足舊毒感動故痛而暴也以當歸芍藥甘草牛膝鉤藤苡仁木通白蘚皮用土茯苓四兩煎湯代水煎前藥服下而痛止咳嗽亦除脈緩其半連服數劑大效精神漸復乃起而督工視事冬至日為酒興鼓舞縱欲無忌次日腰如束縛足面亦疼左眼赤小水短足底有火從兩胯直衝其上痛不可言豫以當歸鉤藤甘草白芍藥牛膝苡仁石斛紅花生地黃柏調理三日症已守定略無進退適大雪寒凍殊甚有女醫為渠宅所親信者因其大便燥結一日夜服玄明粉一兩五錢大便且不行而腰痛愈猛兩足攣縮氣息奄奄一語而三換氣面青慘渠自覺危急乃喚內人及弟叔囑其後事天明豫至診之六脈俱伏痛使然也扣其由乃知服玄明粉所致豫曰症雖熱便雖燥但公病不在腸胃而在經絡筋骨間徒瀉腸胃無益也且冬月陽氣閉藏誤瀉則陽氣虧乏來春無發生根本矣今四肢拘縮腰胯痛劇者由日來天令寒極經絡凝澀也寒主收斂法當溫散寒邪之標使痛定然後復治其本庶可保全乃用桂心杜仲炙甘草蒼朮破故紙五加皮連與二劑痛定而四肢柔和飲食始進豫知渠宅素喜速效豫適有荊溪之往乃宣言曰足下之疾在經絡顧今天令嚴寒幸寧耐以俟春和為足下拔去病根渠宅不以豫言為然乃用張云溪調理豫亦贊張之可守蓋張氏藥用養血清熱雖不去病亦不害事逮二月太守公歸乃改用沈春宇沈揣渠必以酒色而致陰虛乃純用滋陰降火之劑以為旬日可奏功也及調治月餘略無影響豫從荊溪歸而謁渠為三月初旬也渠聞豫至即以沈藥呈豫且語豫公許春和拔除病根此其時也豫知太守公方篤信沈隨以溫語慰渠曰沈公名士也可使彼展盡底蘊沈又調理半月以無功而行沈去豫再以煨腎散進大瀉五六度四肢冰冷舉家大恐以豫瀉之為非也豫曰病人此日減矣夫奚憂後進理脾藥服數帖神氣始轉腰胯柔和可下床舉數步矣方始信而問豫曰人皆以補為治公何得病源之真於三月之前先已預定節節如公語也豫曰此楊梅瘡餘毒伏於經絡豈補劑所能去哉豫故先為疏通濕熱然後以補劑收功則無反復之患後仍以威靈仙末子二錢入豬腰子內煨熟食之又瀉一二度病根盡拔改用苡仁當歸生熟地黃白芍藥牛膝黃柏丹參龜板調理全安潘見所老先生小盛價疳積有發明潘見所老先生有一小盛價年可十六七發熱於午後城中周友以為陰虛而為滋陰降火服三十餘劑熱益加且腹中漸脹面色清白仍以六味地黃丸加黃柏知母麥冬五味子之類又三十劑而腹大如斗堅如石飲食大減發黃成穗額顱光亮口渴不可言兩腿大肉消盡眼大面肉皆消肌膚枯燥如松樹皮奄奄一骷髏耳豫觀其目之神尚五分存欲為治劑潘公門下諸人語豫曰形症如是死在目下尚可服藥乎豫曰症非死候為用藥者誤耳譬之樹木若根本壞而枝葉枯焦非力可生今焦枯乃斧斤傷其枝葉而根本仍在也設灌溉有方猶可冀生安可遽棄豫以神授丹日用一丸煮豬肉四兩飼之十日腹軟其半熱亦消其半神色漸好潘見老詰余曰此何症公能肉枯骨如此之神豫曰此疳積症也彼誤認為腎虛而用補陰之藥是以滯益滯腹焉得不大不堅公曰彼純用寒而熱愈熾君用非寒而熱反退此何說焉豫曰此熱乃濕熱由脾虛所致補陰之劑皆濕類蓋脾屬土惡濕喜燥今以大蘆薈丸肥兒丸調理一月可全瘳矣公曰善微先生此僕已為泉下物矣凌繹泉翁痰火吐紅喘嗽少司空凌繹泉翁年已古稀原有痰火之疾因正月上旬為令孫大婚過勞偶占風寒內熱咳嗽痰中有血血多而痰少痰堅不易出鼻流清水舌生芒刺色焦黃語言強硬不清大小便不利喘急不能睡亦不能仰惟坐高椅椅前安棹棹上安枕日惟額伏枕上而已市醫環治半月不瘳敦豫診之兩手脈浮而洪兩關滑大有力知其內有積熱痰火為風邪所閟且為怒氣所加故血上逆議者以高年見紅脈大發熱為懼豫曰此有餘症諸公認為陰虛而為滋陰降火故不瘳法當先驅中焦痰火積熱然後以地黃補血等劑收功斯不失先後著也翁以豫言為然用栝蔞石膏各三錢橘紅半夏曲桑白皮前胡杏仁酒芩紫蘇子水煎臨服加入蘿蔔汁一小酒盞一劑而血止次日診之脈仍浮而洪大尚惡寒豫曰古云傷風必惡風傷寒必惡寒此其常也只因先時失於清散表中之熱未徹竟用滋陰之劑又加童便收斂降下太速以致風寒鬱而不散故熱愈甚也改以定喘湯一劑而喘急減半再劑熱退而不惡寒復為診之兩手浮體已無惟兩關之脈甚鼓指此中焦痰積膠固已久不可不因其時而疏導之以清中丸同當歸龍薈丸共二錢進之其夜大便所下稠黏穢積甚多豫憶朱丹溪有云凡哮喘火盛者以白虎湯加黃連枳實有功此法正繹翁對腔劑也與十劑外以清中丸同雙玉丸夜服調理而安周鳳亭濕熱壅滯發熱煩躁有發明周鳳亭公年五十有八正月腸風下血又飲食過傷大吐而朱友以枸杞地黃膏一斤進之不知此公肝氣素盛中焦原有痰積且多思傷脾又值卯木正旺之月投以地黃枸杞適以滋其濕而溢滯其痰耳由是飲食減少肌肉日消腹中痞滯又吳友以歸脾湯進之詎知濕熱未除先用溫補是以油撲火勢成燎原以致大便燥結口乾舌燥據巳午未三時中焦蒸蒸發熱煩悶酉時而退此皆濕熱壅滯於脾無疑矣且面色黃中帶黑下午足面有浮氣皆是濕勢傷脾之徵法宜清肅中焦徹去濕熱則飲食自加而新痰不生宿痰磨去庶五穀精華不生痰而生血矣血充則精神長而肌肉可復且秋來無瘧痢之患公曰清肅中焦當用何劑豫曰二陳湯加薏苡仁酒炒白芍藥麥芽以養脾而消痰以枳實黃連泄痞而去熱以青蒿分利陰陽而消其黃葛根升引清陽之氣使肌熱清而口渴可止矣當服十劑公曰先生之方善但枳實黃連恐體虛者不足以當之豫曰惟此二味適可以去公之病根舍是則不效緣中焦有餘之疾非此不能去亦非它藥所能代公半信半疑服四劑而諸疾皆愈公遽中止不復服完至七日盡果發瘧疾而以木香檳榔丸下去稠積甚多乃追悔豫言而延之診豫教以前方仍服十劑夜以丹溪保和丸調理則永無瘧痢之患矣周採石濕熱生痰痞悶令郎採石先生中焦濕熱生痰痞悶五更倒飽且下午兩股或膝下筋脈抽掣疼痛時常噯氣面色帶黃間常夢遺豫以清氣大安化痰丸及豬肚丸二方調治而安豬肚丸用白朮五兩苦參酒炒二兩牡蠣煅過三兩為末將雄豬肚子一具摘去油甘草湯洗過將藥裝入肚中縫其口飯中蒸極爛為度搗極勻為丸此方極健脾去濕熱固精丸也清氣大安化痰丸用白朮四兩橘紅半夏山楂各三兩黃芩黃連俱生薑汁炒各一兩五錢枳實栝蔞仁各二兩白芥子蘿蔔子各炒一兩薑黃鹼水煮乾一兩青黛五錢麥芽取曲打糊為丸緑豆大每食後及夜茶送下二錢又令孫女龜背令孫女才六歲忽發寒熱一日過後腰脊中命門穴間骨節腫一塊如大饅頭之狀高三四寸自此不能平身而立絶不能下地走動如此者半年人皆以為龜背痼疾莫能措一法即如幼科治龜背古方治之亦不效豫曰此非龜背蓋龜背在上今在下部必初年乳母放在地上坐早之過比時筋骨未堅坐久而背曲因受風邪初不覺其漸入骨節間而生痰涎致令骨節脹滿而大不急治之必成痼疾今起未久可用萬靈黑虎比天膏貼之外再以晚蠶砂醋洗炒熱絹片包定於膏上帶熱尉之一夜尉一次再以威靈仙為君五加皮烏藥紅花防風獨活水煎服之一月而消其半骨節柔軟不復腫硬便能下地行走如初矣人皆以為神奇此後三個月驀不能行問之足膝痠軟載身不起故不能行豫知其病去而下元虛也用杜仲晚蠶砂五加皮薏苡仁當歸人參牛膝獨活蒼耳子仙茅水煎服二十劑行動如故閔蜃樓虛損咳嗽令眷痛風奇疾有發明閔文學蜃樓患虛損咳嗽晝輕夜重乃政丁氏長興富翁女也軀甚肥性甚躁患痛風手不能沐櫛足不能履地凡痛處略腫呻吟喊叫比有朱遠齊氏為時推重夫好倚朱治者七越月纖毫不減吳九宜翁乃舉豫治至其家蜃樓大兄嶽樓旦暮與偕診畢語嶽樓曰令弟之症雖易見功然非百日不能斷根丁氏症十日便可刈其根但恐不能盡五劑奈何嶽樓曰何謂也豫曰令弟咳嗽由肺火未清誤服參朮太過而然但為清肺利肺咳可立止止後以補心安神之劑養之則萬全矣藥用麥門冬桑白皮白藥子貝母桔梗甘草黃芩枳殼十帖咳嗽全止惟心血不足神不固精以酸棗仁遠志麥冬蓮花心丹參調養百日果能出戶肄業丁症乃濕痰凝滯經絡作痛朱公作血虛而投以地黃芍藥當歸人參牛膝之類宜其痛愈加而病愈久也今必須燥濕流動之劑疏決一番庶經絡通暢雖不服補劑而五穀精華足以自充但疏決之劑不能止痛恐其不信余而中止也嶽樓曰先生既已言明惟命是聽用二陳湯加烏藥葉蒼朮殭蠶海桐皮南星服至五帖果不懌而欲止藥嶽樓曰孫君已先言十帖見功今過半何不勉強而使功虧一簣哉又服一帖而止百般強之不從乃揚言曰請醫療痛而反加痛吾何藥為後四劑斷斷乎不敢奉命矣時巳申刻豫知其富家嬌態亦不強服隨以芫花醋炒過三分海金沙一分為末白湯調下至晚瀉一次下稠痰半盆足痛減大半稍能動止初更後吾輩酒猶未散忽服云腹中大痛促豫進看行至後堂內中人出而止曰病者卒矣不勞進看豫曰此必痛厥非長逝也烏可不進一看至即冷汗淋漓兀坐溺器面青息斷執而診之手冷如冰但六脈俱在惟沉伏耳知其為痛極使然用生薑湯灌之而蘇徐語近侍女使曰適來腹中痛甚耳後火光濺出肛門如焚大響一聲不知瀉下何物衆看之乃血鰍一條長六寸闊半寸余鱗目俱在盆中尚能遊動衆皆悚駭嶽樓問曰此鰍下可好否豫應之曰此尤物也得下豈不好但丁症實由痰作豫特為行痰初不知其有蟲如是第藥中有芫花乃殺蟲之物故偶中亦令弟之福也次日手足皆能動仍以二陳湯加苡仁紅花五加皮四帖脫然如故閔宅以豫不矜功而益重豫金寄閒令堂痢而胸膈膨脹金寄閒令堂暑月患痢小腹窘迫胸膈膨脹口舌焦渴右寸關脈洪滑左脈弦乃氣鬱食積痢也先與木香檳榔丸開而下之微利一二度因口渴食西瓜一片即噁心而吐昨日大便利後胸膈寬快就進飯一碗致腹飽悶兀兀欲吐所吐皆痰涎乃以溫膽湯加減治之半夏四錢枳實一錢五分竹茹二錢橘紅茯苓各一錢甘草五分姜連八分生薑五片水煎服之一飲而胸膈舒暢便能就枕而睡噁心頓無痢亦尋止徐中宇之婦汗出如雨昏昏憒憒胸膈要人足踹徐中宇之婦汗出如雨昏昏憒憒兩手無所著落胸要人足踹之不少放少放即昏憒益甚氣促不能以息稍近風則嘔惡暈厥與九龍鎮心丹一丸服下即稍定少間則又發始知胸喉中有物作梗而痛湯水難入即藥僅能吞一口多則弗能咽下乃以蘇合香丸與之暈厥尋止心痛始萌昨日六脈俱伏今早六部俱見惟左寸短澀知其痛為瘀血也用玄胡索桃仁丹皮丹參青皮當歸香附其夜仍暈厥一次由其痛極而然再與玄胡丹皮桃仁丹參香附青皮烏梅人參貝母桂枝赤芍藥服此痛減大半乃自云心虛有熱頭眩加山梔仁居常多夢交之症近更甚以其心虛故也人參石斛丹參貝母當歸白芍藥酸棗仁酒連香附調理全安金達泉令政孕三月而痢赤白金文學達泉先生令政暑月患痢赤白一日夜三十餘度後重腿急口渴小腹痛孕已二月幸而腰不痛右手脈弦左脈滑與白芍藥三錢黃連黃芩當歸陳皮香附各一錢桂皮木香各五分水煎服外與香連丸服下後重稍輕因進飯太早其夜仍十數度次早診之右弦減半前藥煎成吞女金丹一帖痢減大半六脈已和但軟弱此氣血不足宜從補養用八珍湯加陳皮香附阿膠條芩一帖全安凡孕婦痢疾後重稍輕腹痛稍減獨痢不止必須補養氣血為主加調氣之劑為佐庶可保胎斯亦丹溪虛回而痢自止之意也金元岩赤白痢金元岩文學下午發熱痢下紅多白少一日夜七十餘度後重下墜飲食不思左脈細數右脈滑此陰虛之候詢知二日前曾夢遺續得痢疾陰虛明矣但滑脈主食積法當先補後攻乃與小建中湯一帖白芍藥三錢桂枝七分粉草酒連酒芩各八分當歸一錢檳榔五分水煎飲之夜半復診脈稍克指改與枳殼三錢桃仁一錢當歸四錢煎熟吞木香檳榔丸一錢五分至天明大便瀉三次則見糞矣次日午進飯又食火肉隨即大便頻並後重如前與山楂枳朮丸一服不效再為診之六部皆虛軟無力獨右關滑此進肉飯太早脾弱不能消磨宜健脾氣兼為升舉人參黃耆各二錢白朮一錢升麻三錢防風藿香炮薑粉草各五分白芍藥一錢半茯苓八分連進兩帖痢減而後重寬因食狗肉過多復傷脾氣前方加砂仁山楂調理痊愈金達泉瘧痢交作金文學達泉先生因食肝白腸內傷續又冒風就成瘧痢日夜四十餘度小腹痛甚每登廁汗出如雨下迫後重小水澀痛頭疼口渴下午發熱天明始退左脈浮弦而數右軟弱中部稍滑此內傷飲食外感風邪瘧痢並作法當速治否則深秋陽氣潛藏邪因陷下未易瘳也乃先與柴苓湯一劑小便即清不痛瘧發時寒多熱少晚與人參敗毒散加減人參乾葛防風桂枝粉草茯苓枳殼各五分柴胡白芍藥各一錢水煎飲之次日頭痛痢疾俱減夜才起三次改與補中益氣湯加酒芩桂枝白芍藥其夜瘧止但微熱再改胃風湯人參白朮桂皮各二錢白芍藥四錢當歸一錢五分茯苓川芎各八分酒芩酒連各一錢炮姜二分地榆五分服後寒熱殄跡夜起一次已是真糞前方減去桂枝再三劑而巾櫛出戶矣金寄閒少陽陽明合病為瘧金寄閒先生七月既望患頭痛口渴汗大泄不斂嘔惡發寒熱間日一發而發於陽日乃為診之兩寸洪大有力左浮弦而數右脈稍軟亦弦長此少陽與陽明合併為瘧以柴葛解肌湯主之柴胡葛根各二錢白芍藥石膏各三錢粉草桂枝各五分知母一錢姜三片水煎飲之次早左脈稍退乃與補陰鱉血何首烏丸截之又與黃耆芍藥湯一帖以防作痢白芍藥石膏黃耆各三錢桂枝五分知母粉草各一錢柴胡七分姜三片煎服後加人參七分瘧竟全止而向安矣淮陰胡少泉令郎夢遺令愛發熱咳嗽又友人奇疾淮陰胡少泉翁麗水縣三尹也令郎年弱冠患夢遺百治不應體倦而氣弱食少而汗多四肢痠軟頭眩肌熱將成瘵疾知豫在理刑吳比部衙中敦余為治其脈兩寸短左寸尤甚餘部滑數余曰郎君之脈心氣大弱蓋心者神之舍神者精之主神旺始能固精今遺不禁由神弱不能固攝其精致多妄泄時近端陽諸症叢集乃兼疰夏病也法當養心安神庶幾不成瘵翁曰然前此諸公每為滋陰降火多不見功徒見損脾減食今先生主以養神願以先生是聽乃與人參黃耆石蓮子酸棗仁蓮花心石菖蒲遠志當歸補心安神為君俾精固汗斂經曰汗者心之液汗多則心血愈虛故佐以甘草白朮黃柏麥門冬五味子兼治疰夏使飲食加而四肢壯緩而圖之可萬全矣藥進甚妥竟以此方調理果精固神全肌熱盡退又令媛及笄頭痛微熱經水愆期日多咳嗽食漸減肌漸消口渴睡臥不寧喉中血腥四肢不勞而疲體不動而汗六脈弦而且數左關長出寸口余以逍遙散加石斛丹參牡丹皮酸棗仁山梔子麥門冬調理而瘳又一文學貧士也忘其姓氏與胡少泉翁為碩交有奇疾兩足不酸不痛每行動絶不聽其所用或扭於左而又墜於左或扭於右而墜於左之玄而行不能一步步正走此亦目之稀覯竟不識為何疾書無所考豫臆度之由筋軟不能所致故行動則偏斜扭墜也夫筋者肝之所主肝屬木木縱不收宜益金以制之用人參黃耆白芍藥以補肺金薏苡仁虎骨龜板杜仲以壯筋骨以鐵華粉專制肝木煉蜜為丸早晚服之別後三載族侄理問公敬亭南還道出淮陰胡少泉寄語云嚮者鐵粉所愈之疾淮人極以為奇遠邇敦録其方布傳以頌自恨貧儒勿能致一芹為謝旦暮額手南鬥以識不忘云吳氏婦隱疾有發明一吳氏婦有隱疾其夫訪於豫三造門而三不言忸怩而去後又至未言而面先赭豫因詰之曰諸來詣余者皆謂豫能為人決疑療急也今子來者四必有疑於中疑而不露一語雖百來而疑終不可決疾終不可去矣且盈天地間怪事甚多非聖智所能盡識然亦非聖智不能通療也彼折肱靈醫說醫鑑等集怪症蝟毛假非明哲決而治之何以擴後人之聞見也其夫乃俯首徐應曰言之無任主臣先生長者即言之諒無嘆山婦子戶中突生一物初長可三寸今則五寸許矣狀如堅筋色赤大可拱把脹而且痛不便起止憎寒壯熱寢食俱減羞澀於言每求自盡聞先生能為人決疑療怪不啻扁華特相訪而祈一決豫曰疾成幾年對曰將百日豫曰蓋凡所謂怪者耳目無所聞睹書籍無所注載今所言者乃陰挺症也書有所徵奚足言怪夫曰陰挺何自而生何法而治幾何月日而可愈也可無妨於生育否豫曰子戶屬厥陰肝經肝屬木肝有濕熱故生陰挺猶木有濕熱而生菌然法當以龍膽瀉肝湯及蝟皮散當歸黃芩牡蠣蝟皮赤芍藥為末每用二錢空心米飲調下即而治之大計月餘可消釋也奚生育之有妨哉其夫合手頂禮於地曰願如藥王言敢徼一料隨按法措劑畀之而去甫三月來報云前疾果如所言消釋無痕茲為汛期一月不至敢問豫曰此有身也夫曰疾才愈未必即能受身恐防他疾豫曰前恙乃肝經有餘之疾肝為血海書云女人血盛則懷胎據血盛行當先期今汛逾期實孕耳匪病也後果足月而産一子染匠之婦腸癰前丘一染匠之婦腹痛兩月矣或以為寒為熱為氣為虛為食積為蟲遞嘗試之轉加一醫與膏藥如斗大者一個滿腹貼之痛益劇乃揭去膏藥即貼牢不可起火尉油調百計不能脫分寸如生在肉上相類無可奈何知豫在吳鄉宦宅中乃買舟就豫診及抵吳門橋口匠偕乃母乃姑四人盡力扶挽絶不能動移一步岸上環視如堵莫不語匠曰病勢若此時刻難抵固乃強其起而欲汙吾橋口耶匠乃止婦舟中起而墾豫為治至舟中見其面色蒼黑及伸手求診皮膚燥若老松樹皮之狀六脈皆洪數問其腹中之痛何在匠即為解衣露腹指其痛所始知膏藥黏牢之故此甚希覯叩其不能舉步之由婦曰非力弱不能行乃左腳不可動動即痛應於心是以一步不能舉也豫俯思若色若脈皆非死候胡治而益劇也此必腸癰左腳莫能舉是其徵也與營衛返魂湯加金銀花為君與四帖酒水各一碗煎服一帖痛稍減二帖下臭膿半桶痛全減腹上膏藥不須手揭自脫而下由熱去而膏脫也四帖完其婦同匠詣吳宅拜謝豫並求善後之方吳宅見之一族皆驚王祖泉臟毒下血王祖泉大便裡急後重腹痛日夜下紫黑稠黏三四十度市中凡有名者雷同痢治自秋歷冬三越月不瘳形色瘦瘁匙箸厭舉即勉強僅一盞而止眼闔懶開悉以為不治棄去訪餘脈之六部濡弱觀其所下之色甚晦如芋苗汁之狀豫曰觀此色非痢乃臟毒下血症醫說中人參樗皮散正此對腔劑也即制與之其夜果減半終劑全愈方以人參樗根白皮各二兩為末每空心米飲調服二錢忌肉汁生菜魚腥南都大司馬發熱燥渴癸巳秋仲南都大司馬袁洪溪老先生以兼署工部都察院操江印日沖暑往來各衙門而經絡其政事致發熱燥渴因解燥渴而過食水浸瓜梨新藕遂成泄瀉小水短少醫以胃苓湯加滑石木通車前子利之而瀉止大便又因之結燥艱澀不堪乃用潤腸丸復瀉不止又進以前通利之劑瀉雖止而小水竟不得流通直遂臍下脹急立起解之則點滴不出臥則流之不竭以頻取夜壺致通宵不得寐也治半月餘而精神削寢食廢聞豫寓崔勳部衙而徵豫治初見即告以受病之源又謂都城諸醫俱不識為何症將認為癃則立解時點滴不出認為祕臥則涓涓而流謂為脾約大便又不結燥謂氣虛下陷心血不足而補中益氣湯與安神丸服過十晝夜無益雅聞先生高手願一診以決之探其脈兩寸短弱關緩大兩尺洪大語之曰此余暑未解而司馬素善飲濕熱流於下部也今已下午恐診之未准俟明早細察而再定方公曰延頸吾子久矣適所言近似願亟求一劑飲之僥夜間一睡豫不得已以益元散三錢煎香薷湯進之略無進退次早復診六脈如昨豫思之而恍然悟又語之曰此症尿竅不對也司馬曰名出何書豫曰內經云膀胱者脬之室也脬中濕熱下墜故立解而竅不對小水因不得出臥則脬不下墜而尿滲出膀胱亦以竅不對小水雖涓涓而流亦不能通達直遂故了而不了也治惟提補上中二焦元氣兼清下焦濕熱斯得矣又有一法今氣虛下陷已久一兩劑未能取效安得伏枕而睡且此不寐非心血不足之故因著心防閒小便之了而不了而不敢寐也暫將舊衣或布襯於席上不必防而任其流出又免取夜器而勞動其神自然熟睡矣以補中益氣湯提補上中二焦之元氣加黃柏知母祛下焦之濕熱夫清陽升則濁陰自降脬無濕熱則不下墜竅可對而病可瘳矣司馬欣然請藥夜如法襯之果嗒然一睡相忘其尿之出不出也次早視襯布雖濕而不甚以久不闔目得此一睡神氣頓回胸臆爽快如未病者調理四日而病全安司馬大喜而欲留久住緣漕運李公相延之亟勿克也差大馬船鼓吹送豫阡關而還崔百原公右脅痛右手足痛崔百原公者河南人也年餘四十矣而為南勳部郎患右脅痛右手足筋骨俱痛艱於舉動者三月諸醫作偏風治之不效馳書邑大夫祝公徵余治豫至視其色蒼其神固性多躁急診其脈左弦數右滑數時當仲秋豫曰此濕痰風熱為痹也脈之滑為痰弦為風數為熱蓋濕生痰痰生熱熱壅經絡傷其營衛變為風也公曰君何以治豫曰痰生經絡雖不害事然非假歲月不能愈也隨與二陳湯加鉤藤蒼耳子薏苡仁紅花五加皮秦艽威靈仙黃芩竹瀝薑汁飲之數日手足之痛稍減而脅痛如舊再加鬱金川芎白芥子痛俱稍安豫以赴漕運李公召而行速勸公請假緩治因囑其慎怒內觀以需藥力公曰內觀何為主豫曰正心公曰儒以正心為修身先務每苦工夫無下手處豫曰正之為義一止而已止於一則靜定而妄念不生宋儒所謂主靜又曰看喜怒哀樂未發以前作何氣象釋氏之止觀老子之了得一萬事畢皆此義也孟子所謂有事勿正勿忘勿助長是其工夫節度也公曰吾知止矣遂上疏請告豫録前方畀之北歸如法調養半年而病根盡除
