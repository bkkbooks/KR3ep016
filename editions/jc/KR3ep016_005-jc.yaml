  - {type: 'tls:div-start', offset: 3518, content: '', id: KR3ep016_jc_005-d7.d2d13, level: 3, head_text: 吳荊樵文學疝氣半年兩跨結核硬痛}
  - {type: 'tls:head', offset: 3518, content: '', id: KR3ep016_jc_005-d7.d2.d13.h1s1}
  - {type: 'tls:div-end', offset: 3624, content: '', id: KR3ep016_jc_005-d7.d2d13}
  - {type: 'tls:div-start', offset: 3624, content: '', id: KR3ep016_jc_005-d7.d2d14, level: 3, head_text: 吳鶴洲先生中焦有痰肺氣不足發瘧熱多寒少口渴小水不利體倦頭痛}
  - {type: 'tls:head', offset: 3624, content: '', id: KR3ep016_jc_005-d7.d2.d14.h1s1}
  - {type: 'tls:div-end', offset: 3762, content: '', id: KR3ep016_jc_005-d7.d2d14}
  - {type: 'tls:div-start', offset: 3762, content: '', id: KR3ep016_jc_005-d7.d2d15, level: 3, head_text: 吳雪舫先生左脅下紅塊大如雞子旁有小菩蕾作疼予作肝膽兩經有熱毒治而愈}
  - {type: 'tls:head', offset: 3762, content: '', id: KR3ep016_jc_005-d7.d2.d15.h1s1}
  - {type: 'tls:div-end', offset: 3942, content: '', id: KR3ep016_jc_005-d7.d2d15}
  - {type: 'tls:div-start', offset: 3942, content: '', id: KR3ep016_jc_005-d7.d2d16, level: 3, head_text: 吳孝廉球泉先生心血不足胃中有痰下元陽氣不充}
  - {type: 'tls:head', offset: 3942, content: '', id: KR3ep016_jc_005-d7.d2.d16.h1s1}
  - {type: 'tls:div-end', offset: 4097, content: '', id: KR3ep016_jc_005-d7.d2d16}
  - {type: 'tls:div-start', offset: 4097, content: '', id: KR3ep016_jc_005-d7.d2d17, level: 3, head_text: 李思椿胸膈脹痛痰有紫色瘀血}
  - {type: 'tls:head', offset: 4097, content: '', id: KR3ep016_jc_005-d7.d2.d17.h1s1}
  - {type: 'tls:div-end', offset: 4243, content: '', id: KR3ep016_jc_005-d7.d2d17}
  - {type: 'tls:div-start', offset: 4243, content: '', id: KR3ep016_jc_005-d7.d2d18, level: 3, head_text: 吳雙泉公病陽亢陰微之候上盛下虛}
  - {type: 'tls:head', offset: 4243, content: '', id: KR3ep016_jc_005-d7.d2.d18.h1s1}
  - {type: 'tls:div-end', offset: 4437, content: '', id: KR3ep016_jc_005-d7.d2d18}
  - {type: 'tls:div-start', offset: 4437, content: '', id: KR3ep016_jc_005-d7.d2d19, level: 3, head_text: 李寅齋先生患血淋小水艱澀難出竅痛不可言二年不愈}
  - {type: 'tls:head', offset: 4437, content: '', id: KR3ep016_jc_005-d7.d2.d19.h1s1}
  - {type: 'tls:div-end', offset: 4743, content: '', id: KR3ep016_jc_005-d7.d2d19}
  - {type: 'tls:div-start', offset: 4743, content: '', id: KR3ep016_jc_005-d7.d2d20, level: 3, head_text: 徐熙宇文學內眷前後心痛耳鳴眩暈嘔逆吐酸四肢痠軟}
  - {type: 'tls:head', offset: 4743, content: '', id: KR3ep016_jc_005-d7.d2.d20.h1s1}
  - {type: 'tls:div-end', offset: 4931, content: '', id: KR3ep016_jc_005-d7.d2d20}
  - {type: 'tls:div-start', offset: 4931, content: '', id: KR3ep016_jc_005-d7.d2d21, level: 3, head_text: 湯簡庵封君素善飲致發腸風且心腎不交}
  - {type: 'tls:head', offset: 4931, content: '', id: KR3ep016_jc_005-d7.d2.d21.h1s1}
  - {type: 'tls:div-end', offset: 4992, content: '', id: KR3ep016_jc_005-d7.d2d21}
  - {type: 'tls:div-start', offset: 4992, content: '', id: KR3ep016_jc_005-d7.d2d22, level: 3, head_text: 吳仰玄先生患胃脘痛痛徹於背痛時冷汗如雨}
  - {type: 'tls:head', offset: 4992, content: '', id: KR3ep016_jc_005-d7.d2.d22.h1s1}
  - {type: 'tls:div-end', offset: 5059, content: '', id: KR3ep016_jc_005-d7.d2d22}
  - {type: 'tls:div-start', offset: 5059, content: '', id: KR3ep016_jc_005-d7.d2d23, level: 3, head_text: 粳芝崗文學酒後近內行採戰之法致成血淋}
  - {type: 'tls:head', offset: 5059, content: '', id: KR3ep016_jc_005-d7.d2.d23.h1s1}
  - {type: 'tls:div-end', offset: 5393, content: '', id: KR3ep016_jc_005-d7.d2d23}
  - {type: 'tls:div-start', offset: 5393, content: '', id: KR3ep016_jc_005-d7.d2d24, level: 3, head_text: 吳中翰漢源先生腸風下血腹中微痛}
  - {type: 'tls:head', offset: 5393, content: '', id: KR3ep016_jc_005-d7.d2.d24.h1s1}
  - {type: 'tls:div-end', offset: 5465, content: '', id: KR3ep016_jc_005-d7.d2d24}
  - {type: 'tls:div-start', offset: 5465, content: '', id: KR3ep016_jc_005-d7.d2d25, level: 3, head_text: 吳大柱史安節公脾肺二經有痰火中焦有濕熱流於膀胱為淋濁}
  - {type: 'tls:head', offset: 5465, content: '', id: KR3ep016_jc_005-d7.d2.d25.h1s1}
  - {type: 'tls:div-end', offset: 5636, content: '', id: KR3ep016_jc_005-d7.d2d25}
  - {type: 'tls:div-start', offset: 5636, content: '', id: KR3ep016_jc_005-d7.d2d26, level: 3, head_text: 吳官詹少溪翁有酒積而頻傷怒致右脅之火衝上作痛耳鳴眩暈大便艱澀}
  - {type: 'tls:head', offset: 5636, content: '', id: KR3ep016_jc_005-d7.d2.d26.h1s1}
  - {type: 'tls:div-end', offset: 5721, content: '', id: KR3ep016_jc_005-d7.d2d26}
  - {type: 'tls:div-start', offset: 5721, content: '', id: KR3ep016_jc_005-d7.d2d27, level: 3, head_text: 吳孝廉球泉公內人痢疾後感寒而經至發熱口渴遍身疼等症}
  - {type: 'tls:head', offset: 5721, content: '', id: KR3ep016_jc_005-d7.d2.d27.h1s1}
  - {type: 'tls:div-end', offset: 6023, content: '', id: KR3ep016_jc_005-d7.d2d27}
  - {type: 'tls:div-start', offset: 6023, content: '', id: KR3ep016_jc_005-d7.d2d28, level: 3, head_text: 吳西云先生庶母筋骨無力不能起止將成痿症}
  - {type: 'tls:head', offset: 6023, content: '', id: KR3ep016_jc_005-d7.d2.d28.h1s1}
  - {type: 'tls:div-end', offset: 6168, content: '', id: KR3ep016_jc_005-d7.d2d28}
  - {type: 'tls:div-start', offset: 6168, content: '', id: KR3ep016_jc_005-d7.d2d29, level: 3, head_text: 蔣近思令郎脅痛氣促胸滿喉疼痰有血屑下午潮熱}
  - {type: 'tls:head', offset: 6168, content: '', id: KR3ep016_jc_005-d7.d2.d29.h1s1}
  - {type: 'tls:div-end', offset: 6358, content: '', id: KR3ep016_jc_005-d7.d2d29}
  - {type: 'tls:div-start', offset: 6358, content: '', id: KR3ep016_jc_005-d7.d2d30, level: 3, head_text: 徐學士檢老正月食新蒜炒肉而又冒風寒咳嗽喉疼聲啞有發明}
  - {type: 'tls:head', offset: 6358, content: '', id: KR3ep016_jc_005-d7.d2.d30.h1s1}
  - {type: 'tls:div-end', offset: 6518, content: '', id: KR3ep016_jc_005-d7.d2d30}
  - {type: 'tls:div-start', offset: 6518, content: '', id: KR3ep016_jc_005-d7.d2d31, level: 3, head_text: 萬肅庵先生令郎發熱旬日口渴舌乾色如沉香}
  - {type: 'tls:head', offset: 6518, content: '', id: KR3ep016_jc_005-d7.d2.d31.h1s1}
  - {type: 'tls:div-end', offset: 6889, content: '', id: KR3ep016_jc_005-d7.d2d31}
  - {type: 'tls:div-start', offset: 6889, content: '', id: KR3ep016_jc_005-d7.d2d32, level: 3, head_text: 大宗伯萬履老夫人右脅痛咳嗽喉干間吐紅腸鳴泄瀉}
  - {type: 'tls:head', offset: 6889, content: '', id: KR3ep016_jc_005-d7.d2.d32.h1s1}
  - {type: 'tls:div-end', offset: 7073, content: '', id: KR3ep016_jc_005-d7.d2d32}
  - {type: 'tls:div-start', offset: 7073, content: '', id: KR3ep016_jc_005-d7.d2d33, level: 3, head_text: 白仰云先生令眷觸怒暈厥手足冷汗如雨氣息微閉門合目靜坐一時始定}
  - {type: 'tls:head', offset: 7073, content: '', id: KR3ep016_jc_005-d7.d2.d33.h1s1}
  - {type: 'tls:div-end', offset: 7337, content: '', id: KR3ep016_jc_005-d7.d2d33}
  - {type: 'tls:div-start', offset: 7337, content: '', id: KR3ep016_jc_005-d7.d2d34, level: 3, head_text: 吳心逸先生之使患勞倦傷寒}
  - {type: 'tls:head', offset: 7337, content: '', id: KR3ep016_jc_005-d7.d2.d34.h1s1}
  - {type: 'tls:div-end', offset: 7428, content: '', id: KR3ep016_jc_005-d7.d2d34}
  - {type: 'tls:div-start', offset: 7428, content: '', id: KR3ep016_jc_005-d7.d2d35, level: 3, head_text: 吳文學霽陽先生以積學勞心而心肺之神不足}
  - {type: 'tls:head', offset: 7428, content: '', id: KR3ep016_jc_005-d7.d2.d35.h1s1}
  - {type: 'tls:div-end', offset: 7701, content: '', id: KR3ep016_jc_005-d7.d2d35}
  - {type: 'tls:div-start', offset: 7701, content: '', id: KR3ep016_jc_005-d7.d2d36, level: 3, head_text: 宜興令君胡鏡陽公夫人患陰虛陽搏之候}
  - {type: 'tls:head', offset: 7701, content: '', id: KR3ep016_jc_005-d7.d2.d36.h1s1}
  - {type: 'tls:div-end', offset: 7852, content: '', id: KR3ep016_jc_005-d7.d2d36}
  - {type: 'tls:div-start', offset: 7852, content: '', id: KR3ep016_jc_005-d7.d2d37, level: 3, head_text: 太史徐檢老向苦㿗疝而妨生育有發明}
  - {type: 'tls:head', offset: 7852, content: '', id: KR3ep016_jc_005-d7.d2.d37.h1s1}
  - {type: 'tls:div-end', offset: 8631, content: '', id: KR3ep016_jc_005-d7.d2d37}
  - {type: 'tls:div-start', offset: 8631, content: '', id: KR3ep016_jc_005-d7.d2d38, level: 3, head_text: 吳宮詹少溪翁以長君秋捷受賀過勞而傷飲食}
  - {type: 'tls:head', offset: 8631, content: '', id: KR3ep016_jc_005-d7.d2.d38.h1s1}
  - {type: 'tls:div-end', offset: 9140, content: '', id: KR3ep016_jc_005-d7.d2d38}
  - {type: 'tls:div-start', offset: 9140, content: '', id: KR3ep016_jc_005-d7.d2d39, level: 3, head_text: 吳別駕勉齋翁體豐腴連跌而口眼歪邪左手足不能動}
  - {type: 'tls:head', offset: 9140, content: '', id: KR3ep016_jc_005-d7.d2.d39.h1s1}
  - {type: 'tls:div-end', offset: 9829, content: '', id: KR3ep016_jc_005-d7.d2d39}
  - {type: 'tls:div-start', offset: 9829, content: '', id: KR3ep016_jc_005-d7.d2d40, level: 3, head_text: 少塚宰徐檢老以賀壽而臀生痔癰有發明}
  - {type: 'tls:head', offset: 9829, content: '', id: KR3ep016_jc_005-d7.d2.d40.h1s1}
  - {type: 'tls:div-end', offset: 10505, content: '', id: KR3ep016_jc_005-d7.d2d40}
  - {type: 'tls:div-start', offset: 10505, content: '', id: KR3ep016_jc_005-d7.d2d41, level: 3, head_text: 宮詹吳少翁患痢赤白兼下里急後重有發明}
  - {type: 'tls:head', offset: 10505, content: '', id: KR3ep016_jc_005-d7.d2.d41.h1s1}
  - {type: 'tls:div-end', offset: 11047, content: '', id: KR3ep016_jc_005-d7.d2d41}
  - {type: 'tls:div-start', offset: 11047, content: '', id: KR3ep016_jc_005-d7.d2d42, level: 3, head_text: 臧少庚年五十飲食不順利喉管中梗而難下}
  - {type: 'tls:head', offset: 11047, content: '', id: KR3ep016_jc_005-d7.d2.d42.h1s1}
  - {type: 'tls:div-end', offset: 11388, content: '', id: KR3ep016_jc_005-d7.d2d42}
  - {type: 'tls:div-end', offset: 11388, content: '', id: KR3ep016_jc_005-d7d2}
