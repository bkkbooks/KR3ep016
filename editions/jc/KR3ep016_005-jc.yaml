body:
  text: 卷五宜興治驗徐學士檢老患腸風下血數桶後委頓而右脅極痛有發明學士徐檢老體豐厚善飲致有腸風計下血不下數桶因而委頓己卯仲冬右脅極疼痛上至耳後夜分尤甚左右不能轉動轉動則痛甚飲食減面色青閉目汗出如雨濕透衣被故不敢合睫而睡族醫皆投以香附青皮及辛散之劑痛愈甚汗愈多面愈青逆予診之兩寸短弱左關弦而搏指右關沉滑六脈皆近七至予曰據痛在少陽經分野始必動於怒木火之性上而不下故上衝耳後而皆痛也夜痛甚者蓋夜屬肝氣用事內經云司疏泄者肝也邪在肝膽故闔目汗即大出中焦原有濕痰法當調肝清熱解毒為主兼利小便不可遽止汗而使邪無出路今脈大數如遽斂汗是逆其木火之性不惟痛加且將發腫毒而害非淺矣內經云膏粱之變足生大疔當預防之公曰何為斂劑而謂不宜予曰當歸六黃湯內有地黃當歸黃耆皆滯痰閉氣之味桔梗亦非所宜書曰下虛者及怒氣上升者皆不可用故當慎也因以柴胡黃連為君白芍甘草天花粉為臣紅花連翹為佐龍膽草為使服後汗雖仍舊痛即減三分之一不妨睡矣次日仍用前藥痛又減半第三日又服左右轉動如常飲食也加予未至公已先迎姑蘇盛氏盛公幼時窗友也家世受醫公初不急予日引領期盛到可刈枯鏟朽也盛至診畢遂詰曾用何劑公出予發劑示盛盛大叫稱謬謂當隆冬之候汗多如此陽氣大泄何敢以柴胡為君喉中痰既未清又何不用桔梗當歸六黃湯前賢已試之藥置而不用是舍紀律而務野戰出即取六黃湯加桔梗以進公雅信盛乃傾心以從速煎服之未逾時而舊病隨作色色加惡左右復不能轉動自戌而至子醜苦不能支有內侍語之曰服孫君藥雖未全可亦已去泰去甚彼曾言二藥不可用何為輕犯而受此苦宜急取孫君藥煎飲飲下即伏枕鼾鼾達旦始寤命使速予至而叩予曰人言隆冬汗出不當用柴胡而公用為君何旨予曰膽與肝為表裡肝膽之火鬱而不發故痛痛極而汗汗出而痛減者是火從汗出蓋汗乃邪出之門也予故曰汗不可斂本草云柴胡瀉肝膽火而以黃連佐之內經云木鬱則達火鬱則發言當順其性而利導之勢則易克古人治火之法輕則正治重則從其性而升之者以此蓋醫貴通變如陰虛火動而汗出者內無有餘邪故以六黃湯斂而降之常治法也今內有餘邪未出遽斂降之邪無從出勢必成毒故變常而從治者使邪有出路木火之性不逆則毒不成而痛可減也公曰善哉孫君之劑奇正相生不下孫武子兵法何輕以無紀律議之願投劑而奏凱也予曰公數日後瘡瘍大發兩胯且有興塊作痛此毒出之徵公於時無恐改用柴胡白芍甘草丹參苦參茯苓瞿麥車前子黃柏金銀花連翹服三日而痛全減汗全收左右不能轉動矣逾日公謂肌膚甚癢累累然似癮疹豈瘡出歟欲以藥浴之可乎予曰可再三日兩胯果發興塊如棋子大者數枚且痛予業已制蠟礬丸以待至是授服之瘡果遍身大發兩腿為甚一月餘而瘳公始信予防毒之言不謬披愫交歡且作序識勝期與終身不替云吳儀制主政尚卿先生患肺經痰火症更兼鼻衄吳儀制主政尚卿先生柱史安節公公子也弱冠時病鼻塞不能噴者四年且衄寒月更甚口渴咽喉邊有痰核脈之右寸關洪滑予曰此肺經痰火症也與前胡秦艽葛根薄荷石膏天花粉玄參貝母山梔子甘草白藥子桔梗丹皮四帖而衄止夜與牛黃三清丸數粒噙之鼻氣即通利能嗅噙未旬曰痊愈先生初年績學心專志一不知寒暑致有塞衄疾又萬曆己卯庚辰郡邑試皆首選如此者再而皆不得籍名學宮益郁然不適予時把臂語之曰先生何以一儒冠為汲汲據脈科甲當不在尊君下即館中二友亦金馬客也依愚見史先登公次之吳又次之日後當以斯言為左券毋相忘後三公先後登第一如予言萬曆戊戌春余應吳宮詹召公暨史玉老不爽前言皆為予撰玄珠序而紀其事以見一時良遇云宜光令君宋太夫人病胸腋脹痛予診左部俱散亂無緒兩尺無神予斷不治宜興宋令君山東人也太夫人年五十餘病胸腋脹痛予時寓吳宮詹家而繩庵安節二公皆宋公年友因二公而逆予診太夫人脈右寸關洪滑彈指如黃豆大左三部散亂無緒如解索狀兩尺絕無神氣予不得其受病之源而宋公亦不以病源告卒然問曰脈為何症予曰據左脈為虛弱久病右脈似又為飲食所傷必病小愈而又傷反覆之疾也其勢亦危宋公聞言危乃拂其意貌似不恭予見其貌即辭出至後堂有各佐二及學博佘公在焉佘公予鄉人也素亦知醫問曰症候何如予曰不治渠謂前診者皆無難色公何云然予曰兩尺無神如樹無根此難經所云也左脈散亂右脈如豆大彈指不旬日當見果後七日而卒邑中鄉先生士民相傳謂予能預決死生云吳宮詹少溪先生以酒積致胃脘疼又加腰眼足跟肢節皆疼宮詹吳少溪先生有酒積常患胃脘疼近右腰眼足跟肢節皆痛予謂此皆由濕熱傷筋脾肺痰火所致法宜清肅中宮消痰去濕俾經絡流通筋骨自不疼矣切不可作風痛而用風劑公極然之用二陳湯加威靈仙蒼朮黃柏五加皮枳實葛根山梔子進之肢節痛減改用清氣化痰丸加瓦楞子蒼朮枳實薑黃用竹瀝神麯打糊為丸調理而安宜興令君胡太夫人七十二脾泄十五年不愈又加吐紅咳嗽多痰痰不易出有發明宜興令君胡鏡陽公尊堂太夫人年七十二脾泄十五年不愈近加吐紅咳嗽痰多痰亦不易出申酉時潮熱胸膈壅塞不能就枕飲食大減且惡風終日坐幔中諸醫謂發熱吐紅法當寒涼脾泄多年氣虛老蓐法當溫補二病矛盾難於投劑又謂身熱脈大血家所忌益束手無能為計皆辭去且歸咎於長橋上拆屋致正堂不利以是前丁宋二公接跡憂去邑中洶洶因延予治診得兩手脈皆浮而洪數亦皆帶滑予曰據脈洪數為熱滑為痰浮為風邪在表以傷風故惡風仲景曰當汗不汗必作衄症法當清解可無恙也公以諸醫二病矛盾之說為問予曰此暗於先後者也夫脾泄已久未嘗為害新病勢熾宜當速去所謂急則治其標也俟邪去之後補脾未晚且潮熱為風邪所致之熱而非陰虛火動之熱血乃當汗不汗之血亦非陰虛火動之血內經云奪血者無汗奪汗者無血當汗不汗邪鼓血動但得表解熱退血自止耳公憮然曰噫唏疇昔老母過錢塘遇風濤受驚因發熱咳嗽血出痰多今以公言質之誠由風邪起病也願以藥進予用紫蘇子前胡麻黃薄荷解表為君枳殼桔梗桑白皮栝蔞紫菀貝母消痰治嗽為臣酒芩甘草為佐連服二帖五更微汗而熱退胸膈不壅嗽也稍減血止大半始進粥次日減麻黃加白茯苓夜服七制化痰丸其夜痰嗽又減半從是不惡風而去幔矣前方再減枳殼加薏苡仁調理而安曹同府東崗先生患右脅痛予以脈知其傷風傷食所致曹同府東崗先生右脅痛脈之左弦大右滑大此由外傷風內傷食所致也又加咳嗽夜更痛體肥面青寢食俱廢予以紫蘇柴胡解其表白芥子桂皮香附治其脅痛山楂蘿蔔子消其食杏仁陳皮半夏栝蔞仁治其嗽四帖飲食進嗽也除脅痛減十之七再與保和丸服之而安宜興令君胡鏡陽公上焦浮熱胃中食積痰飲又因勞心動火頭面瘡癤作疼宜興令君鏡陽先生上焦有浮熱胃中有食積痰飲平常好食熱物稍涼即腹痛泄瀉大便後間有紅又因勞心動火頭面生瘡癤作疼脈左數右滑數以玄參石斛白芍藥各二錢甘草一錢天花粉連翹貝母各一錢茯苓八分薄荷五分四帖瘡癤皆愈再以保和丸加姜連滑石紅曲白朮丸與服半月全安吳鵡源先生咳嗽口乾腹中如火滾動不思飲食右脅痛吳鵡源先生咳嗽口乾腹中如火滾動不知飽餓亦不思飲食右脅痛脈右滑數左弦數此中焦有痰積也先以總管丸去其痰而後養脾服後大便下稠黏黃糜甚多小水如血此熱下行也繼以保和丸理脾消余痰又使新飲食不生痰也外以桔紅貝母天花粉桔梗酒芩知母葛根甘草滑石服之其咳嗽也除吳鶴洲先生太夫人八十六原有痰火大便日三四行夜兩起腸鳴臍腹膨脹脈三四至一止七八至一止人皆不治予獨起之吳鶴洲先生太夫人年八十六素有痰火大便一日三四行一夜兩起腸鳴臍腹膨脹脈三四至一止或七八至一止諸醫不知溫補妄以平胃散加黃連山楂白芍一切苦寒之劑投之克伐太過因致腹疼顧不咎其誤但謂年高而脈歇至是為凶兆辭去不治逆予診之予曰據脈書云脈緩而止曰結數而止曰促今結脈非凶脈也由寒濕之痰凝滯所致法當溫補下元俾火得以生土所謂虛則補其母者當無恙矣鶴洲公曰壽算何如予曰兩尺迢迢有神壽徵也即百年猶未艾以補骨脂白朮各三錢為君杜仲二錢為臣白茯苓澤瀉陳皮甘草各一錢為佐肉豆蔻益智仁各五分為使四帖大便實唯腸鳴未止減肉豆蔻加炮姜五分而安壽果至九十有八吳鶴洲如夫人胃脘痛百治不效目為怪疾予作肝脾相勝之症治而愈吳鶴洲如夫人病胃脘痛醫有認為蟲者有認為火者又有認為痰為氣為食為虛為血為寒者諸說紛紛百治不效群然指為怪疾請予診兩手大而無力皆六至予曰豈怪耶肝脾相勝之症耳東垣治例腹痛以芍藥為君惡熱而痛加黃柏效效此法則治當萬全矣白芍四錢一半生一半酒炒伐肝補脾為君大甘草二錢一半炙一半生緩肝補脾為臣山楂為佐炒黑山梔仁五靈脂各一錢止痛為使三帖而病愈鶴洲公喜曰君真能用藥神而降病怪者也嘻曹宜崗常夢遺予語以神志不足又疝氣嘈雜食硬喉中作梗曹宜崗常多夢遺予曰此神志不足也又有疝氣近加嘈雜食硬物喉中梗作疼予謂病有緩急則治有先後咽喉之症非急先而何初為清肅上焦次為補養神志俾神旺而精有主可不妄遺然後以下部之劑治其疝清肅上焦用六君子湯加滑石酒連枇杷葉蘆柴根香附吳茱萸四帖嘈雜止喉中寬舒再以豬肝丸補其神志遠志石菖蒲石蓮子韭菜子黃連貝母各二兩白朮五兩枸杞子白茯苓各一兩為末入雄豬肚內飯中蒸熟搗為丸梧桐子大硃砂為衣每晚燈心湯送下二錢治疝丸橘核昆布各四兩川椒山梔子炒黑山楂核各二兩柴胡小茴香各一兩哺雞子殼煅三兩曲糊為丸空心白湯或酒送下三錢不終劑而瘳吳荊樵文學疝氣半年兩跨結核硬痛吳荊樵文學愷悌君子也左關尺脈甚弦疝氣半年兩胯結核硬痛予以平疝丸消之海藻昆布橘核各酒醋炒四兩玄胡索山梔子仁山楂核小茴香柴胡各一兩龍膽草酒炒五錢醋打麵糊為丸梧桐子大空心酒下三錢服一月而消吳鶴洲先生中焦有痰肺氣不足發瘧熱多寒少口渴小水不利體倦頭痛吳鶴洲先生中焦有痰肺氣不足瘧一日一發熱多寒少口渴小水不利倦怠頭疼脈左弦大右寸短弱關尺滑大以石膏知母黃耆同柴苓湯煎服服後腹作瀉前方去石膏知母邪熱減大半唯僅潮熱而口渴甚改以人參葛根知母麥門冬柴胡陳皮甘草白朮鱉甲五更服之而愈吳雪舫先生左脅下紅塊大如雞子旁有小菩蕾作疼予作肝膽兩經有熱毒治而愈吳雪舫先生左脅下紅塊大如雞子旁有小菩藟作疼左脈弦大而數右滑大而數蓋由生平嗜爆炙以使肝膽二經有熱毒也用大栝蔞一枚白芍三錢當歸甘草貝母各一錢連進三帖疼減其半脅下紅成一小癤以解毒早故硬塊潛消大毒不成也仍當為活血清熱再用白芍三錢當歸一錢半金銀花甘草各一錢大栝蔞一枚連翹山梔仁各八分紅花柴胡各五分四帖而愈吳孝廉球泉先生心血不足胃中有痰下元陽氣不充吳孝廉球泉先生心血不足胃中有痰下元陽氣不充脈六部皆弱唯右關滑以遠志枸杞子各四兩巴戟菟絲子破故紙山茱萸各二兩五味子白茯神人參各一兩煉蜜為丸空心淡鹽湯送下三錢外以固陽鎖真丹助之龍齒益智仁各一兩黃柏二兩辰砂甘草蓮花心各五錢芡實粉打糊為丸桔桐子大每夜燈心湯送下一錢五分極能固精李思椿胸膈脹痛痰有紫色瘀血李思椿患胸膈脹痛痰中有紫色瘀血其原有酒積鬱火也脈兩寸短關滑兩手皆數先與紅六神丸服之繼以山梔酒連鬱金香附橘紅茯苓半夏曲甘草滑石紫蘇子服後胸膈稍寬仍以山梔仁貝母益元散各二兩牡丹皮黃連橘紅各一兩半白茯苓一兩紫蘇子鬱金紅曲各五錢茜根三兩神麯打糊為丸每早晚白湯送下二錢調理而愈吳雙泉公病陽亢陰微之候上盛下虛吳雙泉公兩尺脈洪大兩關滑兩尺沉微此陽亢陰微之候上盛而下虛也上盛者痰與火下虛者腎經真陰不足也法當清上補下上清則頭目清利耳鳴眩暈之症可除下實則腰膝不酸筋骨強健清上用清中丸貝母橘紅枳實海石山楂茯苓白芥子黃連黃芩滑石青黛神麯為丸食後茶送下二錢補下用既濟丹辰砂磁石各一兩熟生地四兩黃柏知母菟絲子柏子仁各二兩牛膝枸杞子白茯苓各一兩半煉蜜為丸梧桐子大空心淡鹽湯送下八九十丸李寅齋先生患血淋小水艱澀難出竅痛不可言二年不愈李寅齋先生患血淋幾二年不愈每發十餘日小水艱澀難出竅痛不可言將發必先面熱牙疼後則血淋前數日飲湯水欲溫和再二日欲熱又二日非冷如冰者不可燥渴之甚令速汲井水連飲二三碗猶以為未足未發時大便燥結四五日一行發則瀉而不實脈左寸短弱關弦大右寸下半指與關皆滑大兩尺俱洪大據此中焦有痰肝經有瘀血也向服滋陰降火及淡滲利竅之劑皆無效且年六十有三病已久血去多何可不兼補治當去瘀生新提清降濁用四物湯加杜牛膝補新血滑石桃仁消其瘀血枳實貝母以化痰山梔仁以降火柴胡升提清氣二十帖而諸症漸減再以滑石黃柏知母各一兩琥珀小茴香桂心各一錢半玄明粉三錢海金沙沒藥各五錢茅根汁熬膏為丸每服一錢空心及晚茅根湯送下而愈徐熙宇文學內眷前後心痛耳鳴眩暈嘔逆吐酸四肢痠軟徐熙宇文學內眷常患前後心痛每痛必面赤手心熱耳鳴眩暈即飲白湯亦停膈間不下且作酸嘔逆吐出皆酸水五七日方止四肢痠軟無力氣逆上噯乃其常也兩手脈皆沉數左弦此上焦有痰飲故也先以二陳湯加瓦楞子滑石吳茱萸姜連前胡枳殼竹茹香附大腹皮服後以橘紅半夏滑石各二兩為臣白螺螄殼煅過四兩為君茯苓姜連各一兩半為佐旋覆花一兩吳茱萸三錢為使麵糊為丸每服三錢調理而愈湯簡庵封君素善飲致發腸風且心腎不交湯簡庵封君血分熱甚以善飲致腸風且心腎不交予以四物湯加酸棗仁側柏葉槐花連翹煉蜜為丸服之頓愈吳仰玄先生患胃脘痛痛徹於背痛時冷汗如雨吳仰玄先生患胃脘痛痛則徹於背以手重按之少止痛時冷汗如雨脈澀此氣虛而痛也以小建中湯加御米殼服之而愈粳芝崗文學酒後近內行採戰之法致成血淋粳芝崗文學酒後近內每行三峰採戰對景忘情之法致成血淋自仲夏至歲秋未愈便下或紅或紫中有塊如筋膜狀或如蘇木汁色間有小黑子三五日一發或勞心或勞力或久立坐亦發訪醫問道百治不效以吳中書漢源公交善逆予治之觀其色白而青肌肉削甚診其脈左寸沉弱關尺弦細右寸略滑據此必肺經有濁痰肝經有瘀血總由酒後竭力縱欲淫火交煽精離故道不識澄心調氣攝精歸沅之法以致凝滯經絡流於溺道故新血行至被阻塞而成淋濁也三五日一至者科盈滿溢故耳先與丹參加茅根濃煎服小便解後以瓦器盛之少頃即成金色黃砂乃用腎氣丸加琥珀海金沙黃柏以杜牛膝連葉搗汁熬膏為丸調理外以川芎三錢當歸七錢杜牛膝草根煎服臨發時用滑石甘草梢桃仁海金沙麝香為末以韭菜汁藕汁調服去其凝精敗血則新血始得歸源而病根可除矣三月痊愈吳中翰漢源先生腸風下血腹中微痛吳中翰漢源先生腸風下血腹中微痛脈左寸短右關滑兩尺弦大以地榆槐花枳殼各三錢荊芥穗秦艽青蒿葛根各一錢半黃連二錢兩劑而愈吳大柱史安節公脾肺二經有痰火中焦有濕熱流於膀胱為淋濁大柱史安節公脾肺二經有痰火中焦有濕熱流於膀胱為淋濁溲之前作痛小便了而不了脈左寸短弱關弦大右寸關滑兩尺洪大六部皆數法當先清上中二焦痰火然後提清降濁庶日後筋骨無疼痛之患先與萆薢分清飲加山梔黃柏滑石服之淋濁減半改以二陳湯加山梔黃柏滑石螺螄殼木通以去濕熱而消中焦之痰再加柴胡升麻桔梗以提清氣四帖而愈吳官詹少溪翁有酒積而頻傷怒致右脅之火衝上作痛耳鳴眩暈大便艱澀吳官詹少溪翁原有酒積且頻傷於怒致右脅之火衝上作疼耳鳴眩暈大便艱澀脈右寸關滑數左弦以當歸龍薈丸加牛膽南星治之而愈吳孝廉球泉公內人痢疾後感寒而經至發熱口渴遍身疼等症吳孝廉球泉公內人痢疾後感寒又月水適至大發熱口渴遍身疼胸膈飽悶煩躁頭微疼耳亦聾大便瀉舌上白苔脈七八至亂而無序此三陽合病春溫症也時師誤以為漏底傷寒不治予曰病已危醫而不起者有矣未有不醫而起者也且投三陽藥服之挑察徵應再相時而動以柴胡三錢葛根白芍藥各二錢枳實桔梗酒芩竹茹各一錢天花粉八分炙甘草桂枝各五分服後但覺遍身冷如冰面與四肢尤甚六脈俱無舉家及醫者皆嘆為物故矣予獨曰非死候也蓋夜半陰極陽生勢欲作汗比之天將雨而六合皆陰球泉疑信相半而諸醫聞之皆笑去四鼓後果戰而汗出衣被皆濕四肢體面漸溫神思清爽且索粥舉家欣欣以為再生次日惟耳尚聾腹中大響脈近六至改以柴苓湯加烏梅兩帖而愈吳西云先生庶母筋骨無力不能起止將成痿症吳西云先生庶母筋骨無力不能起止將成痿症上熱下寒易為驚恐小腹左邊疼以玄胡索五靈脂陳皮半夏香附青皮白芍藥茯苓山梔子煎服小腹痛減唯小水頻數改用青蒿山梔子苡仁白芍藥甘草瞿麥服後熱退小水不頻數獨胸膈微痛夜不欲睡再以當歸白芍藥山梔子香附柴胡陳皮甘草茯苓青蒿調理痊愈蔣近思令郎脅痛氣促胸滿喉疼痰有血屑下午潮熱蔣近思令郎脅痛氣促胸滿喉疼痰中有血屑下午潮熱口渴頭重指梢冷服滋陰降火之劑不效且紅愈多痰咳不出請予診之右寸關滑大左尺亦大予謂此肺經有瘀血濁痰壅而為熱也治當先清化不當先滋補以栝蔞仁三錢紅花紫菀丹皮枳殼各一錢滑石二錢甘草五分前胡青蒿水煎臨服加童便一小酒杯二帖而熱退血止唯咳嗽未除胸膈不寬再以栝蔞陳皮貝母蘿蔔子馬兜鈴白茯苓甘草紫菀滑石杏仁調理而愈徐學士檢老正月食新蒜炒肉而又冒風寒咳嗽喉疼聲啞有發明徐學士檢老以正月食新蒜炒肉又冒風寒因咳嗽喉疼聲啞翁原有痰火又為外邪所束不得發越以致此治當潤肺清熱化痰調氣以祛其本兼散邪解表以治其標庶乎喉痛可除聲音可開亮矣先與栝蔞仁橘紅桔梗薄荷貝母桑白皮地骨皮葛根前胡甘草四帖復以滾痰丸同七制化痰丸兩帖夜服諸症除而聲且亮矣此釜底抽薪法也萬肅庵先生令郎發熱旬日口渴舌乾色如沉香萬肅庵先生令郎發熱十一日口渴舌心色若沉香且甚乾燥額上熱極兩脅亦熱耳微聾曾未有汗亦已下二次熱不少除小水絕少神昏足冷飲食不思市醫技窮仍告急於予予診之左脈中按數而有力右脈軟弱據症為陽明少陽並病也當以柴葛湯清其熱看汗有無再當機而處柴胡五錢葛根三錢白芍藥石膏各二錢人參升麻天花粉各一錢粉草七分水煎服之次早診數脈稍緩熱稍退舌齒仍干小水不利神思尚昏沉改用柴胡粉草天花粉黃芩人參白朮茯苓滑石木通澤瀉下午又覺微熱面赤額上痛且重即以益元散三錢服之大便行一次溏而色黃熱仍甚面仍赤服前藥後小水去二次再診之寸關脈將和兩尺尚洪大乃知邪熱在下焦唯利之而已再與辰砂益元散五錢口渴稍止齒下盤雖潤上盤仍燥神思昏沉睡而不醒睛彩不與人相當又知熱在心包絡也宜用陶節庵導赤散二帖而神清唯小水尚欠利以四苓散加酒連麥芽木通煎服再二帖而諸症悉退飲食且進矣大宗伯萬履老夫人右脅痛咳嗽喉干間吐紅腸鳴泄瀉大宗伯萬履庵老先生夫人右脅下疼咳嗽喉干間亦吐紅或一碗或半碗腸鳴泄瀉年六十外原因頭風壞目性急躁左脈弦數右滑數以栝蔞仁二錢黃連前胡桔梗枳殼橘紅貝母白茯苓各八分甘草五分服之次日紅仍不止唯脅疼減半改用山梔仁牡丹皮香附貝母甘草栝蔞紫菀滑石水煎服方欲覓真鬱金苦不能得唐凝庵老先生乃夫人婿也偶至聞之應聲曰有取磨三分用煎藥飲之二帖而紅止痛瘳白仰云先生令眷觸怒暈厥手足冷汗如雨氣息微閉門合目靜坐一時始定白仰云先生令眷每觸怒即暈厥必閉門合目靜坐不留一人在房手足皆冷汗出如雨氣息俱微越一時許蘇如常原以頸生瘰癧多服女醫草頭藥及專科用斑蝥等毒因而脾胃損元氣虧也年三十八曾未生育每日令二婢不住手敲兩腿俟其熟睡乃已不然則睡不安晚至二更後始睡夜半心多驚跳不止指甲皆無血色經將行小腹先疼二日色紫有塊諸病雖如是而肌肉飲食卻如無事人百治不效慕予而請診之兩寸短弱左關大而有力右關滑左尺滑右尺沉微據脈肺氣虛肝木實胃中有痰之症也用六君子湯加丹參酒連青皮外與珠母丸及獨活湯二方調理而安二方出醫學綱目吳心逸先生之使患勞倦傷寒吳心逸先生之使患額疼口大渴身大熱汗多胸膈痞噁心昏沉先與柴苓湯加枳殼桔梗熱減大半次日以六君子湯加黃芩白芍藥當歸調攝而愈蓋勞倦傷寒以致虛極而邪未散故宜先散而後補也吳文學霽陽先生以積學勞心而心肺之神不足吳文學齊陽先生篤志士也以積學勞心又有星士以己卯決科許者其星士前許歷歷有驗至期瘧發不能終場遂心憂而成癲狂日間或悲或歌或鼓掌或頓足甚則罵詈不避親疏貴賤乃叔邀予視之面白而青脈兩寸短弱關弦右關滑兩尺平予謂兩寸脈既短弱此心肺之神不足志願高而不遂其欲鬱結不舒津液生痰而不生血又攻痰克伐太過心神愈不得養故昏亂而無所攝持內經云主不明則十二官危按此則治宜補養收斂心神而兼之清痰可萬全也用酸棗仁人參茯神小草丹參當歸以補心安神黃連竹茹以清肝膽之火玄參佐之外以龍齒珍珠羚羊角牛黃膽星天麻青黛辰砂全蠍水片黃連甘草膏為丸金箔為衣調理而愈宜興令君胡鏡陽公夫人患陰虛陽搏之候宜興令君胡鏡陽老先生夫人夜間熱口渴經行過十日復行小腹痛兩寸關短弱兩尺洪滑予診畢語曰此內經所謂陰虛陽搏之候也可預防之以川芎當歸條芩蒲黃白芍側柏葉生地荊芥進之下午熱甚口中氣如火噴血下如傾內有紫塊小腹仍痛乃用川芎二錢當歸四錢地榆香附各一錢半黃芩一錢蓮蓬殼一枚燒灰煎服兩帖而止太史徐檢老向苦㿗疝而妨生育有發明太史徐檢老向為㿗疝所苦而妨生育辛巳孟秋有江右陳苓泉者以是症為專科寓無錫翁延而治謂將爛藥煮竹片夾陰囊俾陰囊爛見子又以爛藥點開腎子使其中蓄積臭水潰出然後用生肌藥長肉收功翁以此治與道中諸友商之無有勸者而謀於予予曰翁疾非常疾則治當非常治也陳能為翁治於外予當佐陳補於內內外兼治必可成功翁因予言而決用陳是時予有湖州之役而陳用其術治一月囊爛子開洞見水泡第不能使泡破水出也由是胸中氣滿汗出如流終夜不寐飲食減三分之二面青肌肉瘦其半形氣弱而大便艱澀腰腎俱痛苦不可殫述將令人急予予適自湖州至荊溪主吳少溪公家翁時杜門謝客聞予至大喜而促予診脈兩寸軟弱右尺大右關滑予診畢曰向許佐陳治內今其時也比陳技已竭而水不得出翁又難於痛業已用收口藥矣予曰無傷痛由元氣虛憊而汗亦因痛來汗去多則心血不足心血不足則神失養故不寐脾胃為痛所傷故飲食減今只大補血氣不惟痛止疾除即水泡亦可出也陳謂用補收口生肌或可使泡出水或未必然予曰三日後當自見翁曰補甚善奈生平不能服參何予曰翁體非昔比也脈症皆可服又何憂乃用人參黃耆各三錢當歸白芍石斛各一錢五分陳皮貝母紅花粉甘草各八分飲下即睡次早汗斂且索粥胸膈頓寬連服二日痛減大半飲食頓加精神亦爽乃陳恐予奪功私譖之曰孫君之藥雖善但非外科所急服之恐生肌收口後而水終不得出也翁謂必如何而後可陳曰當於前藥加羌活防風白芷遠志減去石斛則外內兩得矣翁然其說且服其藥飲未半而痛立至汗立出頭熱如火氣逆上升夜竟不寐種種病復矣極索予劑予知陳之忌而行譖也乃宣言曰予實佐爾成功耳爾何自敗爾知翁之痛乎元氣虛而毒藥凝滯故補而助之活動其血則毒藥自行藥行則泡可潰水方可出翁之謝爾已有成議予雅善翁來者為義非為利也鄙見與尋常較不牟矣陳聞言而語塞亦以投劑無功遂乘機而聽予治仍用前方加酸棗仁枸杞子皂角刺各一錢兩帖而泡潰出臭水五六碗囊隨消癟陳拊掌曰今而後知用補之神其老先生之福也太史受補自此始吳宮詹少溪翁以長君秋捷受賀過勞而傷飲食丁酉冬宮詹少溪吳公年七十二以長君秋闈之捷應酬賀者過勞過飲又傷於犬肉市醫概用消導之劑投之漠如也反加內熱常州張氏荊溪縉紳大家恃為鎖鑰者至則謂公高年過勞消劑峻而致內熱用補可愈也因投人參則右脅脹痛盡夜難支張又謂補法不瘥唯少行氣之味故無功耳於前藥加木香砂仁辛熱止痛之劑益嘔吐不止脹痛轉劇而大便燥結張不自咎不認病而誤投乃遍語縉紳相知曰吳少翁老年膈食非其所宜丹溪復生無能為也少翁聞予在苕而急予治予兼程而往至則腦之念一日也診其脈左弦右滑兩手皆數且搏指諦視其色神藏氣固唯肌肉略瘦手心甚熱予曰此內傷症非膈食症也公曰諸君言吐而大便燥結食不得下非膈而何予曰否公原不熱不痛又不吐由誤飲藥而使然耳書云通則不痛痛則不通大便既燥而用補非也經曰食不得入是有火也尤用辛熱非之非也以是而治比之以油救火益令其熾耳予見與諸醫不侔也即與琥珀調中丸一帖其夜脅痛稍緩次早診之脈仍如前予決謂非通不可即以龍薈丸與調中丸兼服之五日內下黑糞十五六次諸症悉減飲食大進改以保和丸調中丸調理念七日公即能巾櫛元旦命庖人治酒榜人艤舟拉予泛於南門持觴為予壽曰與兄別者十六年不憚勞涉險而赴吾急自今以後之齒皆兄之賜也敢不銘心為歡竟日至穀日予乃別而復之苕吳別駕勉齋翁體豐腴連跌而口眼歪邪左手足不能動別駕吳勉齋翁體豐腴嗜炮炙任性縱欲年六十七極躁急一日跌傷其齒恬不為意閱三日復跌亦不為意復跌之次日晚左手足忽不能動口眼歪斜陸懷南先生公通家友也即往診之語公諸郎曰此中風也治不可緩急取牛黃丸進之諸郎皆有名博士弟子延予為治診其脈左洪大右緩大觀其色蒼黑神昏鼾呼呼長而吸短呼至口氣𠷺𠷺出不能回終日偃臥如醉人不能動陸曰此非半身不遂乎予曰症候甚惡不特半身不遂也半身不遂者中風已過之疾其勢仍緩亦有十餘年無恙者今才病勢便若此乃中風之漸方來且不可測陸重厚長者所詣亦精聞予言當下瞭然即與予商確用藥始以六君子湯加全蠍殭蠶天麻與之兩日神氣仍未清猶昏睡睡猶呼吸口邊𠷺𠷺然間作吐粒米尚不進前藥再加竹茹又兩日神始蘇欲言而舌難掉囁囁不能出諸口前藥又加石菖蒲遠志紅花始能進粥數口日計亦可茶甌許夜與正舌散同前藥飲之又三日能坐粥亦頗加唯言尚謇澀欲言以筆代口寫我左手甚痛大小便艱少又用四君子湯加陳皮竹茹當歸芍藥紅花鉤藤天麻服三日神思大好飲食日加以是方調理彌月手痛減稍能動足稍能伸扶起能坐且能自按譜鋪牌語言十分清至八九駸駸有萬全之望唯大便有七八日或十餘日始一行予曰此血少之故補養久當自全幸無他用而速害公常自言吾疾乃痰在膈間何能得一吐為快此醫家有授之言也予曰公脈大虛非余痰為害況今以補養而漸安此其明驗何敢輕試一吐願寧耐靜俟毋涉危險也此戊戌九月念五予以是日別往苕城別不及旬公復傾心而任張甲張大言曰公病可吐早吐早愈諸郎君始信予言持議不可彼曰公病痰也不可不吐吐而後補可全愈而無後患不然必成痼疾公欲速效決意吐之諸郎君不能阻一吐而煩躁猶曰吐不快耳須大吐始可再吐而神昏氣促汗出如雨立時就殂可嘆可嘆少塚宰徐檢老以賀壽而臀生痔癰有發明少塚宰徐檢老以萬曆丁酉三月初旬往賀長興臧老夫人眉壽而發寒熱臀近肛硬處生一毒紅腫而痛坐臥為艱因歸荊溪訪治外科即以鑱針點開插藥線於內塗以爛藥使膿血急潰又於瘡口上以生肌藥敷之使易收口可受謝而去未半月其傍之硬處又紅腫痛寒熱交作幾於成膿以前醫有功遂復延之至則又以曏者之法治之受謝而去遞醫遞患遞針而遞插藥計其患者凡八遍計其醫之更者如張如魯如馮凡八人有陳外科者則總其中而受謝獨多其時則丁酉三月至戊戌八月幾年半矣於時予赴吳少溪翁召因知翁在褥亟往謁於臥榻間翁見予至悲喜交集備陳其歷病之由針刀之苦伏枕歲月之深輒為痛心予聞之亦為鼻酸諦觀其色則青慘診其脈皆濡弱把其手足則冷如冰問其飲食減平日之六究其所服之藥則槐角黃柏生地涼血解毒之類予駭然而語翁曰此痔癰非痔漏也痔漏當用掛線以五灰膏點之可愈今腫硬無定處離肛門且遠況其初原無硬塊硬塊由插藥凝滯中來諺云剜肉做瘡者非耶假令非翁稟氣厚胃氣壯安能六十以外之年而當此剝削哉初只可大補氣血即有毒只宜托出一膿而愈未成者使活動消散不復生毒此王道之治不勝於針刀萬萬諸君之治如避影者不知息陰而急趨以求避則影益速而氣促敝矣自迨之道也翁初不逆予者以非外科至聽予之論幡然有悟又見玄珠集有外科二卷益信予之善外科而聽予治予即以十全大補湯進之四帖而飲食加手足暖大便艱澀百方潤而不能行者今亦通利而肛門如不知也諸外科猶曉曉議補非是予極言排之翁惟予為聽予以何首烏四兩人參枸杞子黃耆當歸熟地各二兩槐角秦艽各一兩蜜丸服之不終劑其腫處少出膿而全瘳旁亦不生硬塊益信向之硬塊為插藥之毒所致也翁喜為謔曰予病非孫君諸外科視我疾為金穴其取寧有已耶呵呵宮詹吳少翁患痢赤白兼下里急後重有發明宮詹吳少翁患痢赤白兼下裡急後重市醫治半月後重不除飲食漸減最苦者下午發熱嘔吐乃遣使往苕召予予聞狀心怖即涉險而過太湖一晝夜而至荊溪翁臥榻已二十日觀其色唇紅面瘁聽其聲微弱不揚但一兩語氣即不接續下午潮熱至醜方退形神俱弱診其脈兩手俱大而無力右關略滑予曰據此乃虛虛實實之候不足中之有餘也治當補養兼清兼消緩以治之庶可無恙公深然之以四君子湯加白芍藥黃連山楂滑石陳皮柴胡兩帖而潮熱除嘔吐止去柴胡因口渴不止加葛根六劑而飲食漸進血亦止惟白膿不除改用人參白朮各二錢白茯苓白芍藥當歸神麯各一錢酒連陳皮澤瀉各七分滑石山楂各一錢半外以丸劑消息盈虛調養半月則神氣回而飲食大進肌肉漸生矣少塚宰檢翁問曰諸醫先謂老年痢非所宜又嘔吐飲食不進者謂之噤口且身熱脈大為痢所忌公不旬日而收功豈諸醫稱書之忌皆幻妄哉予曰諸君所言皆至言也第非因時制宜耳愚見以脾胃乃五臟六腑之倉稟故曰納穀者昌又曰人身之內穀氣為寶予姑舍痢不治而先開胃口俾進飲食使新糟粕將宿穢壓下若見糞則後重除而痢易愈也然又相其機宜若食入而腹脹作痛又量勢略與疏通通後或氣虛下墜又因勢而略與升提大抵以理脾開胃進飲食為先此亦遠交近攻之策日雖多功可萬全矣斯僕一得之愚屢試而屢驗者也設不先開胃口不審老弱不揣緩急一概治痢雖有得未必無失豈能勝算哉公曰善臧少庚年五十飲食不順利喉管中梗而難下臧少庚年五十每飲食胸膈不順利覺喉管中梗梗宛轉難下大便燥結內熱肌肉漸瘦醫與五香連翹湯五膈丁香散諸治膈之劑嘗試之不效時予方有事於先塚久未遠出臧則不遠千里而就予治觀其色蒼黑目中神炯炯不眊唯氣促骨立予知其有機心人也其脈左弦大右滑大予謂之曰據脈乃謀而不決氣鬱成火脾志不舒致成痰涎因而血少便燥內熱肌消張雞峰有言膈乃神思間病即是推之子當減思慮斷色欲薄滋味絕妄想俾神思清淨然後服藥有功不然世無大丹而草根木石何足恃哉子既遠來予敢不以肝膈相照茲酌一方頗妥歸即制服但毋輕示人恐見未精者妄為加減乃敗事矣慎之慎之臧曰謹如教其方用桂府滑石六兩炙甘草一兩真北白芥子蘿蔔子麝干連翹子各一兩半辰砂五錢以竹茹四兩煎湯打饅頭糊為丸綠豆大每食後及夜用燈心湯送下一錢半一日三服終劑而病如失
