body:
  text: 卷一三吳治驗萬曆龍飛二年吳小峰小川目疾萬曆龍飛二年小春月豫始遊苕之東雙林於時族兄吉泉之友吳小峰與其弟小川俱病目專科者愈治愈重其目始紅腫次加太陽痛繼則白星翳疊出豫不以目科名而識者稱豫大方因謀于吉泉曰醫以通變為良昔秦越人過邯鄲聞貴婦人則為帶下醫過洛陽聞周人愛老人則為耳目痹醫聞東宿君國手也必能隨俗為變願一言去吾兄弟目疾吉泉邀豫余曰嘉靖間論醫者必首西吳如周仲仁氏凌漢章氏王賓湖氏者皆擅一時名其家世必有傳也何需於豫吉泉曰渠家慕弟久矣且其尊人受博士易為西吳名家弟好易幸一往藉此為談易地勿遜診其脈小峰之脈濡而緩大兩目血縷直貫瞳人薄暮則疼小川之脈皆洪大鼓指黑珠有浮翳瘼隱澀難開大小便皆不利故於小峰用補先以清肝散與之夏枯草五錢香附四錢甘草一錢五分細茶五分以徹其痛藥兩進而痛止繼用人參白茯苓熟地黃枸杞子桂心牛膝破故紙白蒺藜牡凡皮服八日而愈於小川用瀉內用瀉肝湯及當歸龍薈丸外用象牙冰片為末點之七日痊愈其尊君我峰翁喜詣余曰二目均病年同齒染同時諸醫同治而同不愈先生一補一瀉而二病均愈何哉余曰此陰陽虛實之辨也經云實者正治虛者從治令侄之症惟厥陰肝火熾盛肝常有餘有餘者瀉之正治也郎君下虛又為怒所激怒則火起於肝肝為藏血之地故血絲貫瞳人而薄暮作痛方用夏枯草香附為君疏其肝氣經云肝苦急急食甘以緩之故用甘草為臣茶能清頭目用以為使先為去此痛經又云水流濕火就燥故復用甘溫補其下元之虛俾火得歸元此從治也若用苦寒降火之劑不惟血凝而痛加抑且激其火而使愈熾矣我峰聞之語人曰孫君本陰陽而治寒熱是用易為醫也故補者補效攻者攻效語曰不知易者不可以為太醫孫君神於易而於醫乎何有願於吾苕懸一壺也余哂之謂昔韓伯休且不欲人間知其名余又何壺之可懸哉萬曆甲戌沈中丞案萬曆甲戌其年自仲秋徂冬瘄子盛行三月內豫所治男婦嬰孩共七十二人苕之望族沈最著大中丞觀頤公當考功時幼君瘄喘嗽不寧聲啞發熱泄瀉斑紫不斂豫以小無比散愈之夫人妊腹痛昏厥者五日名醫如高陳二公者沈姻婭無巨細悉任之亦不能措手豫至診之兩手脈皆洪大法當下衆僉以妊難之豫曰經云有故無殞亦無殞也妊已九月將解即胎動奚傷若當下不下不獨其痛難忍而變且不測考功是豫言而請藥豫即用小承氣湯加蘇梗砂仁下之而安考功偶冒風頭痛倦怠發寒熱如瘧脈弦浮而數豫曰此小柴胡湯症也一劑而瘥考功請告家居者二十年篤好方書豫初之苕苕人未知豫考功聞豫亟欲識之謂豫治病甚奇又與豫論傷寒痘疹胎産皆中窾深然之語人曰良相良醫等爾如孫君所詣即千金不足為其重特撰醫說書於冊以不朽孫君云張孝廉後渠大頭疫張孝廉後渠丁年患大頭疫頭大如斗不見項唇垂及乳色如紫肝昏憒不知人事見者駭而走其年疫甚癘人畏傳染致廢吊慶張與考功公子同受春秋於會稽陶春源所陶邀余診之其脈皆浮弦而數初以柴胡一兩黃芩玄參各三錢薄荷連翹葛根各二錢甘草一錢服三劑寒熱退弦脈減但洪大豫知其傳於陽明也改以貫衆一兩葛根天花粉各三錢甘草一錢黑豆四十九粒一劑腫消其半再劑全消漿粒不入口者二十一日再與小柴胡湯兩劑服之始納干糕如指者二條次日進粥而漸平矣丁酉秋闈報捷吳江孫行人痛風有發明吳江孫質庵老先生行人時患痛風兩手自肩髃及曲池以至手梢兩足自膝及跟尻腫痛更甚痛處熱飲食少請告南還而伏蓐者三年里有吳君九宜者沈考功西席也見豫起後渠疾因語行人逆豫診其脈皆弦細而數面青肌瘦大小腿肉皆削豫與言此病得之稟氣弱下虛多內以傷其陰也在燕地又多寒經云氣主煦之血主濡之今陰血虛則筋失養故營不營於中氣為寒束百骸拘攣故衛不衛於外營衛不行故肢節腫而痛痛而熱病名周痹是也治當養血舒筋疏濕潤躁使經絡通暢則腫消熱退而痛止矣痛止即以大補陰血之劑實其下元則腿肉復生稍愈之後願加珍重年餘始可出戶行人聞而喜曰果如公言是起白骨而肉之也吾即未藥病似半去惟公命劑豫先以五加皮蒼朮黃柏蒼耳子當歸紅花苡仁羌活防風秦艽紫荊皮服之二十劑而筋漸舒腫漸消痛減大半更以生地龜板牛膝蒼朮黃柏晚蠶砂蒼耳子苡仁海桐皮當歸秦艽三十劑而腫痛全減行人公益喜豫曰病加於小愈公下元虛憊非歲月不能充實古謂難足而易敗者陰也須痛戒灑色自培根本斯飲藥有效而沉疴可除據公六脈輕清流利官必腰金願葆真以俟之萬毋自輕來春氣和可北上也乃用仙茅為君枸杞子牛膝鹿角膠虎骨人參為臣熟地黃黃柏晚蠶砂茯苓蒼耳子為佐桂心秦艽澤瀉為使蜜丸服百日腿肉長完精神復舊又喜語豫曰貧官何以稱報撰次公濟人澤物盛德於沈考功冊後以彰盛美云後十年行人官至江西副憲鄭都諫公子痘有發明鄭都諫春寰公長君四歲患痘稠密煩躁醫者星羅皆以為熱盛不退形枯色紫頂有焦勢症逆必不可為將辭去豫至細觀之見兩太陽圓淨神氣蒼厚謂當急為涼血解毒用赤芍藥生地黃各三錢紫草二錢連翹黃芩貝母山楂木通各一錢蟬蛻甘草各五分藥成劑而衆止之曰麻要清涼痘要溫故博愛心鑑以保元湯為良吾儕將劑而進之乃公獨主寒涼保元之謂何豫曰用藥貴對症保元湯良矣必血活熱清而後可用今血熱毒盛而用溫劑是火熾添油也衆曰若慮毒未解吾苕酵法甚佳用桑蟲雞冠血調酒服之痘即立起而慎氏王氏茅氏皆苕上專門名家亦以為言豫曰此法亦可用於清解之後經曰諸痛瘡瘍皆屬心火火未退而用是以毒攻毒其勢愈熾豫故欲先清解而後保元也惟楚銅壁山人黃桂峰者治痘高手也獨語鄭公曰孫公之劑實與症對衆論皆膠固不達變者第恐清解之劑用遲一日爾試煎服之以觀其後鄭公命僕速煎衆猶持議曰如必服此劑亦當揀去貝母山楂鄭公聽其減去至夜豫始聞隨語桂峰曰減去二味恐七八日後不能無它症桂峰曰何以故豫曰此痘內傷外感俱未清楚今帶熱而出故其腹猶膨脹去貝母恐搶喉去山楂恐泄瀉七八日痘毒出盡腹內空虛變從虛出諸君素以痘專科何不慮及此其夜服藥後即嗒然而睡天明痘色明潤焦頂盡退血亦漸活惟嘔噦搶喉衆又以昨日之劑太寒所致豫曰此火毒未盡徹也宜進竹茹湯而慎云峰怫然早吾家世世業痘年亦七十有五曾未見治痘用竹茹者春寰公令弟樂津公撿痘疹全書用竹茹者以正慎語塞悻然而去藥進而噦止至八日果泄瀉發癢豫以保元湯加白朮以治瀉大加何首烏以止癢一帖而癢止至十四日天庭兩顴皆回漿作靨惟兩頤漿未回泄瀉不止豫因偶出北門半日歸見其口開項軟手足痘氣盡癟復又作脹已成內攻舉家啼泣豫亦茫然不遑為計嘆息出門樂津公把而送之少間揖別而聞衣間痘臭語樂津公曰公聞臭乎曰聞豫曰似有生意亟還起之豫思兩頤乃腎經部位獨不回漿者腎元虛也峻補腎元庶可使活先以紫河車一錢用灑漿調服固其元氣服後即睡繼以人參一兩黃耆菟絲子各三錢作大劑服之一日夜服人參一兩八錢黃桂峰是夜自松江還時已四鼓亟叩門而入鄭語之變且告之服藥黃曰俟吾看作何狀見其結靨之下腹灌一錢黃漿贈痘盡起桂峰曰萬全矣非孫公不能起此病桂峰由此益昵豫出必聯舟歸則同榻相印正者三年鄭公感豫而作序以贈親書孫憲副公冊後識不忘也張文學子心病虛弱有發明張文學子心二尹可泉公長君也自知醫弱冠病吳下名醫皆診之僉曰瘵治久不效子心亦自分必死督家人具祕器已沐浴衣襚衣而臥正寢斷粒絶藥者二日可泉聞豫治其高第張星嶽之嬸奇因訪豫曰病心痹而尸寢浹旬者能起之誰不嘖嘖稱公高手吾子病且革幸憐而診之豫至診其脈左寸短弱右關略弦余皆洪大其症咳嗽下午熱從兩足心起漸至頭面夜半乃退面色青形羸氣促多夢遣交睫臥床褥奄奄一息耳時則七月初旬也診畢語可泉公曰郎君病可治不宜豫凶器也可泉公曰諸醫僉謂火起九泉者十不救一大肉盡削者死咳嗽加汗者死脈不為汗衰者死又當此鑠石流金之候又恐肺金將絶豚子亦自謂無生理先生何言可治也豫曰汗多者孤陽幾於飛越也可泉公曰飛越亦死候也豫曰幾者將成未成之辭也症雖危其色其聲音其脈尚有生意終不可以一凶而廢三善兩顴不赤心火未焚也聲音不啞肺金未痿也耳輪不焦腎水未涸也相書云面青者憂疑不決左寸短者心神不足關略弦者謀為不遂夫心者萬世萬化之主內經曰主明則下安主不明則十二官危又肝主謀為膽主決斷謀為不決故色青症與色與脈皆非瘵也蓋郎君志願高而不遂其欲殆心病非腎病也經曰色脈相得者生豫故謂郎君之病可起也病者聞言明目語其父曰吾今由寐者初寤矣從來未有此論沁吾心脾也吾病由星士許決科於癸酉是年餘落第而同窗者中故怏怏至此先生得吾心於色脈神矣此言可當藥石謹拜命豫為定方煎方名調肝益神湯以人參酸棗仁龍骨為君丹參石斛貝母麥冬五味子為臣山梔香附為佐服二十帖而病起丸方則大龜板熟地黃枸杞子人參麥冬五味茯苓蜜丸服三月而精神健肌肉完次年生女可泉公苕中名士奇豫治而延譽聞於大宗伯董潯陽公宗伯交歡豫者由可泉公始也大宗伯董潯陽翁脾胃疾有發明大宗伯董潯老年六十七有脾胃疾翁以過啖瓜果而胸膈脹痛時當處暑也延豫治診其脈寸關弦緊觀其色神藏氣固翁門下蔣虹橋沈樂閒者多藝人也翁素親信二公詰余曰症脈何如豫曰症脈雖胸腹脹痛然易瘳也二公曰翁生平不能素食食輟瀉今不茹葷者半月燕居好奕好看書好作詩文即盛暑亦手一編不言倦日永亦不瞌今不親筆硯者月餘不櫛沐者七日它一切無所事事倦極矣諸名家如沈竹亭沈春宇金樗丘者劑備嘗之無益也而公何言易豫曰諸公不過用二陳平胃加山楂麥芽等消導劑耳與症何涉蓋翁傷於瓜果而為寒濕淫勝經云寒淫所勝治以辛溫然瓜果非麝香肉桂不能消此諸公所以不能愈翁疾也豫以高良薑香附各一兩為君肉桂五錢為臣麝香一錢為佐每服二錢酒調下之藥入腹胸次便寬再而知餓三服而巾櫛交接賓客如未病者翁語沈蔣曰孫君所見所養度越諸人若是往聞治張氏子氣絶兩日而能活之今於活吾病益信誠臨淄虢國之遺特書一軸以彰其高因以紀一時之良遇云董龍山夫人便血大宗伯郎君董龍山公夫人為憲副茅鹿門公女年三十五而病便血日二三下腹不疼諸醫診治者三年不效豫診之左脈沉澀右脈漏出關外診不應病豫竊謂血既久下且當益其氣而升提之以探其症乃用補中益氣湯加阿膠地榆側柏葉服八劑血不下者半月彼自喜病愈矣偶因勞而血復下因索前藥豫語龍山公曰夫人之病必有瘀血積於經隧前藥因右脈漏關難憑故以升提兼補兼澀者以探虛實耳今得病情法當下而除其根也龍山公曰三年間便血雖一日二三下而月汛之期不爽每行且五日如此尚有瘀血停蓄耶豫曰此豫因其日下月至而知其必有瘀血停蓄也經云不塞不流不行不止今之瘀實由塞之行也不可再澀古人治痢必先下之亦此意也公曰明日試卜之豫曰卜以決疑不疑何卜公隨以語夫人夫人曰孫先生非誤人者識見往往出尋常宜惟命蓋夫人讀書能文聰明謀斷不啻丈夫故言下便能了悟即用桃仁承氣湯加丹參五靈脂荷葉蒂水煎夜服之五更下黑瘀血半桶其日血竟不來復令人索下藥豫曰姑以理脾藥養之病根已動俟五日而再下未晚也至期復用下劑又下黑血如前者半繼用補中益氣湯參苓白朮散調理痊愈馬廚瘧痢併發有發明大宗伯董潯老門下有馬廚者七月初旬病病二十餘日愈劇而勢甚獗時宗伯對余奕正酣而蔣虹橋沈樂閒報曰馬廚危在旦夕宗伯聞之推枰嘆息曰吾命吾命豫叩其故語曰能廚者不下二十人獨此廚適吾意將恃之以怡晚節今病不可起奈何豫詰何病翁顧蔣與沈曰第詳道其狀蔣沈述其症大發寒熱寒至不憚入灶熱至不憚下井痢兼紅白日夜八十餘行腹痛噁心汗多神氣倦甚究其脈曰脈不吉下痢脈洪大者死細微者生今洪大逆也豫曰痢固忌洪大寒熱亦非細微所宜其中必有故二公曰幸一往決之潯翁不可謂何可以細人而勞長者豫曰醫寄人生死何論巨細矧事翁之人猶不可坐視不救也潯翁欣然握余手偕行至宅後橋余入門同居數十家皆執香拱立以伺診其脈察其症果如蔣沈所言其面色微紅汗淋淋下豫究病所由起渠謂過客衆廚間燥熱食瓜果菱藕過多晚又過飲御內而寢於樓檐之下次日即寒熱腹痛因而下痢雖得其病情尚未融通一治法因沉思之不覺行至橋而潯老猶立而俟豫見豫無婉容知病重遂置不問如前握余手而回蔣沈問余可治否豫曰僥幸先生寵靈偶有一得乃背水陳也人參白朮石膏滑石各五錢知母炮姜各三錢大附子炙甘草各二錢作一大劑煎之蔣沈將問豫潯翁即命近侍煎於其側不欲蔣沈問也熟則付飲之飲訖即睡老先生曰服後何狀為佳豫曰倘得一睡則陰陽始和和則汗可斂而寒熱嘔惡可止也蔣沈曰聞已睡矣明日巳刻二公鼓掌來言夜來痢減半汗吐全無脈亦斂矣再用人參石膏白朮白芍藥滑石各三錢炮薑肉桂知母各二錢炙甘草附子各一錢服後瘧止痢又減半飲食漸進神氣漸轉改用白芍藥酒炒五錢人參白朮滑石各二錢甘草陳皮炮薑肉桂各一錢三劑而痢全止飲食加漸就安矣蔣沈問曰公寒熱均投此為何症而劑何名也豫笑曰此滑公所謂混沌湯也潯老又問豫對曰經云夏傷於暑秋必瘧痢白虎湯益元散皆解暑之劑瓜果寒涼傷其中氣酒後御色損其下元附子理中湯正所以溫中補下者內經又云實者邪氣實也故以白虎湯益元散應之虛者正氣虛也故以理中湯應之若以寒熱均用為疑而張仲景附子甘草瀉心湯即用大黃黃連又用乾薑附子此何說哉蓋假對假真對真也潯翁躍然喜曰先生惟是故能起垂斃之人而生之余詩冊中臨淄虢國之談非虛語矣吳肖峰令政腹痛有發明吳江吳太僕長君肖峰令政太宗伯董潯老次女也患咳嗽體倦多汗腹痛呻吟不絶口者半月吳江之醫不效訪遠近名最著者如姑蘇盛氏後湖王氏後山震澤沈氏竹亭先後遞治之而痛愈加豫適寓苕城龍山公邀豫乘快船兼程而進至則診其脈左手三五不調右手沉弦面色青而息甚微腹中漉漉有聲豫因問上年夏月曾病否肖峰曰曾頭痛體倦多汗動止無力不能親事但不咳嗽不腹痛今五月初病如上年而市醫謂傷風所致用參蘇飲表之始咳嗽沉為其清嗽則加腹痛王與盛謂通則不痛以沉香滾痰丸下之則勢憊而不可支豫方殫思謂此乃疰夏病仲景謂春夏劇秋冬瘥者是也而龍山公詰問疰夏何為咳嗽豫曰原不咳嗽由參蘇飲而咳嗽也汗多又重發汗肺金受傷故燥而嗽何為腹痛豫曰原不腹痛因治嗽而寒其中氣腹故痛也後事者又不究其因寒而痛乃謂通則不痛而用寒涼滾痰之劑重傷其中氣不思五月六陽之氣皆散於外汗而又汗汗多則亡陽夏至一陰將萌腹中尚虛虛而復下下多則亡陰陰陽俱亡不憊何待豫欲酌一方以起之恐從事者又將議其後龍山促之乃用灑炒白芍五錢甘草黃耆各三錢桂枝二錢大棗二枚水煎臨服加飴糖一合吳下諸公果群然又辨龍山公曰不必辨病者望此以蘇其生速煎飲之飲訖而睡自已至申不醒先事者皆搖首命僕急攜藥囊將去且語龍山公曰奪令妹之速者孫君也本草云夏不用桂伐天和也諸痛不補助邪氣也故一飲而不醒吾儕行矣龍山公以其言語余因詰病者之熟睡豫曰所善者以其睡也睡則陰氣生陰生則汗可斂痛可止也假令藥不對症安得有此又詰所投之劑何名豫曰此仲景小建中湯也出金匱要略蓋建者立也中者陽明所主今腹痛如縛帶脈急縮也東垣治例腹痛以芍藥為君惡寒而痛加桂甘草緩帶脈之急縮用以為臣經曰急者緩之面青脈弦肝氣盛也肝屬木木盛則脾土受制而又誤下因傷之極故痛之猛也經云木得桂而枯佐以黃耆伐肝補脾又能斂汗止痛此建中之所由名也語未竟內報病者醒而索粥豫曰與之穀氣進則有本矣粥後又睡至天明腹全不痛惟稍咳嗽加五味子麥門冬兼治疰夏而全瘳焉龍山公述病之始末劑之藥味報大宗伯宗伯公致書於豫曰足下以四味之常藥振不起之危疴名震三吳聲溢兩浙昔宋景濂為朱丹溪立傳吾固不敏幸先生以所治節條敷之俾序以傳於後俾工是術者有所籍乎豫憮然語龍山公曰何修而得老先生寵幸之深也第令妹被克伐太過陰陽俱亡今病雖愈而脈弦不退猶可為慮幸叮嚀戒暴怒節飲食謝去人事恬淡多補庶可永年不然亥月陰極陽生恐不能保無患也慎之慎之後至期與肖峰齟齬怒而絶藥果以凶聞苕人多豫之直與先見云大光祿龐太夫人寒熱頭痛飽悶大光祿龐公子遠吳江人也其太夫人病頭痛惡寒胸膈悶且痛時發寒熱吳醫王后山者有時名吳人最所篤信延治五日不瘥聞豫居吳禮致為治診其脈右滑大左浮弦而數問服何劑光祿公曰不識而有藥在豫視之偶失言曰左矣時有西席項姓者聞言而厲聲曰此三吳最名士也渠發劑而有議者輒面唾之幸不在爾豫笑曰渠是而議者非則當唾人渠非而議者是是自唾且不暇何暇唾人四物湯玄胡索牡丹皮香附子養血調經劑也太夫人七十餘矣而有經可調哉投劑之左由生平守常套而不知因人因症隨俗為變也項子曰此何症豫曰仲景有云頭痛惡寒外感病也浮弦而數胸膈悶痛少陽脈症俱在右脈滑飲食滯而為痰彼用當歸地黃芍藥皆滯痰閉氣之味內傷何由得消外感何由得出此症只宜用柴胡湯合平胃散一二帖可瘳也項猶有言光祿公曰勿辨飲藥而涇渭明矣一飲而寒熱除再飲而胸膈泰光祿喜曰奇公名不虛附矣豫私問項子何極譽王光祿曰項初受業於王未睹大方而獨是其師說多見其識之不廣也光祿公痰火脅痛有發明光祿公後有事於莊所值中秋乘酒步月失足一跌扶起便脅痛不能立晝夜不寧行血散血活血之劑一日三進閲三月服二百餘帖痛不少減因迎豫治診之脈左弦右滑數豫曰此痰火症也公曰否賤軀雖肥生平未嘗有痰徒以遭跌積血於脅間作痛爾豫曰據脈實痰火也痰在經絡間不在肺故不咳嗽而亦不上出脈書云滑為痰弦為飲豫據脈而認痰火如瘀血脈必沉伏或芤或澀也面色亦必帶黃前諸君認瘀血治者皆徇公言不以色脈為據且多服峻厲克伐破堅之劑無效此非瘀血之積明矣公欣然請藥即用大栝蔞殼者二枚重二兩研碎枳實甘草前胡各一錢貝母二錢與四帖公以為少豫曰愚見猶以為多此症服之一二劑可瘳又即報我為制補益之藥可也公得藥一更矣仍煎服五更腹中漉漉有聲天明大瀉一二次皆痰無血痛減大半再服又下痰數碗許痛全止隨能挺立三服腹中不復有聲亦不瀉蓋前由痰積瀉也今無痰故不瀉公曰望聞問切四者醫之要務人人皆著之口吻有先生獨見之行事即豫母子之疾先有事者皆吳之名流微先生吾殆撞壁矣何能還轅而生哉吾於是益服先生之高張思軒夫人心痹有發明進賢三尹張思軒公與潘少保印川公皆受室於施氏稱聯襟云施故富家而張公夫人賢慧治家勤篤為人精潔周致以産多而氣血憊又以婚嫁繁而費用不支積憂年將五十因病心痹發則暈厥小水短澀胸膈痛不可忍煩躁乾噦惡內蒸熱氣苾苾上騰肌削骨立月汛不止苕城時輩有認為氣怯者有認為膈食者皆束手無措尸寢浹旬漿粒不入口者五日凶具備而待斃舉家計無所之惟神是禱豫適在潘府逆豫診之脈左弦大右滑大而數診畢豫曰可生也病機云諸逆吐酸皆屬於火諸風掉眩皆屬於木法當調肝清熱開鬱安神諸醫群然目攝而背謔曰書云骨蒸肉脫者死形瘦脈大胸中多氣者死絶穀食者死孫君獨許其生果藥王再世哉豫若不聞而撿藥以進竹茹滑石各三錢白豆蔻仁七分半夏曲橘紅姜連茯苓各一錢甘草五分水煎令一口口咽之服畢噦止暈定次日用溫膽湯調辰砂益元散三錢服之胸膈頓開漸進飲食小水通長煩躁盡減駸駸然安若無事後用逍遙散六君子湯加黃連香附三越月而肌肉全精神如舊苕入駭然曰能起此病信藥王矣馬迪庵公內傷腹脹大小便不利有發明馬二尹迪庵公年五十五以掃墓而過食鰻肉捲餅心腹脹痛市醫不知用吐而遽用硝黃下之大便不行脹痛愈增繼至者又用木香檳榔丸繼又有下以小承氣湯者有下以大承氣湯者十日多脹痛益甚飲食粒不能進大便並不行小水亦僅點滴後醫又以大黃芒硝多服不行謂非白餅子不可服五日而脹痛尤加又謂非備急丸不可服三日脹痛益不可當又用甘遂芫花大戟牽牛之屬服三日不惟大便不行並小便點滴亦無矣脹不可言衆醫大叫稱怪自三月初二日起至是念二日矣有名士王南野者用灸法灸中脘三十餘壯毫不為動因斷其越三日為念五戌時當棄人間迪老四子皆逢掖聞言涕泗時有張太學懷赤者迪老甥也見豫起張思軒夫人疾喻亟請豫豫至觀其色蒼黑神藏不露聲音亮惟腹大如覆箕不能反側診其脈兩手皆滑大兩尺尤有力究其受病之源查其歷服之藥豫駭然以為未聞且見也因思一治法先用六君子湯加木香砂仁參術俱用二錢乃旁有錢小松者自稱家世受醫見劑爭之豫曰非若所知也彼猶喋喋詰豫謂人言中滿者瀉之於內大小便不利者當先利大小便然歟豫曰非人言素問云云也又云諸痛不得用參朮蒼黑之人尤忌先生既知素問奈何不用通而用塞也豫悄然不答顧迪老諸子言曰錢君拘儒常見何能起尊君病尊君非中滿脹症內傷症也當始傷時猶在上膈法當用吐素問云在上者因而越之是也不用吐而用下藥以傷其脾脾氣傷則失運動之職是以愈下愈傷愈傷愈脹不思脾氣傷而神不為用藥不能行以峻厲味益下之是遵何說也豫因脾傷故用六君子湯以醒其脾木香砂仁助其運動再用吐法吐出前藥豫劑非治尊君之病治諸君藥也豫初欲為諸君諱何錢君激豫而使暴其短哉且豫不慮大便不行獨慮行之不止也錢又謬言急則治標今法用盡不能使一行何以不止為慮豫曰君試思常人能服硝黃幾何服巴豆白餅子幾何今硝黃服過五斤巴豆白餅子之屬服過五六兩又加甘遂牽牛芫花大戟至悍至急之劑幸而大便未行藥性未動尚可為計若一行而諸藥性動譬瓶水底漏其中能蓄點滴哉危矣錢又詰迪老多服下藥而大便不行何也豫曰此易知之始為食傷繼為藥傷所傷在上中二焦下元未損故兩尺脈尚有神氣難經曰人有兩尺如樹之有根也內經曰腎者胃之關蓋腎主大便觀其色蒼黑神藏氣固皆由根本未動賴此猶可為也服藥後腹中大痛豫知其藥力已動改用人參蘆防風蘆升麻桔梗各三錢水煎服之少頃用鵝翎探喉中令吐之前服藥物一湧而出十數碗病者以手加額曰目前光矣此巳時也豫曰酉時大便必行可預買人參數斤以備不虞至午進至寶丹一帖以溫中氣未申間腹中汩汩有聲濁氣下滾傾刻間腹寬數寸至晚大便行一次小水略通豫即用人參白朮各五錢炮姜三錢茯苓二錢木香甘草各五分陳皮一錢令急煎服四鼓又大便一次小水繼至脹痛漸減次日大便瀉十次余因以前理中湯劑為丸與煎劑兼補腹脹全消飲食漸進共瀉七十二日服人參二斤余苕人聞以補收功群然異之而錢小松始帖然心服曰奇哉奇哉人多用攻孫君獨用補人多用下孫君獨用吐由見之真而所投者確也醫可易言哉今而後知孫君之高矣潘大司馬腸風潘大司馬公嘗有腸風之疾八月丁祭學博饋鹿血食之而血暴下致豫治用槐角子五錢黃連枳殼地榆貫衆各三錢一服而止大司馬善其方書之黏壁間遇有便血者輒依方藥之無不立愈喜甚鼓腹謂諸子曰往而姨之疾族醫無不言必死孫君獨能生之神哉進乎技矣豫曰昔扁鵲有言豫非能生死人也此當自生者越人使之起耳豫何能亦張安人當自生也大司馬公由是益重豫病無巨細悉任之而豫亦得盡其術云馬鳳林內子隱疾有發明迪老之子鳳林見豫起乃翁疾乘間語曰內子包有隱疾每月汛行子戶傍輟生一腫毒脹而不痛過三五日以銀簪燒紅針破出白膿盞余而消不必帖膏藥而生肉無疤痕初間用針刺近只以指掐之膿即出但汛行即發或上下左右而無定所第不離子戶也於今八年內外科歷治不效且致不孕先生學博而思超幸為籌之豫沉思兩日而悟曰此中焦濕痰隨經水下流壅於子戶也經下而痰凝故化為膿以原非毒故不痛用白螺螄殼火鍛存性為君南星半夏為臣柴胡甘草為佐麵糊為丸令早晚服之未終劑而汛行不腫次年生女舜田臧公氣虛中滿舜田臧公吳車駕湧瀾公嶽也年將六旬為人多怒多欲胸膈痞脹飲食少時醫治以平胃散枳朮丸香砂丸不效復以檳榔三稜莪朮之類日消之而大便溏瀉兩足跟踝皆浮腫漸及兩手背醫又以其手足浮腫而認為黃胖者以針砂丸與之腫益加面色黃且黑自二月醫至八月身重不能動止又有以水腫治者車駕公雅善豫因延診之脈沉而濡弱豫曰此氣虛中滿症也法當溫補兼升提庶清陽升則大便可實濁陰降則膈胸自寬以人參白朮各三錢炮薑回陽陳皮各一錢茯苓黃耆各二錢澤瀉升麻肉桂蒼朮防風各七分三十帖而安客有疑而詰豫曰此症諸家非消導則淡滲而先生獨以溫補收功腹中積而為滿為腫者從何道而去也豫曰脹滿非腫滿比也故治不同腫滿由脾虛不能攝水水滲皮膚遍身光腫今脹滿者先因中虛以致皮脹外堅中空腹皮脹緊象鼓故俗名鼓脹蓋由氣虛以成中滿若氣不虛何中滿之有氣虛為本中滿為標是以治先溫補使脾氣健運則清濁始分清濁分而脹斯愈也金溪令君臧老夫人大頭疫有發明金溪令淨涵臧公尊堂太夫人以季春眉壽連看戲文二十餘本且多食魚腥蝦蟹偶發寒熱三日不退第四日左耳前後及頰車皆紅腫第五日右邊亦腫第六日腫及滿頭紅大如斗眼合無縫昏憒不知人事譫語若有邪崇粒米不進者八日舉家驚惶逆豫為治診其脈六部皆洪長而數豫曰此大頭疫也即以貫衆石膏各六錢柴胡葛根各三錢赤芍藥天花粉各二錢甘草一錢黑豆四十九粒水煎服之日進二帖脈始減半第九日方進粥飲半盅前藥除石膏又四帖而安是役也人皆為豫危之謂八十之尊年八日之絶粒頭大如斗體熱如燔炭昏憒譫語乃不去而治何冥行不知止如此而其壻閔懷海亦言病勢如此吾心亦危疑見先生安閒而甘寢食賴以少慰豫曰此疾為陽明少陽二經熱壅而然夫陽明多氣多血之經也以高年故不敢用硝黃惟投以輕清解散之劑使因微汗而解症脈相對雖重可生假如人言以高年病危而棄不治豈惟非醫之存心於病家相托之意亦孤矣可乎哉潘見所公半身不遂有發明丙申夏見所潘公謁豫於海陽邑邸時霪浹旬邑市水漲公至豫驚問曰公貴倨也者何堪此公曰與君間者闊矣且先君服闋秋當北上不卜補任南下謁求一診他何計豫究何疾公曰無第年甫逾疆微覺陽萎次早診畢語其隨行俞金二字曰公脈上盛下虛上盛為痰與火下虛為精元弱切宜戒色慎怒劑宜清上補下不然三年內恐中風不免蓋由痰生熱熱生風也謹之識之乃為立方別去公亦未暇制服公次年八月往返武林不無勞怒又屆中秋連宵酒色平常色後輟用鹿角膠三錢人參一錢酒送下以連宵有犯乃用鹿角膠五錢人參三錢空心服之十七日薄暮偶與社友談詩筵間左手陡然顫動把捉不住隨歸房左手重不能舉十八日早左邊半體手足皆不為用矣亟令人逆豫豫適在前丘吳宅及至公驚喜交集曰君何先見若此也先少保患在左體不遂者三年而歿不佞今亦左體其風水致然歟第先少保年七十餘不佞四十有七先少保不能遇先生不佞賴有先生或可企無恙也豫始觀面色赤口微喎向右唇麻手足軃拽已成癱瘓診其脈左弦大右滑大先用烏藥順氣散一帖服後昏睡半日醒覺面更加赤喎也稍加知痰盛使然即以二陳湯加全蠍殭蠶天麻黃芩石菖蒲紅花秦艽水煎臨服加竹瀝一小酒杯生薑汁五茶匙一日兩進晚更與活絡丹服至第六日手指梢頭略能運動足可倚棹而立豫喜曰機動矣改用歸芍六君子湯加紅花鉤藤天麻竹瀝薑汁服二十帖行可二十步矣手指先麻木不知痛癢至是能執物繼用天麻丸兼服全鹿丸調理百日病去十之九次年二月北上補任永清公以病後能戒色斷酒自知培養故藥功獲奏此症豫歷治歷效者良由先為疏通經絡活血調氣然後以補劑收功惟經絡疏通宿痰磨去新痰不生何疾不瘳此治類中風之法也見所公白濁有發明見所公弱冠隨尊君大司馬印老治河居北患白濁精淫淫下自北地山東淮揚鎮江及江右三吳諸名家醫藥三年不效癸酉冬禮豫診之其脈兩寸短弱兩關滑兩尺洪滑觀其人襟期瀟灑出塵而神色閒雅真翩翩佳公子也一接見便就昵而信余請藥豫曰公疾易愈第待來春之仲一劑可瘳而今時不可公固請曰先生大方而善拯人之急以大方而治小疾試可立效何待來年豫曰非祕其術不售也素問有云升降浮沉必順之又曰天時不可伐公脈為濕痰下流症也經曰治痰必先理氣而脈書亦謂洪大而見於尺部者陽乘於陰也法當從陰引陽今冬令為閉藏之候冬之閉藏實為來春發生根本天人一理若不顧天時而強用升提之法是逆天時而泄元氣根本既竭來春何以發生故素問曰必先歲氣毋伐天和必養必和待其來復公疾本小而歷治三年不效者良由諸醫不知脈不識病不按時也公聞言唯唯乃尊君所遣之醫踵接治竟無效至春分而逆豫以白螺螄殼火煅四兩為君牡蠣二兩為臣半夏葛根柴胡苦參各一兩為佐黃柏一兩為使麵糊為丸名曰端本丸令早晚服之不終劑而全愈公復書曰賤疾果如先生言今勿藥也何歷治三年不效竊謂天下無藥服端本丸而愈又信天下有藥矣凌夫人孕少司空凌繹老夫人蔣適繹老無幾腹脹痛發熱經過期不行者五日諸醫皆以經期作痛為調經不效而繹老召豫診左寸洪滑兩尺皆滑數左尺之外更有神氣豫喜而語繹老曰經閉非病孕也産必男繹老雅信豫因究其說豫曰滑非經閉之脈左尺尤有神氣是以知産必男也繹老謂果孕矣奈發熱腹痛何豫曰何傷氣虛血熱耳以安胎飲加減調理即安也用人參白朮白芍藥為君川芎當歸為臣香附柴胡蘇梗條芩甘草為佐四帖腹痛減熱除至期果生子繹老德余而多推轂云金元岩令眷産後痢金文學元岩之眷産後兩日腹痛下痢純紅腸鳴三越月時當孟秋兩脈皆軟弱用佛手散加減以治川芎三錢當歸五錢艾葉炮姜各一錢桂心五分酒炒白芍藥二錢連進三帖而疾減半後因食新菱新栗又連為怒氣所激日晡暈厥以生薑湯灌蘇腹脅大痛手不可近用二陳湯加香附砂仁桂皮炮姜與之痛亦不減且胸膈脹甚自以手探喉中吐出菱栗痛稍定少頃復痛又用手探吐吐後瀉三四次而元氣脫矣脈皆散亂如解索狀神氣憊而恍惚循衣摸床病勢危急用人參白朮各五錢酒炒白芍藥二錢砂仁炮薑肉桂甘草各一錢急煎進之痛乃稍定精神清仍瀉二次次日復進藥痛減瀉止加白朮又四帖而飲食進精神勃勃興起矣此因初痢時醫者不以産後為重徒以治痢苦寒之劑傷其中氣又為菱栗生冷所損中氣益壞然也治可不慎哉沈別駕夫人産後發熱有發明沈三石別駕公夫人嚴産三日而腹不暢南潯女科陳姓者為下之大瀉五六次遂發熱噁心又用溫膽湯止吐小柴胡退熱服四日熱吐四日粒米不進亦四日又進八珍湯加童便服後昏憒耳聾眼合口渴腸鳴眼胞上下及手足背皆有虛浮因逆豫治診其六脈皆數時五月初二日也豫曰脈書云數脈所主其邪為熱其症為虛法當以十全大補湯加炮姜進之夜半稍清爽進粥一盂始開目言語次日午時以承值者倦而藥不相接且言語太多復昏昧不知人事初四日以人參白朮各三錢炮薑茯苓陳皮各一錢甘草五分煎服訖體微汗遍身痱痤熱退而神爽下午又藥不接又動怒昏昧復如前六脈散亂無倫狀如解索痱痤沒而虛極矣亟以人參白朮各五錢炙甘草炮姜大附子各一錢連進二帖是夜熟寢唯呼吸之息尚促初六日脈又數下午發熱不退環跳穴邊發一毒如碗大紅腫微痛夫人父嚴翁與陳女科交譖之曰向之發熱噁心皆此所致由附子乾薑溫補誤也須急用寒涼解毒之劑豫正色而諭以理曰此乃胃中虛火遊行無制大虛之症非毒也若作毒治而用寒涼速其死爾內經云壯者氣行則愈怯者著而成病惟大補庶可萬全三石翁然豫言急煎附子理中湯進之日夕兩帖參術皆用七錢服後痱痤復出毒散無蹤熱亦退沾沾喜矣復以參苓白朮散調理而全安皆由産後誤用下藥致變百出噫唏彼不達變之專科其可任哉吳太夫人白帶誥封吳太夫人者車駕湧瀾公母也年餘六十久患白帶歷治不效變為白崩逆豫治之診得右寸滑左寸短弱兩關濡兩尺皆軟弱豫曰據脈心腎俱不足而中焦不濕脈經云崩中日久為白帶漏下多時骨木枯今白物下多氣血日敗法當燥脾兼補心腎以既濟丹補其心腎以斷下丸燥中宮之濕則萬全矣服果不終劑而愈既濟丹方鹿角霜當歸白茯苓各二兩石菖蒲遠志各一兩五錢龍骨白石脂各一兩益智仁五錢乾山藥打糊為丸梧桐子大空心白湯下七八十丸斷下丸方頭二蠶砂炒三兩黃荊子炒二兩海螵蛸磨去黑甲樗根白皮各一兩麵糊為丸下午白湯送下六十丸吳北海令政經行四肢纍纍發塊紅紫吳北海太學令政每月經行期之前四肢纍纍發塊紅紫脹痛不思飲食胃脘亦常痛經水多不及期診其脈兩手皆駛以症脈參之肝脾二經有鬱火也蓋肝主怒脾主思多思多怒隱而不發鬱滯於中故臨經纍纍發紅腫於四肢也以柴胡川芎香附烏藥白芍藥青皮丹參玄胡索鬱金酒炒黃連山梔子治之而愈周芻玉白濁吳之清客周芻玉者豪放不拘人言有晉人風酒後益恣而好男色因患白濁吳醫有以補中益氣湯升提者有以六味地黃丸補陰者有以五苓散六一散滲利者有為降火者有為溫補者不效又以草頭藥亂進之肌瘦如削膝軟如痿患有年所矣因紹介吳太學北海而謁余懇為治之診其脈右寸關皆數豫曰皆由酒後不檢所致也中宮多濕多痰積而為熱流於下部故濁物淫淫而下久不愈矣與以加味端本丸服之而瘥白螺螄殼四兩牡蠣苦參葛根黃柏各二兩陳皮半夏茯苓各一兩甘草五錢麵糊為丸令早晚白湯下三錢竹匠婦妊娠吐血胸腹脹痛有發明丁酉夏豫寓雉城顧鄉宦宅其門下竹匠婦懷妊五月而患心痛究其所由起謂由失足墜樓也始教飲韭菜汁一盞而痛隨止其夫又從他醫贖藥二帖歸令煎服服既心復痛吐鮮血盈盆胸間忡忡上抵疼不可言危在頃刻竹匠告急豫僕孫安安憐之懇豫診治六脈皆洪大汗出如雨喘息不相續其婦樓居低小豫令亟移居樓下隨與益元散五錢令用紫蘇湯調服又囑之曰今夜若睡聽其自醒切勿驚動汗止即蘇也服後果睡至曉汗斂而胸膈不痛喘息亦定再與固胎飲一帖煎服而安全矣先是鄰醫診其脈謂吐血之脈宜沉細今反洪大而汗出喘息不休危在今夜及病起來詢余曰妊婦不得汗不得下不得利小便是謂三禁昨日之劑悉犯之而反獲效何哉豫曰醫貴審證蓋婦之患非由病汗以樓居低小當酷暑而熱逼故也汗血去而胎失養故忡忡上抵喘息不續移樓下以避暑氣益元散為解暑之聖藥而紫蘇又安胎下氣之妙品氣下則血歸原而病痊矣此對症之藥法出王海藏醫壘元戎中四血飲是也特諸君檢閲不遍即檢閲亦不知為胎産之治余何能不過融會前人之法用之不膠焉耳鄰醫俯首唯唯而退李妓夢遺咳嗽壬申仲秋豫東遊槜李而王松泉吳小峰偕行小峰語豫中秋至矣此間一妓李姓者行第七殊可人意須訪之晚令佐酒至則見其態度果淡雅風致坐少頃連咳兩聲少峰究其病曰偶耳小峰謂毋誑孫公知人生死不啻扁鵲可求一診診之兩寸短澀兩尺洪滑關弦豫未語而小峰問脈豫曰脈甚怪公可問經行否曰行僅一日亦僅點滴豫曰此脈在良家主夢遺若不宜有也妓曰良然即御客時亦或遺遺則冷汗淫淫體倦而不能支小峰為請藥豫曰姑置之小峰問何故豫曰金木相勝心神無主法當不治小峰謂人尚無恙何得便至於此豫曰弦為春令當金旺之時猶然猖獗設在卯月木旺火相肺金枯萎水之上源已竭且腎脈洪滑妓以欲勝陰血既虧淫火愈熾書云陰虛則病陰絶則死今已咳嗽其兆見矣可治乎次年二月果死金妓時疫有老妓金姓者其嫂三月患頭痛身熱口渴水瀉不止身重不能反側日漸昏沉耳聾眼合夢多亂語嘉秀醫者歷試不效視為必死豫適吳江歸便道過槜李訪南溪吉泉二兄吉泉兄以是症見詢且言諸醫有以補中益氣湯進者有以附子理中湯進者二藥已煎成未服幸弟至乞為診之六脈洪大觀其色內紅外黑口唇乾燥舌心黑胎不知人事豫曰此疫症也法當清解急以小白湯進之猶可生也若附子理中湯殺之耳安可用南溪兄問小白何湯也豫曰小柴胡白虎湯合而一之是也南溪兄謂泄瀉昏沉如此恐石膏不可用也豫曰此挾熱下痢但使清陽上升則瀉止熱退而神氣自清也服訖夜半神氣蘇醒惟小水不利熱渴不退豫思仲景法謂渴而身熱不退小便不利者當利其小便乃以辰砂六一散一兩燈心湯調服之兩帖而瘳南溪兄曰死生信乎命也弟頃刻不至必服理中湯此婦不為泉下人哉曹鏜胸膈不暢有曹姓諱鏜者九月重陽以胸膈不舒暢而謁南溪兄為治診未竟豫至南溪兄起語曹曰舍弟高手浼診之診訖未有言而南溪私問曰曹何如脈豫曰不治會易貨者沓至豫亦別去曹果次年二月死南溪兄問曰何曹無它病而弟見脈即斷不治何也豫曰其脈兩寸洪滑搏指兩關微弦兩尺微弱難經所謂溢脈也九月深秋木凋零時也不宜弦大大則上盛下虛至二月木旺木能生火火木性皆上升不下下無真陰以相濟是有陽無陰有升無降內經曰出入廢則神機化滅升降息則氣立孤危是以斷曹子二月當嘔吐而死也李雙痛風嘉善之妓李雙號素琴體雖肥而性沖淡態度閒雅端重歌調娼家推其擅場與豫邑程芹溪處厚患痛風自二月起至仲冬諸治不效鴇母慳毒遂視為痼疾不為治而芹溪固懇豫診之六脈大而無力手足肢節腫痛兩跨亦痛不能起止肌肉消其半日僅進粥二碗月汛兩月一行甚少豫曰此行痹也芹溪問病可治否豫笑而應曰君能娶豫能治之芹溪曰嫁娶乃風月中套語公長者乃亦此言豫曰觀此子雖墮風塵實有良家風度豫故憐之且君斷絃未續而彼有心於君或天緣也芹溪曰誠吾素願恐鴇母高其價而難與言豫謂乘其病而盟之易與耳芹溪以豫言為然乞為治之以人參白朮苡仁各三錢當歸枸杞杜仲龜板蒼耳子各二錢晚蠶砂秦艽防風各一錢大附子甘草桂枝黃柏各五分十帖而痛止腫消改用歸芍六君子加苡仁丹參紅花石斛紫荊皮三十帖而痊愈芹溪娶之善持家舉族稱賢而亦羡豫知人焉沈別駕門下老僕三陽合病有發明沈別駕翁有老僕頭痛遍身骨節痛面色黑發熱口渴胸膈膨脹飲食七日不入復感寒人皆危之豫診其脈左弦數右洪大以藿香蒼朮防風葛根白芷紫蘇甘草陳皮大腹皮麥芽枳實服後胸膈稍寬熱與痛更甚改以麻黃葛根柴胡各二錢石膏滑石各三錢紫蘇葉白芷蒼朮各一錢甘草五分姜三片服後大汗出而熱痛皆除惟口渴又以白芍藥當歸石膏知母柴胡黃芩麥冬葛根陳皮煎服痊愈別駕翁喜詰豫曰老僕病甚重無不謂其必死先生三日起之此何症而何湯劑飲之使起也豫曰此三陽合病先為飲食所傷豫故先用藿香正氣湯加消導之劑治其本又以六神通解散加助表之藥治其標病雖重年雖高喜其色脈相對故投以對症之藥易愈也翁曰在先生然耳若他人輕者且重況重者乎吾未見其能起也蔡中林內人陽明少陽合病蔡中林文學內人發熱口渴舌上燥裂小腹痛嘔吐藥食不能入者七日諸醫之技殫矣皆視為膈食而不可為吳我峰翁固邀豫診右寸脈絶不應指關沉滑有力左手弦數豫曰此陽明少陽合病邪熱壅於上焦然也非膈食法當解散數劑可愈無恐以軟柴胡石膏各五錢半夏曲枳實黃芩黃連葛根竹茹人參各二錢姜三片煎服藥納而不吐五更下黑糞數塊熱痛減半次日仍與前藥右寸脈至是亦起粥始進改用小柴胡加橘紅竹茹葛根服三帖而全安吳九宜先生早晨泄瀉吳九宜先生每早晨腹痛泄瀉者半年糞色青腹膨脝人皆認為脾腎泄也為灸關元三十壯服補脾腎之藥皆不效自亦知醫謂其尺寸俱無脈惟兩關沉滑大以為憂以人言泄久而六脈將絶也豫為診之曰君無憂此中焦食積痰泄也積膠於中故尺寸脈隱伏不見法當下去其積諸公用補謬矣渠謂敢下耶豫曰何傷素問云有故無殞亦無殞也若不乘時久則元氣愈弱再下難矣以丹溪保和丸二錢加備急丸三粒五更服之巳刻下稠積半桶脹痛隨愈次日六脈齊見再以東垣木香化滯湯調理而安渠稱謝言曰人皆謂六脈將絶為虛極公獨見之真而下之由公究理深邃故見之行事著之談論皆自理學中來他人何敢望其後塵沈大官左膝腫痛不能起止沈大官左膝腫痛不能起止者年半大便瀉一日三次診其脈弦緊豫曰此脾虛有濕熱凝於經絡流於下部也古謂腫屬濕痛屬火用蒼朮黃柏薏苡仁為君澤瀉豬苓五加皮為臣炙甘草防風桂枝為佐木通為使四帖痛減腫消泄瀉亦止改用蒼朮蒼耳子五加皮苡仁當歸枸杞子杜仲丹參黃柏烏藥葉酒糊為丸調理月餘步履如故沈繼庵下痢脫肛內人乾霍亂沈繼庵先生下痢十二日腹痛脫肛後重噯氣不知飢一友用補中益氣加白芍藥腹痛愈加後重亦甚豫脈之右關滑大搏指曰此積滯固結腸胃間故後重脫肛也當為推蕩以其素弱多郁不敢只為調氣而兼消導木香山楂檳榔枳實川芎白芍藥黃連黃芩秦艽服後稍寬次日用七傷丸二帖痊愈其內人患發熱頭痛遍身痛乾嘔口渴胸膈脹悶坐臥不安醫與以參蘇飲乾嘔愈甚又加煩躁豫診之右手洪大倍於左左浮數豫曰乾霍亂症也與以藿香正氣散減去白朮桔梗加白扁豆香薷一帖吐止食進遍身痛除惟口渴額痛未除小水不利以石膏香薷滑石各五錢橘紅藿香葛根各二錢檳榔木瓜各一錢甘草五分姜三片一帖而愈沈晴嶽先生五更耳鳴沈晴嶽先生五更耳鳴腹不舒暢稍勞則烘然熱自汗脈右關滑大有力左脈和緩原為當風睡臥而得素來上焦有痰火午後過勞或受餓大作眩暈冷汗津津再不敢動稍動則嘔吐此皆痰火所致蓋無痰不作暈也先與藿香正氣散一帖以去表裡之邪繼與溫膽湯加天麻服後眩暈嘔吐皆止次日診之右關脈仍滑此中焦食積痰飲膠固已久卒難動搖姑以二陳湯加枳實黃連滑石天花粉天麻竹茹調理後以當歸龍薈丸加牛膽南星青礞石凡數帖痊愈潘景宇內人頭痛作瀉潘景宇內人後半夜不睡面黃肌瘦兩太陽及眉稜骨痛大便溏稍勞動則體熱四肢無力其脈左寸洪滑自春至秋皆然此由脾虛肝心二經火盛然也先用四君子加酒連柴胡白扁豆澤瀉滑石調理夜與錢仲陽安神丸數粒燈心湯送下服八日得睡兩太陽亦不痛繼用六君子加黃耆秦艽柴胡澤瀉當歸白芍藥黃柏全安臧六老上吐血下瀉血臧六老上吐血下瀉血胸膈背心皆脹原從怒觸又犬肉所傷故發熱而渴醫者皆作陰虛火動而為滋陰降火胸背愈脹血來更多豫診之兩關俱洪滑有力謂曰此肝脾二經有餘症也作陰虛治左矣內經曰怒傷肝甚則嘔血並下泄胸背脹痛瘀血使然脾為犬肉所傷故不能統血今誤用地黃麥冬黃柏知母等劑是以脾益傷而上焦瘀血愈滯也惟調氣健脾兼之消導則萬全矣六老曰人皆謂勞怯故發熱吐紅血上吐陽絡傷也血下行陰絡傷也陰陽俱傷法當不治公獨認非陰虛何也豫曰脈書云脈數無力者陰虛也今脈固非陰虛書又曰凡陰虛之熱發於申酉戌間夜半而退明日猶是如潮信然以下午乃陰分主事故曰陰虛潮熱也今熱不分晝夜而症亦非陰虛故曰作陰虛治者左也六老聞言大喜曰公誠見垣一方者幸惠一匕以生之即與山楂香附枳實調氣消導為君丹參丹皮桃仁滑石茅根化瘀血為臣黃連蘆根解犬肉之熱為佐四帖胸背寬血吐止惟腹中不舒仍以前藥同丹溪保和丸與之四帖大便下極臭黑糞半桶寢食俱安矣臧氏婦臍邊痛下痢紅白有臧氏之婦原以有痰火服降火之藥過多至秋痰積因令氣下行而滯於大腸臍邊有硬塊按之甚痛痢下紅白八日下惟點滴日夜二十餘行腹痛潮熱口渴小水不利大便裡急後重飲食不進身重不能轉側豫診之喜左脈皆有神氣即從劉守真之法行血則便膿自愈調氣則後重自除治之用白芍藥滑石桃仁為君當歸為臣木香檳榔山楂酒芩酒連枳殼為佐服下大便稍流利腹中稍寬舒次日仍與前藥則滯下大行痢減大半第三日用芍藥當歸滑石桃仁炙甘草酒連木香與保和丸同服下午大便行上午所服丸藥隨糞而下乃知積滯已盡諸症悉減惟臍邊痛未全止以仲景小建中湯加當歸木香服之而安丁耀川令堂吐血左胯肛門互換作痛丁耀川文學令堂年四十四常患胃脘痛孀居十五年日茹蔬素其年七月觸於怒吐血碗許不數日平矣九月又怒而吐血如前加腹痛至次年二月忽裡急後重肛門大疼小便短澀出惟點滴痛不可言腰與小腹之熱如滾湯泡者日惟仰臥不有側一側則左跨並腿作痛兩跨原有痛小便疼則肛門之痛減肛門疼則小便之痛亦減肛門以疼之故不能坐遇驚恐則下愈墜而疼經不行者兩月往常經來時腰腹必痛下紫黑血塊甚多今又白帶如注口渴通宵不寐不思飲食多怒面與手足發虛浮喉中梗梗有痰肌肉半消診之脈僅四至兩寸軟弱右關滑左關弦兩尺澀據脈上焦氣血不足中焦有痰下焦氣凝血滯鬱而為火蓋下焦之疾肝腎所攝腰胯肝之所經而二便乃腎之所主也據症面與手足虛浮則脾氣甚弱飲食不思則胃氣不充不寐由過於愁憂思慮而心血不足總為七情所傷故爾內經云二陽之病發心脾女子得之則不月此病近之且值火令當權之候誠可慮也所幸者脈尚不數聲音清亮尤可措手因先為開鬱清熱調達肝氣保過夏令後再為驟補陰血必戒絶怒氣使血得循經而病可痊不然則倉扁亦難奏功矣初投當歸龍薈丸以徹下部之熱繼以四物湯龍膽草黃柏知母柴胡澤蘭葉煎吞滋腎丸連服四日腰與小腹之熱始退後以香薷石葦龍膽草桃仁滑石杜牛膝甘草梢軟柴胡煎吞滋腎丸大小便痛全減丁文學令姊暈厥丁文學長令姊常患暈厥吐痰碗許乃蘇一月三五發後又口渴五更倒飽腸鳴腹疼泄瀉小水短澀咳嗽餘脈之兩寸濡弱兩關滑大此中焦痰積所致也先與二陳湯加蒼朮山楂麥芽以健脾祛濕為臣以白芍藥止痛為君以滑石澤瀉引濕熱從小便出為佐黃芩為裨佐十帖二陰之痛俱止改以六味地黃丸加黃柏知母牛膝服之而安金良美咳嗽吐紅潮熱左脅不能臥有金良美者年十八患咳嗽吐紅下午潮熱夢遺市醫進四物湯加天門冬黃柏知母之類治半年反加左脅脹疼不能側臥聲音漸啞飲食輒噁心肌肉大削六脈俱數醫告技窮因就豫治觀其面色白又隱隱有清氣夾之兩足痿弱無力豫語之曰此症氣虛血熱而肝脈甚弦弦則木氣太旺脾土受虧不能統血殆始怒氣所觸繼為寒涼之劑所傷以致飲食噁心肌肉瘦削書云脾胃一虛肺氣先絶以肺金不足則肝木愈不能制濁痰瘀血凝於肺竅故咳嗽聲啞滯於肝故左脅不能貼席而臥病勢危矣喜在青年猶可措手因急用人參二錢鱉甲五錢為君白朮白芍陳皮茯苓通草貝母各一錢為臣甘草牡丹皮各七分為佐桔梗五分為使二十帖潮熱止咳嗽減大半三十帖聲音開亮左脅亦能貼席而臥後以大造丸調理全安矣乃囑之曰病愈雖可喜而弦脈未退須切忌怒氣及勞心勞力之事庶幾可保無虞苟不守豫言而勞怒相觸血來必不能御戒之防之此後精神日旺肌體半肥六年無事一日遇事拂意大怒而又結算勞心則血如泉湧頃刻盈盆上唇黑腫汗出淋漓急請豫診脈亂無倫診畢渠語近侍欲大解豫曰此死徵也陰陽乖離矣辭而出未離門而氣絶父母哭謝豫曰始守翁訓苟活六年一旦不戒遂如翁所料死生雖命亦不自慎致之其為人也量窄而緊於財因記此以戒世之重財輕生者倪五娘子口眼歪斜倪五娘子以中風暈厥之後口眼歪斜左腳右手不能屈伸口渴小水不利兩頰緊出語艱澀問之則期期而對不問默然亦不思飲食行年五十矣諸醫不效豫治始與涼膈散加石菖蒲遠志煎湯化錢氏安神丸二顆服之其夜大便四行次日神氣遂清口眼半正惟頰車尚緊未能開聲細察形氣似弱也即與六君子湯加麥門冬滑石天花粉石菖蒲遠志當歸薄荷服後神思大清爽能自坐不須人扶語言亦少利改以六君子湯加麥冬天花粉石菖蒲當歸五加皮薏苡仁紅花天麻十帖痊愈矣王祖泉令政頭痛惡寒汗出如雨王祖泉令政患頭疼夜熱灑淅惡寒汗淋漓如雨上身熱下身寒渴不思飲遍身疼腹有一塊大如拳硬如石腸鳴小水短少飲食俱廢脈則右關滑左弦數究所由起謂大怒後即傷於食市醫皆以地黃門冬芩連黃柏之劑治之熱愈甚脾氣大虛豫治用平胃散加山楂麥芽砂仁香附木香川芎枳實連進四帖中氣稍能運動而夜熱如前再與補中益氣湯寒熱俱退矣而腹痛裡急後重豫知其積滯將行也乃與白六神丸而腹痛後重皆除改進以參苓白朮散加香附烏梅山楂服之病良已溫巽橋子婦滯下溫巽橋子婦吳車駕湧瀾公長女也發熱噁心小腹痛原為怒後進食因而成積左腳痠已十日矣南潯有陳女科始作瘟疫療治嘔噦益加又作瘧治粒米不能進變為滯下裡急後重一日夜三十餘行陳技窮而辭去且言曰非不盡心犯逆症也下痢身涼者生身熱者死脈沉細者生脈洪大者死今身熱脈大而又噤口何可為哉因請豫治脈之兩手皆滑大尺部尤搏指豫曰症非逆誤認為疫為瘧治者逆也雖多日不食而尺脈搏指內經云在下者引而竭之法從下可生也即與當歸龍薈丸一錢五分服下去稠積半盆痛減大半不食者十四日至此始進粥一甌但胸膈仍飽悶不知餓又與紅六神丸二錢胸膈舒而小腹軟惟兩跨痛小腹覺冷用熱磚尉之子戶中白物綿綿下小水短澀改用五苓散加白芷小茴香白雞冠花柴胡服之至夜滿腹作疼亟以五靈脂醋炒為未酒糊為丸三錢白湯送下通宵安寢次日精神清健飲食大進小水通利矣而獨白物仍下再用香附炒黑存性枯礬各一兩麵糊為丸每空心益母草煎湯送下二錢不終劑而白物無病痊愈矣專科赧然稱奇而服録其案驗而去溫一渠內人血虛咳嗽溫一渠內人平素血虛咳嗽近為飲食所傷不知飢餓專科作陰虛治而胸膈愈脹豫脈之右關滑大左手軟弱法當先健脾消去飲食然後治嗽若為補陰降火不惟咳嗽無功恐脾胃轉傷腹脹瀉泄變將不測何也脾胃喜溫而誤寒也即以二陳湯加山楂麥芽枳實白朮川芎香附與之一劑而胸膈寬再劑而飲食進繼用桑白皮地骨皮甘草陳皮貝母栝蔞仁馬兜鈴桔梗紫菀十帖而咳嗽脫然矣溫巽橋二令媳産後脅脹痛白帶如膿溫巽橋二令媳産後五十餘日右脅脹痛手不可近赤白帶多下如膿發熱大便燥結豫曰此惡露未盡瘀血化為膿治宜急也嘗見數婦有此病而不識治積而成毒有成腸癰者有內成腫毒潰從腰俞出者皆以不知治法則瘀血無從出故也急用澤蘭葉山楂子五靈脂消惡露為君川芎當歸茯苓白芷為臣益母草為佐香附青皮為使外與當歸龍薈丸潤大便使熱從大便去服後次日腹脅皆寬痛亦盡止又因食葷與雞子復作疼但不如前之甚隨與保和丸用山楂煎湯送下三錢而痛愈矣溫天衢病目吐血溫天衢氏冬月病目醫為發散太過至春間吐血碗余及夏下午潮熱咳嗽胸膈脹疼早晨冷汗淋漓大便溏一日兩行飲食少肌肉消十之七脈數據症脈法在不治里中諸長老以其素行端厚群然懇豫措劑豫以衆懇不能辭乃用瀉白散加五味子白芍藥貝母馬兜鈴服下其夜帖然而臥不嗽惟大便溏前藥加白扁豆山藥茯苓汗亦漸止復與瀉白散加石斛馬兜鈴貝母陳皮薏苡仁白芍藥山藥五味子桔梗調理三月而痊張二娘子孕七月嘔吐不止張二娘子妊七月而嘔吐不止氣壅咳嗽胸與兩脅皆脹不能伏枕豫先與金花丸二服以止吐服下立應繼與大腹皮陳皮枳殼半夏甘草竹茹茯苓旋覆花前胡紫菀黃芩生薑服二帖氣平嗽止安然睡矣金花丸者雄黃一錢五分半夏一兩檳榔二錢薑汁浸蒸餅糊為丸是也王敬泉內眷痰嗽腹脹王敬泉內眷患痰嗽腹飽脹泄瀉腸鳴裡急後重發熱口鼻之氣如火塞以六君子湯加山楂麥芽柴胡秦艽青蒿白芍藥益智仁與香連丸兼服兩劑氣舒嗽減大便結實鼻仍塞前方加川芎減白芍藥而安溫南溪內人大便祕結溫南溪內人居常大便祕結面赤不思飲食頭時眩暈診其脈右關尺滑大有力此痰火症也用栝蔞四錢為君滑石三錢枳實二錢半夏一錢半為臣蘿蔔子薑黃各一錢為佐兩帖愈矣又教以或遇大便祕結每服當歸龍薈丸加牛膽南星一錢立應陳春野公令愛丁奚疳痢陳春野孝廉二令媛患丁奚疳痢四肢浮腫以布袋丸與大安丸同服則大瀉用參苓白朮散加澤瀉山楂麥芽瀉亦不止神氣大弱穀粒不入口小水不利大便一日仍三五次積滯未除改以參苓白朮散加肉果與服瀉稍止食粥一盞下午因食紅棗數枚夜分痰忽起其勢甚危急與蘇合丸服之而愈再以參苓白朮散加石菖蒲藿香炮薑肉果調理全安潘敬齊令媳血下筋膜如手大者一二桶潘敬齊令媳原因經水不行醫投安胎之劑越七月經水忽大行內有血塊筋膜如手大者一二桶昏冒困憊為劇逆豫治其脈右關洪滑左寸洪數兩尺皆洪大病形夜分咬牙亂語手心熱口噤時手足皆冷心頭脹悶不快面色青始諸醫皆謂難治豫曰無恐此濁痰流滯血海以誤服安胎之劑益加其滯夫血去多故神魂無依痰鳴心竅故神昏語亂急為調氣開痰安神養血可生也即以溫膽湯加石菖蒲酒芩天麻酸棗仁丹參與服其夜子丑時咬牙亂語皆減半次日仍與前藥每帖加竹茹五錢臨睡又與黑虎丹數粒諸症悉去而愈敬齊問曰藉高手病痊矣而每發於夜半何也豫曰此心包絡與膽經有痰熱故每至其時而發單治此兩經痰既消而神魂俱安也敬齊曰善張懷赤公早晨泄瀉下元虛寒上舍張懷赤每早晨腸鳴瀉一二度晚間瀉一度年四十二且未有子豫診之尺寸短弱右關滑大豫謂此中焦有濕痰君相二火皆不足故有此症以六君子湯加破故紙桂心益智仁肉豆蔻煎服瀉遂減半又以前藥加杜仲為丸服之而愈次年生子臧七房二老夫人痢臧七房二老婦人年六十八患痢痢後過食熟菱與腐湯以致大便滑泄不固飲湯水徑直下不停胸膈痞悶語言無力舌乾口燥生瘡咽津液則喉疼元氣大虛而熱皆虛火所致且長素二十餘年又當痢後益知非有餘之症也脈又尺寸俱弱兩關滑大內經云清氣在下必生飧泄濁氣在上必生䐜脹此之謂也法當提清降濁補助元氣用四君子湯加葛根白芍藥黃連清虛熱止燥渴為君桔梗輔佐葛根升提清氣為臣陳皮麥芽降其濁氣以消胸膈痞悶為佐加烏梅為使上使生津下使止濁連服二劑尺寸之脈稍起飲食亦得停腹駸駸然始有生氣仍以前方加白扁豆神麯打糊為丸調理而安蔡樂川令眷頭痛如破蔡樂川令眷患頭痛痛如物破髮根稍動則痛延滿頭暈倒不省人事逾半時乃蘇遍身亦作疼胸膈飽悶飲湯水停膈間不下先一日吐清水數次蛔蟲三條原為怒起今或惡風或惡熱口或渴或不渴大便祕脈則六部皆滑大有力豫曰此痰厥頭痛症也先以藿香正氣散止其吐繼以牛黃丸黑虎丹清其人事頭仍疼甚又以天麻藁本各三錢半夏二錢陳皮白芷薄荷麻黃生薑蔥白煎服得少汗而頭痛少止至晚再服之五更痛止大半而人事未全清豫謂此中焦痰盛非下不可乃用半夏五錢巴霜一分麵糊為丸每服三十丸生薑湯送下下午大便行三次皆稠黏痰積也由此飲食少進餘症瘥可惟遍身仍略疼改用二陳湯加前胡石膏藁本薄荷枳殼黃芩石菖蒲調理而安周蘆汀乃眷胃脘痛周蘆汀乃眷患胃脘痛手心熱嘔吐不食者四日晝夜叫痛不輟聲脈則兩手皆滑數豫謂當以清熱止痛為先故先與清熱止痛末藥二錢令服之不一飯頃痛遂止而睡家人皆色喜豫曰未也此火暫息耳其中痰積甚固不乘時而下之勢必再作因與總管丸三錢服下腹中微痛再服二錢又睡至天明乃寤而腹痛亦止大便下痰積甚多次日以二陳湯加枳實薑黃香附山梔黃連與之服後胃脘之痛全止惟小腹略覺膨脝豫謂其痰積未盡也再與總管丸三錢夜服之天明又行一次痰積之下如前而胃脘之痛亦絶不發矣
