body:
  text: 孫序蓋士君子有濟世之心者必托經世之術以運之遇不遇無論也何也得時而駕則宇內之休戚利害隱然共之視其患若切於身之疾痛疴癢不措之安全不止此士君子之心得位以行之者也不幸不獲遇澤不及物而心不得施有志君子往往懷其道而隱於醫故是昔人謂濟人利物無位者不能惟醫以救死扶生為功故業之者可以推不忍之心及於物而於道有益有味乎其言之也然醫豈易言哉吾聞其宗旨自內經本草以來書之藏於有司者一百七十九家非博通巨儒超悟上哲專攻其業何能探討洞明其陰陽寒熱靜躁虛實消息盈縮之奧而措之行事夫人之待命於醫生死攸系乃以未諳淺薄者嘗試之其不賊人之命者幾希醫以濟人至於賊人可不畏耶此醫之所以難言也余頃多病謁告山居嘗嘆濟物之衷未措於用顧思延醫以求濟其身然而醫之良者苦不一遇也乃壬申仲秋吳君柳溪談新安海陽有孫君東宿者醫可謂稱良矣余亟請而相印證之耳其論渢渢乎素難之旨而表裡夫張劉孫李丹溪伯仁諸家其視余疾也未投藥先談余之經絡色脈機能與受病之自即勿藥而余病爽然若失及詳察其端方之度沉著之思淵淵之閫奧則杳焉莫竟其涯非所謂深於道而隱於醫者耶余因詰之曰神農嘗百草先天而命之藥黃帝岐伯後天而著之經此天以神授聖以神符不可及矣嗣後若和扁華他淳于意仲景思邈河間東垣朱滑莫不簸弄化機制人命於掌上術亦神也何今日之事是業者不能踵其芳躅耶抑世代之不同也孫君勃然曰古今人非不相及用心殊爾宋儒有言古之仁者為人今之仕者為己不佞亦謂古之醫者為人今之醫者為己道不同而受病一也夫士君子之視天下與吾身血脈相流通天下病若痌瘝之切身天下安則愜然而無恨雖以道為藥石者其濟宏以醫為道術者其濟狹其心一也故古之醫也以救死扶生之心其業專而用方也慎專則精而造詣入室慎則審而投藥奏功此和扁諸名家所以悉臻祕妙稱神奇今之醫則異是也將以市利非以濟人黃岐以來諸書非不剽竊以資口説乃其心則實胡越一膜視天下率以利之盈絀為心之重輕人之濟與否若與吾術不相關此何以比古人而接其芳躅哉不佞奎何能造古賢哲之閫奧第無愧於此心爾余聞而喟然嘆曰孫君充是心而行是術其將大有裨於時矣雖隱而亦顯也因次其語而歸之爰以訂夫業是術者是為序時萬曆癸酉中秋日吳江孫質庵從龍敬書於符丸草堂
